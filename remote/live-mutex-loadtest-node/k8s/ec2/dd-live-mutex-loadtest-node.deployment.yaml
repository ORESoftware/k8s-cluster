apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-live-mutex-loadtest-node
  namespace: default
  labels:
    app: dd-live-mutex-loadtest-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-live-mutex-loadtest-node
  template:
    metadata:
      labels:
        app: dd-live-mutex-loadtest-node
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: docker.io/library/node:22-bookworm-slim
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              cd /opt/dd-next-1/remote/live-mutex-loadtest-node
              npm ci --omit=dev --ignore-scripts
              exec node src/main.js
          env:
            - name: LOCK_BACKEND
              value: live-mutex
            - name: BROKER_HOST
              value: dd-live-mutex.default.svc.cluster.local
            - name: BROKER_PORT
              value: "6970"
            - name: REDIS_HOST
              value: dd-redis-cache.default.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REQUESTS_PER_SECOND
              value: "1000"
            - name: WORKER_PROCESSES
              value: "3"
            - name: CLIENTS_PER_WORKER
              value: "12"
            - name: LOCK_KEYS
              value: lmx-loadtest-a,lmx-loadtest-b,lmx-loadtest-c,lmx-loadtest-d,lmx-loadtest-e
            - name: LOCK_HOLD_MS
              value: "0"
            - name: LOCK_TTL_MS
              value: "4000"
            - name: LOCK_REQUEST_TIMEOUT_MS
              value: "3000"
            - name: UNLOCK_REQUEST_TIMEOUT_MS
              value: "3000"
            - name: LOCK_MAX_RETRIES
              value: "0"
            - name: MAX_IN_FLIGHT_PER_WORKER
              value: "2000"
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
            - name: TEST_DURATION_SECONDS
              value: "0"
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
