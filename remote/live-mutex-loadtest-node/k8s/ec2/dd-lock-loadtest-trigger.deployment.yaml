apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-lock-loadtest-trigger
  namespace: default
  labels:
    app: dd-lock-loadtest-trigger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-lock-loadtest-trigger
  template:
    metadata:
      labels:
        app: dd-lock-loadtest-trigger
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: trigger
          image: docker.io/library/node:22-bookworm-slim
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              cd /opt/dd-next-1/remote/live-mutex-loadtest-node
              npm ci --omit=dev --ignore-scripts
              exec node src/server.js
          env:
            - name: HTTP_PORT
              value: "8110"
            - name: DEFAULT_TEST_DURATION_SECONDS
              value: "60"
            - name: BROKER_HOST
              value: dd-live-mutex.default.svc.cluster.local
            - name: BROKER_PORT
              value: "6970"
            - name: REDIS_HOST
              value: dd-redis-cache.default.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REQUESTS_PER_SECOND
              value: "1000"
            - name: WORKER_PROCESSES
              value: "3"
            - name: CLIENTS_PER_WORKER
              value: "12"
            - name: LOCK_KEYS
              value: lmx-loadtest-a,lmx-loadtest-b,lmx-loadtest-c,lmx-loadtest-d,lmx-loadtest-e
            - name: LOCK_HOLD_MS
              value: "0"
            - name: LOCK_TTL_MS
              value: "4000"
            - name: LOCK_REQUEST_TIMEOUT_MS
              value: "3000"
            - name: UNLOCK_REQUEST_TIMEOUT_MS
              value: "3000"
            - name: LOCK_MAX_RETRIES
              value: "0"
            - name: MAX_IN_FLIGHT_PER_WORKER
              value: "2000"
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
          ports:
            - name: http
              containerPort: 8110
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "4"
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
