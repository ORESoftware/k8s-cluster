apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dev-server-api
  namespace: default
spec:
  template:
    spec:
      volumes:
        - name: workspace
          hostPath:
            path: /var/lib/dd/minikube/bootstrap-workspaces/dd-dev-server-api
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-remote-auth
  namespace: default
spec:
  template:
    spec:
      volumes:
        - name: repo
          hostPath:
            path: /workspace/k8s-cluster
            type: Directory
