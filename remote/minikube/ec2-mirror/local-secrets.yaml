apiVersion: v1
kind: Secret
metadata:
  name: dd-agent-secrets
  namespace: default
  labels:
    app.kubernetes.io/part-of: dd-ec2-mirror
type: Opaque
stringData:
  SERVER_AUTH_SECRET: local-dev-server-secret-change-me-32chars
  DD_REPO_URL: git@github.com:ORESoftware/k8s-cluster.git
  DD_REPO_REF: dev
  GH_PAT: replace-with-local-github-token
  GH_DEPLOY_KEY_PUBLIC: ssh-ed25519 replace-with-public-deploy-key
  GH_DEPLOY_KEY: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    replace-with-private-deploy-key
    -----END OPENSSH PRIVATE KEY-----
  ANTHROPIC_API_KEY: replace-with-local-anthropic-key
  OPENAI_API_KEY: replace-with-local-openai-key
---
apiVersion: v1
kind: Secret
metadata:
  name: dd-remote-rest-api-secrets
  namespace: default
  labels:
    app.kubernetes.io/part-of: dd-ec2-mirror
type: Opaque
stringData:
  AGENT_TASKS_RDS_DATABASE_URL: replace-with-local-or-remote-postgres-url
  RDS_DATABASE_URL: replace-with-local-or-remote-postgres-url
---
apiVersion: v1
kind: Secret
metadata:
  name: dd-remote-auth-secrets
  namespace: default
  labels:
    app.kubernetes.io/part-of: dd-ec2-mirror
type: Opaque
stringData:
  DD_AUTH_PIN: "123456"
  DD_AUTH_COOKIE_VALUE: local-dev-auth-cookie-change-me-32chars
---
