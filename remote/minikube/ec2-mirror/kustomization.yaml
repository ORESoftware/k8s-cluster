apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - local-secrets.yaml
  - ../../argocd/messaging
  - ../../argocd/observability
  - ../../argocd/dd-next-runtime
  - ../../gleam-lambda-runner/k8s/ec2
  - ../../gleamlang-server/k8s/ec2
  - ../../gleam-mcp-server/k8s/ec2

patches:
  - path: patches/repo-hostpath.yaml
  - path: patches/local-runtime-safety.yaml
  - path: patches/drop-keda-scaledobject.yaml
  - path: patches/gateway-local-tls.json
    target:
      group: apps
      version: v1
      kind: Deployment
      name: dd-remote-gateway
