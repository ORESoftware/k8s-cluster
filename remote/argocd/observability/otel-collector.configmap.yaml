apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-otel-collector-config
  namespace: observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: dd-dev-server-api
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-dev-server-api.default.svc.cluster.local:8080
            - job_name: dd-remote-web-home
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-remote-web-home.default.svc.cluster.local:8080
            - job_name: dd-remote-rest-api
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-remote-rest-api.default.svc.cluster.local:8082
            - job_name: dd-gleamlang-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-gleamlang-server.default.svc.cluster.local:8081
            - job_name: dd-gleam-lambda-runner
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-gleam-lambda-runner.default.svc.cluster.local:8083
            - job_name: dd-gleam-mcp-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-gleam-mcp-server.default.svc.cluster.local:8090
            - job_name: dd-webrtc-signaling
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-webrtc-signaling.default.svc.cluster.local:8095
            - job_name: dd-mdp-optimizer
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-mdp-optimizer.default.svc.cluster.local:8096
            - job_name: dd-web-scraper
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-web-scraper.default.svc.cluster.local:8097
            - job_name: dd-nats
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-nats.messaging.svc.cluster.local:7777

    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 384
        spike_limit_mib: 128

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/tempo:
        endpoint: dd-tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true
      otlp/jaeger:
        endpoint: dd-jaeger.observability.svc.cluster.local:4317
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      pipelines:
        metrics:
          receivers:
            - prometheus
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - prometheus
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp/tempo
            - otlp/jaeger
            - debug
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - debug
