apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-otel-collector-config
  namespace: observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: dd-dev-server-api
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-dev-server-api.default.svc.cluster.local:8080
            - job_name: dd-remote-web-home
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-remote-web-home.default.svc.cluster.local:8080
            - job_name: dd-remote-rest-api
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-remote-rest-api.default.svc.cluster.local:8082
            - job_name: dd-gleamlang-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-gleamlang-server.default.svc.cluster.local:8081
            - job_name: dd-gleam-lambda-runner
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-gleam-lambda-runner.default.svc.cluster.local:8083
            - job_name: dd-gleam-mcp-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-gleam-mcp-server.default.svc.cluster.local:8090
            - job_name: dd-webrtc-signaling
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-webrtc-signaling.default.svc.cluster.local:8095
            - job_name: dd-mdp-optimizer
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-mdp-optimizer.default.svc.cluster.local:8096
            - job_name: dd-des-simulator
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-des-simulator.default.svc.cluster.local:8099
            - job_name: dd-contract-service
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-contract-service.default.svc.cluster.local:8101
            - job_name: dd-trading-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-trading-server.default.svc.cluster.local:8103
            - job_name: dd-ai-ml-pipeline
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-ai-ml-pipeline.ai-ml.svc.cluster.local:8099
            - job_name: dd-web-scraper
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-web-scraper.default.svc.cluster.local:8097
            - job_name: dd-build-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-build-server.default.svc.cluster.local:8100
            - job_name: dd-container-pool
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-container-pool.default.svc.cluster.local:8102
            - job_name: dd-akka-ws-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-akka-ws-server.default.svc.cluster.local:8086
            - job_name: dd-fsharp-ws-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-fsharp-ws-server.default.svc.cluster.local:8087
            - job_name: dd-spark-pipeline-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-spark-pipeline-server.default.svc.cluster.local:8085
            - job_name: dd-formal-methods-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-formal-methods-server.default.svc.cluster.local:8110
            # gcs-router runs with >=2 replicas; the in-process counters
            # gcs_router_routed_total / gcs_router_active_conns /
            # gcs_router_no_peers_total / gcs_router_latency_seconds are
            # per-pod, so static_configs against the Service VIP would
            # round-robin scrapes between pods and lose ~half the signal
            # plus alias-counter-resets on the way through. Discover each
            # pod directly via kubernetes_sd and label by pod for
            # per-router visibility.
            - job_name: gcs-router
              scrape_interval: 10s
              metrics_path: /metrics
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - default
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: gcs-router
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: metrics
                - source_labels: [__meta_kubernetes_pod_phase]
                  action: keep
                  regex: Running
                - source_labels: [__meta_kubernetes_pod_ready]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app
            - job_name: gcs
              scrape_interval: 10s
              metrics_path: /chat/metrics
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - default
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: gcs
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: rest
                - source_labels: [__meta_kubernetes_pod_phase]
                  action: keep
                  regex: Running
                - source_labels: [__meta_kubernetes_pod_ready]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app
            - job_name: dd-agent-worker-broker
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-agent-worker-broker.default.svc.cluster.local:8098
            - job_name: dd-remote-auth
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-remote-auth.default.svc.cluster.local:8083
            - job_name: dd-billing-server
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-billing-server.default.svc.cluster.local:80
            - job_name: dd-formal-methods-service
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-formal-methods-service.default.svc.cluster.local:8111
            - job_name: dd-lock-loadtest-trigger
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-lock-loadtest-trigger.default.svc.cluster.local:8110
            - job_name: dd-nats
              scrape_interval: 10s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - dd-nats.messaging.svc.cluster.local:7777
            - job_name: dd-promtail
              scrape_interval: 10s
              metrics_path: /metrics
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - observability
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: dd-promtail
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: http
                - source_labels: [__meta_kubernetes_pod_phase]
                  action: keep
                  regex: Running
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app

    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 384
        spike_limit_mib: 128

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/tempo:
        endpoint: dd-tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true
      otlp/jaeger:
        endpoint: dd-jaeger.observability.svc.cluster.local:4317
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      pipelines:
        metrics:
          receivers:
            - prometheus
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - prometheus
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp/tempo
            - otlp/jaeger
            - debug
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - debug
