apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-jaeger
  namespace: observability
  labels:
    app: dd-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-jaeger
  template:
    metadata:
      labels:
        app: dd-jaeger
    spec:
      automountServiceAccountToken: false
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.63.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            # Jaeger all-in-one uses in-memory storage. With no bound it
            # accumulates traces until the pod exhausts its 1Gi limit and
            # goes unresponsive on the Query API (16686) while still
            # accepting OTLP grpc connections — which then stall the
            # otel-collector's otlp/jaeger sending queue (observed:
            # queue_size pinned at capacity 1000, enqueue_failed_spans
            # rate ~7.7/s, send_failed_spans ~9.5k accumulated, while
            # otlp/tempo on the same pipeline dropped zero). Cap the
            # in-memory trace ring so old traces evict instead of pinning
            # memory. 50k traces fits comfortably under the 1Gi limit for
            # typical span sizes here.
            - name: MEMORY_MAX_TRACES
              value: "50000"
          ports:
            - name: query
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
