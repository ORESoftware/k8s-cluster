apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-jaeger
  namespace: observability
  labels:
    app: dd-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-jaeger
  template:
    metadata:
      labels:
        app: dd-jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.63.0
          imagePullPolicy: IfNotPresent
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: query
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
