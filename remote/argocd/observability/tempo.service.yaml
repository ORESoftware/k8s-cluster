apiVersion: v1
kind: Service
metadata:
  name: dd-tempo
  namespace: observability
  labels:
    app: dd-tempo
spec:
  type: ClusterIP
  selector:
    app: dd-tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
