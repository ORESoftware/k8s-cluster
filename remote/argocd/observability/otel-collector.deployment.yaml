apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-otel-collector
  namespace: observability
  labels:
    app: dd-otel-collector
  annotations:
    # Reloader watches this annotation list and triggers a rolling
    # restart whenever the named configmap's contents change. This
    # avoids the previous failure mode where editing the scrape config
    # in git had no runtime effect until someone remembered to bump
    # `dd.dev/config-revision` below.
    configmap.reloader.stakater.com/reload: "dd-otel-collector-config"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-otel-collector
  template:
    metadata:
      annotations:
        dd.dev/config-revision: "2026-05-22-gcs-router-pod-sd"
      labels:
        app: dd-otel-collector
    spec:
      serviceAccountName: dd-otel-collector
      automountServiceAccountToken: true
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          args:
            - --config=/etc/otelcol/collector.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: self-metrics
              containerPort: 8888
            - name: prom-export
              containerPort: 8889
            - name: health
              containerPort: 13133
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: dd-otel-collector-config
