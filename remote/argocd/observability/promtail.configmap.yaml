apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://dd-loki.observability.svc.cluster.local:3100/loki/api/v1/push
        # Agent-scoped labels stamped onto every stream this node pushes.
        # cluster/env let a shared Loki (or a future stage cluster) tell
        # prod and stage log sources apart, and node pins the source host.
        # Values are injected from the DaemonSet env; the DaemonSet runs
        # promtail with -config.expand-env=true so ${...} is substituted.
        external_labels:
          cluster: ${CLUSTER_NAME}
          env: ${CLUSTER_ENV}
          node: ${NODE_NAME}

    # Tail every container's CRI log through the stable /var/log/containers
    # symlink farm. The host /var/log mount exposes both the symlinks and
    # their /var/log/pods targets, so this single glob reliably produces
    # streams without depending on the Kubernetes API for discovery (the
    # previous kubernetes_sd + /var/log/pods/*$1/*.log setup left Loki with
    # zero streams). The cri stage decodes the containerd log envelope, then
    # the filename regex lifts namespace, pod, and container into first-class
    # Loki labels so a query can pin one deployment directly, for example
    # {namespace="default", container="dart-server"} or {env="prod"}.
    scrape_configs:
      - job_name: kubernetes-containers
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-containers
              __path__: /var/log/containers/*.log
        pipeline_stages:
          - cri: {}
          - regex:
              source: filename
              expression: '^/var/log/containers/(?P<pod>[^_]+)_(?P<namespace>[^_]+)_(?P<container>.+)-[0-9a-f]+\.log$'
          - labels:
              namespace:
              pod:
              container:
          # filename carries the 64-char container id and rotates on every
          # restart; drop it so it does not explode Loki stream cardinality.
          - labeldrop:
              - filename
