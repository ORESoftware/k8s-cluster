apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://dd-loki.observability.svc.cluster.local:3100/loki/api/v1/push
        # `cluster` identifies this single self-managed EC2 cluster. We use a
        # literal value (NOT env-var templating): promtail is deliberately run
        # WITHOUT -config.expand-env, because that expander collides with the
        # regex `$` end-anchors in the pipeline below. The stage/prod `env`
        # label is intentionally not cluster-wide (this cluster runs both stage
        # and prod workloads) and is derived per deployment in the pipeline.
        external_labels:
          cluster: dd-ec2

    # Tail every container's CRI log through the stable /var/log/containers
    # symlink farm (exposed via the host /var/log mount). We deliberately do NOT
    # use kubernetes_sd_configs: on this cluster the SD informer silently
    # discovered 0 targets (API reachability, the mounted ServiceAccount token,
    # RBAC list/watch, and TLS against the in-cluster CA were all verified
    # working from inside the pod, yet promtail found nothing and Loki stayed
    # empty). A static file glob is informer-independent and reliable. Labels
    # are parsed from the filename so Loki can pin a single deployment, e.g.
    # {namespace="default", deployment="dd-dart-server"} or {environment="prod"}.
    scrape_configs:
      - job_name: kubernetes-containers
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-containers
              __path__: /var/log/containers/*.log
        pipeline_stages:
          # Decode the containerd log envelope ("<ts> <stream> <flag> <msg>").
          - cri: {}
          # /var/log/containers/<pod>_<namespace>_<container>-<containerid>.log
          # pod and namespace never contain "_", so the underscores split cleanly.
          - regex:
              source: filename
              expression: '^/var/log/containers/(?P<pod>[^_]+)_(?P<namespace>[^_]+)_(?P<container>.+)-[0-9a-f]+\.log$'
          # Per-deployment `app`: strip the trailing ReplicaSet pod-template-hash
          # + random pod suffix (Deployments/DaemonSets) or the ordinal
          # (StatefulSets). The k8s hash/suffix alphabet excludes vowels, so a
          # real name segment (e.g. "promtail") is never mistaken for a hash.
          - regex:
              source: pod
              expression: '^(?P<deployment>.+?)(-[bcdfghjklmnpqrstvwxz0-9]{8,10})?-(?:[bcdfghjklmnpqrstvwxz0-9]{5}|[0-9]+)$'
          # Default every stream to stage; the known production services are
          # promoted to prod just below.
          - static_labels:
              env: stage
              environment: stage
          - labels:
              namespace:
              pod:
              container:
              app: deployment
              deployment:
          - match:
              selector: '{deployment=~"dd-billing-server|dd-web-scraper|dd-browser-test-server|dd-selenium-server"}'
              stages:
                - static_labels:
                    env: prod
                    environment: prod
          # filename carries the 64-char container id and rotates on every
          # restart; drop it so it does not explode Loki stream cardinality.
          - labeldrop:
              - filename
