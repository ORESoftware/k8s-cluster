apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-prometheus
  namespace: observability
  labels:
    app: dd-prometheus
  annotations:
    # Pick up scrape-config edits without a manual rollout.
    configmap.reloader.stakater.com/reload: "dd-prometheus-config"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-prometheus
  template:
    metadata:
      annotations:
        dd.dev/config-revision: "2026-05-15-gateway-paths"
      labels:
        app: dd-prometheus
    spec:
      automountServiceAccountToken: false
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
            - --web.external-url=http://54.91.17.58/prometheus/
            - --web.route-prefix=/
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: dd-prometheus-config
        - name: data
          emptyDir: {}
