apiVersion: v1
kind: Service
metadata:
  name: dd-otel-collector
  namespace: observability
  labels:
    app: dd-otel-collector
spec:
  type: ClusterIP
  selector:
    app: dd-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: self-metrics
      port: 8888
      targetPort: 8888
    - name: prometheus
      port: 8889
      targetPort: 8889
    - name: health
      port: 13133
      targetPort: 13133
