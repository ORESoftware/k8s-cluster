apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-k8s-resource-exporter
  namespace: observability
  labels:
    app: dd-k8s-resource-exporter
data:
  exporter.py: |
    import base64
    import datetime
    import json
    import os
    import re
    import socket
    import ssl
    import time
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    PORT = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
    BASE_URL = "https://%s:%s" % (HOST, PORT)
    SCRAPE_TIMEOUT = float(os.environ.get("SCRAPE_TIMEOUT_SECONDS", "5"))
    DEFAULT_WATCH_NAMESPACES = "ai-ml,airbyte,anon-proxy,big-data,daedalus,default,fiducia,headlamp,kafka,messaging,observability,presence,spark,threefa,vpn"
    DEFAULT_WATCH_APPS = (
        "dd-agent-worker-broker,dd-ai-ml-pipeline,dd-akka-ws-server,dd-apostille-services-server,"
        "dd-athleto-app-rs,dd-athleto-backend,dd-bastion,"
        "dd-airbyte-postgresql,dd-billing-server,dd-browser-job-runner,dd-browser-test-server,dd-build-server,"
        "dd-cluster-mcp-rs,dd-compliance-rs,dd-container-pool,dd-contract-service,dd-daedalus-api-server,dd-daedalus-web-server,dd-dagster-postgresql,dd-dart-server,dd-des-rs,dd-des-simulator,"
        "dd-dev-server-api,dd-economics-server,dd-escrow-rs,dd-fabrication-server,dd-formal-methods-server,dd-formal-methods-service,"
        "dd-fsharp-ws-server,dd-gleam-lambda-runner,dd-gleam-mcp-server,"
        "dd-gleamlang-server,dd-gleamlang-ws-loadtest,"
        "dd-gleamlang-ws-loadtest-akkaws-akkastreams,"
        "dd-gleamlang-ws-loadtest-akkaws-asyncjava,dd-gleamlang-ws-loadtest-dart,"
        "dd-gleamlang-ws-loadtest-gcs,dd-gleamlang-ws-server,dd-go-wss-server,"
        "dd-grafana,dd-idle-reaper,dd-image-builder,dd-in-house-mip-solver-node-master,"
        "dd-in-house-mip-solver-node-slave,dd-jaeger,dd-k8s-resource-exporter,dd-live-mutex,dd-live-mutex-distributed,"
        "dd-live-mutex-submodule,dd-lock-loadtest-gleam,dd-lock-loadtest-rs,"
        "dd-lock-loadtest-trigger,dd-loki,dd-mdp-optimizer,dd-mlflow-postgresql,dd-music-rs,dd-nats,"
        "dd-nodejs-ws-loadtest-gcs,dd-otel-collector,dd-patent-filing-rs,dd-prometheus,dd-promtail,dd-public-data-server,"
        "dd-redis-cache,dd-remote-auth,dd-remote-gateway,dd-remote-queue-consumer,"
        "dd-remote-rest-api,dd-remote-web-home,dd-runtime-config,dd-rust-network-mutex,dd-rust-network-mutex-mills,"
        "dd-rust-network-mutex-raft,"
        "dd-rust-vapi-phone,dd-rust-wss-server,dd-selenium-server,dd-sound-recorder-rs,dd-spark-pipeline-server,"
        "dd-t2v-api,dd-t2v-web,dd-tempo,dd-threefa-web-server,dd-thread-fleet-exporter,"
        "dd-thread-operator,dd-trading-server,dd-vpn,"
        "dd-web-scraper,dd-webrtc-media,dd-webrtc-signaling,dd-ws-loadtest-rs,"
        "dd-ws-loadtest-rs-akkaws-akkastreams,dd-ws-loadtest-rs-akkaws-asyncjava,"
        "dd-ws-loadtest-rs-dart,dd-ws-loadtest-rs-fsharp-rx,dd-ws-loadtest-rs-gcs,"
        "dd-ws-loadtest-rs-go-wss,dd-ws-loadtest-rs-rust-wss,gcs,gcs-kafka,"
        "gcs-mongodb,gcs-rabbitmq,gcs-router,headlamp,minio,presence,reloader,"
        "spark,spark-master,spark-worker,airflow,benefactor-backend-rs,dd-agent-sim-server,"
        "dd-ai-agent-bridge,dd-akrion-web-server-rs,dd-alertmanager,dd-benefactor-marketing-rs,"
        "dd-canonical-cloud,dd-chaos,dd-constraint-scheduler,dd-data-viz-rs,dd-dataset-labeling,"
        "dd-document-rs,dd-email-sms-contact-rs,dd-embeddings-rs,dd-evolution-optimizer-island,"
        "dd-evolution-optimizer-master,dd-fiducia-rs,dd-func-approx-rs,dd-git-rs,dd-gpu-rs,"
        "dd-image-builder,dd-knowledge-graph-builder,dd-monte-carlo-server,dd-next-1-js,dd-ocr-rs,"
        "dd-quantum-compute-rs,dd-raft-consensus,dd-route-optimizer,dd-routing-server-master,"
        "dd-routing-server-worker,dd-sat-smt-server,dd-soccer-rs,dd-sonus-auris-site,"
        "fiducia-admin,fiducia-auth,fiducia-backend,fiducia-brain,fiducia-load-balance,fiducia-node,"
        "fiducia-otel-agent,threefa-sync-server,tor-client,tor-relay-a,tor-relay-b,tor-relay-c,"
        "usacc-rest-api-backend-rs"
    )
    WATCH_NAMESPACES = [v.strip() for v in os.environ.get("WATCH_NAMESPACES", DEFAULT_WATCH_NAMESPACES).split(",") if v.strip()]
    WATCH_APPS = set(v.strip() for v in os.environ.get("WATCH_APPS", DEFAULT_WATCH_APPS).split(",") if v.strip())
    DEPENDENCY_TCP_TARGETS = [v.strip() for v in os.environ.get(
        "DEPENDENCY_TCP_TARGETS",
        "kafka=gcs-kafka.default.svc.cluster.local:9092,"
        "rabbitmq=gcs-rabbitmq.default.svc.cluster.local:5672,"
        "mongodb=gcs-mongodb.default.svc.cluster.local:27017,"
        "redis=dd-redis-cache.default.svc.cluster.local:6379",
    ).split(",") if v.strip()]
    REDIS_INFO_TARGET = os.environ.get("REDIS_INFO_TARGET", "dd-redis-cache.default.svc.cluster.local:6379")
    RABBITMQ_MANAGEMENT_URL = os.environ.get("RABBITMQ_MANAGEMENT_URL", "http://gcs-rabbitmq.default.svc.cluster.local:15672/api/overview")
    RABBITMQ_MANAGEMENT_USER = os.environ.get("RABBITMQ_MANAGEMENT_USER", "gcs")
    RABBITMQ_MANAGEMENT_PASSWORD = os.environ.get("RABBITMQ_MANAGEMENT_PASSWORD", "gcs")
    SAFE_LABEL_RE = re.compile(r"[^a-zA-Z0-9_:]")


    def token():
        with open(TOKEN_PATH, "r", encoding="utf-8") as f:
            return f.read().strip()


    def api_get(path):
        req = urllib.request.Request(
            BASE_URL + path,
            headers={"Authorization": "Bearer " + token(), "Accept": "application/json"},
        )
        ctx = ssl.create_default_context(cafile=CA_PATH)
        with urllib.request.urlopen(req, context=ctx, timeout=SCRAPE_TIMEOUT) as resp:
            return json.loads(resp.read().decode("utf-8"))


    def prom_escape(v):
        return str(v).replace("\\", "\\\\").replace("\n", "\\n").replace('"', '\\"')


    def labels(parts):
        return "{" + ",".join('%s="%s"' % (k, prom_escape(v)) for k, v in parts.items()) + "}"


    def emit(lines, name, help_text, metric_type, value, parts=None):
        parts = parts or {}
        if name not in emit.seen:
            lines.append("# HELP %s %s" % (name, help_text))
            lines.append("# TYPE %s %s" % (name, metric_type))
            emit.seen.add(name)
        suffix = labels(parts) if parts else ""
        lines.append("%s%s %s" % (name, suffix, value))


    emit.seen = set()


    def app_for_pod(pod):
        meta = pod.get("metadata", {})
        pod_labels = meta.get("labels", {})
        app = pod_labels.get("app") or pod_labels.get("app.kubernetes.io/name") or ""
        if app:
            return app
        name = meta.get("name", "")
        for candidate in sorted(WATCH_APPS, key=len, reverse=True):
            if name == candidate or name.startswith(candidate + "-"):
                return candidate
        return ""


    def is_watched_app(app):
        return app in WATCH_APPS


    def parse_cpu(v):
        if not v:
            return 0.0
        if v.endswith("n"):
            return float(v[:-1]) / 1_000_000_000.0
        if v.endswith("u"):
            return float(v[:-1]) / 1_000_000.0
        if v.endswith("m"):
            return float(v[:-1]) / 1000.0
        return float(v)


    def parse_bytes(v):
        if not v:
            return 0.0
        units = {
            "Ki": 1024,
            "Mi": 1024**2,
            "Gi": 1024**3,
            "Ti": 1024**4,
            "K": 1000,
            "M": 1000**2,
            "G": 1000**3,
            "T": 1000**4,
        }
        for suffix, multiplier in units.items():
            if v.endswith(suffix):
                return float(v[: -len(suffix)]) * multiplier
        return float(v)


    def parse_time(value):
        if not value:
            return 0
        text = value.replace("Z", "+00:00")
        try:
            return int(datetime.datetime.fromisoformat(text).timestamp())
        except ValueError:
            return 0


    def safe_reason(value):
        value = value or "none"
        return SAFE_LABEL_RE.sub("_", value)


    def split_dependency_target(raw):
        dependency = "unknown"
        target = raw
        if "=" in raw:
            dependency, target = raw.split("=", 1)
        host, port = target.rsplit(":", 1)
        return dependency.strip(), host.strip(), int(port)


    def collect_dependency_tcp(lines):
        for raw in DEPENDENCY_TCP_TARGETS:
            dependency, host, port = split_dependency_target(raw)
            parts = {"dependency": dependency, "host": host, "port": port}
            start = time.monotonic()
            up = 0
            latency = 0.0
            error = "none"
            try:
                with socket.create_connection((host, port), timeout=SCRAPE_TIMEOUT):
                    up = 1
                    latency = time.monotonic() - start
            except Exception as exc:
                error = safe_reason(type(exc).__name__)
            emit(lines, "dd_gcs_dependency_tcp_up", "TCP connectivity from exporter pod to GCS dependencies.", "gauge", up, parts)
            emit(lines, "dd_gcs_dependency_tcp_latency_seconds", "TCP connect latency from exporter pod to GCS dependencies.", "gauge", latency, parts)
            if error != "none":
                emit(lines, "dd_gcs_dependency_tcp_error_info", "TCP connectivity error type by GCS dependency.", "gauge", 1, {**parts, "error": error})


    def redis_info_blob(host, port):
        with socket.create_connection((host, port), timeout=SCRAPE_TIMEOUT) as conn:
            conn.settimeout(SCRAPE_TIMEOUT)
            conn.sendall(b"INFO\r\n")
            chunks = []
            while True:
                try:
                    chunk = conn.recv(65536)
                except socket.timeout:
                    break
                if not chunk:
                    break
                chunks.append(chunk)
                if len(chunk) < 65536:
                    break
        return b"".join(chunks).decode("utf-8", "replace")


    def parse_redis_info(blob):
        out = {}
        for line in blob.splitlines():
            if not line or line.startswith("#") or line.startswith("$"):
                continue
            if ":" not in line:
                continue
            key, value = line.split(":", 1)
            try:
                out[key] = float(value)
            except ValueError:
                continue
        return out


    def collect_redis_info(lines):
        dependency, host, port = split_dependency_target("redis=" + REDIS_INFO_TARGET)
        base = {"dependency": dependency, "host": host, "port": port}
        try:
            values = parse_redis_info(redis_info_blob(host, port))
            emit(lines, "dd_gcs_redis_info_up", "Redis INFO scrape success.", "gauge", 1, base)
        except Exception as exc:
            emit(lines, "dd_gcs_redis_info_up", "Redis INFO scrape success.", "gauge", 0, base)
            emit(lines, "dd_gcs_redis_info_error_info", "Redis INFO scrape error type.", "gauge", 1, {**base, "error": safe_reason(type(exc).__name__)})
            return
        for key in [
            "connected_clients",
            "blocked_clients",
            "used_memory",
            "used_memory_rss",
            "mem_fragmentation_ratio",
            "rejected_connections",
            "total_connections_received",
            "instantaneous_ops_per_sec",
            "evicted_keys",
            "expired_keys",
        ]:
            if key in values:
                emit(lines, "dd_gcs_redis_info", "Selected Redis INFO values for GCS Redis dependency.", "gauge", values[key], {**base, "name": key})


    def rabbitmq_overview():
        auth_raw = ("%s:%s" % (RABBITMQ_MANAGEMENT_USER, RABBITMQ_MANAGEMENT_PASSWORD)).encode("utf-8")
        auth = base64.b64encode(auth_raw).decode("ascii")
        req = urllib.request.Request(
            RABBITMQ_MANAGEMENT_URL,
            headers={"Accept": "application/json", "Authorization": "Basic " + auth},
        )
        with urllib.request.urlopen(req, timeout=SCRAPE_TIMEOUT) as resp:
            return json.loads(resp.read().decode("utf-8"))


    def emit_rabbit_value(lines, name, help_text, metric_type, data, path, parts):
        cur = data
        for key in path:
            if not isinstance(cur, dict) or key not in cur:
                return
            cur = cur[key]
        if isinstance(cur, (int, float)):
            emit(lines, name, help_text, metric_type, cur, parts)


    def collect_rabbitmq_overview(lines):
        parts = {"dependency": "rabbitmq"}
        try:
            data = rabbitmq_overview()
            emit(lines, "dd_gcs_rabbitmq_management_up", "RabbitMQ management overview scrape success.", "gauge", 1, parts)
        except Exception as exc:
            emit(lines, "dd_gcs_rabbitmq_management_up", "RabbitMQ management overview scrape success.", "gauge", 0, parts)
            emit(lines, "dd_gcs_rabbitmq_management_error_info", "RabbitMQ management scrape error type.", "gauge", 1, {**parts, "error": safe_reason(type(exc).__name__)})
            return
        for name in ["connections", "channels", "queues", "consumers", "exchanges"]:
            emit_rabbit_value(lines, "dd_gcs_rabbitmq_object_total", "RabbitMQ object totals.", "gauge", data, ["object_totals", name], {**parts, "name": name})
        for name in ["messages", "messages_ready", "messages_unacknowledged"]:
            emit_rabbit_value(lines, "dd_gcs_rabbitmq_queue_message_total", "RabbitMQ queue message totals.", "gauge", data, ["queue_totals", name], {**parts, "name": name})
        for name in ["publish", "deliver_get", "ack", "redeliver"]:
            emit_rabbit_value(lines, "dd_gcs_rabbitmq_message_stat_total", "RabbitMQ message stat counters.", "counter", data, ["message_stats", name], {**parts, "name": name})


    def is_watched_workload(name, app):
        return is_watched_app(app) or name in WATCH_APPS


    def emit_workload_replicas(lines, ns, kind, name, app, values):
        base = {"namespace": ns, "kind": kind, "workload": name, "app": app}
        for state, value in values.items():
            emit(
                lines,
                "dd_k8s_workload_%s_replicas" % state,
                "Kubernetes workload %s replicas." % state,
                "gauge",
                value,
                base,
            )


    def collect_deployments(lines, ns):
        data = api_get("/apis/apps/v1/namespaces/%s/deployments" % ns)
        for dep in data.get("items", []):
            name = dep.get("metadata", {}).get("name", "")
            app = dep.get("metadata", {}).get("labels", {}).get("app", name)
            if not is_watched_workload(name, app):
                continue
            status = dep.get("status", {})
            spec = dep.get("spec", {})
            values = {
                "desired": spec.get("replicas", 0),
                "available": status.get("availableReplicas", 0),
                "ready": status.get("readyReplicas", 0),
                "updated": status.get("updatedReplicas", 0),
                "unavailable": status.get("unavailableReplicas", 0),
            }
            emit_workload_replicas(lines, ns, "Deployment", name, app, values)
            legacy = {"namespace": ns, "deployment": name, "app": app}
            for state, metric in [
                ("desired", "dd_k8s_deployment_desired_replicas"),
                ("available", "dd_k8s_deployment_available_replicas"),
                ("ready", "dd_k8s_deployment_ready_replicas"),
                ("updated", "dd_k8s_deployment_updated_replicas"),
                ("unavailable", "dd_k8s_deployment_unavailable_replicas"),
            ]:
                emit(lines, metric, "Kubernetes deployment %s replicas." % state, "gauge", values[state], legacy)


    def collect_statefulsets(lines, ns):
        data = api_get("/apis/apps/v1/namespaces/%s/statefulsets" % ns)
        for sts in data.get("items", []):
            name = sts.get("metadata", {}).get("name", "")
            app = sts.get("metadata", {}).get("labels", {}).get("app", name)
            if not is_watched_workload(name, app):
                continue
            status = sts.get("status", {})
            spec = sts.get("spec", {})
            desired = spec.get("replicas", 0)
            available = status.get("availableReplicas", status.get("readyReplicas", 0))
            values = {
                "desired": desired,
                "available": available,
                "ready": status.get("readyReplicas", 0),
                "updated": status.get("updatedReplicas", 0),
                "unavailable": max(desired - available, 0),
            }
            emit_workload_replicas(lines, ns, "StatefulSet", name, app, values)


    def collect_daemonsets(lines, ns):
        data = api_get("/apis/apps/v1/namespaces/%s/daemonsets" % ns)
        for ds in data.get("items", []):
            name = ds.get("metadata", {}).get("name", "")
            app = ds.get("metadata", {}).get("labels", {}).get("app", name)
            if not is_watched_workload(name, app):
                continue
            status = ds.get("status", {})
            values = {
                "desired": status.get("desiredNumberScheduled", 0),
                "available": status.get("numberAvailable", 0),
                "ready": status.get("numberReady", 0),
                "updated": status.get("updatedNumberScheduled", 0),
                "unavailable": status.get("numberUnavailable", 0),
            }
            emit_workload_replicas(lines, ns, "DaemonSet", name, app, values)


    def collect_hpas(lines, ns):
        data = api_get("/apis/autoscaling/v2/namespaces/%s/horizontalpodautoscalers" % ns)
        for hpa in data.get("items", []):
            meta = hpa.get("metadata", {})
            name = meta.get("name", "")
            spec = hpa.get("spec", {})
            status = hpa.get("status", {})
            target = spec.get("scaleTargetRef", {})
            target_kind = target.get("kind", "")
            target_name = target.get("name", "")
            meta_labels = meta.get("labels", {})
            app = meta_labels.get("app") or meta_labels.get("app.kubernetes.io/name") or target_name
            if not is_watched_workload(target_name or name, app):
                continue
            current = status.get("currentReplicas", 0)
            desired = status.get("desiredReplicas", 0)
            min_replicas = spec.get("minReplicas", 1)
            max_replicas = spec.get("maxReplicas", 0)
            base = {"namespace": ns, "hpa": name, "target_kind": target_kind, "target": target_name, "app": app}
            emit(lines, "dd_k8s_hpa_min_replicas", "Watched HorizontalPodAutoscaler minimum replicas.", "gauge", min_replicas, base)
            emit(lines, "dd_k8s_hpa_max_replicas", "Watched HorizontalPodAutoscaler maximum replicas.", "gauge", max_replicas, base)
            emit(lines, "dd_k8s_hpa_current_replicas", "Watched HorizontalPodAutoscaler current replicas.", "gauge", current, base)
            emit(lines, "dd_k8s_hpa_desired_replicas", "Watched HorizontalPodAutoscaler desired replicas.", "gauge", desired, base)
            emit(lines, "dd_k8s_hpa_current_at_max", "Watched HorizontalPodAutoscaler current replicas at max replicas.", "gauge", 1 if max_replicas > 0 and current >= max_replicas else 0, base)
            for condition in status.get("conditions", []):
                condition_type = condition.get("type", "Unknown")
                condition_status = 1 if condition.get("status") == "True" else 0
                reason = safe_reason(condition.get("reason"))
                emit(lines, "dd_k8s_hpa_condition", "Watched HorizontalPodAutoscaler condition status.", "gauge", condition_status, {**base, "condition": condition_type, "reason": reason})


    def collect_pods(lines, ns):
        data = api_get("/api/v1/namespaces/%s/pods" % ns)
        watched = {}
        for pod in data.get("items", []):
            app = app_for_pod(pod)
            if not is_watched_app(app):
                continue
            meta = pod.get("metadata", {})
            status = pod.get("status", {})
            pod_name = meta.get("name", "")
            watched[pod_name] = app
            base = {"namespace": ns, "pod": pod_name, "app": app}
            phase = status.get("phase", "Unknown")
            emit(lines, "dd_k8s_pod_phase", "Watched pod phase as a one-hot gauge.", "gauge", 1, {**base, "phase": phase})
            for condition in status.get("conditions", []):
                condition_type = condition.get("type", "Unknown")
                condition_status = 1 if condition.get("status") == "True" else 0
                emit(lines, "dd_k8s_pod_condition", "Watched pod condition status.", "gauge", condition_status, {**base, "condition": condition_type})
            for container in pod.get("spec", {}).get("containers", []):
                cname = container.get("name", "")
                cbase = {**base, "container": cname}
                resources = container.get("resources", {})
                for key, metric in [("requests", "request"), ("limits", "limit")]:
                    cpu = resources.get(key, {}).get("cpu")
                    mem = resources.get(key, {}).get("memory")
                    if cpu:
                        emit(lines, "dd_k8s_pod_container_cpu_%s_cores" % metric, "Container CPU %s." % metric, "gauge", parse_cpu(cpu), cbase)
                    if mem:
                        emit(lines, "dd_k8s_pod_container_memory_%s_bytes" % metric, "Container memory %s." % metric, "gauge", parse_bytes(mem), cbase)
            for cs in status.get("containerStatuses", []):
                cname = cs.get("name", "")
                cbase = {**base, "container": cname}
                emit(lines, "dd_k8s_pod_container_ready", "Watched container ready state.", "gauge", 1 if cs.get("ready") else 0, cbase)
                emit(lines, "dd_k8s_pod_container_restarts_total", "Watched container restart count.", "counter", cs.get("restartCount", 0), cbase)
                state = cs.get("state", {})
                waiting = state.get("waiting")
                if waiting:
                    emit(lines, "dd_k8s_pod_container_waiting", "Watched container waiting reason.", "gauge", 1, {**cbase, "reason": safe_reason(waiting.get("reason"))})
                terminated = state.get("terminated")
                if terminated:
                    emit(lines, "dd_k8s_pod_container_terminated", "Watched container current termination reason.", "gauge", 1, {**cbase, "reason": safe_reason(terminated.get("reason")), "exit_code": terminated.get("exitCode", 0)})
                last_terminated = cs.get("lastState", {}).get("terminated")
                if last_terminated:
                    parts = {**cbase, "reason": safe_reason(last_terminated.get("reason")), "exit_code": last_terminated.get("exitCode", 0)}
                    emit(lines, "dd_k8s_pod_container_last_terminated", "Watched container last termination reason.", "gauge", 1, parts)
                    emit(lines, "dd_k8s_pod_container_last_terminated_timestamp_seconds", "Watched container last termination finish time.", "gauge", parse_time(last_terminated.get("finishedAt")), parts)
            for cs in status.get("initContainerStatuses", []):
                cname = cs.get("name", "")
                cbase = {**base, "init_container": cname}
                emit(lines, "dd_k8s_pod_init_container_ready", "Watched init container ready state.", "gauge", 1 if cs.get("ready") else 0, cbase)
                emit(lines, "dd_k8s_pod_init_container_restarts_total", "Watched init container restart count.", "counter", cs.get("restartCount", 0), cbase)
                state = cs.get("state", {})
                waiting = state.get("waiting")
                if waiting:
                    emit(lines, "dd_k8s_pod_init_container_waiting", "Watched init container waiting reason.", "gauge", 1, {**cbase, "reason": safe_reason(waiting.get("reason"))})
                terminated = state.get("terminated")
                if terminated:
                    emit(lines, "dd_k8s_pod_init_container_terminated", "Watched init container current termination reason.", "gauge", 1, {**cbase, "reason": safe_reason(terminated.get("reason")), "exit_code": terminated.get("exitCode", 0)})
                last_terminated = cs.get("lastState", {}).get("terminated")
                if last_terminated:
                    parts = {**cbase, "reason": safe_reason(last_terminated.get("reason")), "exit_code": last_terminated.get("exitCode", 0)}
                    emit(lines, "dd_k8s_pod_init_container_last_terminated", "Watched init container last termination reason.", "gauge", 1, parts)
                    emit(lines, "dd_k8s_pod_init_container_last_terminated_timestamp_seconds", "Watched init container last termination finish time.", "gauge", parse_time(last_terminated.get("finishedAt")), parts)
        return watched


    def collect_pod_metrics(lines, ns, watched):
        try:
            data = api_get("/apis/metrics.k8s.io/v1beta1/namespaces/%s/pods" % ns)
        except urllib.error.HTTPError:
            return
        for pod in data.get("items", []):
            pod_name = pod.get("metadata", {}).get("name", "")
            app = watched.get(pod_name)
            if not app:
                continue
            for container in pod.get("containers", []):
                usage = container.get("usage", {})
                parts = {"namespace": ns, "pod": pod_name, "app": app, "container": container.get("name", "")}
                emit(lines, "dd_k8s_pod_container_cpu_usage_cores", "Watched container CPU usage from metrics-server.", "gauge", parse_cpu(usage.get("cpu", "0")), parts)
                emit(lines, "dd_k8s_pod_container_memory_usage_bytes", "Watched container memory usage from metrics-server.", "gauge", parse_bytes(usage.get("memory", "0")), parts)


    def collect_events(lines, ns, watched):
        data = api_get("/api/v1/namespaces/%s/events" % ns)
        counts = {}
        last_seen = {}
        for event in data.get("items", []):
            involved = event.get("involvedObject", {})
            name = involved.get("name", "")
            kind = involved.get("kind", "Unknown")
            app = ""
            if kind == "Pod":
                app = watched.get(name, "")
            if not app:
                for candidate in WATCH_APPS:
                    if name == candidate or name.startswith(candidate + "-"):
                        app = candidate
                        break
            if not app:
                continue
            key = (ns, app, kind, event.get("type", "Normal"), safe_reason(event.get("reason")))
            counts[key] = counts.get(key, 0) + int(event.get("count", 1))
            stamp = parse_time(event.get("lastTimestamp") or event.get("eventTime") or event.get("firstTimestamp"))
            last_seen[key] = max(last_seen.get(key, 0), stamp)
        for key, value in counts.items():
            ns_value, app, kind, event_type, reason = key
            parts = {"namespace": ns_value, "app": app, "involved_kind": kind, "type": event_type, "reason": reason}
            emit(lines, "dd_k8s_event_count", "Current watched Kubernetes event count by reason.", "gauge", value, parts)
            emit(lines, "dd_k8s_event_last_timestamp_seconds", "Last watched Kubernetes event timestamp by reason.", "gauge", last_seen.get(key, 0), parts)


    def collect_nodes(lines):
        data = api_get("/api/v1/nodes")
        metrics = {}
        try:
            metric_data = api_get("/apis/metrics.k8s.io/v1beta1/nodes")
            for item in metric_data.get("items", []):
                metrics[item.get("metadata", {}).get("name", "")] = item.get("usage", {})
        except urllib.error.HTTPError:
            metrics = {}
        for node in data.get("items", []):
            name = node.get("metadata", {}).get("name", "")
            alloc = node.get("status", {}).get("allocatable", {})
            capacity = node.get("status", {}).get("capacity", {})
            parts = {"node": name}
            emit(lines, "dd_k8s_node_allocatable_cpu_cores", "Node allocatable CPU cores.", "gauge", parse_cpu(alloc.get("cpu", "0")), parts)
            emit(lines, "dd_k8s_node_allocatable_memory_bytes", "Node allocatable memory bytes.", "gauge", parse_bytes(alloc.get("memory", "0")), parts)
            emit(lines, "dd_k8s_node_capacity_cpu_cores", "Node capacity CPU cores.", "gauge", parse_cpu(capacity.get("cpu", "0")), parts)
            emit(lines, "dd_k8s_node_capacity_memory_bytes", "Node capacity memory bytes.", "gauge", parse_bytes(capacity.get("memory", "0")), parts)
            usage = metrics.get(name, {})
            if usage:
                emit(lines, "dd_k8s_node_cpu_usage_cores", "Node CPU usage from metrics-server.", "gauge", parse_cpu(usage.get("cpu", "0")), parts)
                emit(lines, "dd_k8s_node_memory_usage_bytes", "Node memory usage from metrics-server.", "gauge", parse_bytes(usage.get("memory", "0")), parts)


    def collect():
        emit.seen = set()
        lines = []
        emit(lines, "dd_k8s_resource_exporter_up", "Exporter scrape success.", "gauge", 1)
        emit(lines, "dd_k8s_resource_exporter_scrape_timestamp_seconds", "Exporter scrape Unix timestamp.", "gauge", int(time.time()))
        collect_dependency_tcp(lines)
        collect_redis_info(lines)
        collect_rabbitmq_overview(lines)
        collect_nodes(lines)
        for ns in WATCH_NAMESPACES:
            collect_deployments(lines, ns)
            collect_statefulsets(lines, ns)
            collect_daemonsets(lines, ns)
            collect_hpas(lines, ns)
            watched = collect_pods(lines, ns)
            collect_pod_metrics(lines, ns, watched)
            collect_events(lines, ns, watched)
        return "\n".join(lines) + "\n"


    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.end_headers()
                self._safe_write(b"ok\n")
                return
            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return
            try:
                body = collect().encode("utf-8")
                status = 200
            except Exception as exc:
                body = (
                    "# HELP dd_k8s_resource_exporter_up Exporter scrape success.\n"
                    "# TYPE dd_k8s_resource_exporter_up gauge\n"
                    "dd_k8s_resource_exporter_up 0\n"
                    "# HELP dd_k8s_resource_exporter_error_info Exporter scrape error.\n"
                    "# TYPE dd_k8s_resource_exporter_error_info gauge\n"
                    'dd_k8s_resource_exporter_error_info{error="%s"} 1\n'
                    % prom_escape(exc)
                ).encode("utf-8")
                status = 500
            self.send_response(status)
            self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self._safe_write(body)

        # Prometheus closes the scrape socket when scrape_timeout elapses. On a
        # large payload that means self.wfile.write(body) hits BrokenPipe or
        # ConnectionReset partway through, and the default socketserver handler
        # logs the full traceback as an "Exception occurred during processing
        # of request" — one traceback per scrape, flooding Loki. Swallow the
        # peer-closed cases and let the ThreadingHTTPServer worker exit
        # cleanly; any other error still propagates so real bugs stay visible.
        def _safe_write(self, body):
            try:
                self.wfile.write(body)
            except (BrokenPipeError, ConnectionResetError):
                return

        def handle_one_request(self):
            try:
                super().handle_one_request()
            except (BrokenPipeError, ConnectionResetError):
                self.close_connection = True

        def log_message(self, fmt, *args):
            return


    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "9102"))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
