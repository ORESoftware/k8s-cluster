apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dd-promtail
  namespace: observability
  labels:
    app: dd-promtail
  annotations:
    # Reloader watches this annotation list and triggers a rolling
    # restart whenever the named configmap's contents change.
    configmap.reloader.stakater.com/reload: "dd-promtail-config"
spec:
  selector:
    matchLabels:
      app: dd-promtail
  template:
    metadata:
      annotations:
        dd.dev/config-revision: "2026-05-31-container-log-labels"
      labels:
        app: dd-promtail
    spec:
      serviceAccountName: dd-promtail
      automountServiceAccountToken: true
      # Logs come from every node, including tainted control-plane or
      # dedicated nodes, so tolerate all taints. Without this a tainted
      # node silently ships no logs and Loki looks "empty".
      tolerations:
        - operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:3.2.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # Container log files under /var/log/pods are root-owned; run as
            # root so promtail can actually read them (a non-root default
            # would tail nothing and leave Loki without streams).
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          args:
            - -config.file=/etc/promtail/promtail.yaml
            # Expand ${NODE_NAME}/${CLUSTER_NAME} in the config's external_labels.
            - -config.expand-env=true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CLUSTER_NAME
              value: dd-ec2
          ports:
            - name: http
              containerPort: 9080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: positions
              mountPath: /run/promtail
      volumes:
        - name: config
          configMap:
            name: dd-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: positions
          emptyDir: {}
