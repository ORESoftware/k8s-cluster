apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dd-promtail
  namespace: observability
  labels:
    app: dd-promtail
spec:
  selector:
    matchLabels:
      app: dd-promtail
  template:
    metadata:
      labels:
        app: dd-promtail
    spec:
      containers:
        - name: promtail
          image: grafana/promtail:3.2.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - name: http
              containerPort: 9080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: positions
              mountPath: /run/promtail
      volumes:
        - name: config
          configMap:
            name: dd-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: positions
          emptyDir: {}
