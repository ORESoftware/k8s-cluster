apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/observability.rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090
      - job_name: otel-collector-self
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-otel-collector.observability.svc.cluster.local:8888
      - job_name: otel-collector
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-otel-collector.observability.svc.cluster.local:8889
      - job_name: dd-nats
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-nats.messaging.svc.cluster.local:7777
      - job_name: dd-grafana
        metrics_path: /telemetry/metrics
        static_configs:
          - targets:
              - dd-grafana.observability.svc.cluster.local:3000
      - job_name: dd-loki
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-loki.observability.svc.cluster.local:3100
      - job_name: dd-k8s-resource-exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-k8s-resource-exporter.observability.svc.cluster.local:9102
      - job_name: dd-webrtc-signaling
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-signaling.default.svc.cluster.local:8095
      - job_name: dd-webrtc-media
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-media.default.svc.cluster.local:8125
      # dd-dart-server: coordinator (admin) port 8088 serves the unified
      # exposition including the MDP isolate-pool autotuner metrics and the
      # WS adopt / first-frame latency histograms.
      - job_name: dd-dart-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-dart-server.default.svc.cluster.local:8088
      - job_name: dd-mdp-optimizer
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-mdp-optimizer.default.svc.cluster.local:8096
      - job_name: dd-des-simulator
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-des-simulator.default.svc.cluster.local:8099
      - job_name: dd-contract-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-contract-service.default.svc.cluster.local:8101
      - job_name: dd-rust-vapi-phone
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-rust-vapi-phone.default.svc.cluster.local:8113
      - job_name: dd-trading-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-trading-server.default.svc.cluster.local:8103
      - job_name: dd-ai-ml-pipeline
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-ai-ml-pipeline.ai-ml.svc.cluster.local:8099
      - job_name: dd-in-house-mip-solver-node-master
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-in-house-mip-solver-node.ai-ml.svc.cluster.local:8117
      - job_name: dd-in-house-mip-solver-node-slave
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-in-house-mip-solver-node-slave.ai-ml.svc.cluster.local:8117
      - job_name: dd-gleam-lambda-runner
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-lambda-runner.default.svc.cluster.local:8083
      - job_name: dd-gleam-mcp-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-mcp-server.default.svc.cluster.local:8090
      - job_name: dd-web-scraper
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-web-scraper.default.svc.cluster.local:8097
      - job_name: dd-build-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-build-server.default.svc.cluster.local:8100
      - job_name: dd-container-pool
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-container-pool.default.svc.cluster.local:8102
      - job_name: dd-agent-worker-broker
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-agent-worker-broker.default.svc.cluster.local:8098
      - job_name: dd-remote-auth
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-remote-auth.default.svc.cluster.local:8083
      - job_name: dd-akka-ws-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-akka-ws-server.default.svc.cluster.local:8086
      - job_name: dd-billing-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-billing-server.default.svc.cluster.local:80
      - job_name: dd-formal-methods-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-formal-methods-server.default.svc.cluster.local:8110
      - job_name: dd-formal-methods-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-formal-methods-service.default.svc.cluster.local:8111
      - job_name: dd-fsharp-ws-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-fsharp-ws-server.default.svc.cluster.local:8087
      - job_name: dd-lock-loadtest-trigger
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-lock-loadtest-trigger.default.svc.cluster.local:8110
      - job_name: dd-spark-pipeline-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-spark-pipeline-server.ai-ml.svc.cluster.local:8085
      - job_name: gcs-router
        metrics_path: /metrics
        static_configs:
          - targets:
              - gcs-router.default.svc.cluster.local:9100
  observability.rules.yml: |
    groups:
      - name: dd.observability.rules
        interval: 30s
        rules:
          - record: dd:observability:target_up_ratio
            expr: avg(up{job=~"prometheus|otel-collector-self|otel-collector|dd-grafana|dd-loki|dd-k8s-resource-exporter|dd-promtail"})
          - record: dd:k8s_workload:available_ratio
            expr: sum by (namespace, kind, workload) (dd_k8s_workload_available_replicas) / clamp_min(sum by (namespace, kind, workload) (dd_k8s_workload_desired_replicas), 1)
          - alert: DDObservabilityTargetDown
            expr: up{job=~"prometheus|otel-collector-self|otel-collector|dd-grafana|dd-loki|dd-k8s-resource-exporter|dd-promtail"} == 0
            for: 2m
            labels:
              severity: warning
              service: observability
            annotations:
              summary: "Observability target {{ $labels.job }} is down"
              description: "Prometheus has not scraped {{ $labels.instance }} for job {{ $labels.job }}."
          - alert: DDPromtailTargetMissing
            expr: absent(up{job="dd-promtail"})
            for: 5m
            labels:
              severity: warning
              service: promtail
            annotations:
              summary: Promtail target is missing
              description: "The collector has no dd-promtail target; Loki may stop receiving Kubernetes stdout/stderr."
          - alert: DDK8sResourceExporterDown
            expr: dd_k8s_resource_exporter_up == 0
            for: 2m
            labels:
              severity: warning
              service: k8s-resource-exporter
            annotations:
              summary: Kubernetes resource exporter is down
              description: "The workload inventory exporter cannot collect Deployment, StatefulSet, DaemonSet, pod, event, or resource metrics."
          - alert: DDWorkloadUnavailable
            expr: sum by (namespace, kind, workload) (dd_k8s_workload_unavailable_replicas) > 0
            for: 5m
            labels:
              severity: warning
              service: kubernetes
            annotations:
              summary: "Workload {{ $labels.namespace }}/{{ $labels.workload }} has unavailable replicas"
              description: "At least one watched Kubernetes workload has unavailable replicas for more than five minutes."
          - alert: DDOtelCollectorRejectedTelemetry
            expr: sum(rate({__name__=~"otelcol_receiver_refused_(spans|metric_points|log_records)"}[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: otel-collector
            annotations:
              summary: OpenTelemetry collector is refusing telemetry
              description: "The collector reported refused spans, metric points, or log records in the last five minutes."
          - alert: DDOtelCollectorExporterFailures
            expr: sum(rate({__name__=~"otelcol_exporter_send_failed_(spans|metric_points|log_records)"}[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: otel-collector
            annotations:
              summary: OpenTelemetry collector exporter failures
              description: "The collector could not export spans, metric points, or log records in the last five minutes."
