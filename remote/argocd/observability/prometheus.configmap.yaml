apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090
      - job_name: otel-collector
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-otel-collector.observability.svc.cluster.local:8889
      - job_name: dd-nats
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-nats.messaging.svc.cluster.local:7777
      - job_name: dd-grafana
        metrics_path: /telemetry/metrics
        static_configs:
          - targets:
              - dd-grafana.observability.svc.cluster.local:3000
      - job_name: dd-loki
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-loki.observability.svc.cluster.local:3100
      - job_name: dd-k8s-resource-exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-k8s-resource-exporter.observability.svc.cluster.local:9102
      - job_name: dd-webrtc-signaling
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-signaling.default.svc.cluster.local:8095
      - job_name: dd-webrtc-media
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-media.default.svc.cluster.local:8125
      # dd-dart-server: coordinator (admin) port 8088 serves the unified
      # exposition including the MDP isolate-pool autotuner metrics and the
      # WS adopt / first-frame latency histograms.
      - job_name: dd-dart-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-dart-server.default.svc.cluster.local:8088
      - job_name: dd-mdp-optimizer
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-mdp-optimizer.default.svc.cluster.local:8096
      - job_name: dd-des-simulator
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-des-simulator.default.svc.cluster.local:8099
      - job_name: dd-contract-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-contract-service.default.svc.cluster.local:8101
      - job_name: dd-rust-vapi-phone
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-rust-vapi-phone.default.svc.cluster.local:8113
      - job_name: dd-trading-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-trading-server.default.svc.cluster.local:8103
      - job_name: dd-ai-ml-pipeline
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-ai-ml-pipeline.ai-ml.svc.cluster.local:8099
      - job_name: dd-in-house-mip-solver-node-master
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-in-house-mip-solver-node.ai-ml.svc.cluster.local:8117
      - job_name: dd-in-house-mip-solver-node-slave
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-in-house-mip-solver-node-slave.ai-ml.svc.cluster.local:8117
      - job_name: dd-gleam-lambda-runner
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-lambda-runner.default.svc.cluster.local:8083
      - job_name: dd-gleam-mcp-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-mcp-server.default.svc.cluster.local:8090
      - job_name: dd-web-scraper
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-web-scraper.default.svc.cluster.local:8097
      - job_name: dd-build-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-build-server.default.svc.cluster.local:8100
      - job_name: dd-container-pool
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-container-pool.default.svc.cluster.local:8102
      - job_name: dd-agent-worker-broker
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-agent-worker-broker.default.svc.cluster.local:8098
      - job_name: dd-remote-auth
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-remote-auth.default.svc.cluster.local:8083
      - job_name: dd-akka-ws-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-akka-ws-server.default.svc.cluster.local:8086
      - job_name: dd-billing-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-billing-server.default.svc.cluster.local:80
      - job_name: dd-formal-methods-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-formal-methods-server.default.svc.cluster.local:8110
      - job_name: dd-formal-methods-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-formal-methods-service.default.svc.cluster.local:8111
      - job_name: dd-fsharp-ws-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-fsharp-ws-server.default.svc.cluster.local:8087
      - job_name: dd-lock-loadtest-trigger
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-lock-loadtest-trigger.default.svc.cluster.local:8110
      - job_name: dd-spark-pipeline-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-spark-pipeline-server.ai-ml.svc.cluster.local:8085
      - job_name: gcs-router
        metrics_path: /metrics
        static_configs:
          - targets:
              - gcs-router.default.svc.cluster.local:9100
