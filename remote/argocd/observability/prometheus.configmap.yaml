apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/observability.rules.yml

    # Route firing alert rules to Alertmanager (dedup, grouping, inhibition,
    # delivery). Before this, rules evaluated but had nowhere to go.
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - dd-alertmanager.observability.svc.cluster.local:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090
      - job_name: otel-collector-self
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-otel-collector.observability.svc.cluster.local:8888
      - job_name: otel-collector
        metrics_path: /metrics
        honor_labels: true
        static_configs:
          - targets:
              - dd-otel-collector.observability.svc.cluster.local:8889
      - job_name: dd-nats
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-nats.messaging.svc.cluster.local:7777
      - job_name: dd-grafana
        metrics_path: /telemetry/metrics
        static_configs:
          - targets:
              - dd-grafana.observability.svc.cluster.local:3000
      - job_name: dd-loki
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-loki.observability.svc.cluster.local:3100
      - job_name: dd-alertmanager
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-alertmanager.observability.svc.cluster.local:9093
      # dd-k8s-resource-exporter serves a ~3 MB /metrics payload built from
      # live k8s API list calls plus TCP/Redis/RabbitMQ dependency probes, and
      # each scrape takes ~13-16s in this cluster. The global 15s/10s
      # interval/timeout would mark every scrape as up=0 and truncate the
      # response mid-write (visible as BrokenPipeError in the exporter log).
      # Give this job its own longer interval and timeout so the scrape can
      # actually complete.
      - job_name: dd-k8s-resource-exporter
        metrics_path: /metrics
        scrape_interval: 30s
        scrape_timeout: 25s
        static_configs:
          - targets:
              - dd-k8s-resource-exporter.observability.svc.cluster.local:9102
      - job_name: dd-webrtc-signaling
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-signaling.default.svc.cluster.local:8095
      - job_name: dd-webrtc-media
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-media.default.svc.cluster.local:8125
      # dd-dart-server: coordinator (admin) port 8088 serves the unified
      # exposition including the MDP isolate-pool autotuner metrics and the
      # WS adopt / first-frame latency histograms.
      - job_name: dd-dart-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-dart-server.default.svc.cluster.local:8088
      - job_name: dd-mdp-optimizer
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-mdp-optimizer.default.svc.cluster.local:8096
      - job_name: dd-runtime-config
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-runtime-config.default.svc.cluster.local:8110
      # daedalus-fab org tenant namespace (was `default` before the tenancy migration).
      - job_name: dd-fabrication-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-fabrication-server.daedalus.svc.cluster.local:8113
      - job_name: dd-daedalus-api-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-daedalus-api-server.daedalus.svc.cluster.local:8114
      - job_name: dd-daedalus-web-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-daedalus-web-server.daedalus.svc.cluster.local:8115
      - job_name: dd-economics-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-economics-server.default.svc.cluster.local:8114
      - job_name: dd-des-simulator
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-des-simulator.default.svc.cluster.local:8099
      - job_name: dd-contract-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-contract-service.default.svc.cluster.local:8101
      - job_name: dd-escrow-rs
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-escrow-rs.default.svc.cluster.local:8115
      - job_name: dd-rust-vapi-phone
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-rust-vapi-phone.default.svc.cluster.local:8113
      - job_name: dd-trading-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-trading-server.default.svc.cluster.local:8103
      - job_name: dd-public-data-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-public-data-server.default.svc.cluster.local:8115
      - job_name: dd-patent-filing-rs
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-patent-filing-rs.default.svc.cluster.local:8116
      - job_name: dd-compliance-rs
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-compliance-rs.default.svc.cluster.local:8118
      - job_name: dd-ai-ml-pipeline
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-ai-ml-pipeline.ai-ml.svc.cluster.local:8099
      - job_name: dd-in-house-mip-solver-node-master
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-in-house-mip-solver-node.ai-ml.svc.cluster.local:8117
      - job_name: dd-in-house-mip-solver-node-slave
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-in-house-mip-solver-node-slave.ai-ml.svc.cluster.local:8117
      - job_name: dd-gleam-lambda-runner
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-lambda-runner.default.svc.cluster.local:8083
      - job_name: dd-gleam-mcp-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-mcp-server.default.svc.cluster.local:8090
      - job_name: dd-cluster-mcp-rs
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-cluster-mcp-rs.default.svc.cluster.local:8091
      - job_name: dd-web-scraper
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-web-scraper.default.svc.cluster.local:8097
      - job_name: dd-build-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-build-server.default.svc.cluster.local:8100
      - job_name: dd-image-builder
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-image-builder.default.svc.cluster.local:8082
      - job_name: dd-container-pool
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-container-pool.default.svc.cluster.local:8102
      - job_name: dd-agent-worker-broker
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-agent-worker-broker.default.svc.cluster.local:8098
      - job_name: dd-remote-auth
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-remote-auth.default.svc.cluster.local:8083
      - job_name: dd-akka-ws-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-akka-ws-server.default.svc.cluster.local:8086
      - job_name: dd-billing-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-billing-server.default.svc.cluster.local:80
      - job_name: dd-formal-methods-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-formal-methods-server.default.svc.cluster.local:8110
      - job_name: dd-formal-methods-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-formal-methods-service.default.svc.cluster.local:8111
      - job_name: dd-fsharp-ws-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-fsharp-ws-server.default.svc.cluster.local:8087
      - job_name: dd-lock-loadtest-trigger
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-lock-loadtest-trigger.default.svc.cluster.local:8110
      - job_name: dd-spark-pipeline-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-spark-pipeline-server.ai-ml.svc.cluster.local:8085
      - job_name: gcs-router
        metrics_path: /metrics
        static_configs:
          - targets:
              - gcs-router.default.svc.cluster.local:9100
      # fiducia data-plane raft metrics. Each fiducia-node StatefulSet pod runs a
      # sidecar (fiducia-node-sidecar) that translates the node's JSON observe API
      # into Prometheus text on :8091/metrics. Addressed per-pod through the
      # headless peer Service (serviceName: fiducia-node-peer); the pod ordinal is
      # kept as the `instance` label. The sidecar also self-reports scrape health
      # via fiducia_sidecar_scrape_up so a node it cannot reach still surfaces.
      - job_name: fiducia-node-sidecar
        metrics_path: /metrics
        static_configs:
          - targets:
              - fiducia-node-0.fiducia-node-peer.fiducia.svc.cluster.local:8091
              - fiducia-node-1.fiducia-node-peer.fiducia.svc.cluster.local:8091
              - fiducia-node-2.fiducia-node-peer.fiducia.svc.cluster.local:8091
      # fiducia control-plane (brain) raft metrics. Each fiducia-brain StatefulSet
      # pod runs the same sidecar binary in brain mode (:8091/metrics), translating
      # the brain's /v1/status rollup (leader/term, placement gaps, node health).
      # Per-pod via the headless peer Service (serviceName: fiducia-brain-peer).
      - job_name: fiducia-brain-sidecar
        metrics_path: /metrics
        static_configs:
          - targets:
              - fiducia-brain-0.fiducia-brain-peer.fiducia.svc.cluster.local:8091
              - fiducia-brain-1.fiducia-brain-peer.fiducia.svc.cluster.local:8091
              - fiducia-brain-2.fiducia-brain-peer.fiducia.svc.cluster.local:8091
  observability.rules.yml: |
    groups:
      - name: dd.observability.rules
        interval: 30s
        rules:
          - record: dd:observability:target_up_ratio
            expr: avg(up{job=~"prometheus|otel-collector-self|otel-collector|dd-grafana|dd-loki|dd-k8s-resource-exporter|dd-promtail|dd-alertmanager"})
          - record: dd:k8s_workload:available_ratio
            expr: sum by (namespace, kind, workload) (dd_k8s_workload_available_replicas) / clamp_min(sum by (namespace, kind, workload) (dd_k8s_workload_desired_replicas), 1)
          - alert: DDObservabilityTargetDown
            expr: up{job=~"prometheus|otel-collector-self|otel-collector|dd-grafana|dd-loki|dd-k8s-resource-exporter|dd-promtail|dd-alertmanager"} == 0
            for: 2m
            labels:
              severity: warning
              service: observability
            annotations:
              summary: "Observability target {{ $labels.job }} is down"
              description: "Prometheus has not scraped {{ $labels.instance }} for job {{ $labels.job }}."
          - alert: DDPromtailTargetMissing
            expr: absent(up{job="dd-promtail"})
            for: 5m
            labels:
              severity: warning
              service: promtail
            annotations:
              summary: Promtail target is missing
              description: "The collector has no dd-promtail target; Loki may stop receiving Kubernetes stdout/stderr."
          - alert: DDK8sResourceExporterDown
            expr: dd_k8s_resource_exporter_up == 0
            for: 2m
            labels:
              severity: warning
              service: k8s-resource-exporter
            annotations:
              summary: Kubernetes resource exporter is down
              description: "The workload inventory exporter cannot collect Deployment, StatefulSet, DaemonSet, pod, event, or resource metrics."
          - alert: DDWorkloadUnavailable
            expr: sum by (namespace, kind, workload) (dd_k8s_workload_unavailable_replicas) > 0
            for: 5m
            labels:
              severity: warning
              service: kubernetes
            annotations:
              summary: "Workload {{ $labels.namespace }}/{{ $labels.workload }} has unavailable replicas"
              description: "At least one watched Kubernetes workload has unavailable replicas for more than five minutes."
          - alert: DDRuntimeConfigTargetDown
            expr: up{job="dd-runtime-config"} == 0
            for: 2m
            labels:
              severity: warning
              service: dd-runtime-config
            annotations:
              summary: Runtime-config scrape target is down
              description: "Prometheus cannot scrape dd-runtime-config /metrics; dependent planners may miss configuration subscriber, entry, and push-delivery evidence."
          - alert: DDRuntimeConfigStageSubscribersMissing
            expr: absent(dd_runtime_config_subscribers{env="stage"}) or dd_runtime_config_subscribers{env="stage"} < 1
            for: 10m
            labels:
              severity: warning
              service: dd-runtime-config
            annotations:
              summary: Runtime-config has no stage subscribers
              description: "dd-runtime-config reports no stage subscribers, so fabrication and other runtime services may not receive pushed configuration changes."
          - alert: DDRuntimeConfigPushErrorsIncreasing
            expr: sum(rate(dd_runtime_config_push_total{env="stage",result=~"transport_error|http_error"}[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-runtime-config
            annotations:
              summary: Runtime-config push errors are increasing
              description: "dd-runtime-config is recording failed stage push attempts; dependent services such as dd-fabrication-server may be running with stale configuration."
          - alert: DDExecutionControlPlaneTargetDown
            expr: up{job=~"dd-agent-worker-broker|dd-build-server|dd-container-pool|dd-image-builder|dd-runtime-config"} == 0
            for: 2m
            labels:
              severity: warning
              service: execution-control-plane
            annotations:
              summary: "Execution control-plane target {{ $labels.job }} is down"
              description: "Prometheus cannot scrape {{ $labels.instance }}; readiness, NATS, or build dependency evidence may be unavailable."
          - alert: DDExecutionControlPlaneDependencyNotReady
            expr: dd_agent_worker_broker_nats_connected == 0 or dd_build_server_dependencies_ready == 0 or dd_container_pool_dependencies_ready == 0 or dd_image_builder_dependencies_ready == 0 or dd_runtime_config_redis_ready == 0
            for: 2m
            labels:
              severity: warning
              service: execution-control-plane
            annotations:
              summary: "Execution control-plane dependency is not ready"
              description: "A broker, build, container, image-builder, or runtime-config dependency readiness metric has remained zero for two minutes."
          - alert: DDFabricationNatsTargetDown
            expr: up{job="dd-nats"} == 0
            for: 2m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication NATS dependency scrape target is down
              description: "Prometheus cannot scrape dd-nats metrics; fabrication queue intake, result publication, runtime events, and learning fan-out may be unavailable."
          - alert: DDFabricationMdpOptimizerTargetDown
            expr: up{job="dd-mdp-optimizer"} == 0
            for: 2m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication MDP optimizer dependency scrape target is down
              description: "Prometheus cannot scrape dd-mdp-optimizer /metrics; fabrication planning may lose policy optimization and learning-feedback evidence."
          - alert: DDFabricationRuntimeConfigPushErrorsIncreasing
            expr: sum(rate(dd_runtime_config_push_total{env="stage",subscriber="dd-fabrication-server",result=~"transport_error|http_error"}[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication runtime-config push errors are increasing
              description: "dd-runtime-config is failing to deliver stage snapshots to dd-fabrication-server; planning, NATS fan-out, or MDP learning behavior may be using stale runtime configuration."
          - alert: DDFabricationServerWorkloadUnavailable
            expr: dd:k8s_workload:available_ratio{namespace="daedalus", workload="dd-fabrication-server"} < 1
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server deployment has unavailable replicas
              description: "The dd-fabrication-server Deployment has fewer available replicas than desired; cold release builds, scheduling pressure, or readiness failures may be blocking fabrication planning capacity."
          - alert: DDFabricationServerRolloutUpdatedReplicasLagging
            expr: max(dd_k8s_deployment_updated_replicas{namespace="daedalus",deployment="dd-fabrication-server",app="dd-fabrication-server"}) < max(dd_k8s_deployment_desired_replicas{namespace="daedalus",deployment="dd-fabrication-server",app="dd-fabrication-server"})
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server rollout has not updated all desired replicas
              description: "The dd-fabrication-server Deployment has fewer updated replicas than desired; the hardened Rust planner image or release-build startup may not be fully rolled out even if older replicas are still serving."
          - alert: DDFabricationServerHpaAtMaxReplicas
            expr: max(dd_k8s_hpa_current_at_max{namespace="daedalus",app="dd-fabrication-server",hpa="dd-fabrication-server"}) > 0
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server HPA is at max replicas
              description: "The dd-fabrication-server HorizontalPodAutoscaler has held current replicas at its configured maximum; planning or instruction-analysis demand may need a higher replica ceiling or request throttling."
          - alert: DDFabricationServerCpuNearLimit
            expr: (max(dd_k8s_pod_container_cpu_usage_cores{namespace="daedalus",app="dd-fabrication-server",container="fabrication-server"}) / max(dd_k8s_pod_container_cpu_limit_cores{namespace="daedalus",app="dd-fabrication-server",container="fabrication-server"})) > 0.85
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server CPU usage is near its container limit
              description: "The dd-fabrication-server serving container is using more than 85% of its configured CPU limit; planning, instruction analysis, NATS fan-out, or learning feedback may need more replicas or a higher limit before operators rely on generated machine work."
          - alert: DDFabricationServerMemoryNearLimit
            expr: (max(dd_k8s_pod_container_memory_usage_bytes{namespace="daedalus",app="dd-fabrication-server",container="fabrication-server"}) / max(dd_k8s_pod_container_memory_limit_bytes{namespace="daedalus",app="dd-fabrication-server",container="fabrication-server"})) > 0.85
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server memory usage is near its container limit
              description: "The dd-fabrication-server serving container is using more than 85% of its configured memory limit; retained job/artifact evidence, learning memory, and active planning work may be at risk of eviction or restart."
          - alert: DDFabricationServerPodRestartsIncreasing
            expr: sum(increase(dd_k8s_pod_container_restarts_total{namespace="daedalus",app="dd-fabrication-server",container="fabrication-server"}[15m])) > 0
            for: 2m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server pods are restarting
              description: "The dd-fabrication-server serving container has restarted recently; retained job/artifact evidence, learning memory, NATS subscriptions, or active planning work may have been interrupted."
          - alert: DDFabricationServerServingContainerWaiting
            expr: max(dd_k8s_pod_container_waiting{namespace="daedalus",app="dd-fabrication-server",container="fabrication-server"}) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server serving container is waiting
              description: "The dd-fabrication-server serving container is stuck in a Kubernetes waiting state; request planning, instruction analysis, result publication, and learning feedback may be unavailable even if init checks already completed."
          - alert: DDFabricationServerInitContainerWaiting
            expr: max(dd_k8s_pod_init_container_waiting{namespace="daedalus",app="dd-fabrication-server",init_container=~"source-layout-check|release-build"}) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server init container is waiting
              description: "A dd-fabrication-server init container is waiting; source layout validation or the locked release build may be blocked before the Rust service can become ready."
          - alert: DDFabricationServerInitContainerRestartsIncreasing
            expr: sum(increase(dd_k8s_pod_init_container_restarts_total{namespace="daedalus",app="dd-fabrication-server",init_container=~"source-layout-check|release-build"}[15m])) > 0
            for: 2m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server init containers are restarting
              description: "The dd-fabrication-server source-layout or release-build init container restarted recently; inspect init logs before trusting a rollout or capacity change."
          - alert: DDFabricationServerTargetDown
            expr: up{job="dd-fabrication-server"} == 0
            for: 2m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server scrape target is down
              description: "Prometheus cannot scrape dd-fabrication-server /metrics; planning, instruction validation, and learning telemetry may be unavailable."
          - alert: DDFabricationServerPodScrapeTargetsMissing
            expr: absent(up{job="dd-fabrication-server-pods"})
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server pod scrape targets are missing
              description: "OTel is not exporting direct dd-fabrication-server pod scrape targets; replica-local job/artifact ledgers, learning memory, failure-boundary counters, and NATS/MDP fan-out counters may be hidden behind the Service scrape."
          - alert: DDFabricationServerPodScrapeTargetDown
            expr: up{job="dd-fabrication-server-pods"} == 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server pod scrape target is down
              description: "A direct dd-fabrication-server pod scrape target is down; one replica's retained fabrication evidence or learning counters may be invisible even if the Service scrape still succeeds."
          - alert: DDFabricationServerPodScrapeCoverageBelowDesired
            expr: sum(up{job="dd-fabrication-server-pods"} == bool 1) < max(dd_k8s_deployment_desired_replicas{namespace="daedalus",deployment="dd-fabrication-server",app="dd-fabrication-server"})
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server direct pod scrape coverage is below desired replicas
              description: "Prometheus is scraping fewer ready dd-fabrication-server pod targets than the Deployment desires; replica-local job/artifact ledgers, learning memory, failure-boundary counters, and NATS/MDP fan-out evidence may be partially invisible."
          - alert: DDFabricationServerErrorsIncreasing
            expr: sum(rate(dd_fabrication_server_errors_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server errors are increasing
              description: "dd-fabrication-server has recorded request or background-event errors in the last five minutes."
          - alert: DDFabricationServerNatsPublishFailuresIncreasing
            expr: sum(increase(dd_fabrication_server_nats_publish_failures_total[5m])) > 0
            for: 1m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server NATS publishes are failing
              description: "dd-fabrication-server could not publish and flush one or more NATS result, runtime-event, or learning messages; inspect its dd.log.v1 records in Loki and the dd-nats target before trusting downstream fan-out."
          - alert: DDWebScraperRobotsOverridesIncreasing
            expr: sum(increase(dd_web_scraper_robots_overrides_total[15m])) > 0
            for: 1m
            labels:
              severity: warning
              service: dd-web-scraper
            annotations:
              summary: Web scraper robots policy overrides are being used
              description: "dd-web-scraper accepted one or more explicit robots.txt overrides; verify that the target is owned or authorized and inspect the corresponding structured audit records in Loki."
          - alert: DDQueueConsumerTargetDown
            expr: up{job="dd-remote-queue-consumer"} == 0
            for: 2m
            labels:
              severity: warning
              service: dd-remote-queue-consumer
            annotations:
              summary: Queue consumer metrics target is down
              description: "OpenTelemetry cannot scrape dd-remote-queue-consumer /metrics; task handoff, acknowledgement-heartbeat, and dead-letter evidence may be unavailable."
          - alert: DDQueueConsumerNotReady
            expr: dd_queue_consumer_ready == 0
            for: 2m
            labels:
              severity: warning
              service: dd-remote-queue-consumer
            annotations:
              summary: Queue consumer is not ready
              description: "dd-remote-queue-consumer has not established its JetStream streams and durable consumer, so queued thread tasks cannot be handed off."
          - alert: DDQueueConsumerDeadLettersIncreasing
            expr: sum(increase(dd_queue_consumer_dead_lettered_total[15m])) > 0
            for: 1m
            labels:
              severity: warning
              service: dd-remote-queue-consumer
            annotations:
              summary: Queue tasks are being dead-lettered
              description: "One or more queued tasks exhausted JetStream redelivery and were terminated from DD_REMOTE_TASKS; inspect DD_REMOTE_TASKS_DLQ and the correlated dd.log.v1 critical events in Loki."
          - alert: DDQueueConsumerDlqPublishFailuresIncreasing
            expr: sum(increase(dd_queue_consumer_dlq_publish_failures_total[5m])) > 0
            for: 1m
            labels:
              severity: critical
              service: dd-remote-queue-consumer
            annotations:
              summary: Queue consumer cannot persist dead letters
              description: "dd-remote-queue-consumer failed to receive a JetStream publish acknowledgement from DD_REMOTE_TASKS_DLQ; terminal task evidence may be present only in the critical-event stream and Loki."
          - alert: DDFabricationServerValidationFindingsIncreasing
            expr: sum(rate(dd_fabrication_server_validation_findings_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server validation findings are increasing
              description: "dd-fabrication-server is emitting validation findings for generated or submitted fabrication instructions; review rejected, improved, or draft machine work before release."
          - alert: DDFabricationServerFailureBoundariesIncreasing
            expr: sum(rate(dd_fabrication_server_failure_boundaries_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server is finding machine-failure boundaries
              description: "dd-fabrication-server is emitting fabrication failure boundaries; review the affected plans or submitted instructions before operators run the generated machine work."
          - alert: DDFabricationServerOperatorInterventionsIncreasing
            expr: sum(rate(dd_fabrication_server_operator_actions_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server is requiring operator intervention
              description: "dd-fabrication-server is emitting required operator actions from planning or instruction-analysis responses; affected jobs are not machine-ready until the intervention evidence is resolved."
          - alert: DDFabricationServerFixtureBlockersIncreasing
            expr: sum(rate(dd_fabrication_server_fixture_release_blockers_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication fixture or setup blockers are increasing
              description: "dd-fabrication-server is emitting fixture/setup release blockers; verify workholding, datum transfer, clearance, fixture proof, or setup evidence before releasing generated machine work."
          - alert: DDFabricationServerSplitCombineReviewsIncreasing
            expr: sum(rate(dd_fabrication_server_split_combine_reviews_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication split/combine reviews are increasing
              description: "dd-fabrication-server is emitting split/combine review records; inspect decomposition, recomposition, interface-control, or assembly evidence before treating the job as machine-ready."
          - alert: DDFabricationServerReleaseReadinessBlocked
            expr: (sum(rate(dd_fabrication_server_failure_boundaries_total[10m])) + sum(rate(dd_fabrication_server_operator_actions_total[10m])) + sum(rate(dd_fabrication_server_fixture_release_blockers_total[10m])) + sum(rate(dd_fabrication_server_split_combine_reviews_total[10m]))) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication machine-release readiness is blocked
              description: "dd-fabrication-server is emitting one or more release-readiness blockers across machine-failure boundaries, operator actions, fixture/setup blockers, or split/combine reviews; treat generated or imported machine work as draft until machineRelease and releasePackagePlan evidence is resolved."
          - alert: DDFabricationServerInterventionAutomationReviewsIncreasing
            expr: (sum(rate(dd_fabrication_server_operator_actions_total[10m])) + sum(rate(dd_fabrication_server_split_combine_reviews_total[10m]))) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication intervention or automation reviews are increasing
              description: "dd-fabrication-server is emitting operator-action or split/combine review records; inspect interventionMap, operatorInterventionPlan, executionPlan, automation candidates, and assembly/decomposition evidence before treating the generated or imported work as unattended machine-ready."
          - alert: DDFabricationServerResultFanoutStalled
            expr: (sum(rate(dd_fabrication_server_nats_results_published_total[10m])) == 0) and ((sum(rate(dd_fabrication_server_plan_requests_total[10m])) + sum(rate(dd_fabrication_server_analysis_requests_total[10m])) + sum(rate(dd_fabrication_server_learning_requests_total[10m]))) > 0)
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server result fan-out appears stalled
              description: "dd-fabrication-server is accepting successful plan, analysis, or learning requests but has not published fabrication result messages to NATS."
          - alert: DDFabricationServerQueuedNatsResultFanoutStalled
            expr: (sum(rate(dd_fabrication_server_nats_results_published_total[10m])) == 0) and (sum(rate(dd_fabrication_server_nats_messages_total[10m])) > 0)
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server queued NATS result fan-out appears stalled
              description: "dd-fabrication-server is consuming queued fabrication requests from NATS but has not published fabrication result messages back to NATS."
          - alert: DDFabricationServerMdpFanoutStalled
            expr: (sum(rate(dd_fabrication_server_mdp_published_total[10m])) == 0) and (sum(rate(dd_fabrication_server_plan_requests_total[10m])) > 0)
            for: 10m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server MDP fan-out appears stalled
              description: "dd-fabrication-server is accepting successful plan requests but has not published MDP optimization jobs for fabrication policy learning."
          - alert: DDFabricationServerMemoryLedgerNearCapacity
            expr: max(dd_fabrication_server_current_jobs) > 110 or max(dd_fabrication_server_current_artifacts) > 440 or max(dd_fabrication_server_current_learning_outcomes) > 460
            for: 5m
            labels:
              severity: warning
              service: dd-fabrication-server
            annotations:
              summary: Fabrication server in-memory ledgers are near capacity
              description: "dd-fabrication-server is close to evicting retained job, artifact, or learning-outcome evidence from its bounded in-process ledgers, or artifact evidence volume is approaching the expected high-watermark for retained jobs."
          - alert: DDEconomicsServerTargetDown
            expr: up{job="dd-economics-server"} == 0
            for: 2m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics server scrape target is down
              description: "Prometheus cannot scrape dd-economics-server /metrics; dashboard, forecast, source-pull, and recommendation telemetry may be unavailable."
          - alert: DDEconomicsServerErrorsIncreasing
            expr: sum(rate(dd_economics_server_errors_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics server errors are increasing
              description: "dd-economics-server has recorded forecast, ingest, source, pipeline, or publish errors in the last five minutes."
          - alert: DDEconomicsServerSourcePullFailuresIncreasing
            expr: sum(rate(dd_economics_server_source_pull_failure_total[15m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics source pulls are failing
              description: "Public/private economics source pulls are failing or being rejected; inspect Loki dd.log.v1 events for sourceId, URL host, parser, and sanitized error details."
          - alert: DDEconomicsServerSourcePullSuccessStale
            expr: max(dd_economics_server_source_pull_success_total) > 0 and (time() - max(dd_economics_server_source_pull_last_success_unix_seconds)) > 172800
            for: 15m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics source pulls have not succeeded recently
              description: "dd-economics-server has had at least one successful source pull, but the latest success timestamp is more than 48 hours old."
          - alert: DDEconomicsServerAuthFailuresIncreasing
            expr: sum(rate(dd_economics_server_auth_failures_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics server auth failures are increasing
              description: "dd-economics-server is rejecting requests with missing or invalid auth; check gateway/client routing before treating downstream forecast failures as model errors."
          - alert: DDEconomicsServerPipelinePublishFailuresIncreasing
            expr: sum(rate(dd_economics_server_pipeline_publish_failure_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics pipeline publish failures are increasing
              description: "dd-economics-server is failing or skipping requested NATS pipeline-plan publishes; check NATS_URL and dd.log.v1 pipeline publish events."
          - alert: DDEconomicsServerPipelineSubmitFailuresIncreasing
            expr: sum(rate(dd_economics_server_pipeline_submit_failure_total[10m])) > 0
            for: 5m
            labels:
              severity: warning
              service: dd-economics-server
            annotations:
              summary: Economics pipeline submit failures are increasing
              description: "dd-economics-server is recording Spark pipeline submit failures; check ECONOMICS_ENABLE_PIPELINE_SUBMIT, cluster-local submit URL validation, auth env configuration, and dd.log.v1 submit events."
          - alert: DDOtelCollectorRejectedTelemetry
            expr: sum(rate({__name__=~"otelcol_receiver_refused_(spans|metric_points|log_records)"}[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: otel-collector
            annotations:
              summary: OpenTelemetry collector is refusing telemetry
              description: "The collector reported refused spans, metric points, or log records in the last five minutes."
          - alert: DDOtelCollectorExporterFailures
            expr: sum(rate({__name__=~"otelcol_exporter_send_failed_(spans|metric_points|log_records)"}[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: otel-collector
            annotations:
              summary: OpenTelemetry collector exporter failures
              description: "The collector could not export spans, metric points, or log records in the last five minutes."
