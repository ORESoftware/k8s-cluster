apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090
      - job_name: otel-collector
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-otel-collector.observability.svc.cluster.local:8889
      - job_name: dd-nats
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-nats.messaging.svc.cluster.local:7777
      - job_name: observability-stack
        static_configs:
          - targets:
              - dd-grafana.observability.svc.cluster.local:3000
      - job_name: dd-webrtc-signaling
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-webrtc-signaling.default.svc.cluster.local:8095
      - job_name: dd-mdp-optimizer
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-mdp-optimizer.default.svc.cluster.local:8096
      - job_name: dd-des-simulator
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-des-simulator.default.svc.cluster.local:8099
      - job_name: dd-contract-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-contract-service.default.svc.cluster.local:8101
      - job_name: dd-ai-ml-pipeline
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-ai-ml-pipeline.ai-ml.svc.cluster.local:8099
      - job_name: dd-gleam-lambda-runner
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-gleam-lambda-runner.default.svc.cluster.local:8083
      - job_name: dd-web-scraper
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-web-scraper.default.svc.cluster.local:8097
      - job_name: dd-build-server
        metrics_path: /metrics
        static_configs:
          - targets:
              - dd-build-server.default.svc.cluster.local:8100
