apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-k8s-resource-exporter
  namespace: observability
  labels:
    app: dd-k8s-resource-exporter
  annotations:
    configmap.reloader.stakater.com/reload: "dd-k8s-resource-exporter"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-k8s-resource-exporter
  template:
    metadata:
      labels:
        app: dd-k8s-resource-exporter
    spec:
      serviceAccountName: dd-k8s-resource-exporter
      automountServiceAccountToken: true
      containers:
        - name: exporter
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/exporter.py
          env:
            - name: PORT
              value: '9102'
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
            - name: WATCH_NAMESPACES
              value: ai-ml,default,headlamp,messaging,observability,presence,vpn
            - name: WATCH_APPS
              value: dd-agent-worker-broker,dd-ai-ml-pipeline,dd-akka-ws-server,dd-bastion,dd-billing-server,dd-browser-job-runner,dd-browser-test-server,dd-build-server,dd-container-pool,dd-contract-service,dd-dart-server,dd-des-rs,dd-des-simulator,dd-dev-server-api,dd-formal-methods-server,dd-formal-methods-service,dd-fsharp-ws-server,dd-gleam-lambda-runner,dd-gleam-mcp-server,dd-gleamlang-server,dd-gleamlang-ws-loadtest,dd-gleamlang-ws-loadtest-akkaws-akkastreams,dd-gleamlang-ws-loadtest-akkaws-asyncjava,dd-gleamlang-ws-loadtest-dart,dd-gleamlang-ws-loadtest-gcs,dd-gleamlang-ws-server,dd-go-wss-server,dd-grafana,dd-idle-reaper,dd-jaeger,dd-k8s-resource-exporter,dd-live-mutex,dd-live-mutex-submodule,dd-lock-loadtest-gleam,dd-lock-loadtest-rs,dd-lock-loadtest-trigger,dd-loki,dd-mdp-optimizer,dd-nats,dd-nodejs-ws-loadtest-gcs,dd-otel-collector,dd-prometheus,dd-promtail,dd-redis-cache,dd-remote-auth,dd-remote-gateway,dd-remote-queue-consumer,dd-remote-rest-api,dd-remote-web-home,dd-runtime-config,dd-rust-network-mutex,dd-rust-vapi-phone,dd-rust-wss-server,dd-selenium-server,dd-spark-pipeline-server,dd-tempo,dd-thread-fleet-exporter,dd-thread-operator,dd-trading-server,dd-vpn,dd-web-scraper,dd-webrtc-signaling,dd-ws-loadtest-rs,dd-ws-loadtest-rs-akkaws-akkastreams,dd-ws-loadtest-rs-akkaws-asyncjava,dd-ws-loadtest-rs-dart,dd-ws-loadtest-rs-fsharp-rx,dd-ws-loadtest-rs-gcs,dd-ws-loadtest-rs-go-wss,dd-ws-loadtest-rs-rust-wss,gcs,gcs-kafka,gcs-mongodb,gcs-rabbitmq,gcs-router,headlamp,presence,reloader
            - name: DEPENDENCY_TCP_TARGETS
              value: kafka=gcs-kafka.default.svc.cluster.local:9092,rabbitmq=gcs-rabbitmq.default.svc.cluster.local:5672,mongodb=gcs-mongodb.default.svc.cluster.local:27017,redis=dd-redis-cache.default.svc.cluster.local:6379
            - name: REDIS_INFO_TARGET
              value: dd-redis-cache.default.svc.cluster.local:6379
            - name: RABBITMQ_MANAGEMENT_URL
              value: http://gcs-rabbitmq.default.svc.cluster.local:15672/api/overview
            - name: RABBITMQ_MANAGEMENT_USER
              value: gcs
            - name: RABBITMQ_MANAGEMENT_PASSWORD
              value: gcs
            - name: SCRAPE_TIMEOUT_SECONDS
              value: '5'
          ports:
            - name: metrics
              containerPort: 9102
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: exporter
              mountPath: /app
              readOnly: true
      volumes:
        - name: exporter
          configMap:
            name: dd-k8s-resource-exporter
