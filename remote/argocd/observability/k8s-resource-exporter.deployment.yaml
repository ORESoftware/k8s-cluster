apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-k8s-resource-exporter
  namespace: observability
  labels:
    app: dd-k8s-resource-exporter
  annotations:
    configmap.reloader.stakater.com/reload: "dd-k8s-resource-exporter"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-k8s-resource-exporter
  template:
    metadata:
      labels:
        app: dd-k8s-resource-exporter
    spec:
      serviceAccountName: dd-k8s-resource-exporter
      automountServiceAccountToken: true
      containers:
        - name: exporter
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/exporter.py
          env:
            - name: PORT
              value: '9102'
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
            - name: WATCH_NAMESPACES
              value: default
            - name: WATCH_APPS
              value: gcs,gcs-router,gcs-kafka,gcs-rabbitmq,gcs-mongodb,dd-redis-cache,dd-ws-loadtest-rs-gcs,dd-nodejs-ws-loadtest-gcs,dd-gleamlang-ws-loadtest-gcs
            - name: DEPENDENCY_TCP_TARGETS
              value: kafka=gcs-kafka.default.svc.cluster.local:9092,rabbitmq=gcs-rabbitmq.default.svc.cluster.local:5672,mongodb=gcs-mongodb.default.svc.cluster.local:27017,redis=dd-redis-cache.default.svc.cluster.local:6379
            - name: REDIS_INFO_TARGET
              value: dd-redis-cache.default.svc.cluster.local:6379
            - name: RABBITMQ_MANAGEMENT_URL
              value: http://gcs-rabbitmq.default.svc.cluster.local:15672/api/overview
            - name: RABBITMQ_MANAGEMENT_USER
              value: gcs
            - name: RABBITMQ_MANAGEMENT_PASSWORD
              value: gcs
            - name: SCRAPE_TIMEOUT_SECONDS
              value: '5'
          ports:
            - name: metrics
              containerPort: 9102
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: exporter
              mountPath: /app
              readOnly: true
      volumes:
        - name: exporter
          configMap:
            name: dd-k8s-resource-exporter
