apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Compatibility filename: the former runner-only Application is now the
  # Scintilla app-of-apps root. The direct runner app would otherwise race the
  # monorepo's digest-pinned child Application.
  name: scintilla-run-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:scintilla-run/scintilla-run-monorepo.git
    targetRevision: main
    path: gitops/ec2/bootstrap
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
