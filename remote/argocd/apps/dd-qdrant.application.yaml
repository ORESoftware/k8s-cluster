apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-qdrant
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: dd-ai-ml-platform
  source:
    repoURL: https://qdrant.github.io/qdrant-helm
    chart: qdrant
    targetRevision: 1.17.1
    helm:
      skipTests: true
      values: |
        replicaCount: 1
        image:
          useUnprivilegedImage: true
        updateVolumeFsOwnership: false
        additionalVolumes:
          - name: qdrant-api-keys
            secret:
              secretName: dd-qdrant-api-keys
              defaultMode: 0600
        additionalVolumeMounts:
          - name: qdrant-api-keys
            mountPath: /qdrant/config/local.yaml
            subPath: local.yaml
            readOnly: true
        persistence:
          enabled: true
          size: 5Gi
        snapshotPersistence:
          enabled: true
          size: 5Gi
        podSecurityContext:
          fsGroup: 3000
          fsGroupChangePolicy: Always
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 2000
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        podDisruptionBudget:
          enabled: true
          maxUnavailable: 1
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: '1'
            memory: 2Gi
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
