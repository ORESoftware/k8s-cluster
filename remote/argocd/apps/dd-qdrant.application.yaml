apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-qdrant
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://qdrant.github.io/qdrant-helm
    chart: qdrant
    targetRevision: 1.17.1
    helm:
      values: |
        replicaCount: 1
        persistence:
          enabled: true
          size: 5Gi
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
