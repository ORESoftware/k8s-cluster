apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-qdrant
  namespace: argocd
spec:
  project: dd-ai-ml-platform
  source:
    repoURL: https://qdrant.github.io/qdrant-helm
    chart: qdrant
    targetRevision: 1.17.1
    helm:
      skipTests: true
      values: |
        replicaCount: 1
        apiKey:
          valueFrom:
            secretKeyRef:
              name: dd-qdrant-api-keys
              key: api-key
        readOnlyApiKey:
          valueFrom:
            secretKeyRef:
              name: dd-qdrant-api-keys
              key: read-only-api-key
        persistence:
          enabled: true
          size: 5Gi
        podSecurityContext:
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        podDisruptionBudget:
          enabled: true
          maxUnavailable: 1
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: '1'
            memory: 2Gi
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
