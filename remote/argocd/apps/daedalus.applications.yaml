# daedalus-fab org — three Applications, one per service, all in the `daedalus` tenant.
#
# CRITICAL PATTERN: repoURL points at the ORG MONOREPO directly, NOT at a k8s-cluster
# submodule path. ArgoCD repo-server runs with `reposerver.enable.git.submodule=false`, so
# any path under a gitlink (remote/deployments/<submodule>/...) renders EMPTY. Three existing
# apps are already broken this way — dd-billing-server, dd-dart-server, dd-gleam-lambda-runner
# (see docs/gitops-boundary-audit.md). The daedalus-monorepo submodule in k8s-cluster is an
# INVENTORY PIN for local dev + digest promotion; Argo reads the upstream repo.
#
# PREREQS before applying (left inert until then, per the threefa precedent):
#   1. apply remote/argocd/projects/daedalus.tenant.yaml     (Namespace + quota + default-deny)
#   2. apply remote/argocd/projects/daedalus.appproject.yaml (the enforced boundary)
#   3. push apps/*/k8s to daedalus-monorepo main
#   4. publish images ghcr.io/daedalus-fab/<app>:main (CI currently runs fmt/clippy only)
#      + an imagePullSecret if the packages are private
#
# Promotion knob: flip targetRevision from `main` to a pinned tag/sha per the contract.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-fabrication-server
  namespace: argocd
spec:
  project: daedalus
  source:
    repoURL: https://github.com/daedalus-fab/daedalus-monorepo.git
    targetRevision: main
    path: apps/fabrication-server.rs/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: daedalus
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-daedalus-api-server
  namespace: argocd
spec:
  project: daedalus
  source:
    repoURL: https://github.com/daedalus-fab/daedalus-monorepo.git
    targetRevision: main
    path: apps/daedalus-api-server.rs/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: daedalus
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-daedalus-web-server
  namespace: argocd
spec:
  project: daedalus
  source:
    repoURL: https://github.com/daedalus-fab/daedalus-monorepo.git
    targetRevision: main
    path: apps/daedalus-web-server.rs/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: daedalus
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true
