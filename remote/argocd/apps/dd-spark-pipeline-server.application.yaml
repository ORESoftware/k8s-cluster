apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-spark-pipeline-server
  namespace: argocd
spec:
  project: dd-ai-ml-platform
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/deployments/spark-pipeline-server/k8s/ec2
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
