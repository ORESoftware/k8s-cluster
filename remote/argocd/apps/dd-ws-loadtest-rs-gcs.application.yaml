apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-ws-loadtest-rs-gcs
  namespace: argocd
  labels:
    role: loadtest
    target: gcs-router
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/deployments/ws-loadtest-rs/k8s/gcs
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
