apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-live-mutex-loadtest-node
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/live-mutex-loadtest-node/k8s/ec2
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
