apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-airbyte
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://airbytehq.github.io/helm-charts
    chart: airbyte
    targetRevision: 1.9.2
    helm:
      values: |
        global:
          edition: community
        webapp:
          replicaCount: 1
        worker:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: airbyte
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
