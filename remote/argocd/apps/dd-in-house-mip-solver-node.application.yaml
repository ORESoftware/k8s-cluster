apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-in-house-mip-solver-node
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ORESoftware/mip-solver-node.rs.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
