apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-mlflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://community-charts.github.io/helm-charts
    chart: mlflow
    targetRevision: 1.8.1
    helm:
      values: |
        replicaCount: 1
        service:
          type: ClusterIP
        tracking:
          service:
            type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
