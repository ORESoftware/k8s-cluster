apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-lock-loadtest-node
  namespace: argocd
  labels:
    role: loadtest
    target: dd-live-mutex
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/deployments/live-mutex-loadtest-node/k8s/ec2
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # NOTE: no automated.selfHeal - the deployment ships with replicas=0
  # so the trigger is off by default. Operators scale to 1 for the
  # duration of a load test and back to 0 afterwards.
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
