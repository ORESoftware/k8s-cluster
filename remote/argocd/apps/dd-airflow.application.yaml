apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-airflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.21.0
    helm:
      values: |
        executor: LocalExecutor
        webserver:
          replicas: 1
        scheduler:
          replicas: 1
        triggerer:
          replicas: 1
        workers:
          replicas: 0
        redis:
          enabled: false
        postgresql:
          enabled: true
        dags:
          persistence:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
