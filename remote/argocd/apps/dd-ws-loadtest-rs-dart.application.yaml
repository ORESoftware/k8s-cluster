apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-ws-loadtest-rs-dart
  namespace: argocd
  labels:
    role: loadtest
    target: dd-dart-server
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/deployments/ws-loadtest-rs/k8s/dart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # NOTE: no automated.selfHeal — the deployment ships with replicas=0
  # so the loader is off by default. Operators scale to 1 for the
  # duration of a load test and back to 0 afterwards. selfHeal would
  # revert manual scale operations and keep the loader running.
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
