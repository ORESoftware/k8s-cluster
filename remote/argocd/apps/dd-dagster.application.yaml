apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-dagster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: dd-ai-ml-platform
  source:
    repoURL: https://dagster-io.github.io/helm
    chart: dagster
    targetRevision: 1.13.3
    helm:
      skipTests: true
      values: |
        global:
          postgresqlSecretName: dd-dagster-postgresql
        generatePostgresqlPasswordSecret: false
        dagsterDaemon:
          enabled: true
          labels:
            dd-dagster-postgresql-client: 'true'
          podSecurityContext:
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: dagster-daemon-tmp
              mountPath: /tmp
          volumes:
            - name: dagster-daemon-tmp
              emptyDir:
                sizeLimit: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 2Gi
          initContainerResources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
        dagsterWebserver:
          replicaCount: 1
          labels:
            dd-dagster-postgresql-client: 'true'
          podSecurityContext:
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: dagster-webserver-tmp
              mountPath: /tmp
          volumes:
            - name: dagster-webserver-tmp
              emptyDir:
                sizeLimit: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 2Gi
          initContainerResources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
        runLauncher:
          config:
            k8sRunLauncher:
              labels:
                dd-dagster-postgresql-client: 'true'
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: '1'
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              runK8sConfig:
                podSpecConfig:
                  automountServiceAccountToken: false
                  securityContext:
                    runAsNonRoot: true
                    seccompProfile:
                      type: RuntimeDefault
        dagster-user-deployments:
          enabled: false
          enableSubchart: false
        serviceAccount:
          create: true
        postgresql:
          enabled: false
          postgresqlHost: dd-dagster-postgresql
          postgresqlUsername: dagster
          postgresqlDatabase: dagster
          postgresqlPassword: ''
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
