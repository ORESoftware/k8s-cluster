apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-big-data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: dd-ai-ml-platform
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/argocd/big-data
  destination:
    server: https://kubernetes.default.svc
    namespace: big-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
