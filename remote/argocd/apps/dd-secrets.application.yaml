apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:dancing-dragons/dd-next-1.git
    targetRevision: dev
    path: remote/argocd/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
