apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-gleam-mcp-server-minikube
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/gleam-mcp-server/k8s/minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: dd-dev-local
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
