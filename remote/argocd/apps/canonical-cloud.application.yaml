apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canonical-cloud
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/argocd/canonical-cloud
  destination:
    server: https://kubernetes.default.svc
    namespace: canonical-cloud
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
