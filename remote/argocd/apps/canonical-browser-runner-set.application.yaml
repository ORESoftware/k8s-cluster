apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canonical-browser-runner-set
  namespace: argocd
  annotations:
    # Reconcile after the ARC controller (sync-wave 0) is up.
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.12.1
    helm:
      skipTests: true
      # The Helm *release name* becomes the runner-set name, which is also the
      # `runs-on:` label workflows target. Argo derives the release name from
      # the Application name, so this set is addressable as
      #   runs-on: canonical-browser-runner-set
      # (see the runnerScaleSetName note in the README).
      releaseName: canonical-browser
      values: |
        # Registers ephemeral runners against the whole canonical-cloud org, so
        # every repo's workflow can target this set. Scope to a single repo by
        # using https://github.com/canonical-cloud/<repo> instead.
        githubConfigUrl: "https://github.com/canonical-cloud"
        # Pre-created secret (GitHub App preferred). See README for the shape.
        githubConfigSecret: canonical-cloud-arc-github
        runnerScaleSetName: canonical-browser
        minRunners: 0
        maxRunners: 4
        # Default (in-runner) container mode: the workflow job runs directly in
        # the runner container below — no dind, no extra pod. Our image already
        # ships Chromium + the Playwright/Puppeteer system libraries.
        containerMode:
          type: ""
        template:
          spec:
            securityContext:
              fsGroup: 1001
            containers:
              - name: runner
                image: ghcr.io/canonical-cloud/canonical-ci-runner:browser
                command: ["/home/runner/run.sh"]
                env:
                  # Consumed by the browser harnesses' chrome discovery
                  # (chromeExecutablePath): reuse the OS Chromium instead of a
                  # per-job download.
                  - name: PLAYWRIGHT_CHROMIUM
                    value: /usr/bin/chromium
                  - name: CHROME_PATH
                    value: /usr/bin/chromium
                  - name: PUPPETEER_SKIP_DOWNLOAD
                    value: "1"
                  - name: PUPPETEER_EXECUTABLE_PATH
                    value: /usr/bin/chromium
                  # Playwright: don't fetch its own browser build either.
                  - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
                    value: "1"
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
