apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dd-nodejs-ws-loadtest-gcs
  namespace: argocd
  labels:
    role: loadtest
    target: gcs-router
spec:
  project: default
  source:
    repoURL: git@github.com:ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/deployments/gleamlang-ws-loadtest/k8s/gcs-node
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
