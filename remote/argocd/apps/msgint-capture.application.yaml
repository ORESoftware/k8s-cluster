# Catalog entry only. Apply or wire this Application into a cluster app-of-apps
# after messaging-intel/msgint-monorepo PR #1 is merged. The overlay itself
# keeps the capture CronJob suspended and collection disabled.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msgint-capture
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/messaging-intel/msgint-monorepo.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: msgint-research
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
