# The cluster repository owns deployment state. Backend CI promotes the exact
# private GHCR image digest into the Kustomize overlay after tests pass.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: benefactor-backend-rs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ORESoftware/k8s-cluster.git
    targetRevision: dev
    path: remote/argocd/benefactor-backend-rs
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
