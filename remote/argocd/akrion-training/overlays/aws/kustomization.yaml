apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dd-soccer-learning-rds-continuous
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dd-soccer-learning-rds-continuous
      spec:
        replicas: 1
