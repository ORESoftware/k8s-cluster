apiVersion: v1
kind: Service
metadata:
  name: benefactor-backend-rs
  namespace: default
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '80'
    prometheus.io/scrape: 'true'
  labels:
    app: benefactor-backend-rs
spec:
  type: ClusterIP
  selector:
    app: benefactor-backend-rs
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
