apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - benefactor-ghcr.externalsecret.yaml
  - benefactor-backend-rs.deployment.yaml
  - benefactor-backend-rs.service.yaml

# The backend release workflow replaces this exact OCI digest after a
# successful build. Argo CD deploys only the state committed to this file.
images:
  - name: ghcr.io/benefactor-cc/backend.rs
    newName: ghcr.io/benefactor-cc/backend.rs
    digest: sha256:a58a210defad3e6b80136ded9bb65bc9be248c8ec63818a85ee17c6faf7cc485
