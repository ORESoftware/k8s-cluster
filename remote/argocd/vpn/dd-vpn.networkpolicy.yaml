apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-vpn-ingress
  namespace: vpn
  labels:
    app.kubernetes.io/name: dd-vpn
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dd-vpn
      app.kubernetes.io/component: wireguard
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: UDP
          port: 51820
    # The admin UI has no hostPort or external Service, but kubelet probes can
    # originate from the node host IP instead of a namespace-selected pod.
    - ports:
        - protocol: TCP
          port: 51821
