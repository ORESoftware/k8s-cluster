apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-vpn-secrets
  namespace: vpn
  labels:
    app.kubernetes.io/name: dd-vpn
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-vpn-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dd/remote-dev/vpn-secrets

