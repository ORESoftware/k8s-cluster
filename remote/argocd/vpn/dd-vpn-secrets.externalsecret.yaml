apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-vpn-secrets
  namespace: vpn
  labels:
    app.kubernetes.io/name: dd-vpn
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-vpn-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: INIT_USERNAME
      remoteRef:
        key: dd/remote-dev/vpn-secrets
        property: INIT_USERNAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: INIT_PASSWORD
      remoteRef:
        key: dd/remote-dev/vpn-secrets
        property: INIT_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
