apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-bastion-secrets
  namespace: vpn
  labels:
    app.kubernetes.io/name: dd-bastion
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-bastion-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: dd/remote-dev/agent-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
