apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-vpn
  namespace: vpn
  labels:
    app.kubernetes.io/name: dd-vpn
    app.kubernetes.io/component: wireguard
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dd-vpn
      app.kubernetes.io/component: wireguard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dd-vpn
        app.kubernetes.io/component: wireguard
        app.kubernetes.io/part-of: dd-remote-dev
    spec:
      serviceAccountName: dd-vpn
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: vpn-sysctl
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              sysctl -w net.ipv4.ip_forward=1
              sysctl -w net.ipv4.conf.all.src_valid_mark=1
          securityContext:
            privileged: true
      containers:
        - name: wg-easy
          image: ghcr.io/wg-easy/wg-easy:15
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: dd-vpn-config
          env:
            - name: INIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dd-vpn-secrets
                  key: INIT_USERNAME
            - name: INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dd-vpn-secrets
                  key: INIT_PASSWORD
          ports:
            - name: wireguard
              containerPort: 51820
              hostPort: 51820
              protocol: UDP
            - name: http
              containerPort: 51821
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
                - SYS_MODULE
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/wireguard
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: dd-vpn-config
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
