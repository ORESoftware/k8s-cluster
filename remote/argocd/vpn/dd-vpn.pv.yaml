apiVersion: v1
kind: PersistentVolume
metadata:
  name: dd-vpn-config
  labels:
    app.kubernetes.io/name: dd-vpn
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  storageClassName: dd-vpn-hostpath
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  claimRef:
    namespace: vpn
    name: dd-vpn-config
  hostPath:
    path: /home/ec2-user/dd-vpn-config
    type: DirectoryOrCreate
