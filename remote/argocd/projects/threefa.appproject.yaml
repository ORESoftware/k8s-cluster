# AppProject for the 3FA sync server — the FIRST worked adoption of the app/platform
# boundary (see docs/app-deploy-contract.md, remote/argocd/projects/README.md).
#
# 3fa is the cleanest case: its manifests already live in the APP repo
# (3FA-app/3fa-backend.rs, path deploy/k8s) and already target their own namespace
# `threefa` — not `default`. This project pins that Application so it can ONLY source from
# the 3fa repo, ONLY write to `threefa`, and create NO cluster-scoped resources except its
# own Namespace (transitional — see below).
#
# Safe to apply now: the threefa-sync-server Application is currently inert (awaits an
# ArgoCD repo cred + DATABASE_URL). Enforcing the boundary before it goes live means it can
# never drift out of these bounds.
#
#   kubectl apply -f remote/argocd/projects/threefa.appproject.yaml
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: threefa
  namespace: argocd
spec:
  description: "Tenant project for the 3FA sync server — namespace threefa only."
  sourceRepos:
    - "git@github.com:3FA-app/3fa-backend.rs.git"
  destinations:
    - server: https://kubernetes.default.svc
      namespace: threefa
  # TRANSITIONAL: the app repo's deploy/k8s still ships its own namespace.yaml, so Namespace
  # is the one cluster-scoped kind we allow. End-state: move Namespace creation to a
  # platform-owned tenant scaffold (remote/argocd/projects/_tenant-scaffold.template.yaml),
  # delete namespace.yaml from the app repo, then tighten this to `clusterResourceWhitelist: []`.
  clusterResourceWhitelist:
    - { group: "", kind: Namespace }
  namespaceResourceBlacklist:
    - { group: "", kind: ResourceQuota }
    - { group: "", kind: LimitRange }
