# GCP edge — identical to the Hetzner overlay except the host is the GKE ingress-nginx
# LoadBalancer IP's sslip name. After `remote/gcp/create-cluster.sh` prints the LB IP,
# replace GKE_LB_IP_DASHED below with that IP in dashed form (e.g. 34-1-2-3).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dd-remote-gateway
  namespace: default
  labels:
    app: dd-remote-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["hello.GKE_LB_IP_DASHED.sslip.io"]
      secretName: gateway-public-tls
  rules:
    - host: hello.GKE_LB_IP_DASHED.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dd-remote-gateway
                port:
                  number: 443
