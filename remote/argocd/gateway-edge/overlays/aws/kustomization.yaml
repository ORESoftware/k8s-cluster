apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
# AWS single-node edge: NO ingress controller. The gateway pod binds the node's
# hostPort 80/443 (patched on the shared Deployment in dd-next-runtime) and terminates
# TLS itself from secret dd-remote-gateway-tls, which certbot renews on the host via
# /usr/local/bin/dd-renew-gateway-cert.sh (uses $RENEWED_LINEAGE — survives IP changes).
# There is therefore no Ingress here; the overlay is just the neutral base Service.
resources:
  - ../../base
