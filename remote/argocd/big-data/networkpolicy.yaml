apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: big-data-default-deny
  namespace: big-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: big-data-dns-egress
  namespace: big-data
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spark-master-ingress
  namespace: big-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spark
      app.kubernetes.io/component: master
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spark
              app.kubernetes.io/component: worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
      ports:
        - protocol: TCP
          port: 7077
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spark-master-egress
  namespace: big-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spark
      app.kubernetes.io/component: master
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spark
              app.kubernetes.io/component: worker
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spark-worker-ingress
  namespace: big-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spark
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spark
              app.kubernetes.io/component: master
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spark-worker-egress
  namespace: big-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spark
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spark
              app.kubernetes.io/component: master
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: airflow-big-data-egress
  namespace: big-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: airflow
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spark
              app.kubernetes.io/component: master
      ports:
        - protocol: TCP
          port: 7077
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-api-ingress
  namespace: big-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spark
      ports:
        - protocol: TCP
          port: 9000
