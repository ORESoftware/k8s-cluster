apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: canonical-cloud-revoker
  namespace: canonical-cloud
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: canonical-session-revoker
      app.kubernetes.io/component: revoker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.0.2.0/24
              - 192.168.0.0/16
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: "::/0"
            except:
              - "::/128"
              - "::1/128"
              - "64:ff9b:1::/48"
              - "100::/64"
              - "2001:2::/48"
              - "2001:db8::/32"
              - "fc00::/7"
              - "fe80::/10"
              - "ff00::/8"
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
