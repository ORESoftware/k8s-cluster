apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canonical-cloud-web-runtime
  namespace: canonical-cloud
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-cluster-secrets
  target:
    name: canonical-cloud-web-runtime
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: dd/remote-dev/canonical-cloud-web
        property: DATABASE_URL
    - secretKey: APP_SESSION_ENCRYPTION_KEY
      remoteRef:
        key: dd/remote-dev/canonical-cloud-web
        property: APP_SESSION_ENCRYPTION_KEY
    - secretKey: SUPABASE_URL
      remoteRef:
        key: dd/remote-dev/canonical-cloud-web
        property: SUPABASE_URL
    - secretKey: SUPABASE_PUBLISHABLE_KEY
      remoteRef:
        key: dd/remote-dev/canonical-cloud-web
        property: SUPABASE_PUBLISHABLE_KEY
    - secretKey: APP_BASE_URL
      remoteRef:
        key: dd/remote-dev/canonical-cloud-web
        property: APP_BASE_URL
    - secretKey: APP_ALLOWED_ORIGINS
      remoteRef:
        key: dd/remote-dev/canonical-cloud-web
        property: APP_ALLOWED_ORIGINS
