apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canonical-cloud-ghcr-pull
  namespace: canonical-cloud
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-cluster-secrets
  target:
    name: canonical-cloud-ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: dd/remote-dev/canonical-cloud-ghcr-pull
        property: dockerconfigjson
