apiVersion: apps/v1
kind: Deployment
metadata:
  name: canonical-cloud-web
  namespace: canonical-cloud
  labels:
    app.kubernetes.io/name: canonical-web-server
    app.kubernetes.io/component: web
  annotations:
    canonical.cloud/release-sha: "e245ed408810455b7a0c43b9f4e81fd60b172100"
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: canonical-web-server
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canonical-web-server
        app.kubernetes.io/component: web
      annotations:
        canonical.cloud/release-sha: "e245ed408810455b7a0c43b9f4e81fd60b172100"
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      imagePullSecrets:
        - name: canonical-cloud-ghcr-pull
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/canonical-cloud/canonical-web-server:e245ed408810455b7a0c43b9f4e81fd60b172100
          imagePullPolicy: IfNotPresent
          args:
            - serve
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: canonical-cloud-web-runtime
          env:
            - name: PORT
              value: "8081"
            - name: COOKIE_SECURE
              value: "true"
            - name: DATABASE_MAX_CONNECTIONS
              value: "10"
            - name: APP_SESSION_TTL_DAYS
              value: "30"
            - name: RUST_LOG
              value: canonical_web_server=info,tower_http=info,hyper=warn,h2=warn,reqwest=warn,sea_orm=warn
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=canonical-web-server,deployment.environment=remote-dev
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
