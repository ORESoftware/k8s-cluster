apiVersion: v1
kind: Service
metadata:
  name: canonical-cloud-web
  namespace: canonical-cloud
  labels:
    app.kubernetes.io/name: canonical-web-server
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: canonical-web-server
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
      appProtocol: http
