apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiducia-admin
  namespace: fiducia
  labels:
    app: fiducia-admin
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      app: fiducia-admin
  template:
    metadata:
      labels:
        app: fiducia-admin
      annotations:
        dd.dev/fiducia-source: 'fiducia-cloud/fiducia-monorepo@main (apps/fiducia-admin.rs)'
        dd.dev/fiducia-build: '2026-06-27-raft-locks-merge'
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: fiducia-admin
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities: { drop: [ALL] }
            seccompProfile: { type: RuntimeDefault }
          command: [/bin/bash, -lc]
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              # Clone PUBLIC app repos as siblings (the monorepo is private).
              rm -rf /tmp/src && mkdir -p /tmp/src && cd /tmp/src
              for repo in fiducia-admin.rs fiducia-interfaces; do git clone --depth 1 --branch main "https://github.com/fiducia-cloud/${repo}.git"; done
              cd /tmp/src/fiducia-admin.rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - { name: PORT, value: '8096' }
            # Where the admin dashboard reaches the auth + brain services in-cluster.
            - { name: FIDUCIA_AUTH_URL, value: http://fiducia-auth.fiducia.svc.cluster.local:8097 }
            - { name: FIDUCIA_BRAIN_URL, value: http://fiducia-brain.fiducia.svc.cluster.local:8095 }
            # Public canonical origin — release builds fail closed without it, and
            # the exact-Host/Origin CSRF checks compare against this value. Must
            # match the dd-remote-gateway server_name for the admin host.
            - { name: FIDUCIA_ADMIN_ORIGIN, value: https://admin.fiducia.cloud }
            # Secrets are provisioned out-of-band (same posture as
            # fiducia-auth-secrets). Release builds fail closed when csrf-secret
            # is missing; login needs the Supabase pair; the admin plane needs
            # its own Postgres (admin.sql):
            #   kubectl -n fiducia create secret generic fiducia-admin-secrets \
            #     --from-literal=csrf-secret=<32+ random bytes> \
            #     --from-literal=database-url=postgres://... \
            #     --from-literal=supabase-url=https://<project>.supabase.co \
            #     --from-literal=supabase-publishable-key=<key>
            - name: FIDUCIA_ADMIN_CSRF_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-admin-secrets, key: csrf-secret, optional: true }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: fiducia-admin-secrets, key: database-url, optional: true }
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef: { name: fiducia-admin-secrets, key: supabase-url, optional: true }
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef: { name: fiducia-admin-secrets, key: supabase-publishable-key, optional: true }
            - { name: RUST_LOG, value: info }
            - { name: HOME, value: /tmp }
            - { name: CARGO_HOME, value: /tmp/cargo }
            - { name: CARGO_TARGET_DIR, value: /tmp/target }
            - { name: CARGO_BUILD_JOBS, value: '1' }
          ports:
            - { name: http, containerPort: 8096 }
          resources:
            requests: { memory: 768Mi }
            limits: { memory: 3Gi }
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 240
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 8Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: fiducia-admin
  namespace: fiducia
  labels:
    app: fiducia-admin
spec:
  type: ClusterIP
  selector:
    app: fiducia-admin
  ports:
    - { name: http, port: 8096, targetPort: http }
