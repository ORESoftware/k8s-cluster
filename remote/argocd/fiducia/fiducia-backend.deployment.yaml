apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiducia-backend
  namespace: fiducia
  labels:
    app: fiducia-backend
spec:
  # The customer-facing website/marketing server. Stateless → autoscaled by the
  # HPA below (replicas is just the starting point; the HPA owns it after).
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fiducia-backend
  template:
    metadata:
      labels:
        app: fiducia-backend
      annotations:
        dd.dev/fiducia-source: 'fiducia-cloud/fiducia-monorepo@main (apps/fiducia-customer.rs + apps/fiducia-marketing.web)'
        dd.dev/fiducia-build: '2026-06-27-raft-locks-merge'
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Build the Astro UI from the monorepo and hand it to the backend via the
        # shared site-dist emptyDir (served at STATIC_DIR).
        - name: build-ui
          image: docker.io/library/node:22-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
          command: [/bin/bash, -lc]
          args:
            - |
              set -euo pipefail
              command -v git >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends git ca-certificates; }
              # Clone the PUBLIC ui repo directly (the monorepo is private).
              rm -rf /work/src && mkdir -p /work/src && cd /work/src
              git clone --depth 1 --branch main https://github.com/fiducia-cloud/fiducia-marketing.web.git
              cd /work/src/fiducia-marketing.web
              npm ci --no-audit --no-fund
              PUBLIC_BASE=/ npm run build
              cp -R dist/. /site-dist/
              chmod -R a+rX /site-dist
          env:
            - { name: npm_config_cache, value: /work/npm-cache }
            - { name: HOME, value: /work }
          resources:
            requests: { memory: 512Mi }
            limits: { memory: 2Gi }
          volumeMounts:
            - { name: site-dist, mountPath: /site-dist }
            - { name: work, mountPath: /work }
      containers:
        - name: fiducia-backend
          # Matches fiducia-customer.rs/rust-toolchain.toml.
          image: docker.io/library/rust:1.97.0-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command: [/bin/bash, -lc]
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              # Clone the PUBLIC app repos as siblings (the monorepo is private).
              rm -rf /tmp/src && mkdir -p /tmp/src && cd /tmp/src
              for repo in fiducia-customer.rs fiducia-interfaces; do git clone --depth 1 --branch main "https://github.com/fiducia-cloud/${repo}.git"; done
              cd /tmp/src/fiducia-customer.rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - { name: HOST, value: 0.0.0.0 }
            - { name: PORT, value: '8117' }
            - { name: STATIC_DIR, value: /site-dist }
            # ── app.fiducia.cloud identity + CSRF surface ──────────────────
            # fiducia-auth verifies Supabase sessions (GET /v1/me); the exact
            # Host/Origin CSRF checks compare against CUSTOMER_APP_ORIGIN, which
            # must equal the public https origin the gateway serves.
            - { name: FIDUCIA_AUTH_URL, value: http://fiducia-auth.fiducia.svc.cluster.local:8097 }
            - { name: CUSTOMER_APP_HOST, value: app.fiducia.cloud }
            - { name: CUSTOMER_APP_ORIGIN, value: https://app.fiducia.cloud }
            - { name: FIDUCIA_SITE_MODE, value: customer }
            # ── Postgres: dedicated `fiducia` schema on the shared AWS RDS ──
            # Schema/roles are declared in remote/libs/pg-defs (fiducia section)
            # and converged with dpm; pinning search_path keeps this plane from
            # colliding with other apps in the same RDS database.
            - { name: FIDUCIA_DB_SCHEMA, value: fiducia }
            # Secrets are created out-of-band in the `fiducia` namespace (not in
            # git). `database-url` is the RDS DSN for the fiducia role, e.g.:
            #   kubectl -n fiducia create secret generic fiducia-backend-secrets \
            #     --from-literal=database-url='postgres://fiducia_app:***@dd-remote-dev-pg-primary.c4rk0ygsgsfe.us-east-1.rds.amazonaws.com:5432/appdb' \
            #     --from-literal=supabase-url='https://<ref>.supabase.co' \
            #     --from-literal=supabase-publishable-key='***' \
            #     --from-literal=csrf-secret="$(openssl rand -hex 32)"
            # optional:true lets the pod start for the in-pod build; the app
            # fails closed at runtime if a required value is absent.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: fiducia-backend-secrets, key: database-url, optional: true }
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef: { name: fiducia-backend-secrets, key: supabase-url, optional: true }
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef: { name: fiducia-backend-secrets, key: supabase-publishable-key, optional: true }
            - name: FIDUCIA_CUSTOMER_CSRF_SECRET
              valueFrom:
                secretKeyRef: { name: fiducia-backend-secrets, key: csrf-secret, optional: true }
            # Export OTLP traces to the shared observability collector
            # (fiducia-telemetry degrades to stdout-only logging when unset).
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: http://dd-otel-collector.observability.svc.cluster.local:4317 }
            - { name: RUST_LOG, value: info }
            - { name: HOME, value: /tmp }
            - { name: CARGO_HOME, value: /tmp/cargo }
            - { name: CARGO_TARGET_DIR, value: /tmp/target }
            - { name: CARGO_BUILD_JOBS, value: '1' }
            - { name: RUSTUP_TOOLCHAIN, value: '1.97.0' }
          ports:
            - name: http
              containerPort: 8117
          resources:
            requests:
              memory: 768Mi
            limits:
              memory: 3Gi
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 240
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - { name: site-dist, mountPath: /site-dist, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: site-dist, emptyDir: {} }
        - { name: work, emptyDir: {} }
        - name: tmp
          emptyDir: { sizeLimit: 6Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: fiducia-backend
  namespace: fiducia
  labels:
    app: fiducia-backend
spec:
  type: ClusterIP
  selector:
    app: fiducia-backend
  ports:
    - name: http
      port: 8117
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fiducia-backend
  namespace: fiducia
  labels:
    app: fiducia-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fiducia-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
