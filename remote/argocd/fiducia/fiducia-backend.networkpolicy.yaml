apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fiducia-backend
  namespace: fiducia
  labels:
    app: fiducia-backend
spec:
  podSelector:
    matchLabels:
      app: fiducia-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # app.fiducia.cloud terminates on dd-remote-gateway (namespace `default`),
    # which proxies to fiducia-backend.fiducia:8117 — the only legitimate
    # caller besides the observability scrapers.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
          podSelector:
            matchLabels:
              app: dd-remote-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - dd-prometheus
                  - dd-otel-collector
      ports:
        - protocol: TCP
          port: 8117
  egress:
    # Session verification: every authenticated request calls fiducia-auth
    # GET /v1/me to verify the Supabase JWT + org membership. Without this the
    # portal fails closed (503) on every login.
    - to:
        - podSelector:
            matchLabels:
              app: fiducia-auth
      ports:
        - protocol: TCP
          port: 8097
    # OTLP trace export to the in-cluster OpenTelemetry collector.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # DNS resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Public HTTP(S) for the cold in-pod builds: git clone (GitHub), the npm
    # registry (build-ui init container) and crates.io — public internet only,
    # private ranges excluded so this does not widen in-cluster reachability.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.168.0.0/16
              - 192.0.2.0/24
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        # Supabase Postgres (session pooler) + AWS RDS are public endpoints on
        # 5432/6543; the customer plane connects out over the public internet.
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6543
    - to:
        - ipBlock:
            cidr: ::/0
            except:
              - ::/128
              - ::1/128
              - 64:ff9b:1::/48
              - 100::/64
              - 2001:2::/48
              - 2001:db8::/32
              - fc00::/7
              - fe80::/10
              - ff00::/8
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
