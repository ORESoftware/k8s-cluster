apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single-cluster (AWS) fiducia.cloud deployment — the full sharded-multi-Raft
# coordination stack, built from the fiducia-monorepo apps/ at main.
#
#   data plane:   fiducia-node  (StatefulSet x3, 1 shard, RF3)
#   control plane: fiducia-brain (Deployment x3)
#   router:       fiducia-load-balance (Deployment x1)
#   website:      fiducia-backend (Deployment + HPA, autoscaled)
#
# Wired AWS-only via remote/argocd/clusters/aws/applications.yaml (the `fiducia`
# Application) — intentionally NOT in clusters/hetzner.

namespace: fiducia

resources:
  - namespace.yaml
  - fiducia-node.statefulset.yaml
  - fiducia-node.service.yaml
  - fiducia-brain.deployment.yaml
  - fiducia-load-balance.deployment.yaml
  - fiducia-backend.deployment.yaml
