apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fiducia-brain
  namespace: fiducia
  labels:
    app: fiducia-brain
spec:
  podSelector:
    matchLabels:
      app: fiducia-brain
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Client-facing API (:8095): fiducia-admin (FIDUCIA_BRAIN_URL),
    # fiducia-load-balance (FIDUCIA_BRAIN_URL) and the fiducia-node sidecars'
    # membership heartbeats (their FIDUCIA_BRAIN_URL). The brain's own metrics
    # sidecar scrapes it over pod-local localhost, which NetworkPolicy does not
    # police.
    - from:
        - podSelector:
            matchLabels:
              app: fiducia-admin
        - podSelector:
            matchLabels:
              app: fiducia-load-balance
        - podSelector:
            matchLabels:
              app: fiducia-node
      ports:
        - protocol: TCP
          port: 8095
    # Raft peer plane (:9095): brain members only.
    - from:
        - podSelector:
            matchLabels:
              app: fiducia-brain
      ports:
        - protocol: TCP
          port: 9095
    # The fiducia-brain-sidecar Prometheus job scrapes each pod's exporter on
    # :8091 via the headless peer Service.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - dd-prometheus
                  - dd-otel-collector
      ports:
        - protocol: TCP
          port: 8091
  egress:
    # Raft peer RPC to the other brain members (HTTP transport POSTs to :9095).
    - to:
        - podSelector:
            matchLabels:
              app: fiducia-brain
      ports:
        - protocol: TCP
          port: 9095
    # The leader's reconciler places shards by instructing data-plane nodes on
    # their :8090 API (node addresses come from heartbeats, not env).
    - to:
        - podSelector:
            matchLabels:
              app: fiducia-node
      ports:
        - protocol: TCP
          port: 8090
    # OTLP trace export to the in-cluster OpenTelemetry collector.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # DNS resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Public HTTP(S) for the cold in-pod builds (brain + sidecar: git clone
    # GitHub, crates.io). The KubeOracle's kube-apiserver calls also ride the
    # :443 rule (same posture as dd-agent-worker-broker, the other in-cluster
    # k8s-API client); Cilium additionally exempts host/apiserver traffic.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.168.0.0/16
              - 192.0.2.0/24
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: ::/0
            except:
              - ::/128
              - ::1/128
              - 64:ff9b:1::/48
              - 100::/64
              - 2001:2::/48
              - 2001:db8::/32
              - fc00::/7
              - fe80::/10
              - ff00::/8
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
