# Fiducia cannot safely source its own at-rest encryption key: doing so creates
# an unrecoverable cold-start dependency. Bootstrap the versioned keyring from
# the cluster's existing cloud-backed store, then seal values before Raft sees
# them. Sync wave -1 makes Argo wait for this Secret before creating node pods.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fiducia-kv-protection
  namespace: fiducia
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-cluster-secrets
  target:
    name: fiducia-kv-protection
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: encryption-keys
      remoteRef:
        key: dd/remote-dev/fiducia-kv-protection
        property: FIDUCIA_KV_ENCRYPTION_KEYS
    - secretKey: active-key-id
      remoteRef:
        key: dd/remote-dev/fiducia-kv-protection
        property: FIDUCIA_KV_ENCRYPTION_ACTIVE_KEY_ID
