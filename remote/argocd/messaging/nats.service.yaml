apiVersion: v1
kind: Service
metadata:
  name: dd-nats
  namespace: messaging
  labels:
    app: dd-nats
spec:
  type: ClusterIP
  selector:
    app: dd-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
    - name: metrics
      port: 7777
      targetPort: 7777
