apiVersion: v1
kind: ResourceQuota
metadata:
  name: dd-ai-ml-resource-quota
  namespace: ai-ml
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 24Gi
    requests.ephemeral-storage: 20Gi
    limits.cpu: "24"
    limits.memory: 64Gi
    limits.ephemeral-storage: 40Gi
    requests.storage: 80Gi
    persistentvolumeclaims: "20"
    pods: "80"
    services: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dd-ai-ml-limit-range
  namespace: ai-ml
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 256Mi
      default:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 1Gi
      min:
        cpu: 25m
        memory: 64Mi
      max:
        cpu: "8"
        memory: 16Gi
        ephemeral-storage: 8Gi
---
