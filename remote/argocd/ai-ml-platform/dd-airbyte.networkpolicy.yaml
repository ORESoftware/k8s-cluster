apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-airbyte-namespace-boundary
  namespace: airbyte
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-ml
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
