apiVersion: v1
kind: PersistentVolume
metadata:
  name: dd-dagster-postgresql-data
  labels:
    app.kubernetes.io/name: dd-dagster-postgresql
    app.kubernetes.io/part-of: dd-dagster
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 10Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: data-dd-dagster-postgresql-0
    namespace: ai-ml
  hostPath:
    path: /home/ec2-user/dd-ai-ml-platform/dagster-postgresql
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
---
