apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-ai-ml-agent-secrets
  namespace: ai-ml
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-cluster-secrets
  target:
    name: dd-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: SERVER_AUTH_SECRET
      remoteRef:
        key: dd/remote-dev/agent-secrets
        property: SERVER_AUTH_SECRET
