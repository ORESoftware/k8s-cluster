apiVersion: v1
kind: Service
metadata:
  name: dd-dagster-postgresql
  namespace: ai-ml
  labels:
    app.kubernetes.io/name: dd-dagster-postgresql
    app.kubernetes.io/part-of: dd-dagster
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: postgres
  selector:
    app.kubernetes.io/name: dd-dagster-postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dd-dagster-postgresql
  namespace: ai-ml
  labels:
    app.kubernetes.io/name: dd-dagster-postgresql
    app.kubernetes.io/part-of: dd-dagster
spec:
  replicas: 1
  serviceName: dd-dagster-postgresql
  selector:
    matchLabels:
      app.kubernetes.io/name: dd-dagster-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dd-dagster-postgresql
        app.kubernetes.io/part-of: dd-dagster
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-postgres-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 999:999 /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: docker.io/library/postgres:17.6-alpine@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: dagster
            - name: POSTGRES_USER
              value: dagster
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dd-dagster-postgresql
                  key: postgresql-password
            - name: POSTGRES_INITDB_ARGS
              value: --auth-host=scram-sha-256
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: postgres-tmp
              mountPath: /tmp
      volumes:
        - name: postgres-run
          emptyDir:
            sizeLimit: 64Mi
        - name: postgres-tmp
          emptyDir:
            sizeLimit: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-dagster-postgresql-ingress
  namespace: ai-ml
  labels:
    app.kubernetes.io/name: dd-dagster-postgresql
    app.kubernetes.io/part-of: dd-dagster
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dd-dagster-postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              dd-dagster-postgresql-client: 'true'
      ports:
        - protocol: TCP
          port: 5432
  egress: []
