apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-airbyte-auth
  namespace: airbyte
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-airbyte-auth
    creationPolicy: Owner
  data:
    - secretKey: jwt-signature-secret
      remoteRef:
        key: dd/remote-dev/ai-ml-platform-secrets
        property: AIRBYTE_JWT_SIGNATURE_SECRET
    - secretKey: instance-admin-password
      remoteRef:
        key: dd/remote-dev/ai-ml-platform-secrets
        property: AIRBYTE_INSTANCE_ADMIN_PASSWORD
    - secretKey: instance-admin-client-id
      remoteRef:
        key: dd/remote-dev/ai-ml-platform-secrets
        property: AIRBYTE_INSTANCE_ADMIN_CLIENT_ID
    - secretKey: instance-admin-client-secret
      remoteRef:
        key: dd/remote-dev/ai-ml-platform-secrets
        property: AIRBYTE_INSTANCE_ADMIN_CLIENT_SECRET
    - secretKey: dataplane-client-id
      remoteRef:
        key: dd/remote-dev/ai-ml-platform-secrets
        property: AIRBYTE_DATAPLANE_CLIENT_ID
    - secretKey: dataplane-client-secret
      remoteRef:
        key: dd/remote-dev/ai-ml-platform-secrets
        property: AIRBYTE_DATAPLANE_CLIENT_SECRET
---
