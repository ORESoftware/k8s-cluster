apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-ai-ml-namespace-boundary
  namespace: ai-ml
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: NotIn
        values:
          - dd-ai-ml-pipeline
      - key: app.kubernetes.io/name
        operator: NotIn
        values:
          - dd-dagster-postgresql
          - dd-mlflow-postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
