apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-ai-ml-rest-api-secrets
  namespace: ai-ml
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-remote-rest-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: RDS_DATABASE_URL
      remoteRef:
        key: dd/remote-dev/rest-api-secrets
        property: RDS_DATABASE_URL
