apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dd-ai-ml-pipeline
  namespace: ai-ml
  labels:
    app: dd-ai-ml-pipeline
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dd-ai-ml-pipeline
