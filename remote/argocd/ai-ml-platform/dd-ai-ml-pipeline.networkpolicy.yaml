apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-ai-ml-pipeline
  namespace: ai-ml
  labels:
    app: dd-ai-ml-pipeline
spec:
  podSelector:
    matchLabels:
      app: dd-ai-ml-pipeline
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8099
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
      ports:
        - protocol: TCP
          port: 4222
