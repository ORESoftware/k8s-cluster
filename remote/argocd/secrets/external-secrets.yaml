apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-agent-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-agent-secrets
    creationPolicy: Owner
  dataFrom:
    # Expected AWS Secrets Manager JSON keys include SERVER_AUTH_SECRET,
    # DD_REPO_URL, DD_REPO_REF, model provider keys, GH_PAT, GH_DEPLOY_KEY,
    # and optional GH_DEPLOY_KEY_PUBLIC. The private key belongs here, not in
    # the worker image or Git.
    - extract:
        key: dd/remote-dev/agent-secrets
---
