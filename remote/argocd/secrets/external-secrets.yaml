apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-agent-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-agent-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dd/remote-dev/agent-secrets
