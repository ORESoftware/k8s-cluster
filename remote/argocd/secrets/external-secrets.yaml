---
# dd-gleam-mcp-server pulls its own narrow secret bundle so the MCP pod can
# talk to RDS Postgres via dd_pg_defs (RDS_DATABASE_URL /
# AGENT_TASKS_RDS_DATABASE_URL) plus any future MCP-specific keys, without
# inheriting the broader REST API or agent secrets. AWS source:
# dd/remote-dev/mcp-secrets — see remote/deployments/gleam-mcp-server/readme.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-gleam-mcp-server-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-gleam-mcp-server-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dd/remote-dev/mcp-secrets
---
# dd-gleamlang-server already owns GLEAM_BROADCAST_SECRET. The same secret
# bundle now also carries the optional RDS_DATABASE_URL so the WebSocket
# fan-out can use dd_pg_defs for shared app_config reads. AWS source:
# dd/remote-dev/gleamlang-server-secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-gleamlang-server-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-gleamlang-server-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dd/remote-dev/gleamlang-server-secrets
---
# Dedicated admin-token bundle for the live-mutex brokers (dd-live-mutex
# Node and dd-rust-network-mutex Rust). Both services authenticate
# `/admin/*` endpoints with `x-admin-token` and fall back to the literal
# default `all-dogs-go-to-heaven` when LMX_ADMIN_TOKEN is empty. Putting
# this in its own AWS secret keeps the admin-control blast radius
# isolated from dd-agent-secrets and lets the token rotate without
# restarting every consumer of the broader bundle.
#
# AWS source: dd/remote-dev/lmx-admin-token. Expected JSON keys:
#   * LMX_ADMIN_TOKEN — long random string used for /admin/otel,
#     /admin/log, /admin/tcp on both brokers.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-lmx-admin-token
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-lmx-admin-token
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dd/remote-dev/lmx-admin-token
