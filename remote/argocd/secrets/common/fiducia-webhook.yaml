# Bootstrap is intentionally one-way: the existing cloud provider supplies the
# read-only Fiducia API key and Fiducia's at-rest encryption keyring. Fiducia can
# then become a second source for application secrets without depending on itself
# for the credentials required to start or decrypt its Raft state.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fiducia-eso-reader
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-cluster-secrets
  target:
    name: fiducia-eso-reader
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          # Required by ESO v0.18.2 before a webhook provider may read
          # credential material into its template context.
          external-secrets.io/type: webhook
  data:
    - secretKey: token
      remoteRef:
        key: dd/remote-dev/fiducia-eso-reader
        property: FIDUCIA_API_KEY
---
# Application ExternalSecrets reference this store by name. The webhook makes
# one authenticated GET per spec.data entry and extracts the unsealed value from
# fiducia-node's documented KV response envelope.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: dd-fiducia-kv
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    dd.dev/secret-backend: fiducia-kv
spec:
  provider:
    webhook:
      method: GET
      timeout: 5s
      # ESO URL-escapes remoteRef values before rendering URL templates. Do not
      # apply a second encoder here or `%2F` becomes `%252F` and addresses the
      # wrong Fiducia key.
      url: 'http://fiducia-load-balance.fiducia.svc.cluster.local:8088/v1/kv?key={{ .remoteRef.key }}'
      result:
        jsonPath: '$.entry.value'
      headers:
        Accept: application/json
        Authorization: 'Bearer {{ .auth.token }}'
      secrets:
        - name: auth
          secretRef:
            name: fiducia-eso-reader
            namespace: external-secrets
