# AthletO real-browser smoke lane against the LIVE storefronts.
#
# Unlike the fiducia suite (which boots the whole stack), this is a lightweight
# dispatcher: it POSTs read-only declarative UI scenarios to the in-cluster
# dd-browser-test-server (:8104), which drives them through Chromium under BOTH
# the Playwright and Puppeteer back-ends. So it exercises app.athleto.store and
# biz.athleto.store through the cluster's own browser runners without an app
# build, a database, or any mutation of production data.
#
# The scenario runner is `athleto-app-rs e2e/cluster/run-cluster.mjs`, embedded
# in the dd-athleto-e2e-scenarios ConfigMap (keep the two in sync). It needs no
# npm deps -- only node built-ins (node:test, fetch) -- so it runs on a plain
# node image and reaches dd-browser-test-server over the cluster network,
# authenticating with the same SERVER_AUTH_SECRET the server itself uses.
#
# Opt-in: suspend: true means Argo applies it but the scheduler never fires it.
# One-off run:
#   kubectl -n default create job dd-athleto-e2e-smoke-manual \
#     --from=cronjob/dd-athleto-e2e-browser-suite
# or flip suspend: false for the nightly cadence.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dd-athleto-e2e-browser-suite
  namespace: default
  labels:
    app: dd-athleto-e2e-browser-suite
    app.kubernetes.io/name: dd-athleto-e2e-browser-suite
    app.kubernetes.io/component: browser-e2e
    app.kubernetes.io/part-of: dd-next-runtime
  annotations:
    dd.dev/note: Opt-in AthletO live-storefront browser smoke via dd-browser-test-server (Playwright + Puppeteer); suspended by default, read-only.
spec:
  schedule: "25 6 * * *"
  timeZone: America/Chicago
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    metadata:
      labels:
        app: dd-athleto-e2e-browser-suite
        app.kubernetes.io/name: dd-athleto-e2e-browser-suite
        app.kubernetes.io/component: browser-e2e
        app.kubernetes.io/part-of: dd-next-runtime
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: dd-athleto-e2e-browser-suite
            app.kubernetes.io/name: dd-athleto-e2e-browser-suite
            app.kubernetes.io/component: browser-e2e
            app.kubernetes.io/part-of: dd-next-runtime
        spec:
          automountServiceAccountToken: false
          enableServiceLinks: false
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: e2e-dispatch
              image: node:22-bookworm-slim
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              command:
                - node
                - --test
                - /scripts/run-cluster.mjs
              env:
                - name: BROWSER_TEST_URL
                  value: http://dd-browser-test-server.default.svc.cluster.local:8104
                - name: ATHLETO_APP_URL
                  value: https://app.athleto.store
                - name: ATHLETO_BIZ_URL
                  value: https://biz.athleto.store
                - name: SERVER_AUTH_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: dd-agent-secrets
                      key: SERVER_AUTH_SECRET
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: scenarios
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scenarios
              configMap:
                name: dd-athleto-e2e-scenarios
