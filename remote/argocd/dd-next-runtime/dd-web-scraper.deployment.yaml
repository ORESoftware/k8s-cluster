apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-web-scraper
  namespace: default
  labels:
    app: dd-web-scraper
spec:
  replicas: 0
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-web-scraper
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-16-web-scraper'
      labels:
        app: dd-web-scraper
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: web-scraper
          image: mcr.microsoft.com/playwright:v1.56.0-noble
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export COREPACK_HOME=/tmp/corepack
              export npm_config_cache=/tmp/.npm
              mkdir -p "$PNPM_HOME" "$COREPACK_HOME" "$XDG_CACHE_HOME" "$npm_config_cache"
              cd /opt/dd-next-1/remote/deployments/web-scraper-service
              corepack prepare pnpm@9.15.4 --activate
              corepack pnpm install --frozen-lockfile --ignore-workspace --prod=false
              corepack pnpm run build
              exec corepack pnpm run start
          env:
            - name: HOME
              value: /tmp
            - name: PNPM_HOME
              value: /tmp/pnpm
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: COREPACK_HOME
              value: /tmp/corepack
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8097'
            - name: NODE_ENV
              value: production
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /ms-playwright
            - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
              value: '1'
            - name: PUPPETEER_SKIP_DOWNLOAD
              value: 'true'
            - name: SCRAPER_BROWSER_HEADLESS
              value: 'true'
            - name: SCRAPER_CAPTURE_FAILURE_SCREENSHOTS
              value: 'true'
            - name: SCRAPER_FAILURE_SCREENSHOT_QUALITY
              value: '65'
            - name: SCRAPER_FAILURE_SCREENSHOT_MAX_BYTES
              value: '512000'
            - name: SCRAPER_DEFAULT_STRATEGY
              value: auto
            - name: SCRAPER_MAX_CONCURRENT
              value: '4'
            - name: SCRAPER_PARSER_WORKERS
              value: '2'
            - name: SCRAPER_PARSER_WORKER_MEMORY_MB
              value: '128'
            - name: SCRAPER_MAX_TIMEOUT_MS
              value: '60000'
            - name: SCRAPER_DNS_TIMEOUT_MS
              value: '5000'
            - name: SCRAPER_MAX_REDIRECTS
              value: '5'
            - name: SCRAPER_MAX_HTML_CHARS
              value: '1000000'
            - name: SCRAPER_ALLOW_PRIVATE_NETWORKS
              value: 'false'
            - name: SCRAPER_ALLOW_SENSITIVE_HEADERS
              value: 'false'
            - name: SCRAPER_ALLOW_URL_CREDENTIALS
              value: 'false'
            - name: SCRAPER_AUTO_BROWSERLESS
              value: 'false'
            # Proxy rotation. Pool is sourced from a secret (comma/newline list of
            # proxy URLs); empty secret = direct egress. `sticky` keeps one egress
            # IP per target host; failures cool a proxy out for the window below.
            - name: SCRAPER_PROXY_ROTATION
              value: sticky
            - name: SCRAPER_PROXY_COOLDOWN_MS
              value: '60000'
            - name: SCRAPER_ALLOW_REQUEST_PROXY
              value: 'true'
            - name: SCRAPER_PROXIES
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SCRAPER_PROXIES
                  optional: true
            # CAPTCHA orchestration. Detection is always on and reported in the
            # response; auto-solve stays off until a solver key is present.
            - name: SCRAPER_DETECT_CAPTCHAS
              value: 'true'
            - name: SCRAPER_CAPTCHA_AUTOSOLVE
              value: 'false'
            - name: SCRAPER_CAPTCHA_PROVIDER_URL
              value: https://2captcha.com
            - name: SCRAPER_CAPTCHA_POLL_INTERVAL_MS
              value: '5000'
            - name: SCRAPER_CAPTCHA_TIMEOUT_MS
              value: '120000'
            - name: SCRAPER_CAPTCHA_MAX_ATTEMPTS
              value: '2'
            - name: SCRAPER_CAPTCHA_MAX_CONCURRENT
              value: '2'
            - name: SCRAPER_CAPTCHA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SCRAPER_CAPTCHA_API_KEY
                  optional: true
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: BROWSERLESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: BROWSERLESS_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8097
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir: {}
