apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-remote-gateway
  namespace: default
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app: dd-remote-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-remote-gateway
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-07-gateway-quoted-regex'
        dd.dev/gateway-config-revision: '2026-07-15-fiducia-public-hosts'
      labels:
        app: dd-remote-gateway
    spec:
      priorityClassName: system-cluster-critical
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: gateway
          image: docker.io/library/nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            # NOTE: We deliberately do not `drop: [ALL]` on this nginx
            # container. nginx 1.27-alpine starts a master as root (so it
            # can bind 80/443), then forks workers and switches them to
            # the `nginx` user, which needs CAP_SETUID/SETGID. Adding
            # only NET_BIND_SERVICE breaks worker spawn. Hardening here
            # should instead come from running an unprivileged nginx
            # image and using `runAsUser: 101` plus `add: NET_BIND_SERVICE`,
            # which is a coordinated change tracked separately.
          env:
            - name: DD_REMOTE_GATEWAY_AUTH_VALUE
              valueFrom:
                secretKeyRef:
                  name: dd-remote-auth-secrets
                  key: DD_AUTH_COOKIE_VALUE
            - name: DD_REMOTE_DEV_SERVER_AUTH_VALUE
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            # Dedicated read-only MCP bearer token validated by the gateway for
            # /mcp and /cluster-mcp only. Lets local IDE MCP clients connect
            # with a narrow, revocable credential instead of the master
            # operator cookie value. Required (not optional) so the
            # $dd_mcp_bearer_ok map never matches an empty "Bearer " token.
            - name: DD_MCP_READONLY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-mcp-gateway-token
                  key: MCP_READONLY_TOKEN
          ports:
            - name: http
              containerPort: 80
              hostPort: 80
            - name: https
              containerPort: 443
              hostPort: 443
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: acme-webroot
              mountPath: /var/www/acme
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dd-remote-gateway-config
        - name: tls
          secret:
            secretName: dd-remote-gateway-tls
        - name: acme-webroot
          hostPath:
            path: /home/ec2-user/dd-acme-webroot
            type: DirectoryOrCreate
