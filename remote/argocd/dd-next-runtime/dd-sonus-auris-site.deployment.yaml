apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-sonus-auris-site
  namespace: default
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app: dd-sonus-auris-site
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 900
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-sonus-auris-site
  template:
    metadata:
      annotations:
        dd.dev/sonus-auris-site-revision: '2f94949c6a36533cec3cfe36022f7f9da50648de'
      labels:
        app: dd-sonus-auris-site
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: build-sonus-auris-site
          image: docker.io/library/node:22-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              if ! command -v git >/dev/null 2>&1; then
                apt-get update
                apt-get install -y --no-install-recommends git ca-certificates
              fi

              source_dir=/work/source
              git clone --depth 1 --no-checkout "${SONUS_AURIS_SITE_GIT_URL}" "${source_dir}"
              git -C "${source_dir}" fetch --depth 1 origin "${SONUS_AURIS_SITE_GIT_REF}"
              git -C "${source_dir}" switch --detach FETCH_HEAD
              echo "[dd-sonus-auris-site] source: ${SONUS_AURIS_SITE_GIT_URL}@${SONUS_AURIS_SITE_GIT_REF} ($(git -C "${source_dir}" rev-parse --short HEAD))"

              cd "${source_dir}"
              node -e 'const fs = require("fs"); const p = "src/styles/global.css"; fs.writeFileSync(p, fs.readFileSync(p, "utf8").replaceAll("/sonus-auris-site.web/", "/sonus-auris/"));'
              npm ci --no-audit --no-fund
              npm run build -- --base /sonus-auris
              cp -R dist/. /site-dist/
          env:
            - name: SONUS_AURIS_SITE_GIT_URL
              value: https://github.com/sonus-auris/sonus-auris-site.web.git
            - name: SONUS_AURIS_SITE_GIT_REF
              value: 2f94949c6a36533cec3cfe36022f7f9da50648de
            - name: npm_config_cache
              value: /work/npm-cache
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1536Mi
          volumeMounts:
            - name: build-work
              mountPath: /work
            - name: site-dist
              mountPath: /site-dist
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: site-dist
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: build-work
          emptyDir: {}
        - name: site-dist
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: dd-sonus-auris-site-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
