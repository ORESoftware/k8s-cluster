apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-live-mutex
  namespace: default
  labels:
    app: dd-live-mutex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-live-mutex
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-17-live-mutex'
      labels:
        app: dd-live-mutex
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: live-mutex
          image: docker.io/library/node:22-bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              npm install --global --omit=dev --ignore-scripts live-mutex@0.2.25
              exec env live_mutex_host=0.0.0.0 live_mutex_port=6970 lmx_start_server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          # The lock-protocol TCP listener on 6970 is what makes the
          # broker functional; the optional HTTP listener on 6971 mounts
          # `/admin/otel`, `/healthz`, `/metrics`, and the status HTML
          # page (see `remote/submodules/live-mutex/src/http-server.ts`)
          # and is opted in here through `LMX_HTTP_PORT`. Probes still
          # target port `lmx` because lock-port-up is the canonical
          # liveness signal — a wedged HTTP listener should not bounce
          # the broker.
          env:
            - name: LMX_HTTP_HOST
              value: 0.0.0.0
            - name: LMX_HTTP_PORT
              value: '6971'
            - name: LMX_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-lmx-admin-token
                  key: LMX_ADMIN_TOKEN
                  optional: true
          ports:
            - name: lmx
              containerPort: 6970
            - name: http
              containerPort: 6971
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: lmx
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: lmx
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            tcpSocket:
              port: lmx
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
