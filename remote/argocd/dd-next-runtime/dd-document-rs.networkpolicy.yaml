apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-document-rs
  namespace: default
  labels:
    app: dd-document-rs
spec:
  podSelector:
    matchLabels:
      app: dd-document-rs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dd-remote-gateway
        - podSelector:
            matchLabels:
              app: dd-runtime-config
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8122
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
          podSelector:
            matchLabels:
              app: dd-nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - podSelector:
            matchLabels:
              app: dd-runtime-config
      ports:
        - protocol: TCP
          port: 8110
