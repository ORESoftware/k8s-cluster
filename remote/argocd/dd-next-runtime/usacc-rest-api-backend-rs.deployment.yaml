apiVersion: apps/v1
kind: Deployment
metadata:
  name: usacc-rest-api-backend-rs
  namespace: default
  labels:
    app: usacc-rest-api-backend-rs
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: usacc-rest-api-backend-rs
  template:
    metadata:
      annotations:
        dd.dev/usacc-source-revision: 'bf2c3a774591fec597bd884d3909dd96c9bb1318'
        dd.dev/telemetry-revision: '2026-06-08-usacc-rest-api'
      labels:
        app: usacc-rest-api-backend-rs
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: usacc-rest-api-backend-rs
          image: docker.io/library/rust:1.91.1-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/usacc-rest-api-backend-rs
              export CARGO_HOME=/var/cache/usacc-rest-api-backend-rs/cargo
              export CARGO_TARGET_DIR=/var/cache/usacc-rest-api-backend-rs/target
              for attempt in $(seq 1 120); do
                actual_revision="$(git rev-parse HEAD)"
                if [ "$actual_revision" = "$USACC_SOURCE_REVISION" ]; then
                  break
                fi
                echo "waiting for GitOps source revision expected=$USACC_SOURCE_REVISION actual=$actual_revision attempt=$attempt/120" >&2
                sleep 5
              done
              test "$(git rev-parse HEAD)" = "$USACC_SOURCE_REVISION"
              exec /usr/local/cargo/bin/cargo run --release --locked
          env:
            - name: USACC_SOURCE_REVISION
              value: 'bf2c3a774591fec597bd884d3909dd96c9bb1318'
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8121'
            - name: HOME
              value: /tmp
            - name: CARGO_BUILD_JOBS
              value: '1'
            - name: RUST_LOG
              value: usacc_rest_api_backend_rs=info,tower_http=info
            - name: USACC_API_AUTH_REQUIRED
              value: 'true'
            # HTMX operator console under /app. The gateway exposes it at
            # /usacc/app and strips the /usacc prefix, so the console builds
            # its links with that base path. Access is gated by the gateway
            # auth (same as the JSON API), so no separate UI bearer is set.
            - name: USACC_APP_UI_ENABLED
              value: 'true'
            - name: USACC_APP_BASE_PATH
              value: /usacc
            - name: USACC_CONTRACT_SERVICE_URL
              value: http://dd-contract-service.default.svc.cluster.local:8101
            - name: USACC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: USACC_DATABASE_URL
                  optional: true
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: DATABASE_URL
                  optional: true
            - name: AGENT_TASKS_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: AGENT_TASKS_RDS_DATABASE_URL
                  optional: true
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
          ports:
            - name: http
              containerPort: 8121
          resources:
            requests:
              cpu: 25m
              memory: 1Gi
            limits:
              cpu: '1'
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 600
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/usacc-rest-api-backend-rs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
