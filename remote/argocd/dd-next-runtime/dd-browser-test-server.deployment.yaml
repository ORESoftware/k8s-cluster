apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-browser-test-server
  namespace: default
  labels:
    app: dd-browser-test-server
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-browser-test-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-23-browser-test-server'
      labels:
        app: dd-browser-test-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: browser-test-server
          # Reuse the Playwright Noble image so a single bundled Chromium drives
          # all three back-ends (Playwright, Puppeteer, Selenium). The runtime
          # selects this binary via playwright.chromium.executablePath() so we
          # do not need a separate google-chrome-stable install.
          image: mcr.microsoft.com/playwright:v1.56.0-noble
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export COREPACK_HOME=/tmp/corepack
              export npm_config_cache=/tmp/.npm
              mkdir -p "$PNPM_HOME" "$COREPACK_HOME" "$XDG_CACHE_HOME" "$npm_config_cache"
              cd /opt/dd-next-1/remote/deployments/browser-test-server
              corepack prepare pnpm@9.15.4 --activate
              corepack pnpm install --frozen-lockfile --ignore-workspace --prod=false
              corepack pnpm run build
              exec corepack pnpm run start
          env:
            - name: HOME
              value: /tmp
            - name: PNPM_HOME
              value: /tmp/pnpm
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: COREPACK_HOME
              value: /tmp/corepack
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8104'
            - name: NODE_ENV
              value: production
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /ms-playwright
            - name: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
              value: '1'
            - name: PUPPETEER_SKIP_DOWNLOAD
              value: 'true'
            - name: BROWSER_TEST_HEADLESS
              value: 'true'
            - name: BROWSER_TEST_DEFAULT_TOOL
              value: playwright
            - name: BROWSER_TEST_MAX_CONCURRENT
              value: '2'
            - name: BROWSER_TEST_DEFAULT_TIMEOUT_MS
              value: '30000'
            - name: BROWSER_TEST_MAX_TIMEOUT_MS
              value: '180000'
            - name: BROWSER_TEST_STEP_TIMEOUT_MS
              value: '15000'
            - name: BROWSER_TEST_MAX_STEPS
              value: '64'
            - name: BROWSER_TEST_MAX_SCREENSHOT_BYTES
              value: '1500000'
            - name: BROWSER_TEST_SCREENSHOT_QUALITY
              value: '70'
            # evaluate steps run arbitrary JavaScript inside the rendered page.
            # Default off so a stolen gateway auth header cannot become a
            # remote-script-execution primitive against arbitrary targets.
            - name: BROWSER_TEST_ALLOW_EVALUATE
              value: 'false'
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
          ports:
            - name: http
              containerPort: 8104
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: '2'
              memory: 3Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir: {}
