apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-idle-reaper
  namespace: default
  labels:
    app: dd-idle-reaper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-idle-reaper
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-19-worker-image-rebuild-done'
      labels:
        app: dd-idle-reaper
    spec:
      serviceAccountName: dd-idle-reaper
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 20
      containers:
        - name: reaper
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/idle-reaper-rs
              exec /usr/local/cargo/bin/cargo run --release
          envFrom:
            - configMapRef:
                name: dd-idle-reaper-config
          env:
            - name: REAPER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-idle-reaper-secret
                  key: REAPER_SECRET
                  optional: true
            - name: CLUSTER_DOCTOR_SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-idle-reaper-secret
                  key: CLUSTER_DOCTOR_SERVER_AUTH_SECRET
                  optional: true
            - name: NATS_WATCH_GLEAM_BROADCAST_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-idle-reaper-secret
                  key: NATS_WATCH_GLEAM_BROADCAST_SECRET
                  optional: true
            - name: WORKER_IMAGE_BUILD_GITHUB_DEPLOY_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: GH_DEPLOY_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
            - name: nerdctl-bin
              mountPath: /usr/local/bin/nerdctl
              readOnly: true
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: nerdctl-bin
          hostPath:
            path: /usr/local/bin/nerdctl
            type: File
