apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-agent-worker-broker
  namespace: default
  labels:
    app: dd-agent-worker-broker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-agent-worker-broker
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-16-agent-worker-broker'
      labels:
        app: dd-agent-worker-broker
    spec:
      serviceAccountName: dd-agent-worker-broker
      terminationGracePeriodSeconds: 20
      containers:
        - name: agent-worker-broker
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/agent-worker-broker-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8098'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: NATS_TASK_SUBJECT
              value: dd.remote.thread.*.tasks
            - name: NATS_TASK_STREAM
              value: DD_REMOTE_TASKS
            - name: NATS_WAKEUP_SUBJECT
              value: dd.remote.orchestrator.wakeup
            - name: THREAD_RUNTIME_NAMESPACE
              value: default
            - name: DIRECT_DISPATCH_ENABLED
              value: 'true'
            - name: WAKE_ON_DISPATCH
              value: 'true'
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
          envFrom:
            - secretRef:
                name: dd-agent-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8098
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
