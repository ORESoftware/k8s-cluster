apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-agent-worker-broker
  namespace: default
  labels:
    app: dd-agent-worker-broker
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-agent-worker-broker
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-18-observability'
      labels:
        app: dd-agent-worker-broker
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: agent-worker-broker
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export HOME=/tmp
              export CARGO_HOME=/tmp/cargo
              export CARGO_TARGET_DIR=/tmp/dd-agent-worker-broker-target
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              cd /opt/dd-next-1/remote/deployments/agent-worker-broker-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_TARGET_DIR
              value: /tmp/dd-agent-worker-broker-target
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8098'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            # Require TLS to the NATS broker. Left 'false' for the in-cluster
            # plaintext listener; set 'true' once a TLS listener/creds exist.
            # Optional auth: NATS_CREDENTIALS_FILE / NATS_TOKEN / NATS_NKEY.
            - name: NATS_REQUIRE_TLS
              value: 'false'
            - name: NATS_TASK_SUBJECT
              value: dd.remote.thread.*.tasks
            - name: NATS_TASK_STREAM
              value: DD_REMOTE_TASKS
            - name: NATS_WAKEUP_SUBJECT
              value: dd.remote.orchestrator.wakeup
            - name: THREAD_RUNTIME_NAMESPACE
              value: default
            - name: DIRECT_DISPATCH_ENABLED
              value: 'true'
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-agent-worker-broker
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-agent-worker-broker
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-agent-worker-broker.default.svc.cluster.local:8098/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: dd-agent-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8098
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 600
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir: {}
