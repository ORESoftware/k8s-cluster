  # Root soccer game server (uuid-keyed games) proxied by the gateway under
  # /soccer/. The gateway configmap below proxies to the dd-soccer-rs Service,
  # so these MUST be applied or nginx fails to resolve the upstream at startup
  # and the whole gateway crashloops.
  - dd-soccer-rs.deployment.yaml
  - dd-soccer-rs.service.yaml
  # Akrion Sim web portal: Maud/HTMX pages and Supabase browser-login shell,
  # mounted by the gateway at /akrion-sim.
  - dd-akrion-web-server-rs.deployment.yaml
  - dd-akrion-web-server-rs.service.yaml
  # Nightly soccer learning tournament. AWS and Hetzner both schedule it, while
  # the runner's Postgres advisory lock lets only one cluster run matches.
  - dd-soccer-tournament-nightly.cronjob.yaml
  # Queue self-play farm: extra throughput lives here, not in the continuous
  # learner's deterministic SOCCER_PARALLEL_GAMES=1 loop.
  - dd-soccer-learning-queue.cronjob.yaml
