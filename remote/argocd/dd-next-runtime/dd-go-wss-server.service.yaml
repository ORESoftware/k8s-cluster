apiVersion: v1
kind: Service
metadata:
  name: dd-go-wss-server
  namespace: default
  labels:
    app: dd-go-wss-server
spec:
  type: ClusterIP
  selector:
    app: dd-go-wss-server
  ports:
    - name: ws
      port: 8107
      targetPort: ws
    - name: admin
      port: 8108
      targetPort: admin
