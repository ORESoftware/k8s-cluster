              export CARGO_TERM_COLOR="${CARGO_TERM_COLOR:-never}"
              cd /opt/dd-remote/deployments/fabrication-server-rs
              if [ ! -x "$CARGO_TARGET_DIR/release/dd-fabrication-server" ]; then
                echo "dd-fabrication-server startup failed: compiled binary missing" >&2
                exit 78
              fi
              fabrication_pid=""
              shutdown_fabrication() {
                trap - TERM INT
                if [ -n "$fabrication_pid" ]; then
                  echo "dd-fabrication-server shutdown requested; forwarding SIGINT to server pid $fabrication_pid pod=${POD_NAME} uid=${POD_UID} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
                  kill -INT "$fabrication_pid" 2>/dev/null || true
                  wait "$fabrication_pid"
                  exit $?
                fi
                exit 143
              }
              trap shutdown_fabrication TERM INT
              echo "dd-fabrication-server starting compiled server pod=${POD_NAME} uid=${POD_UID} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
              "$CARGO_TARGET_DIR/release/dd-fabrication-server" &
              fabrication_pid=$!
              wait "$fabrication_pid"
