apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-fabrication-server
  namespace: default
  labels:
    app: dd-fabrication-server
    app.kubernetes.io/name: dd-fabrication-server
    app.kubernetes.io/part-of: dd-next-runtime
    app.kubernetes.io/component: fabrication-planner
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-fabrication-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-05-fabrication-server'
        kubectl.kubernetes.io/default-container: fabrication-server
        kubectl.kubernetes.io/default-logs-container: fabrication-server
      labels:
        app: dd-fabrication-server
        app.kubernetes.io/name: dd-fabrication-server
        app.kubernetes.io/part-of: dd-next-runtime
        app.kubernetes.io/component: fabrication-planner
    spec:
      serviceAccountName: dd-fabrication-server
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false
      shareProcessNamespace: false
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: '2'
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: dd-fabrication-server
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: dd-fabrication-server
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: dd-fabrication-server
      initContainers:
        - name: source-layout-check
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              echo "dd-fabrication-server source layout check starting pod=${POD_NAME} uid=${POD_UID} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
              for required in \
                /opt/dd-remote/deployments/fabrication-server-rs/Cargo.toml \
                /opt/dd-remote/deployments/fabrication-server-rs/Cargo.lock \
                /opt/dd-remote/deployments/fabrication-server-rs/src/main.rs \
                /opt/dd-remote/deployments/fabrication-server-rs/generated/api-docs.html \
                /opt/dd-remote/deployments/fabrication-server-rs/generated/api-docs.json \
                /opt/dd-remote/submodules/discrete-event-system.rs/Cargo.toml \
                /opt/dd-remote/submodules/discrete-event-system.rs/src/lib.rs \
                /opt/dd-remote/libs/nats/subject-defs/generated/rust/Cargo.toml \
                /opt/dd-remote/libs/nats/subject-defs/generated/rust/src/lib.rs \
                /opt/dd-remote/libs/runtime-config-client-rs/Cargo.toml \
                /opt/dd-remote/libs/runtime-config-client-rs/src/lib.rs \
                /opt/dd-remote/libs/interfaces/shared/generated/rust/Cargo.toml \
                /opt/dd-remote/libs/interfaces/shared/generated/rust/src/lib.rs
              do
                if [ ! -f "$required" ]; then
                  echo "dd-fabrication-server source layout check failed: missing $required" >&2
                  exit 78
                fi
              done
              for dependency in \
                'des_engine = { path = "../../submodules/discrete-event-system.rs" }' \
                'dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }' \
                'dd-runtime-config-client = { path = "../../libs/runtime-config-client-rs" }'
              do
                if ! grep -Fq "$dependency" /opt/dd-remote/deployments/fabrication-server-rs/Cargo.toml; then
                  echo "dd-fabrication-server source layout check failed: Cargo.toml missing local dependency $dependency" >&2
                  exit 78
                fi
              done
              for route in \
                '"path": "/fabrication"' \
                '"path": "/fabrication/landing"' \
                '"path": "/fabrication/how-it-works"' \
                '"path": "/fabrication/objective/coverage"' \
                '"path": "/fabrication/capabilities"' \
                '"path": "/fabrication/intake/catalog"' \
                '"path": "/fabrication/templates/catalog"' \
                '"path": "/fabrication/schema"' \
                '"path": "/fabrication/examples"' \
                '"path": "/fabrication/plan"' \
                '"path": "/fabrication/workflow/catalog"' \
                '"path": "/fabrication/workflow/plan"' \
                '"path": "/fabrication/instructions/analyze"' \
                '"path": "/fabrication/instructions/validate"' \
                '"path": "/fabrication/instructions/improve"' \
                '"path": "/fabrication/instructions/boundaries/review"' \
                '"path": "/fabrication/machines/catalog"' \
                '"path": "/fabrication/printers/catalog"' \
                '"path": "/fabrication/fdm-printer/catalog"' \
                '"path": "/fabrication/resin-printer/catalog"' \
                '"path": "/fabrication/material-jetting/catalog"' \
                '"path": "/fabrication/pellet-fgf/catalog"' \
                '"path": "/fabrication/robotic-additive/catalog"' \
                '"path": "/fabrication/sheet-lamination/catalog"' \
                '"path": "/fabrication/directed-energy-deposition/catalog"' \
                '"path": "/fabrication/composite-fiber/catalog"' \
                '"path": "/fabrication/composite-layup/catalog"' \
                '"path": "/fabrication/powder-bed/catalog"' \
                '"path": "/fabrication/hot-wire-foam/catalog"' \
                '"path": "/fabrication/printers/preflight/catalog"' \
                '"path": "/fabrication/subtractive/catalog"' \
                '"path": "/fabrication/subtractive/preflight/catalog"' \
                '"path": "/fabrication/mill-router/catalog"' \
                '"path": "/fabrication/vertical-mill/catalog"' \
                '"path": "/fabrication/horizontal-mill/catalog"' \
                '"path": "/fabrication/sheet-cutting/catalog"' \
                '"path": "/fabrication/hot-wire-foam/catalog"' \
                '"path": "/fabrication/sheet-forming/catalog"' \
                '"path": "/fabrication/gear-cutting/catalog"' \
                '"path": "/fabrication/precision-grinding/catalog"' \
                '"path": "/fabrication/dimensional-inspection/catalog"' \
                '"path": "/fabrication/thermal-postprocess/catalog"' \
                '"path": "/fabrication/surface-finishing/catalog"' \
                '"path": "/fabrication/metal-joining/catalog"' \
                '"path": "/fabrication/molding-casting/catalog"' \
