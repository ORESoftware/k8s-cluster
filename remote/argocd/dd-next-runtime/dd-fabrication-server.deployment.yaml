              do
                if ! grep -Fq "$route" /opt/dd-remote/deployments/fabrication-server-rs/generated/api-docs.json; then
                  echo "dd-fabrication-server source layout check failed: generated api docs missing $route" >&2
                  exit 78
                fi
              done
              for subject in \
                'pub const FABRICATION_REQUESTS_SUBJECT: &str = "dd.remote.fabrication.requests";' \
                'pub const FABRICATION_RESULTS_SUBJECT: &str = "dd.remote.fabrication.results";' \
                'pub const FABRICATION_DESIGN_CONVERSION_REQUESTS_SUBJECT: &str = "dd.remote.fabrication.design.conversion.requests";' \
                'pub const FABRICATION_DESIGN_CONVERSION_REQUESTS_QUEUE_GROUP: &str = "dd-fabrication-design-converters";' \
                'pub const FABRICATION_DESIGN_CONVERSION_RESULTS_SUBJECT: &str = "dd.remote.fabrication.design.conversion.results";' \
                'pub const MDP_OPTIMIZE_SUBJECT: &str = "dd.remote.mdp.optimize";' \
                'pub const RUNTIME_EVENTS_SUBJECT: &str = "dd.remote.events";'
              do
                if ! grep -Fq "$subject" /opt/dd-remote/libs/nats/subject-defs/generated/rust/src/lib.rs; then
                  echo "dd-fabrication-server source layout check failed: generated nats subject defs missing $subject" >&2
                  exit 78
                fi
              done
              echo "dd-fabrication-server source layout check passed pod=${POD_NAME} uid=${POD_UID} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 16Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
          volumeMounts:
            - name: fabrication-source
              mountPath: /opt/dd-remote/deployments/fabrication-server-rs
              readOnly: true
            - name: des-engine-source
              mountPath: /opt/dd-remote/submodules/discrete-event-system.rs
              readOnly: true
            - name: nats-subject-defs-source
              mountPath: /opt/dd-remote/libs/nats/subject-defs/generated/rust
              readOnly: true
            - name: runtime-config-client-source
              mountPath: /opt/dd-remote/libs/runtime-config-client-rs
              readOnly: true
            - name: shared-interfaces-source
              mountPath: /opt/dd-remote/libs/interfaces/shared/generated/rust
              readOnly: true
        - name: release-build
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export HOME=/tmp
              export CARGO_HOME=/var/cache/dd-fabrication-server/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-fabrication-server/target
              export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-1}"
              export CARGO_INCREMENTAL="${CARGO_INCREMENTAL:-0}"
              export CARGO_TERM_COLOR="${CARGO_TERM_COLOR:-never}"
              export CARGO_REGISTRIES_CRATES_IO_PROTOCOL="${CARGO_REGISTRIES_CRATES_IO_PROTOCOL:-sparse}"
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              cd /opt/dd-remote/deployments/fabrication-server-rs
              echo "dd-fabrication-server release build starting pod=${POD_NAME} uid=${POD_UID} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
              /usr/local/cargo/bin/cargo build --release --locked
              if [ ! -x "$CARGO_TARGET_DIR/release/dd-fabrication-server" ]; then
                echo "dd-fabrication-server release build failed: compiled binary missing" >&2
                exit 78
              fi
              echo "dd-fabrication-server release build completed pod=${POD_NAME} uid=${POD_UID} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CARGO_BUILD_JOBS
              value: '1'
            - name: CARGO_INCREMENTAL
              value: '0'
            - name: CARGO_TERM_COLOR
              value: never
            - name: CARGO_NET_RETRY
              value: '5'
            - name: CARGO_HTTP_TIMEOUT
              value: '120'
            - name: CARGO_REGISTRIES_CRATES_IO_PROTOCOL
              value: sparse
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
              ephemeral-storage: 4Gi
            limits:
              cpu: '2'
              memory: 8Gi
              ephemeral-storage: 8Gi
          volumeMounts:
            - name: fabrication-source
              mountPath: /opt/dd-remote/deployments/fabrication-server-rs
              readOnly: true
            - name: des-engine-source
              mountPath: /opt/dd-remote/submodules/discrete-event-system.rs
              readOnly: true
            - name: nats-subject-defs-source
              mountPath: /opt/dd-remote/libs/nats/subject-defs/generated/rust
              readOnly: true
            - name: runtime-config-client-source
              mountPath: /opt/dd-remote/libs/runtime-config-client-rs
              readOnly: true
            - name: shared-interfaces-source
              mountPath: /opt/dd-remote/libs/interfaces/shared/generated/rust
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-fabrication-server
            - name: tmp
              mountPath: /tmp
      containers:
        - name: fabrication-server
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
