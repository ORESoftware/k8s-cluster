                '"path": "/fabrication/as-built/plan"' \
                '"path": "/fabrication/as-built/result"' \
                '"path": "/fabrication/provenance/result"' \
                '"path": "/fabrication/setup/plan"' \
                '"path": "/fabrication/setup/result"' \
                '"path": "/fabrication/monitoring/catalog"' \
                '"path": "/fabrication/monitoring/plan"' \
                '"path": "/fabrication/monitoring/result"' \
                '"path": "/fabrication/postprocess/catalog"' \
                '"path": "/fabrication/postprocess/plan"' \
                '"path": "/fabrication/postprocess/result"' \
                '"path": "/fabrication/artifacts/catalog"' \
                '"path": "/fabrication/jobs/catalog"' \
                '"path": "/fabrication/design/formats"' \
                '"path": "/fabrication/instructions/languages"' \
                '"path": "/fabrication/boundaries/catalog"' \
                '"path": "/fabrication/boundaries/preflight/catalog"' \
                '"path": "/fabrication/boundaries/result"' \
                '"path": "/fabrication/remediation/catalog"' \
                '"path": "/fabrication/remediation/plan"' \
                '"path": "/fabrication/remediation/result"' \
                '"path": "/fabrication/learning/capabilities"' \
                '"path": "/fabrication/learning/engines/catalog"' \
                '"path": "/fabrication/learning/preflight/catalog"' \
                '"path": "/fabrication/learning/features/catalog"' \
                '"path": "/fabrication/learning/rewards/catalog"' \
                '"path": "/fabrication/learning/models/catalog"' \
                '"path": "/fabrication/learning/replay/catalog"' \
                '"path": "/fabrication/learning/scenarios/catalog"' \
                '"path": "/fabrication/learning/beliefs/catalog"' \
                '"path": "/fabrication/learning/optimizers/catalog"' \
                '"path": "/fabrication/learning/models/result"' \
                '"path": "/fabrication/learning/optimizers/result"' \
                '"path": "/jobs"' \
                '"path": "/fabrication/jobs"' \
                '"path": "/jobs/:job_id"' \
                '"path": "/fabrication/jobs/:job_id"' \
                '"path": "/jobs/:job_id/release-bundle"' \
                '"path": "/fabrication/jobs/:job_id/release-bundle"' \
                '"path": "/jobs/:job_id/artifacts/:artifact_id"' \
                '"path": "/fabrication/jobs/:job_id/artifacts/:artifact_id"' \
                '"path": "/fabrication/learning/policy"' \
