apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-ocr-rs-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-ocr-rs-secrets
    creationPolicy: Owner
  dataFrom:
    # AWS Secrets Manager JSON. Expected keys (all optional — the local Tesseract
    # engine works without any of them; each cloud backend turns on only when its
    # credentials are present):
    #   GOOGLE_VISION_API_KEY  — API key for Google Cloud Vision images:annotate.
    #   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — IAM creds allowed to call
    #                            textract:DetectDocumentText (region via AWS_REGION
    #                            env, defaults to us-east-1).
    #   AZURE_VISION_ENDPOINT  — e.g. https://<resource>.cognitiveservices.azure.com
    #   AZURE_VISION_KEY       — Ocp-Apim-Subscription-Key for Azure AI Vision.
    # The deployment references these keys with optional:true, so the pod boots
    # before this bundle exists; until then /engines reports the cloud backends
    # as unavailable.
    - extract:
        key: dd/remote-dev/ocr-rs-secrets
