apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-email-sms-contact-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-email-sms-contact-secrets
    creationPolicy: Owner
  dataFrom:
    # AWS Secrets Manager JSON. Expected keys:
    #   SENDGRID_API_KEY    — MUST carry the mail.send scope (admin/management keys return 401
    #                         "not authorized to send mail"). EMAIL_FROM must be a verified sender.
    #   EMAIL_FROM          — optional override (deployment defaults to outreach@dancingdragons.cc)
    #   TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_FROM_NUMBER — SMS via Twilio
    # Push notifications (each transport activates only when its keys are present; Expo is always on):
    #   VAPID_PRIVATE_KEY   — Web Push EC P-256 private key (PEM). VAPID_SUBJECT — mailto:/https: contact
    #                         (optional; defaults to mailto:outreach@dancingdragons.cc).
    #   FCM_SERVICE_ACCOUNT_JSON — full Firebase service-account JSON (firebase.messaging scope).
    #                         FCM_PROJECT_ID — optional override (else read from the JSON).
    #   APNS_KEY_P8 / APNS_KEY_ID / APNS_TEAM_ID / APNS_TOPIC — Apple token auth (.p8 PEM, key id,
    #                         team id, app bundle id).
    #   EXPO_ACCESS_TOKEN   — optional; only needed if Expo push security is enabled on the project.
    # The deployment references these keys with optional:true, so the pod boots before this bundle
    # exists; until it is created in AWS Secrets Manager, /readyz reports the transports as not configured.
    - extract:
        key: dd/remote-dev/email-sms-contact-secrets
