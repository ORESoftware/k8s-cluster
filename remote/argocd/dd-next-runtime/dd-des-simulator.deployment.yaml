apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-des-simulator
  namespace: default
  labels:
    app: dd-des-simulator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-des-simulator
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-17-des-hardened-examples'
      labels:
        app: dd-des-simulator
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: des-simulator
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/des-simulator-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8099'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: DES_SIMULATE_SUBJECT
              value: dd.remote.des.simulate
            - name: DES_QUEUE_GROUP
              value: dd-des-simulator
            - name: DES_RESULT_SUBJECT
              value: dd.remote.des.results
            - name: DES_EVENT_SUBJECT
              value: dd.remote.events
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_TARGET_DIR
              value: /tmp/des-target
          ports:
            - name: http
              containerPort: 8099
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir: {}
