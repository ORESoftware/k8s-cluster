apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-webrtc-media
  namespace: default
  labels:
    app: dd-webrtc-media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-webrtc-media
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-04-webrtc-media'
      labels:
        app: dd-webrtc-media
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: webrtc-media
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/webrtc-media-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8125'
            - name: WEBRTC_MEDIA_MODE
              value: disabled
            - name: WEBRTC_STUN_URLS
              value: stun:stun.l.google.com:19302
            - name: WEBRTC_TURN_URLS
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_TURN_URLS
                  optional: true
            - name: WEBRTC_TURN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_TURN_USERNAME
                  optional: true
            - name: WEBRTC_TURN_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_TURN_CREDENTIAL
                  optional: true
            - name: WEBRTC_SFU_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_SFU_ENDPOINT
                  optional: true
            - name: WEBRTC_MEDIA_RELAY_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_MEDIA_RELAY_ENDPOINT
                  optional: true
            - name: WEBRTC_PUBLIC_HOST
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_PUBLIC_HOST
                  optional: true
            - name: WEBRTC_UDP_PORT_RANGE
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: WEBRTC_UDP_PORT_RANGE
                  optional: true
            - name: WEBRTC_TURN_UDP_PORT
              value: '3478'
            - name: WEBRTC_TURNS_TLS_PORT
              value: '5349'
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-webrtc-media
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-webrtc-media
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-webrtc-media.default.svc.cluster.local:8125/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8125
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
