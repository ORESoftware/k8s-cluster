apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-canonical-cloud-runtime
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-cluster-secrets
  target:
    name: dd-canonical-cloud-runtime
    creationPolicy: Owner
  dataFrom:
    # AWS Secrets Manager JSON. Expected keys:
    #   DATABASE_URL — least-privilege, non-owner SeaORM runtime connection.
    #   APP_SESSION_ENCRYPTION_KEY — standard-base64 encoded 32-byte key.
    #   SUPABASE_URL — canonical.cloud Supabase project URL.
    #   SUPABASE_PUBLISHABLE_KEY — publishable key only; never service-role.
    # Migration-owner credentials intentionally do not enter the serving pod.
    - extract:
        key: dd/remote-dev/canonical-cloud-secrets
