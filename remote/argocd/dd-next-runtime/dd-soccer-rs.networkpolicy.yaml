apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-soccer-rs
  namespace: default
  labels:
    app: dd-soccer-rs
spec:
  podSelector:
    matchLabels:
      app: dd-soccer-rs
  policyTypes:
    - Ingress
    - Egress
  # Ingress to :8113 is limited to the established callers:
  #   - dd-remote-gateway       — proxies the public /soccer/ surface.
  #   - dd-akrion-web-server-rs — Akrion Sim portal calls the game API
  #                               (AKRION soccer backend base URL).
  #   - observability           — Prometheus / OTel collector scraping /metrics.
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dd-remote-gateway
        - podSelector:
            matchLabels:
              app: dd-akrion-web-server-rs
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - dd-prometheus
                  - dd-otel-collector
      ports:
        - protocol: TCP
          port: 8113
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # RDS Postgres learned-policy loads (SOCCER_DATABASE_URL). RDS resolves to
    # a private VPC address; constrain the broad private ranges to Postgres
    # only.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 5432
    # Public HTTP(S) for cold in-pod builds, GitHub superproject/submodule and
    # engine clones (SOCCER_SERVER_GIT_URL, SOCCER_ENGINE_GIT_URL,
    # DES_ENGINE_GIT_URL), and crates.io.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.168.0.0/16
              - 192.0.2.0/24
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: ::/0
            except:
              - ::/128
              - ::1/128
              - 64:ff9b:1::/48
              - 100::/64
              - 2001:2::/48
              - 2001:db8::/32
              - fc00::/7
              - fe80::/10
              - ff00::/8
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
