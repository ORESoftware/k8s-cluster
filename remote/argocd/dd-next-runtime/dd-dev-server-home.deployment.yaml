apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dev-server-api
  namespace: default
  labels:
    app: dd-dev-server-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-dev-server-api
  template:
    metadata:
      labels:
        app: dd-dev-server-api
      annotations:
        dd.dev/code-revision: '2026-05-20-disable-api-idle-watchdog'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: workspace-permissions
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - mkdir -p /home/node/workspace && chown -R 1000:1000 /home/node/workspace
          volumeMounts:
            - name: workspace
              mountPath: /home/node/workspace
      containers:
        - name: dev-server-api
          image: docker.io/library/dd-dev-server:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: OTEL_SERVICE_NAME
              value: dd-dev-server-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4318
            - name: REMOTE_DEV_THREAD_ID
              value: "00000000-0000-4000-8000-000000000001"
            - name: IDLE_TIMEOUT_MS
              value: "0"
            - name: DD_REPO_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: DD_REPO_URL
            - name: BASE_BRANCH
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: DD_REPO_REF
                  optional: true
            - name: THREAD_CONTEXT_BASE_URL
              value: http://dd-remote-rest-api.default.svc.cluster.local:8082
            - name: AGENT_MCP_URL
              value: http://dd-cluster-mcp-rs.default.svc.cluster.local:8091/mcp
            - name: AGENT_MCP_CONNECT_TIMEOUT_MS
              value: "3000"
            - name: EVENT_INGEST_URL
              value: http://dd-remote-rest-api.default.svc.cluster.local:8082/api/agents/events
            - name: EVENT_INGEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: NATS_EVENT_SUBJECT
              value: dd.remote.events
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-dev-server-api
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-dev-server-api
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-dev-server-api.default.svc.cluster.local:8080/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: dd-agent-secrets
                optional: true
            # GLEAM_BROADCAST_SECRET is owned by dd-gleamlang-server-secrets;
            # the dev-server uses it as the WORKER_FANOUT_WS_SECRET fallback so
            # its outbound /worker-ws fanout authenticates against the gleam
            # broadcaster (see dev-server/src/ws-fanout.ts).
            - secretRef:
                name: dd-gleamlang-server-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8080
          # Conservative requests/limits so this Node bootstrap pod
          # cannot starve other deployments on the single-node EC2 host
          # under load. Adjust upward if the per-thread workload
          # actually requires more headroom.
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /home/node/workspace
      volumes:
        - name: workspace
          hostPath:
            path: /home/ec2-user/codes/dd/bootstrap-workspaces/dd-dev-server-api
            type: DirectoryOrCreate
