apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dev-server-api
  namespace: default
  labels:
    app: dd-dev-server-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-dev-server-api
  template:
    metadata:
      labels:
        app: dd-dev-server-api
      annotations:
        dd.dev/code-revision: '2026-05-20-disable-api-idle-watchdog'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: workspace-permissions
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - mkdir -p /home/node/workspace && chown -R 1000:1000 /home/node/workspace
          volumeMounts:
            - name: workspace
              mountPath: /home/node/workspace
      containers:
        - name: dev-server-api
          image: docker.io/library/dd-dev-server:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: OTEL_SERVICE_NAME
              value: dd-dev-server-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4318
            - name: REMOTE_DEV_THREAD_ID
              value: "00000000-0000-4000-8000-000000000001"
            - name: IDLE_TIMEOUT_MS
              value: "0"
            - name: DD_REPO_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: DD_REPO_URL
            - name: BASE_BRANCH
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: DD_REPO_REF
                  optional: true
            - name: THREAD_CONTEXT_BASE_URL
              value: http://dd-remote-rest-api.default.svc.cluster.local:8082
            - name: AGENT_MCP_URL
              value: http://dd-gleam-mcp-server.default.svc.cluster.local:8090/mcp
            - name: AGENT_MCP_CONNECT_TIMEOUT_MS
              value: "3000"
            - name: EVENT_INGEST_URL
              value: http://dd-remote-rest-api.default.svc.cluster.local:8082/api/agents/events
            - name: EVENT_INGEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: NATS_EVENT_SUBJECT
              value: dd.remote.events
          envFrom:
            - secretRef:
                name: dd-agent-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workspace
              mountPath: /home/node/workspace
      volumes:
        - name: workspace
          hostPath:
            path: /home/ec2-user/codes/dd/bootstrap-workspaces/dd-dev-server-api
            type: DirectoryOrCreate
