apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-athleto-backend
  namespace: default
  labels:
    app: dd-athleto-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-athleto-backend
  template:
    metadata:
      labels:
        app: dd-athleto-backend
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: athleto-backend
          image: docker.io/library/rust:1.95-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/athleto-backend-rs
              cargo build --release --locked
              exec target/release/athleto-backend
          env:
            - name: PORT
              value: '8080'
            - name: RUST_LOG
              value: info,athleto_backend=info,sea_orm=warn,hyper=warn
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=remote-dev
            - name: DEPLOYMENT_ENV
              value: remote-dev
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ATHLETO_DATABASE_URL
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
