apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dd-fabrication-server
  namespace: default
  labels:
    app: dd-fabrication-server
    app.kubernetes.io/name: dd-fabrication-server
    app.kubernetes.io/part-of: dd-next-runtime
    app.kubernetes.io/component: fabrication-planner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dd-fabrication-server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
