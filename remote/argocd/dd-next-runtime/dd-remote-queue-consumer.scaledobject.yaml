apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dd-remote-queue-consumer-nats-jetstream
  namespace: default
  labels:
    app: dd-remote-queue-consumer
spec:
  pollingInterval: 10
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 8
  scaleTargetRef:
    name: dd-remote-queue-consumer
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: dd-nats.messaging.svc.cluster.local:8222
        account: $G
        stream: DD_REMOTE_TASKS
        consumer: dd-remote-thread-preparer
        lagThreshold: '25'
        activationLagThreshold: '5'
        useHttps: 'false'
