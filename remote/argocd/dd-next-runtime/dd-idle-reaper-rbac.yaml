apiVersion: v1
kind: ServiceAccount
metadata:
  name: dd-idle-reaper
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dd-idle-reaper-runtime-watch
  namespace: default
rules:
  - apiGroups: ['']
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-idle-reaper-runtime-watch
  namespace: default
subjects:
  - kind: ServiceAccount
    name: dd-idle-reaper
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dd-idle-reaper-runtime-watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dd-idle-reaper-runtime-watch
  namespace: vpn
rules:
  - apiGroups: ['']
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-idle-reaper-runtime-watch
  namespace: vpn
subjects:
  - kind: ServiceAccount
    name: dd-idle-reaper
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dd-idle-reaper-runtime-watch
