apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-contract-service
  namespace: default
  labels:
    app: dd-contract-service
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-contract-service
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-07-16-solana-formal-rs-filter'
      labels:
        app: dd-contract-service
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: contract-service
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/contract-service-rs
              export CARGO_HOME=/var/cache/dd-contract-service/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-contract-service/target
              exec /usr/local/cargo/bin/cargo run --release --locked
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8101'
            - name: HOME
              value: /tmp
            - name: SOLANA_CLUSTER
              value: devnet
            - name: SOLANA_RPC_URL
              value: https://api.devnet.solana.com
            - name: SOLANA_RPC_TIMEOUT_SECONDS
              value: '20'
            - name: SOLANA_RPC_MAX_IN_FLIGHT
              value: '64'
            - name: SOLANA_ALLOW_PRIVATE_RPC
              value: 'false'
            # Stateless source/program verification delegates to the internal
            # formal-methods service. Repository jobs are restricted in-process
            # to credential-free github.com/fiducia-cloud URLs.
            - name: CONTRACT_FORMAL_METHODS_ENABLED
              value: 'true'
            - name: FORMAL_METHODS_URL
              value: http://dd-formal-methods-server.default.svc.cluster.local:8110
            - name: FORMAL_METHODS_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
            - name: CONTRACT_FORMAL_METHODS_GITHUB_ORGS
              value: fiducia-cloud
            # Every Solana sendTransaction path is fenced twice across both
            # replicas: pg_try_advisory_xact_lock over the signed transaction
            # digest, then Fiducia's durable idempotency lease/fencing token.
            - name: CONTRACT_COORDINATION_ENABLED
              value: 'true'
            - name: CONTRACT_COORDINATION_REQUIRED
              value: 'true'
            - name: CONTRACT_COORDINATION_PG_POOL_SIZE
              value: '4'
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: FIDUCIA_LOCK_URL
              value: http://fiducia-load-balance.fiducia.svc.cluster.local:8088
            - name: FIDUCIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: FIDUCIA_API_KEY
                  optional: true
            - name: FIDUCIA_IDEMPOTENCY_LEASE_MS
              value: '300000'
            - name: FIDUCIA_IDEMPOTENCY_RETENTION_MS
              value: '604800000'
            - name: SOLANA_SEND_ENABLED
              value: 'false'
            - name: SOLANA_ALLOW_SKIP_PREFLIGHT
              value: 'false'
            # Settlement + dispute-resolution surface. Off by default; enabling
            # either /settle or /resolve requires CONTRACT_SETTLEMENT_AUTH_SECRET.
            - name: SOLANA_SETTLEMENT_ENABLED
              value: 'false'
            - name: SOLANA_RESOLUTION_ENABLED
              value: 'false'
            # Second gate: refuses to start if any broadcast capability is enabled
            # against mainnet-beta without this set true. Mirrors dd-escrow-rs.
            - name: SOLANA_MAINNET_SETTLEMENT_ENABLED
              value: 'false'
            # NATS-initiated settle/resolve messages carry no auth header, so
            # broadcast over NATS stays off unless explicitly enabled (and it
            # also requires SOLANA_SEND_ENABLED=true). Otherwise the settle/
            # resolve subjects only validate, simulate, and confirm.
            - name: CONTRACT_NATS_SETTLEMENT_ENABLED
              value: 'false'
            # Required acknowledgement before NATS-initiated broadcast can be
            # enabled: the shared NATS bus has no per-subject authz, so any pod
            # reaching it could publish to settle/resolve. Lock the bus down
            # (subject authz + messaging NetworkPolicy) before setting this true.
            - name: CONTRACT_NATS_SETTLEMENT_ACK_UNAUTHENTICATED_BUS
              value: 'false'
            # Executor/verifier surface: confirm escrow settlement signatures to
            # finality and publish confirmations. Off by default.
            - name: CONTRACT_ESCROW_CONFIRM_ENABLED
              value: 'false'
            - name: CONTRACT_SETTLEMENT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: CONTRACT_SETTLEMENT_AUTH_SECRET
                  optional: true
            # ----------------------------------------------------------------
            # Blockchain feature suite (keyless, custody-ready). All features are
            # OFF by default; the service holds no keys and never signs. Read/
            # coordination paths only need the *_ENABLED flag; execute/broadcast
            # paths additionally require CONTRACT_BLOCKCHAIN_AUTH_SECRET and, for
            # a mainnet target, CONTRACT_BLOCKCHAIN_MAINNET_ENABLED=true.
            # ----------------------------------------------------------------
            # Optional EVM read/relay surface (Solana stays the primary chain).
            # EVM_RPC_URL must be https (SSRF-guarded like SOLANA_RPC_URL) and is
            # reached over the existing public-443 egress rule.
            - name: EVM_RPC_URL
              value: ''
            - name: EVM_CHAIN_ID
              value: '0'
            - name: EVM_NETWORK
              value: sepolia
            - name: EVM_ALLOW_PRIVATE_RPC
              value: 'false'
            # Read/coordination features (no signing, no broadcast).
            - name: BLOCKCHAIN_WALLET_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_EXECUTOR_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_RELAYER_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_MULTISIG_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_INDEXER_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_MEV_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_NFT_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_STAKING_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_BRIDGE_ENABLED
              value: 'false'
            # Gated execute/broadcast paths: each relays an externally-signed raw
            # transaction. Enabling any of these requires CONTRACT_BLOCKCHAIN_AUTH_SECRET.
            - name: BLOCKCHAIN_EXECUTOR_EXECUTE_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_RELAYER_BROADCAST_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_STAKING_EXECUTE_ENABLED
              value: 'false'
            - name: BLOCKCHAIN_BRIDGE_BROADCAST_ENABLED
              value: 'false'
            # Mainnet second gate for any blockchain execute/broadcast capability.
            - name: CONTRACT_BLOCKCHAIN_MAINNET_ENABLED
              value: 'false'
            - name: CONTRACT_BLOCKCHAIN_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: CONTRACT_BLOCKCHAIN_AUTH_SECRET
                  optional: true
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: CONTRACT_VALIDATE_SUBJECT
              value: dd.remote.contracts.solana.validate
            - name: CONTRACT_QUEUE_GROUP
              value: dd-contract-service
            - name: CONTRACT_RESULT_SUBJECT
              value: dd.remote.contracts.solana.results
            - name: CONTRACT_SETTLE_SUBJECT
              value: dd.remote.contracts.solana.settle
            - name: CONTRACT_RESOLVE_SUBJECT
              value: dd.remote.contracts.solana.resolve
            - name: CONTRACT_SETTLEMENT_RESULT_SUBJECT
              value: dd.remote.contracts.solana.settlement.results
            - name: CONTRACT_ESCROW_RESULT_SUBJECT
              value: dd.remote.escrow.solana.results
            - name: CONTRACT_EVENT_SUBJECT
              value: dd.remote.events
            - name: NATS_CRITICAL_EVENT_SUBJECT
              value: dd.remote.events.critical
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-contract-service
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-contract-service
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-contract-service.default.svc.cluster.local:8101/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8101
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            # First boot compiles the service and SQLx dependency graph into the
            # pod-local cache; observed cold builds can exceed five minutes.
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-contract-service
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
