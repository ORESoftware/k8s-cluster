apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-contract-service
  namespace: default
  labels:
    app: dd-contract-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-contract-service
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-17-contract-service'
      labels:
        app: dd-contract-service
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: contract-service
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/contract-service-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8101'
            - name: SOLANA_CLUSTER
              value: devnet
            - name: SOLANA_RPC_URL
              value: https://api.devnet.solana.com
            - name: SOLANA_RPC_TIMEOUT_SECONDS
              value: '20'
            - name: SOLANA_SEND_ENABLED
              value: 'false'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: CONTRACT_VALIDATE_SUBJECT
              value: dd.remote.contracts.solana.validate
            - name: CONTRACT_QUEUE_GROUP
              value: dd-contract-service
            - name: CONTRACT_RESULT_SUBJECT
              value: dd.remote.contracts.solana.results
            - name: CONTRACT_EVENT_SUBJECT
              value: dd.remote.events
          ports:
            - name: http
              containerPort: 8101
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
