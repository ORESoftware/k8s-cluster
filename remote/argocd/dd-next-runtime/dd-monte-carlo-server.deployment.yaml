apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-monte-carlo-server
  namespace: default
  labels:
    app: dd-monte-carlo-server
spec:
  # Scaled to 0 by default (like dd-mdp-optimizer) to spare the single-node
  # cluster a cold-start rustc build storm; scale up to exercise the service.
  replicas: 0
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-monte-carlo-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-09-fun-servers'
      labels:
        app: dd-monte-carlo-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: monte-carlo-server
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/monte-carlo-server-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8134'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: MONTE_CARLO_SIMULATE_SUBJECT
              value: dd.remote.montecarlo.simulate.requests
            - name: MONTE_CARLO_QUEUE_GROUP
              value: dd-monte-carlo-server
            - name: MONTE_CARLO_RESULT_SUBJECT
              value: dd.remote.montecarlo.simulate.results
            - name: MONTE_CARLO_EVENT_SUBJECT
              value: dd.remote.events
            - name: MONTE_CARLO_MAX_INFLIGHT
              value: '16'
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-monte-carlo-server
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-monte-carlo-server
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-monte-carlo-server.default.svc.cluster.local:8134/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8134
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
