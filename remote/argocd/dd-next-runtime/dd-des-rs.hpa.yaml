apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dd-des-rs
  namespace: default
  labels:
    app: dd-des-rs
    app.kubernetes.io/name: dd-des-rs
    app.kubernetes.io/part-of: dd-next-runtime
    app.kubernetes.io/component: discrete-event-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dd-des-rs
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 900
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
