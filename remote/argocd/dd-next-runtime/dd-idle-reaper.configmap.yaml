apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-idle-reaper-config
  namespace: default
  labels:
    app: dd-idle-reaper
data:
  # Set this to your public Next.js host endpoint that serves:
  #   POST /api/admin/remote-dev/reaper/sweep
  REAPER_SWEEP_URL: ''
  REAPER_INTERVAL_SECONDS: '60'
  REAPER_TIMEOUT_SECONDS: '30'
  NATS_WATCH_ENABLED: 'true'
  NATS_URL: 'nats://dd-nats.messaging.svc.cluster.local:4222'
  NATS_WATCH_TASK_SUBJECT: 'dd.remote.thread.*.tasks'
  NATS_WATCH_EVENT_SUBJECT: 'dd.remote.events'
  NATS_WATCH_REST_API_URL: 'http://dd-remote-rest-api.default.svc.cluster.local:8082'
  NATS_WATCH_GLEAM_BROADCAST_URL: 'http://dd-gleamlang-server.default.svc.cluster.local:8081/broadcast'
  NATS_WATCH_ACTIVE_INTERVAL_SECONDS: '5'
  NATS_WATCH_IDLE_INTERVAL_SECONDS: '15'
  RUNTIME_FLOOR_ENABLED: 'true'
  RUNTIME_FLOOR_INTERVAL_SECONDS: '20'
  RUNTIME_FLOOR_NATS_TASK_SUBJECT: 'dd.remote.thread.*.tasks'
  RUNTIME_FLOOR_NATS_TASK_STREAM: 'DD_REMOTE_TASKS'
  RUNTIME_FLOOR_NATS_TASK_CONSUMER: 'dd-remote-thread-preparer'
  RUNTIME_FLOOR_NATS_TASK_ACK_WAIT_SECONDS: '600'
  RUNTIME_FLOOR_NATS_TASK_MAX_ACK_PENDING: '256'
  RUNTIME_FLOOR_NATS_TASK_MAX_DELIVER: '5'
  RUNTIME_FLOOR_CONTAINER_POOL_URL: 'http://dd-container-pool.default.svc.cluster.local:8102'
  RUNTIME_FLOOR_K8S_NAMESPACE: 'default'
  RUNTIME_FLOOR_QUEUE_CONSUMER_DEPLOYMENT: 'dd-remote-queue-consumer'
  RUNTIME_FLOOR_QUEUE_CONSUMER_MIN_REPLICAS: '1'
  RUNTIME_FLOOR_QUEUE_CONSUMER_MIN_READY: '1'
  K8S_RUNTIME_WATCH_ENABLED: 'true'
  K8S_RUNTIME_WATCH_NAMESPACES: 'default,vpn'
  K8S_RUNTIME_WATCH_EVENT_SUBJECT: 'dd.remote.events'
  K8S_RUNTIME_WATCH_RESYNC_SECONDS: '200'
  K8S_RUNTIME_WATCH_TIMEOUT_SECONDS: '200'
  K8S_RUNTIME_WATCH_RETRY_SECONDS: '5'
  CLUSTER_DOCTOR_ENABLED: 'true'
  CLUSTER_DOCTOR_INTERVAL_SECONDS: '5400'
  CLUSTER_DOCTOR_RUN_ON_START: 'false'
  CLUSTER_DOCTOR_TASK_URL: 'http://dd-dev-server-api.default.svc.cluster.local:8080/tasks'
  CLUSTER_DOCTOR_THREAD_ID: '00000000-0000-4000-8000-000000000001'
  CLUSTER_DOCTOR_THREAD_TITLE: 'cluster telemetry doctor'
  CLUSTER_DOCTOR_PROVIDER: 'claude-sdk'
  # CLUSTER_DOCTOR_SERVER_AUTH_SECRET is injected by dd-idle-reaper-secret.
  WORKER_IMAGE_BUILD_ENABLED: 'true'
  WORKER_IMAGE_BUILD_TIMEZONE: 'America/New_York'
  WORKER_IMAGE_BUILD_HOUR: '4'
  WORKER_IMAGE_BUILD_MINUTE: '0'
  WORKER_IMAGE_BUILD_RUN_ON_START: 'false'
  WORKER_IMAGE_BUILD_REPO_DIR: '/opt/dd-next-1'
  WORKER_IMAGE_BUILD_REPO_URL: 'git@github.com:ORESoftware/k8s-cluster.git'
  WORKER_IMAGE_BUILD_REF: 'dev'
  WORKER_IMAGE_BUILD_IMAGE: 'docker.io/library/dd-dev-server:dev'
  WORKER_IMAGE_BUILD_NERDCTL: '/usr/local/bin/nerdctl'
  WORKER_IMAGE_BUILD_EVENT_SUBJECT: 'dd.remote.events'
  # WORKER_IMAGE_BUILD_GITHUB_DEPLOY_KEY is read from dd-agent-secrets as GH_DEPLOY_KEY.
  # Backstop reaper for dd-browser-job-runner's per-job nerdctl worker
  # containers (namespace dd-browser-jobs). The spawner enforces the 9-minute
  # deadline itself; this loop force-removes anything that outlives its
  # dd.browser-job.deadline-ms label plus a grace, in case the spawner pod died.
  BROWSER_JOB_REAP_ENABLED: 'true'
  BROWSER_JOB_REAP_NAMESPACE: 'dd-browser-jobs'
  BROWSER_JOB_REAP_LABEL: 'dd.browser-job.managed=true'
  BROWSER_JOB_REAP_DEADLINE_LABEL: 'dd.browser-job.deadline-ms'
  BROWSER_JOB_REAP_INTERVAL_SECONDS: '60'
  BROWSER_JOB_REAP_GRACE_SECONDS: '60'
  BROWSER_JOB_REAP_NERDCTL: '/usr/local/bin/nerdctl'
  BROWSER_JOB_REAP_EVENT_SUBJECT: 'dd.remote.events'
