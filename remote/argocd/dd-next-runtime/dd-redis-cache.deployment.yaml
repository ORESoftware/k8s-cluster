apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-redis-cache
  namespace: default
  labels:
    app: dd-redis-cache
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-redis-cache
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-17-redis-cache'
      labels:
        app: dd-redis-cache
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --bind
            - 0.0.0.0
            - --protected-mode
            - 'no'
            - --appendonly
            - 'no'
            - --save
            - ''
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --tcp-keepalive
            - '60'
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - redis-cli
                - -h
                - 127.0.0.1
                - ping
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -h
                - 127.0.0.1
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -h
                - 127.0.0.1
                - ping
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
