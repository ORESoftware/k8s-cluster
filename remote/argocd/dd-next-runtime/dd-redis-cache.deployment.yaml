apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-redis-cache
  namespace: default
  labels:
    app: dd-redis-cache
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-redis-cache
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-17-redis-cache-hardened'
      labels:
        app: dd-redis-cache
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7.4.9-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
          args:
            - /usr/local/etc/redis/redis.conf
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - redis-cli
                - -h
                - 127.0.0.1
                - ping
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -h
                - 127.0.0.1
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -h
                - 127.0.0.1
                - ping
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/redis
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: dd-redis-cache-config
        - name: data
          emptyDir:
            sizeLimit: 512Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
