apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-des-rs
  namespace: default
  labels:
    app: dd-des-rs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-des-rs
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-30-des-rs-engine-library'
      labels:
        app: dd-des-rs
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: des-rs
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              # Imports the discrete-event-system.rs engine as a library via the
              # remote/submodules/discrete-event-system.rs git submodule, which
              # must be initialized in the mounted repo
              # (git submodule update --init remote/submodules/discrete-event-system.rs).
              cd /opt/dd-next-1/remote/deployments/des-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8112'
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_TARGET_DIR
              value: /tmp/des-rs-target
            # Writable working dir the engine renders artifacts into (out/ is
            # created here). Kept on the /tmp emptyDir so the repo can stay
            # read-only.
            - name: DES_WORK_DIR
              value: /tmp/des-rs-work
            # Fast, HTML-producing simulations rendered once at startup so /out/
            # has content immediately (ends with build_site for the curated
            # index.html). Override or set empty to skip. Heavy sims are run on
            # demand via POST /simulate.
            - name: DES_STARTUP_SIMS
              value: main_empirical_control_report,main_elevator_highrise,main_two_disease,main_build_site
          ports:
            - name: http
              containerPort: 8112
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: '2'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir: {}
