apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-economics-server
  namespace: default
  labels:
    app: dd-economics-server
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    # This service builds from a hostPath source checkout at pod start. Avoid
    # surge pods on the single-node EC2 cluster so deploys do not deadlock on
    # requested CPU while old build pods are still present.
    type: Recreate
  selector:
    matchLabels:
      app: dd-economics-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-05-economics-server'
      labels:
        app: dd-economics-server
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: release-build
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export HOME=/tmp
              export CARGO_HOME=/var/cache/dd-economics-server/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-economics-server/target
              export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-1}"
              export CARGO_INCREMENTAL="${CARGO_INCREMENTAL:-0}"
              export CARGO_TERM_COLOR="${CARGO_TERM_COLOR:-never}"
              export CARGO_REGISTRIES_CRATES_IO_PROTOCOL="${CARGO_REGISTRIES_CRATES_IO_PROTOCOL:-sparse}"
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              cd /opt/dd-next-1/remote/deployments/economics-server-rs
              echo "dd-economics-server release build starting pod=${POD_NAME} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
              /usr/local/cargo/bin/cargo build --release --locked
              if [ ! -x "$CARGO_TARGET_DIR/release/dd-economics-server" ]; then
                echo "dd-economics-server release build failed: compiled binary missing" >&2
                exit 78
              fi
              echo "dd-economics-server release build completed pod=${POD_NAME} namespace=${POD_NAMESPACE} node=${NODE_NAME}"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CARGO_BUILD_JOBS
              value: '1'
            - name: CARGO_INCREMENTAL
              value: '0'
            - name: CARGO_TERM_COLOR
              value: never
            - name: CARGO_NET_RETRY
              value: '5'
            - name: CARGO_HTTP_TIMEOUT
              value: '120'
            - name: CARGO_REGISTRIES_CRATES_IO_PROTOCOL
              value: sparse
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
              ephemeral-storage: 4Gi
            limits:
              cpu: '2'
              memory: 8Gi
              ephemeral-storage: 8Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-economics-server
            - name: tmp
              mountPath: /tmp
      containers:
        - name: economics-server
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export HOME=/tmp
              export CARGO_TARGET_DIR=/var/cache/dd-economics-server/target
              cd /opt/dd-next-1/remote/deployments/economics-server-rs
              if [ ! -x "$CARGO_TARGET_DIR/release/dd-economics-server" ]; then
                echo "dd-economics-server startup failed: compiled binary missing" >&2
                exit 78
              fi
              exec "$CARGO_TARGET_DIR/release/dd-economics-server"
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_TARGET_DIR
              value: /var/cache/dd-economics-server/target
            - name: RUST_LOG
              value: info
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8114'
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: ECONOMICS_HISTORY_YEARS
              value: '15'
            - name: ECONOMICS_PROJECTION_MONTHS
              value: '18'
            - name: ECONOMICS_CONFIDENCE_LEVEL
              value: '0.90'
            - name: ECONOMICS_ALLOW_UNAUTHENTICATED
              value: 'false'
            - name: ECONOMICS_ALLOW_PRIVATE_SOURCE_URLS
              value: 'false'
            - name: ECONOMICS_ALLOWED_SOURCE_HOSTS
              value: api.fiscaldata.treasury.gov,api.worldbank.org,api.coingecko.com,fred.stlouisfed.org
            # Optional sentiment-provider placeholders. Values live in AWS
            # Secrets Manager / Kubernetes secrets, never in Git.
            - name: ECONOMICS_X_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_X_BEARER_TOKEN
                  optional: true
            - name: ECONOMICS_X_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_X_API_KEY
                  optional: true
            - name: ECONOMICS_X_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_X_API_SECRET
                  optional: true
            - name: ECONOMICS_X_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_X_ACCESS_TOKEN
                  optional: true
            - name: ECONOMICS_X_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_X_ACCESS_TOKEN_SECRET
                  optional: true
            - name: ECONOMICS_REDDIT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_REDDIT_CLIENT_ID
                  optional: true
            - name: ECONOMICS_REDDIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_REDDIT_CLIENT_SECRET
                  optional: true
            - name: ECONOMICS_REDDIT_USER_AGENT
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_REDDIT_USER_AGENT
                  optional: true
            - name: ECONOMICS_NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_NEWS_API_KEY
                  optional: true
            - name: ECONOMICS_STOCKTWITS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_STOCKTWITS_TOKEN
                  optional: true
            - name: ECONOMICS_GDELT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_GDELT_API_KEY
                  optional: true
            - name: ECONOMICS_FRED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_FRED_API_KEY
                  optional: true
            - name: ECONOMICS_BEA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_BEA_API_KEY
                  optional: true
            - name: ECONOMICS_BLS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_BLS_API_KEY
                  optional: true
            - name: ECONOMICS_TREASURY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_TREASURY_API_KEY
                  optional: true
            - name: ECONOMICS_CENSUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_CENSUS_API_KEY
                  optional: true
            - name: ECONOMICS_EIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_EIA_API_KEY
                  optional: true
            - name: ECONOMICS_COINGECKO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_COINGECKO_API_KEY
                  optional: true
            - name: ECONOMICS_SEC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_SEC_API_KEY
                  optional: true
            - name: ECONOMICS_CRUNCHBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_CRUNCHBASE_API_KEY
                  optional: true
            - name: ECONOMICS_PITCHBOOK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_PITCHBOOK_API_KEY
                  optional: true
            - name: ECONOMICS_CB_INSIGHTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_CB_INSIGHTS_API_KEY
                  optional: true
            - name: ECONOMICS_DEALROOM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_DEALROOM_API_KEY
                  optional: true
            - name: ECONOMICS_PREQIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_PREQIN_API_KEY
                  optional: true
            - name: ECONOMICS_DATABRICKS_HOST
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_DATABRICKS_HOST
                  optional: true
            - name: ECONOMICS_DATABRICKS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ECONOMICS_DATABRICKS_TOKEN
                  optional: true
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: ECONOMICS_FORECAST_REQUEST_SUBJECT
              value: dd.remote.economics.forecast.requests
            - name: ECONOMICS_QUEUE_GROUP
              value: dd-economics-server
            - name: ECONOMICS_FORECAST_RESULT_SUBJECT
              value: dd.remote.economics.forecast.results
            - name: ECONOMICS_MARKET_EVENT_SUBJECT
              value: dd.remote.economics.market.events
            - name: ECONOMICS_RUNTIME_EVENT_SUBJECT
              value: dd.remote.events
            - name: ECONOMICS_PIPELINE_INTENT_SUBJECT
              value: dd.remote.public_data.pipeline.jobs
            - name: ECONOMICS_SPARK_PIPELINE_URL
              value: http://dd-spark-pipeline-server.ai-ml.svc.cluster.local:8085
            - name: ECONOMICS_SPARK_PIPELINE_AUTH_ENV
              value: SERVER_AUTH_SECRET
            - name: ECONOMICS_SPARK_MASTER_URL
              value: spark://spark-master.big-data.svc.cluster.local:7077
            - name: ECONOMICS_AIRFLOW_API_URL
              value: http://airflow.big-data.svc.cluster.local:8080
            - name: ECONOMICS_DATA_LAKE_URI
              value: s3a://dd-economics/market-signals
            - name: ECONOMICS_ENABLE_PIPELINE_SUBMIT
              value: 'false'
            - name: ECONOMICS_ALLOW_EXTERNAL_PIPELINE_URLS
              value: 'false'
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-economics-server
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-economics-server
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-economics-server.default.svc.cluster.local:8114/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: dd-agent-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8114
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-economics-server
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-cache
          emptyDir:
            sizeLimit: 8Gi
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
