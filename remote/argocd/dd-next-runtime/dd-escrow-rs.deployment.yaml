apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-escrow-rs
  namespace: default
  labels:
    app: dd-escrow-rs
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-escrow-rs
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-09-escrow-rs-contract-service-delegation'
      labels:
        app: dd-escrow-rs
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: escrow-rs
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/dd-escrow-rs
              export CARGO_HOME=/var/cache/dd-escrow-rs/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-escrow-rs/target
              exec /usr/local/cargo/bin/cargo run --release --locked
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8115'
            - name: HOME
              value: /tmp
            - name: SOLANA_CLUSTER
              value: devnet
            - name: SOLANA_RPC_URL
              value: https://api.devnet.solana.com
            - name: SOLANA_RPC_TIMEOUT_SECONDS
              value: '20'
            - name: SOLANA_ALLOW_PRIVATE_RPC
              value: 'false'
            - name: SOLANA_SETTLEMENT_ENABLED
              value: 'false'
            - name: SOLANA_MAINNET_SETTLEMENT_ENABLED
              value: 'false'
            - name: ESCROW_SETTLEMENT_REQUIRE_INTENT
              value: 'true'
            - name: SOLANA_ALLOW_SKIP_PREFLIGHT
              value: 'false'
            # Delegate on-chain simulate/send to the in-cluster dd-contract-service
            # gateway instead of calling Solana JSON-RPC directly. The NetworkPolicy
            # grants no public egress, so 'solana-rpc' (direct-RPC) would also need a
            # 443 egress rule re-added before it could reach Solana.
            - name: ESCROW_SETTLEMENT_BACKEND
              value: contract-service
            - name: CONTRACT_SERVICE_URL
              value: http://dd-contract-service.default.svc.cluster.local:8101
            - name: CONTRACT_SERVICE_TIMEOUT_SECONDS
              value: '20'
            # Matches dd-contract-service CONTRACT_SEND_AUTH_SECRET; only needed once
            # both services enable live sends (SOLANA_SETTLEMENT_ENABLED /
            # SOLANA_SEND_ENABLED). Simulate does not require it.
            - name: CONTRACT_SERVICE_SEND_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: CONTRACT_SEND_AUTH_SECRET
                  optional: true
            - name: ESCROW_SETTLEMENT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ESCROW_SETTLEMENT_AUTH_SECRET
                  optional: true
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: ESCROW_VALIDATE_SUBJECT
              value: dd.remote.escrow.solana.validate
            - name: ESCROW_RESULT_SUBJECT
              value: dd.remote.escrow.solana.results
            - name: ESCROW_EVENT_SUBJECT
              value: dd.remote.events
            - name: NATS_CRITICAL_EVENT_SUBJECT
              value: dd.remote.events.critical
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-escrow-rs
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-escrow-rs
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-escrow-rs.default.svc.cluster.local:8115/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8115
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-escrow-rs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
