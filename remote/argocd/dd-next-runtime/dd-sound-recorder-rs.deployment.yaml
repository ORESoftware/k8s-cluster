apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-sound-recorder-rs
  namespace: default
  labels:
    app: dd-sound-recorder-rs
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-sound-recorder-rs
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-07-18-sonus-otel-seaorm'
        prometheus.io/path: /metrics
        prometheus.io/port: '8126'
        prometheus.io/scrape: 'true'
      labels:
        app: dd-sound-recorder-rs
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: sound-recorder-rs
          image: docker.io/library/rust:1.91.1-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export CARGO_HOME=/var/cache/dd-sound-recorder-rs/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-sound-recorder-rs/target
              export HOME=/tmp
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              # The backend code lives in its own private repo, sonus-auris/sonus-auris-backend.rs,
              # wired into this superproject as a git submodule at
              # remote/deployments/dd-sound-recorder-rs. Prefer mounted source
              # when the node has it; otherwise clone the superproject and
              # initialize only this backend submodule so unrelated private
              # submodules cannot block Sonus Auris startup. GH_PAT
              # (dd-agent-secrets) authenticates the private fetch via an HTTP
              # header instead of a URL, so auth failures cannot print a token.
              git_auth_args=()
              if [ -n "${GH_PAT:-}" ]; then
                authhdr="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_PAT" | base64 | tr -d '\n')"
                git_auth_args=(-c "http.https://github.com/.extraheader=${authhdr}")
                git config --global url."https://github.com/".insteadOf "git@github.com:"
              fi
              source_root=/opt/dd-next-1
              app_dir="$source_root/remote/deployments/dd-sound-recorder-rs"
              if [ -f "$app_dir/Cargo.toml" ]; then
                echo "[dd-sound-recorder-rs] source: using mounted backend at ${app_dir}"
              elif [ -n "${SOUND_RECORDER_GIT_URL:-}" ]; then
                clone_root="$(mktemp -d /tmp/dd-sound-recorder-rs-source.XXXXXX)"
                if git clone --depth 1 \
                     --branch "${SOUND_RECORDER_GIT_REF:-dev}" "${SOUND_RECORDER_GIT_URL}" "$clone_root" &&
                   git -C "$clone_root" submodule init remote/deployments/dd-sound-recorder-rs &&
                   git -C "$clone_root" config "submodule.remote/deployments/dd-sound-recorder-rs.url" "https://github.com/sonus-auris/sonus-auris-backend.rs.git" &&
                   git -C "$clone_root" "${git_auth_args[@]}" submodule update --depth 1 remote/deployments/dd-sound-recorder-rs; then
                  source_root="$clone_root"
                  app_dir="$source_root/remote/deployments/dd-sound-recorder-rs"
                  sub_sha="$(git -C "$clone_root/remote/deployments/dd-sound-recorder-rs" rev-parse --short HEAD 2>/dev/null || echo '?')"
                  echo "[dd-sound-recorder-rs] source: cloned ${SOUND_RECORDER_GIT_URL}@${SOUND_RECORDER_GIT_REF:-dev} ($(git -C "$clone_root" rev-parse --short HEAD)); backend submodule ${sub_sha}"
                else
                  echo "[dd-sound-recorder-rs] source clone failed; using mounted source at ${source_root}" >&2
                fi
              fi
              # When we fall back to the read-only mounted superproject, the host must have already run
              # `git submodule update --init` for this path. Fail loudly with a fix hint instead of a
              # confusing cargo "could not find Cargo.toml" error.
              if [ ! -f "$app_dir/Cargo.toml" ]; then
                echo "[dd-sound-recorder-rs] FATAL: backend submodule not populated at $app_dir." >&2
                echo "[dd-sound-recorder-rs] If using mounted source, run on the host: git -C \"$source_root\" submodule update --init remote/deployments/dd-sound-recorder-rs" >&2
                echo "[dd-sound-recorder-rs] If using the git clone path, ensure GH_PAT (private-repo read) is set." >&2
                exit 1
              fi
              cd "$app_dir"
              exec /usr/local/cargo/bin/cargo run --release --locked
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /var/cache/dd-sound-recorder-rs/cargo
            - name: CARGO_TARGET_DIR
              value: /var/cache/dd-sound-recorder-rs/target
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=kubernetes
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SOUND_RECORDER_GIT_URL
              value: https://github.com/ORESoftware/k8s-cluster.git
            - name: SOUND_RECORDER_GIT_REF
              value: dev
            # Read access for the private backend submodule (sonus-auris/sonus-auris-backend.rs)
            # pulled in by `git clone --recurse-submodules`. Same token used by dd-next-1-js.
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: GH_PAT
                  optional: true
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8126'
            - name: SOUND_RECORDER_DEFAULT_RETENTION_HOURS
              value: '500'
            - name: SOUND_RECORDER_DEFAULT_SEGMENT_SECONDS
              value: '60'
            - name: SOUND_RECORDER_MAX_SEGMENT_SECONDS
              value: '120'
            - name: SOUND_RECORDER_MAX_SEGMENT_BYTES
              value: '10485760'
            - name: SOUND_RECORDER_UPLOAD_URL_TTL_SECONDS
              value: '300'
            - name: SOUND_RECORDER_DOWNLOAD_URL_TTL_SECONDS
              value: '900'
            - name: SOUND_RECORDER_S3_KEY_PREFIX
              value: sound-recorder/segments
            - name: SOUND_RECORDER_OAUTH_STATE_TTL_SECONDS
              value: '600'
            - name: SOUND_RECORDER_CLOUD_COPY_BATCH_SIZE
              value: '25'
            - name: SOUND_RECORDER_CLOUD_COPY_MAX_ATTEMPTS
              value: '3'
            - name: SOUND_RECORDER_CLOUD_COPY_MAX_BYTES
              value: '26214400'
            - name: SOUND_RECORDER_CLOUD_BACKFILL_SEGMENTS
              value: '240'
            - name: SOUND_RECORDER_ALLOW_PUBLIC_DEVICE_REGISTRATION
              value: 'false'
            - name: SOUND_RECORDER_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_S3_BUCKET
                  optional: true
            - name: SOUND_RECORDER_CDN_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_CDN_BASE_URL
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: S3_BUCKET
                  optional: true
            - name: S3_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: S3_PUBLIC_BASE_URL
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_REGION
                  optional: true
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_SESSION_TOKEN
                  optional: true
            - name: SOUND_RECORDER_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: SOUND_RECORDER_RDS_DATABASE_URL
                  optional: true
            - name: AGENT_TASKS_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: AGENT_TASKS_RDS_DATABASE_URL
                  optional: true
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: SOUND_RECORDER_DEVICE_TOKEN_PEPPER
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_DEVICE_TOKEN_PEPPER
                  optional: true
            - name: SOUND_RECORDER_REGISTRATION_BEARER
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_REGISTRATION_BEARER
                  optional: true
            - name: SOUND_RECORDER_SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SERVER_AUTH_SECRET
                  optional: true
            - name: SOUND_RECORDER_CLOUD_TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_CLOUD_TOKEN_ENCRYPTION_KEY
                  optional: true
            - name: SOUND_RECORDER_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_URL
                  optional: true
            - name: SOUND_RECORDER_SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_JWT_SECRET
                  optional: true
            - name: SOUND_RECORDER_SUPABASE_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_JWKS_URL
                  optional: true
            - name: SOUND_RECORDER_SUPABASE_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_AUDIENCE
                  optional: true
            - name: SOUND_RECORDER_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_GOOGLE_CLIENT_ID
                  optional: true
            - name: SOUND_RECORDER_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_GOOGLE_CLIENT_SECRET
                  optional: true
            - name: SOUND_RECORDER_MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_MICROSOFT_CLIENT_ID
                  optional: true
            - name: SOUND_RECORDER_MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_MICROSOFT_CLIENT_SECRET
                  optional: true
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
            - name: SOUND_RECORDER_IOS_APP_STORE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_IOS_APP_STORE_URL
                  optional: true
            - name: SOUND_RECORDER_ANDROID_PLAY_STORE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_ANDROID_PLAY_STORE_URL
                  optional: true
          ports:
            - name: http
              containerPort: 8126
          resources:
            requests:
              cpu: 25m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 180
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-sound-recorder-rs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: DirectoryOrCreate
        - name: build-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
