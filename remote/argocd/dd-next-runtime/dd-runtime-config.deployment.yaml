apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-runtime-config
  namespace: default
  labels:
    app: dd-runtime-config
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-runtime-config
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-21-runtime-config-initial'
      labels:
        app: dd-runtime-config
        # Required by the dd-redis-cache NetworkPolicy.
        dd.dev/redis-cache-client: 'true'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: runtime-config
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export HOME=/tmp
              export CARGO_HOME=/tmp/cargo
              export CARGO_TARGET_DIR=/tmp/dd-runtime-config-target
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              cd /opt/dd-next-1/remote/deployments/runtime-config-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_TARGET_DIR
              value: /tmp/dd-runtime-config-target
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8110'
            - name: RUNTIME_CONFIG_REDIS_URL
              value: redis://dd-redis-cache.default.svc.cluster.local:6379
            - name: RUNTIME_CONFIG_REDIS_PREFIX
              value: dd:rc
            - name: RUNTIME_CONFIG_PUSH_INTERVAL_SECONDS
              value: '300'
            - name: RUNTIME_CONFIG_PUSH_TIMEOUT_SECONDS
              value: '10'
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
            - name: RUNTIME_CONFIG_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8110
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir: {}
