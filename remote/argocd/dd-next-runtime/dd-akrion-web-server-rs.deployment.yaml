apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-akrion-web-server-rs
  namespace: default
  labels:
    app: dd-akrion-web-server-rs
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-akrion-web-server-rs
  template:
    metadata:
      annotations:
        dd.dev/akrion-web-server-revision: '7b4e16780717f4307fa98bab7d2bd2c29716bab5'
      labels:
        app: dd-akrion-web-server-rs
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: akrion-web-server-rs
          image: docker.io/library/rust:1.91.1-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export CARGO_HOME=/var/cache/dd-akrion-web-server-rs/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-akrion-web-server-rs/target
              export HOME=/tmp
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"

              git_auth_args=()
              if [ -n "${GH_PAT:-}" ]; then
                authhdr="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_PAT" | base64 | tr -d '\n')"
                git_auth_args=(-c "http.https://github.com/.extraheader=${authhdr}")
                git config --global url."https://github.com/".insteadOf "git@github.com:"
              fi

              source_root=/opt/dd-next-1
              mounted_app_dir="$source_root/remote/deployments/akrion-web-server-rs"
              app_dir="$mounted_app_dir"
              if [ -n "${AKRION_WEB_GIT_URL:-}" ]; then
                clone_root="$(mktemp -d /tmp/dd-akrion-web-server-rs-source.XXXXXX)"
                if git clone --depth 1 \
                     --branch "${AKRION_WEB_GIT_REF:-dev}" "${AKRION_WEB_GIT_URL}" "$clone_root" &&
                   git -C "$clone_root" submodule init remote/deployments/akrion-web-server-rs &&
                   git -C "$clone_root" config "submodule.remote/deployments/akrion-web-server-rs.url" "https://github.com/akrion-sim/akrion-web-server.rs.git" &&
                   git -C "$clone_root" "${git_auth_args[@]}" submodule update --depth 1 remote/deployments/akrion-web-server-rs; then
                  source_root="$clone_root"
                  app_dir="$source_root/remote/deployments/akrion-web-server-rs"
                  sub_sha="$(git -C "$app_dir" rev-parse --short HEAD 2>/dev/null || echo '?')"
                  echo "[dd-akrion-web-server-rs] source: cloned ${AKRION_WEB_GIT_URL}@${AKRION_WEB_GIT_REF:-dev}; web submodule ${sub_sha}"
                else
                  echo "[dd-akrion-web-server-rs] source clone failed; using mounted source at ${source_root}" >&2
                fi
              fi
              if [ "$app_dir" = "$mounted_app_dir" ] && [ -f "$app_dir/Cargo.toml" ]; then
                echo "[dd-akrion-web-server-rs] source: using mounted web server at ${app_dir}"
              fi

              if [ ! -f "$app_dir/Cargo.toml" ]; then
                echo "[dd-akrion-web-server-rs] FATAL: web server submodule not populated at $app_dir." >&2
                echo "[dd-akrion-web-server-rs] If using mounted source, run on the host: git -C \"$source_root\" submodule update --init remote/deployments/akrion-web-server-rs" >&2
                echo "[dd-akrion-web-server-rs] If using the git clone path, ensure GH_PAT has private-repo read access." >&2
                exit 1
              fi

              cd "$app_dir"
              exec /usr/local/cargo/bin/cargo run --release --locked
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /var/cache/dd-akrion-web-server-rs/cargo
            - name: CARGO_TARGET_DIR
              value: /var/cache/dd-akrion-web-server-rs/target
            - name: CARGO_BUILD_JOBS
              value: '1'
            - name: AKRION_WEB_GIT_URL
              value: https://github.com/ORESoftware/k8s-cluster.git
            - name: AKRION_WEB_GIT_REF
              value: dev
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: dd-git-clone-token
                  key: token
                  optional: true
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8127'
            - name: AKRION_WEB_BASE_PATH
              value: /akrion-sim
            - name: AKRION_BACKEND_URL
              value: http://dd-soccer-rs.default.svc.cluster.local:8113
            - name: AKRION_RUST_LOG
              value: info,akrion_web_server=info,tower_http=info
            # Promtail sends structured stdout logs to Loki; the OTel collector
            # receives traces/metrics and exposes metrics to Prometheus.
            - name: AKRION_TELEMETRY_ENABLED
              value: 'true'
            - name: AKRION_LOG_JSON
              value: 'true'
            - name: AKRION_SERVICE_NAME
              value: dd-akrion-web-server-rs
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4318
            - name: AKRION_OTEL_TRACES
              value: 'true'
            - name: AKRION_OTEL_METRICS
              value: 'true'
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AKRION_SUPABASE_URL
                  optional: true
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AKRION_SUPABASE_ANON_KEY
                  optional: true
          ports:
            - name: http
              containerPort: 8127
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-akrion-web-server-rs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: DirectoryOrCreate
        - name: build-cache
          emptyDir:
            sizeLimit: 4Gi
        - name: tmp
          emptyDir: {}
