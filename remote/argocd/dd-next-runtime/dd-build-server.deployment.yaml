apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-build-server
  namespace: default
  labels:
    app: dd-build-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-build-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-16-build-server'
      labels:
        app: dd-build-server
    spec:
      serviceAccountName: dd-build-server
      terminationGracePeriodSeconds: 30
      containers:
        - name: build-server
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export CARGO_HOME=/tmp/cargo
              export CARGO_TARGET_DIR=/tmp/dd-build-server-target
              export HOME=/tmp
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              source_root=/opt/dd-next-1
              if [ -n "${BUILD_SERVER_GIT_URL:-}" ]; then
                clone_root="$(mktemp -d /tmp/dd-build-server-source.XXXXXX)"
                github_extraheader=''
                if [ -n "${GH_PAT:-}" ]; then
                  github_basic="$(printf 'x-access-token:%s' "$GH_PAT" | base64 | tr -d '\n')"
                  github_extraheader="AUTHORIZATION: basic ${github_basic}"
                fi
                if git clone --depth 1 --branch "${BUILD_SERVER_GIT_REF:-dev}" "${BUILD_SERVER_GIT_URL}" "$clone_root" \
                  && git -C "$clone_root" \
                    -c 'url.https://github.com/.insteadOf=git@github.com:' \
                    -c "http.https://github.com/.extraheader=${github_extraheader}" \
                    submodule update --init --depth 1 -- remote/libs; then
                  source_root="$clone_root"
                  echo "[dd-build-server] source: cloned ${BUILD_SERVER_GIT_URL}@${BUILD_SERVER_GIT_REF:-dev} with remote/libs ($(git -C "$clone_root" rev-parse --short HEAD))"
                else
                  echo "[dd-build-server] source clone or remote/libs init failed; using mounted source at ${source_root}" >&2
                fi
              fi
              cd "$source_root/remote/deployments/build-server-rs"
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_TARGET_DIR
              value: /tmp/dd-build-server-target
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8100'
            - name: BUILD_SERVER_WORK_ROOT
              value: /var/lib/dd-build-server/jobs
            - name: BUILD_SERVER_GIT_BIN
              value: git
            - name: BUILD_SERVER_NERDCTL_BIN
              value: /usr/local/bin/nerdctl
            - name: BUILD_SERVER_KUBECTL_BIN
              value: /usr/bin/kubectl
            - name: BUILD_SERVER_TAR_BIN
              value: /bin/tar
            - name: BUILD_SERVER_CONTAINERD_NAMESPACE
              value: k8s.io
            - name: BUILD_SERVER_ALLOWED_REPO_PREFIXES
              value: https://github.com/,git@github.com:,ssh://git@github.com/
            - name: BUILD_SERVER_ALLOWED_IMAGE_PREFIXES
              value: 710156900967.dkr.ecr.us-east-1.amazonaws.com/
            - name: BUILD_SERVER_ALLOWED_NAMESPACES
              value: default
            - name: BUILD_SERVER_ALLOWED_PROFILES
              value: flutter-verify,flutter-android-debug,flutter-web-release,flutter-linux-release,flutter-linux-desktop-entrypoint,flutter-web-e2e,playwright,puppeteer,browser-e2e
            - name: BUILD_SERVER_ALLOWED_PROFILE_REPO_PREFIXES
              value: https://github.com/ORESoftware/,https://github.com/sonus-auris/,git@github.com:ORESoftware/,git@github.com:sonus-auris/
            - name: BUILD_SERVER_PROFILE_CPUS
              value: '4'
            - name: BUILD_SERVER_PROFILE_MEMORY
              value: 8g
            - name: BUILD_SERVER_PROFILE_PIDS_LIMIT
              value: '2048'
            - name: BUILD_SERVER_GIT_URL
              value: https://github.com/ORESoftware/k8s-cluster.git
            - name: BUILD_SERVER_GIT_REF
              value: dev
            - name: BUILD_SERVER_DEPLOY_ENABLED
              value: 'true'
            - name: BUILD_SERVER_PUSH_ENABLED
              value: 'true'
            - name: BUILD_SERVER_ECR_LOGIN_ENABLED
              value: 'true'
            - name: BUILD_SERVER_MAX_CONCURRENT_BUILDS
              value: '1'
            - name: BUILD_SERVER_JOB_TIMEOUT_SECONDS
              value: '2700'
            - name: BUILD_SERVER_JOB_DEADLINE_SECONDS
              value: '5400'
            - name: BUILD_SERVER_MAX_QUEUED
              value: '32'
            - name: BUILD_SERVER_MAX_LOG_BYTES
              value: '4194304'
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            # --- Postgres persistence (own database dd_build_server on RDS).
            # Optional: with no URL the server keeps in-memory job state.
            # Schema contract:
            # remote/libs/pg-defs/schema/databases/dd_build_server/schema.sql
            # converged with build-server-rs/scripts/dpm.sh (never at boot).
            - name: BUILD_SERVER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-build-server-secrets
                  key: BUILD_SERVER_DATABASE_URL
                  optional: true
            # --- fiducia.cloud coordination (build locks + idempotency leases).
            - name: BUILD_SERVER_COORDINATION_ENABLED
              value: 'true'
            - name: BUILD_SERVER_COORDINATION_REQUIRED
              value: 'false'
            - name: FIDUCIA_LOCK_URL
              value: http://fiducia-load-balance.fiducia.svc.cluster.local:8088
            - name: FIDUCIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-build-server-secrets
                  key: FIDUCIA_API_KEY
                  optional: true
            # --- NATS MQ (lifecycle events + optional durable request intake).
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: BUILD_SERVER_NATS_ENABLED
              value: 'true'
            - name: BUILD_SERVER_NATS_INTAKE_ENABLED
              value: 'false'
            # --- Webhooks (GitHub push/workflow_run + registry image events).
            - name: BUILD_SERVER_GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-build-server-secrets
                  key: BUILD_SERVER_GITHUB_WEBHOOK_SECRET
                  optional: true
            - name: BUILD_SERVER_REGISTRY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-build-server-secrets
                  key: BUILD_SERVER_REGISTRY_WEBHOOK_SECRET
                  optional: true
            - name: BUILD_SERVER_WEBHOOK_RULES_PATH
              value: /etc/dd-build-server/webhook-rules.json
            # --- GitHub Actions secret sync (AWS SM/ESO -> GitHub repo secrets).
            # GH_PAT is provided by dd-agent-secrets (repo scope).
            - name: BUILD_SERVER_GH_SYNC_ENABLED
              value: 'false'
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: GH_PAT
                  optional: true
            - name: BUILD_SERVER_GH_SYNC_RULES_PATH
              value: /etc/dd-build-server/gh-sync-rules.json
            - name: BUILD_SERVER_GH_SYNC_INTERVAL_SECONDS
              value: '0'
            # --- gleam-lambda-runner build executor (opt-in per job).
            - name: BUILD_SERVER_LAMBDA_ENABLED
              value: 'false'
            - name: BUILD_SERVER_LAMBDA_URL
              value: http://dd-gleam-lambda-runner.default.svc.cluster.local:8083
            - name: BUILD_SERVER_LAMBDA_FUNCTION_ID
              valueFrom:
                secretKeyRef:
                  name: dd-build-server-secrets
                  key: BUILD_SERVER_LAMBDA_FUNCTION_ID
                  optional: true
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: AWS_SESSION_TOKEN
                  optional: true
            # runtime-config wiring: registers this pod with the control plane
            # so it receives /internal/update-runtime-config pushes every 5 min
            # plus on-demand admin pushes.
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-build-server
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-build-server
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-build-server.default.svc.cluster.local:8100/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8100
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: '4'
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 600
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: rules
              mountPath: /etc/dd-build-server
              readOnly: true
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-work
              mountPath: /var/lib/dd-build-server
            - name: tmp
              mountPath: /tmp
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
            - name: nerdctl-bin
              mountPath: /usr/local/bin/nerdctl
              readOnly: true
            - name: kubectl-bin
              mountPath: /usr/bin/kubectl
              readOnly: true
      volumes:
        - name: rules
          configMap:
            name: dd-build-server-rules
            optional: true
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-work
          hostPath:
            path: /var/lib/dd-build-server
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: nerdctl-bin
          hostPath:
            path: /usr/local/bin/nerdctl
            type: File
        - name: kubectl-bin
          hostPath:
            path: /usr/bin/kubectl
            type: File
