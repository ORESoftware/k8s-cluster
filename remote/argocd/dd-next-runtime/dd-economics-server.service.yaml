apiVersion: v1
kind: Service
metadata:
  name: dd-economics-server
  namespace: default
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '8114'
    prometheus.io/scheme: http
    prometheus.io/scrape: 'true'
  labels:
    app: dd-economics-server
spec:
  selector:
    app: dd-economics-server
  ports:
    - name: http
      port: 8114
      targetPort: http
