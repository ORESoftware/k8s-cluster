apiVersion: v1
kind: Service
metadata:
  name: dd-rust-network-mutex-raft
  namespace: default
  labels:
    app: dd-rust-network-mutex-raft
spec:
  # ClusterIP is the in-cluster load balancer here. It can round-robin all
  # healthy Raft nodes because followers proxy HTTP lock/unlock calls to the
  # elected leader.
  type: ClusterIP
  selector:
    app: dd-rust-network-mutex-raft
  ports:
    - name: http
      port: 6971
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: dd-rust-network-mutex-raft-peer
  namespace: default
  labels:
    app: dd-rust-network-mutex-raft
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: dd-rust-network-mutex-raft
  ports:
    - name: raft-rpc
      port: 7980
      targetPort: raft-rpc
    - name: http
      port: 6971
      targetPort: http
