apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-remote-auth
  namespace: default
  labels:
    app: dd-remote-auth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-remote-auth
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-18-observability'
      labels:
        app: dd-remote-auth
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: remote-auth
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/auth-server-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8083'
            - name: DD_AUTH_PIN
              valueFrom:
                secretKeyRef:
                  name: dd-remote-auth-secrets
                  key: DD_AUTH_PIN
            - name: DD_AUTH_COOKIE_NAME
              value: dd_auth
            - name: DD_AUTH_COOKIE_VALUE
              valueFrom:
                secretKeyRef:
                  name: dd-remote-auth-secrets
                  key: DD_AUTH_COOKIE_VALUE
          ports:
            - name: http
              containerPort: 8083
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
