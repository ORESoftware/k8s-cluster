apiVersion: v1
kind: ServiceAccount
metadata:
  name: dd-remote-rest-api
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dd-remote-rest-api-control-plane
  namespace: default
rules:
  - apiGroups: ['']
    resources: [pods, services, persistentvolumeclaims]
    verbs: [get, list, watch, create, delete, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, delete, patch, update]
  - apiGroups: [apps]
    resources: [deployments/scale]
    verbs: [get, patch, update]
  - apiGroups: ['']
    resources: [events]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-remote-rest-api-control-plane
  namespace: default
subjects:
  - kind: ServiceAccount
    name: dd-remote-rest-api
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dd-remote-rest-api-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-remote-rest-api-control-plane
  namespace: dd-dev
subjects:
  - kind: ServiceAccount
    name: dd-remote-rest-api
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dd-control-plane
