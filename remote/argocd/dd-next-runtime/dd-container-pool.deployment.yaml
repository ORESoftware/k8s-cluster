apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-container-pool
  namespace: default
  labels:
    app: dd-container-pool
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-container-pool
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-16-container-pool'
      labels:
        app: dd-container-pool
        dd.dev/redis-cache-client: 'true'
    spec:
      serviceAccountName: dd-container-pool
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      containers:
        - name: container-pool
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/container-pool-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8102'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: CONTAINER_POOL_NATS_SUBJECT
              value: dd.remote.container_pool.*.requests
            - name: CONTAINER_POOL_NATS_RESULT_SUBJECT
              value: dd.remote.container_pool.results
            - name: CONTAINER_POOL_NATS_MAX_PAYLOAD_BYTES
              value: '2097152'
            - name: CONTAINER_POOL_REDIS_URL
              value: redis://dd-redis-cache.default.svc.cluster.local:6379/0
            - name: CONTAINER_POOL_REDIS_LOCK_PREFIX
              value: dd:container-pool:affinity
            - name: CONTAINER_POOL_REDIS_LOCK_TTL_SECONDS
              value: '600'
            - name: CONTAINER_POOL_REDIS_LOCK_WAIT_TIMEOUT_SECONDS
              value: '420'
            - name: CONTAINER_POOL_REDIS_LOCK_RETRY_MS
              value: '250'
            - name: CONTAINER_POOL_REDIS_LOCK_REQUEST_TIMEOUT_MS
              value: '800'
            - name: CONTAINER_POOL_WORKER_RESPONSE_MAX_BYTES
              value: '2097152'
            - name: CONTAINER_POOL_NERDCTL_BIN
              value: /usr/local/bin/nerdctl
            - name: CONTAINER_POOL_CONTAINERD_NAMESPACE
              value: k8s.io
            - name: CONTAINER_POOL_APP_CONFIG_SCOPE
              value: default
            - name: CONTAINER_POOL_APP_CONFIG_KEY
              value: container-pool.runtime-pools.v1
            - name: CONTAINER_POOL_NETWORK
              value: host
            - name: CONTAINER_POOL_PULL_POLICY
              value: never
            - name: CONTAINER_POOL_PORT_START
              value: '12000'
            - name: CONTAINER_POOL_PORT_END
              value: '12999'
            - name: CONTAINER_POOL_CONFIG_REFRESH_SECONDS
              value: '30'
            - name: CONTAINER_POOL_RECONCILE_SECONDS
              value: '10'
            - name: CONTAINER_POOL_COMMAND_TIMEOUT_SECONDS
              value: '300'
            - name: CONTAINER_POOL_NERDCTL_RUN_TIMEOUT_SECONDS
              value: '180'
            - name: CONTAINER_POOL_START_TIMEOUT_SECONDS
              value: '300'
            - name: CONTAINER_POOL_CONTAINER_MEMORY
              value: 512m
            - name: CONTAINER_POOL_CONTAINER_CPUS
              value: '1'
            - name: CONTAINER_POOL_PIDS_LIMIT
              value: '128'
            - name: CONTAINER_POOL_NOFILE_LIMIT
              value: '128'
            - name: CONTAINER_POOL_HEALTH_CHECK_SECONDS
              value: '10'
            - name: CONTAINER_POOL_HEALTH_TIMEOUT_MS
              value: '1000'
            - name: CONTAINER_POOL_UNHEALTHY_GRACE_SECONDS
              value: '5'
            - name: CONTAINER_POOL_UNHEALTHY_FAILURE_THRESHOLD
              value: '2'
            - name: CONTAINER_POOL_CLEANUP_ON_START
              value: 'true'
            - name: CONTAINER_POOL_FORWARD_ENV_KEYS
              value: SERVER_AUTH_SECRET,REMOTE_DEV_SERVER_SECRET,GH_DEPLOY_KEY,GH_PAT,ANTHROPIC_API_KEY,ANTHROPIC_API_KEYS_JSON,CLAUDE_API_KEYS_JSON,OPENAI_API_KEY,OPENAI_API_KEYS_JSON,GOOGLE_API_KEY,GOOGLE_API_KEYS_JSON,GEMINI_API_KEY,GEMINI_API_KEYS_JSON,OPENCODE_API_KEY,OPENCODE_API_KEYS_JSON,OPENCODE_BASE_URL,OPENCODE_MODELS,DEEPSEEK_API_KEY,DEEPSEEK_API_KEYS_JSON,DEEPSEEK_BASE_URL,DEEPSEEK_MODELS,DASHSCOPE_API_KEY,DASHSCOPE_API_KEYS_JSON,DASHSCOPE_BASE_URL,QWEN_API_KEY,QWEN_API_KEYS_JSON,QWEN_BASE_URL,QWEN_MODELS,XAI_API_KEY,XAI_API_KEYS_JSON,XAI_BASE_URL,XAI_MODELS,GROK_API_KEY,GROK_API_KEYS_JSON,GROK_BASE_URL,GROK_MODELS,EVENT_INGEST_URL,EVENT_INGEST_SECRET,GLEAM_WORKER_WS_SECRET,WORKER_FANOUT_WS_SECRET,WORKER_FANOUT_WS_BASE_URL
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
          envFrom:
            - secretRef:
                name: dd-agent-secrets
                optional: true
            - secretRef:
                name: dd-remote-rest-api-secrets
                optional: true
            - secretRef:
                name: dd-container-pool-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8102
          resources:
            requests:
              cpu: 25m
              memory: 192Mi
            limits:
              cpu: '2'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
            - name: containerd-root
              mountPath: /var/lib/containerd
              mountPropagation: Bidirectional
            - name: nerdctl-bin
              mountPath: /usr/local/bin/nerdctl
              readOnly: true
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: containerd-root
          hostPath:
            path: /var/lib/containerd
            type: Directory
        - name: nerdctl-bin
          hostPath:
            path: /usr/local/bin/nerdctl
            type: File
