apiVersion: v1
kind: ServiceAccount
metadata:
  name: dd-agent-worker-broker
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dd-agent-worker-broker-control-plane
  namespace: default
rules:
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments/scale]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-agent-worker-broker-control-plane
  namespace: default
subjects:
  - kind: ServiceAccount
    name: dd-agent-worker-broker
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dd-agent-worker-broker-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-agent-worker-broker-control-plane
  namespace: dd-dev
subjects:
  - kind: ServiceAccount
    name: dd-agent-worker-broker
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dd-control-plane
