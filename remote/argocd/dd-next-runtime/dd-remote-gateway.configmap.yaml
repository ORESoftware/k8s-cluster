apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-remote-gateway-config
  namespace: default
data:
  default.conf.template: |
    map $http_auth $dd_gateway_header_auth_ok {
      default 0;
      "${DD_REMOTE_GATEWAY_AUTH_VALUE}" 1;
    }

    map $cookie_dd_auth $dd_gateway_cookie_auth_ok {
      default 0;
      "${DD_REMOTE_GATEWAY_AUTH_VALUE}" 1;
    }

    map "$dd_gateway_header_auth_ok:$dd_gateway_cookie_auth_ok" $dd_gateway_auth_ok {
      default 0;
      ~1 1;
    }

    map $dd_gateway_auth_ok $dd_gateway_auth_header {
      default "";
      1 "${DD_REMOTE_GATEWAY_AUTH_VALUE}";
    }

    map $dd_gateway_auth_ok $dd_dev_server_auth_header {
      default "";
      1 "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
    }

    map $http_accept $dd_gateway_accepts_html {
      default 0;
      ~*text/html 1;
    }

    map "$dd_gateway_accepts_html:$http_sec_fetch_dest" $dd_gateway_browser_auth_html {
      default 0;
      ~^1:document$ 1;
      ~^1:iframe$ 1;
      "1:" 1;
    }

    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 80 default_server;
      server_name _;

      location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
      }

      location / {
        return 308 https://$host$request_uri;
      }
    }

    server {
      listen 443 ssl default_server;
      server_name _;

      ssl_certificate /etc/nginx/tls/tls.crt;
      ssl_certificate_key /etc/nginx/tls/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_session_cache shared:SSL:10m;
      ssl_session_timeout 10m;
      # Strict-Transport-Security: 180 days. Bootstrap cert is self-signed
      # (or a short-lived Let's Encrypt IP cert) so we deliberately stop
      # short of the standard 1y/preload window; revisit when we have a
      # stable trusted cert chain.
      add_header Strict-Transport-Security "max-age=15552000" always;
      add_header Content-Security-Policy "upgrade-insecure-requests" always;
      # Defensive headers: prevent clickjacking, MIME sniffing, and
      # cross-origin Referer leaks. Safe to apply globally; individual
      # locations can override with their own add_header if needed.
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      # Hide nginx version from the Server response header.
      server_tokens off;

      client_max_body_size 10m;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
      error_page 401 = @auth_required;

      location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
      }

      location = /auth {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-auth.default.svc.cluster.local:8083;
      }

      location /auth/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-auth.default.svc.cluster.local:8083;
      }

      location = / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /home {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      # Operator-only HTML pages backed by /api/agents/* (which IS auth-gated
      # below). Without the same auth gate here a fresh visit to
      # /agents/threads would render the HTML, then the agents-threads UI
      # would issue fetch("/api/agents/tasks?limit=200") and the gateway
      # would return the JSON 401 ('missing required dd header') because no
      # dd_auth cookie was ever obtained — visible in the browser console
      # as "snapshot failed 401". Gating the page itself makes the
      # error_page 401 = @auth_required redirect kick in and bounce the
      # browser to /auth?return=/agents/threads, after which the cookie is
      # set and every subsequent /api/agents/* fetch succeeds.
      location /agents/tasks {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /agents/threads {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /lambdas/functions {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /lambdas/invoke/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method != POST) {
          return 405;
        }
        client_max_body_size 5m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 65;
        proxy_send_timeout 65;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleam-lambda-runner.default.svc.cluster.local:8083/invoke/;
      }

      location = /lambdas/check {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method != POST) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 35;
        proxy_send_timeout 35;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleam-lambda-runner.default.svc.cluster.local:8083/check;
      }

      location /api/lambdas/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST|PATCH)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      # /container-pool/config — operator UI for viewing and editing pool image
      # Dockerfiles, with build+test history. Gated by the same operator cookie
      # as /lambdas/functions.
      location /container-pool/config {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      # /api/container-pool/* — CRUD + build/test API backing the page above.
      # Operator-cookie gated; the rest-api binary trusts the gateway and
      # mirrors the lambdas API auth model.
      location /api/container-pool/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|PUT|POST)$) {
          return 405;
        }
        client_max_body_size 256k;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 1200;
        proxy_send_timeout 1200;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      location /api/db/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST|PATCH|DELETE)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header X-Agent-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      # /api/runtime-config/snapshot/{stage|prod} — proxied through the rest-api
      # for short-lived consumers (lambdas, container-pool images, cron). Read
      # only; no secret material should ever live in runtime-config entries.
      location /api/runtime-config/ {
        if ($request_method !~ ^(GET)$) {
          return 405;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
        proxy_send_timeout 30;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      # /runtime-config/admin — operator-cookie-gated HTML admin UI.
      # All form posts (entries/{env}/{scope}/{key}/delete, /admin/upsert,
      # /admin/push/{env}, /subscribers/{env}/{name}/delete) live under
      # /runtime-config/* so this single block covers the whole admin
      # surface. The trailing slash on proxy_pass strips the prefix so the
      # upstream sees /admin, /admin/upsert, etc.
      location /runtime-config/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 60;
        proxy_send_timeout 60;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header X-Admin-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-runtime-config.default.svc.cluster.local:8110/;
      }

      location /api/agent-worker/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(POST)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-agent-worker-broker.default.svc.cluster.local:8098;
      }

      location = /container-pools {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST)$) {
          return 405;
        }
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-container-pool.default.svc.cluster.local:8102/pools;
      }

      location /container-pools/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST)$) {
          return 405;
        }
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        rewrite ^/container-pools/?(.*)$ /pools/$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-container-pool.default.svc.cluster.local:8102;
      }

      location /api/agents/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header X-Agent-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      location = /bastion {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /bastion/profile;
      }

      location /bastion/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bastion-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_bastion_upstream dd-bastion.vpn.svc.cluster.local:8111;
        rewrite ^/bastion/?(.*)$ /$1 break;
        proxy_pass http://$dd_bastion_upstream;
      }

      location = /headlamp {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /headlamp/;
      }

      location /headlamp/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://headlamp.headlamp.svc.cluster.local:80;
      }

      location = /telemetry {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /telemetry/;
      }

      location /telemetry/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        # Grafana Live uses a WebSocket at /telemetry/api/live/ws, so the
        # gateway must forward Upgrade/Connection through this location.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /telemetry;
        proxy_pass http://dd-grafana.observability.svc.cluster.local:3000;
      }

      location = /prometheus {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /prometheus/;
      }

      location /prometheus/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /prometheus;
        proxy_pass http://dd-prometheus.observability.svc.cluster.local:9090/;
      }

      location = /nats {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /nats/;
      }

      location /nats/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-nats.messaging.svc.cluster.local:8222/;
      }

      location = /nats-metrics {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /nats-metrics/metrics;
      }

      location /nats-metrics/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-nats.messaging.svc.cluster.local:7777/;
      }

      location = /gleam {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /gleam/home;
      }

      location /gleam/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleamlang-server.default.svc.cluster.local:8081/;
      }

      location /admin/gleam/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-DD-Admin "1";
        proxy_pass http://dd-gleamlang-server.default.svc.cluster.local:8081/;
      }

      # /fsws — dd-fsharp-ws-server (F# + ASP.NET Core, port 8087). Same
      # access posture as /gleam/ and /webrtc/: gateway-authenticated operator
      # demo traffic only. WS upgrade is supported so /fsws/ws/rx and
      # /fsws/ws/async work end-to-end after the browser has a dd_auth cookie.
      location = /fsws {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /fsws/;
      }

      location /fsws/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        # WS endpoints (/ws/rx, /ws/async) need a long idle timeout; keep
        # the same 3600s ceiling /gcs/ws/ uses so a load-test client can
        # hold a session open for the full hold window.
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Trailing slash on proxy_pass strips the /fsws/ prefix, so the
        # upstream sees /, /healthz, /livez, /ws/rx, /ws/async, etc.
        proxy_pass http://dd-fsharp-ws-server.default.svc.cluster.local:8087/;
      }

      # /dart — dd-dart-server (full-stack Dart). Same access posture
      # as /fsws/ and /gleam/: gateway-authenticated operator demo
      # traffic only. dd-dart-server runs three isolate roles exposed
      # on three ports:
      #   * Coordinator (svc port 8088, name `admin`) — main isolate.
      #     Owns /dart/admin/* and the canonical /metrics for the pod;
      #     does NOT do any WS work, so admin/Prometheus traffic stays
      #     responsive even under a saturated WS load.
      #   * Gateway shards (svc port 8089, name `ws`) — N isolates per
      #     pod, each binding 8089 with `shared: true` (SO_REUSEPORT
      #     distribution). Owns the WS upgrade path at /dart/wss and
      #     the WS frame I/O lifecycle for its share of sockets.
      #   * HTTP isolate (svc port 8090, name `http`) — single
      #     dedicated event loop for Jaspr SSR (/dart/pages), Flutter
      #     SPAs (/dart/app, /dart/mobile), and assets. Isolated from
      #     the WS gateway so HTML rendering never blocks on WS pumps.
      # We split the three upstreams here so the public URL space
      # stays the same (everything under /dart/...) but routes to the
      # right isolate role inside the pod.
      location = /dart {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /dart/pages;
      }

      # WebSocket upgrade → gateway-shard pool (port 8089). Long idle
      # timeout matches /fsws/ and /gcs/ws/.
      location = /dart/wss {
