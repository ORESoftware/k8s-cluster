apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-remote-gateway-config
  namespace: default
data:
  default.conf.template: |
    map $http_auth $dd_gateway_header_auth_ok {
      default 0;
      "${DD_REMOTE_GATEWAY_AUTH_VALUE}" 1;
    }

    map $cookie_dd_auth $dd_gateway_cookie_auth_ok {
      default 0;
      "${DD_REMOTE_GATEWAY_AUTH_VALUE}" 1;
    }

    map "$dd_gateway_header_auth_ok:$dd_gateway_cookie_auth_ok" $dd_gateway_auth_ok {
      default 0;
      ~1 1;
    }

    map $dd_gateway_auth_ok $dd_gateway_auth_header {
      default "";
      1 "${DD_REMOTE_GATEWAY_AUTH_VALUE}";
    }

    map $dd_gateway_auth_ok $dd_dev_server_auth_header {
      default "";
      1 "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
    }

    map $http_accept $dd_gateway_accepts_html {
      default 0;
      ~*text/html 1;
    }

    map "$dd_gateway_accepts_html:$http_sec_fetch_dest" $dd_gateway_browser_auth_html {
      default 0;
      ~^1:document$ 1;
      ~^1:iframe$ 1;
      "1:" 1;
    }

    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 80 default_server;
      listen 443 ssl default_server;
      server_name _;

      ssl_certificate /etc/nginx/tls/tls.crt;
      ssl_certificate_key /etc/nginx/tls/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_session_cache shared:SSL:10m;
      ssl_session_timeout 10m;
      add_header Strict-Transport-Security "max-age=3600" always;
      add_header Content-Security-Policy "upgrade-insecure-requests" always;

      client_max_body_size 10m;
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
      error_page 401 = @auth_required;

      location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
      }

      location = /auth {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-auth.default.svc.cluster.local:8083;
      }

      location /auth/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-auth.default.svc.cluster.local:8083;
      }

      location = / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /home {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /agents/tasks {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /agents/threads {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /lambdas/functions {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location /lambdas/invoke/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method != POST) {
          return 405;
        }
        client_max_body_size 5m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 65;
        proxy_send_timeout 65;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleam-lambda-runner.default.svc.cluster.local:8083/invoke/;
      }

      location /api/lambdas/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST|PATCH)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      location /api/agent-worker/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(POST)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-agent-worker-broker.default.svc.cluster.local:8098;
      }

      location = /container-pools {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST)$) {
          return 405;
        }
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-container-pool.default.svc.cluster.local:8102/pools;
      }

      location /container-pools/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST)$) {
          return 405;
        }
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        rewrite ^/container-pools/?(.*)$ /pools/$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-container-pool.default.svc.cluster.local:8102;
      }

      location /api/agents/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header X-Agent-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-remote-rest-api.default.svc.cluster.local:8082;
      }

      location = /bastion {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /bastion/profile;
      }

      location /bastion/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bastion-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_bastion_upstream dd-bastion.vpn.svc.cluster.local:8111;
        rewrite ^/bastion/?(.*)$ /$1 break;
        proxy_pass http://$dd_bastion_upstream;
      }

      location = /telemetry {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /telemetry/;
      }

      location /telemetry/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /telemetry;
        proxy_pass http://dd-grafana.observability.svc.cluster.local:3000;
      }

      location = /prometheus {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /prometheus/;
      }

      location /prometheus/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /prometheus;
        proxy_pass http://dd-prometheus.observability.svc.cluster.local:9090/;
      }

      location = /nats {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /nats/;
      }

      location /nats/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-nats.messaging.svc.cluster.local:8222/;
      }

      location = /nats-metrics {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /nats-metrics/metrics;
      }

      location /nats-metrics/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-nats.messaging.svc.cluster.local:7777/;
      }

      location = /gleam {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /gleam/home;
      }

      location /gleam/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleamlang-server.default.svc.cluster.local:8081/;
      }

      location = /mcp {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /mcp;
        proxy_pass http://dd-gleam-mcp-server.default.svc.cluster.local:8090/mcp;
      }

      location /mcp/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /mcp;
        proxy_pass http://dd-gleam-mcp-server.default.svc.cluster.local:8090/;
      }

      location = /webrtc {
        return 302 /webrtc/;
      }

      location /webrtc/ {
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-webrtc-signaling.default.svc.cluster.local:8095;
      }

      location = /mdp {
        return 302 /mdp/;
      }

      location /mdp/ {
        proxy_http_version 1.1;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-mdp-optimizer.default.svc.cluster.local:8096/;
      }

      location = /des {
        return 302 /des/;
      }

      location /des/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-des-simulator.default.svc.cluster.local:8099/;
      }

      location = /contracts {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /contracts/;
      }

      location /contracts/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-contract-service.default.svc.cluster.local:8101/;
      }

      location = /ml {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /ml/;
      }

      location /ml/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_ml_pipeline_upstream dd-ai-ml-pipeline.ai-ml.svc.cluster.local:8099;
        rewrite ^/ml/?(.*)$ /$1 break;
        proxy_pass http://$dd_ml_pipeline_upstream;
      }

      location = /trading {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /trading/;
      }

      location /trading/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-trading-server.default.svc.cluster.local:8103/;
      }

      location = /scrape {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-web-scraper.default.svc.cluster.local:8097;
      }

      location /scrape/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-web-scraper.default.svc.cluster.local:8097;
      }

      location = /builds {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1800;
        proxy_send_timeout 1800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-build-server.default.svc.cluster.local:8100;
      }

      location /builds/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1800;
        proxy_send_timeout 1800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-build-server.default.svc.cluster.local:8100;
      }

      location = /reaper {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /reaper/;
      }

      location /reaper/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        default_type application/json;
        return 200 '{"service":"dd-idle-reaper","kind":"deployment","namespace":"default","httpService":false,"notes":"Idle reaper runs as a Kubernetes deployment and sweeps thread workers through the control-plane API."}';
      }

      location = /cron {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /cron/;
      }

      location /cron/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        default_type application/json;
        return 200 '{"service":"dd-chron-service","kind":"planned deployment","namespace":"default","httpService":false,"notes":"Cron/at style scheduler should expose an authenticated status and control API when promoted from templates."}';
      }

      location /tasks {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-dev-server-api.default.svc.cluster.local:8080;
      }

      location /status {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-dev-server-api.default.svc.cluster.local:8080;
      }

      location /agents {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-dev-server-api.default.svc.cluster.local:8080;
      }

      location /healthz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-dev-server-api.default.svc.cluster.local:8080;
      }

      location /stream/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-dev-server-api.default.svc.cluster.local:8080;
      }

      location ~ "^/dd-thread/(?<thread_short>[a-z0-9]{12})/ws$" {
        set $dd_thread_service dd-thread-$thread_short.default.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_pass http://$dd_thread_service:8080/ws$is_args$args;
      }

      location ~ "^/dd-thread/(?<thread_short>[a-z0-9]{12})(?<thread_path>/.*)?$" {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        set $dd_thread_service dd-thread-$thread_short.default.svc.cluster.local;
        set $dd_thread_proxy_path $thread_path;
        if ($dd_thread_proxy_path = "") {
          set $dd_thread_proxy_path /;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://$dd_thread_service:8080$dd_thread_proxy_path;
      }

      location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dd-remote-web-home.default.svc.cluster.local:8080;
      }

      location @auth_required {
        if ($dd_gateway_browser_auth_html = 1) {
          return 302 /auth?return=$request_uri;
        }
        default_type application/json;
        return 401 '{"error":"unauthorized","errMessage":"missing required dd header"}';
      }
    }
