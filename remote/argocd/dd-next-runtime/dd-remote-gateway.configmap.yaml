      # /dart — dd-dart-server (full-stack Dart). Same access posture
      # as /fsws/ and /gleam/: gateway-authenticated operator demo
      # traffic only. dd-dart-server runs three isolate roles exposed
      # on three ports:
      #   * Coordinator (svc port 8088, name `admin`) — main isolate.
      #     Owns /dart/admin/* and the canonical /metrics for the pod;
      #     does NOT do any WS work, so admin/Prometheus traffic stays
      #     responsive even under a saturated WS load.
      #   * Gateway shards (svc port 8089, name `ws`) — N isolates per
      #     pod, each binding 8089 with `shared: true` (SO_REUSEPORT
      #     distribution). Owns the WS upgrade path at /dart/wss and
      #     the WS frame I/O lifecycle for its share of sockets.
      #   * HTTP isolate (svc port 8090, name `http`) — single
      #     dedicated event loop for Jaspr SSR (/dart/pages), Flutter
      #     SPAs (/dart/app, /dart/mobile), and assets. Isolated from
      #     the WS gateway so HTML rendering never blocks on WS pumps.
