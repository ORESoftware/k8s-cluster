apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-remote-gateway-config
  namespace: default
data:
  default.conf.template: |
    # The $dd_mcp_bearer_ok map keys on "Bearer <MCP_READONLY_TOKEN>", which is
    # longer than nginx's default 64-byte map hash bucket, so raise it.
    map_hash_bucket_size 128;

    map $http_auth $dd_gateway_header_auth_ok {
      default 0;
      "${DD_REMOTE_GATEWAY_AUTH_VALUE}" 1;
    }

    map $cookie_dd_auth $dd_gateway_cookie_auth_ok {
      default 0;
      "${DD_REMOTE_GATEWAY_AUTH_VALUE}" 1;
    }

    map "$dd_gateway_header_auth_ok:$dd_gateway_cookie_auth_ok" $dd_gateway_auth_ok {
      default 0;
      ~1 1;
    }

    map $dd_gateway_auth_ok $dd_gateway_auth_header {
      default "";
      1 "${DD_REMOTE_GATEWAY_AUTH_VALUE}";
    }

    map $dd_gateway_auth_ok $dd_dev_server_auth_header {
      default "";
      1 "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
    }

    # Dedicated read-only MCP bearer token. Scoped to /mcp and /cluster-mcp
    # only (enforced in those location blocks) so local IDE MCP clients
    # (Cursor, VS Code, Codex) authenticate with a narrow, revocable
    # credential instead of the master operator cookie value. Sourced from the
    # dd-mcp-gateway-token secret (AWS dd/remote-dev/mcp-gateway-token). The
    # secretKeyRef in the gateway Deployment is required, so the token is never
    # empty in a running pod; do not relax it to optional or "Bearer " alone
    # would match an empty token.
    map $http_authorization $dd_mcp_bearer_ok {
      default 0;
      "Bearer ${DD_MCP_READONLY_TOKEN}" 1;
    }

    # MCP endpoints accept EITHER the operator auth (Auth header / dd_auth
    # cookie) OR the dedicated read-only MCP bearer token.
    map "$dd_gateway_auth_ok:$dd_mcp_bearer_ok" $dd_mcp_auth_ok {
      default 0;
      ~1 1;
    }

    map $http_accept $dd_gateway_accepts_html {
      default 0;
      ~*text/html 1;
    }

    map "$dd_gateway_accepts_html:$http_sec_fetch_dest" $dd_gateway_browser_auth_html {
      default 0;
      ~^1:document$ 1;
      ~^1:iframe$ 1;
      "1:" 1;
    }

    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    map $request_method $dd_fabrication_write_limit_key {
      default "";
      POST $binary_remote_addr;
    }

    # Throttle POST /auth (operator PIN + TOTP submission) per client IP. The
    # PIN is the entire trust boundary for the gateway, so the login endpoint
    # must not be brute-forceable at line speed. Keyed only on POST so the GET
    # login form and /auth/status reads are never rate-limited; an empty key
    # makes nginx skip the limit for those.
    map $request_method $dd_auth_write_limit_key {
      default "";
      POST $binary_remote_addr;
    }

    limit_req_zone $dd_fabrication_write_limit_key zone=dd_fabrication_write:10m rate=12r/m;
    limit_req_zone $dd_auth_write_limit_key zone=dd_auth_write:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=dd_music_vote_write:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=dd_sound_recorder_mobile_write:10m rate=120r/m;
    # Read-only MCP endpoints (/mcp, /cluster-mcp): each tools/call fans out to
    # the Kubernetes API (~20 list calls) or 12 observability backends, so a
    # compromised or buggy read-only token could amplify load. Cap external
    # gateway traffic per client IP; in-cluster callers reach the Services
    # directly and are unaffected. 300r/m + burst 60 is far above interactive
    # IDE use but bounds a runaway to ~5 req/s sustained.
    limit_req_zone $binary_remote_addr zone=dd_mcp:10m rate=300r/m;

    # Redacted path-only access logs make gateway guardrails observable without
    # writing Auth headers, cookies, or query strings into Loki.
    log_format dd_gateway_json escape=json '{"schema":"dd.gateway.access.v1","service":"dd-remote-gateway","request_id":"$request_id","method":"$request_method","uri":"$uri","status":$status,"body_bytes_sent":$body_bytes_sent,"request_length":$request_length,"request_time":$request_time,"upstream_status":"$upstream_status","upstream_response_time":"$upstream_response_time","upstream_addr":"$upstream_addr"}';
    access_log /dev/stdout dd_gateway_json;
    error_log /dev/stderr warn;

    server {
      listen 80 default_server;
      server_name _;

      location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
      }

      location / {
        return 308 https://$host$request_uri;
      }
    }

    server {
      listen 443 ssl default_server;
      server_name _;

      ssl_certificate /etc/nginx/tls/tls.crt;
      ssl_certificate_key /etc/nginx/tls/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_session_cache shared:SSL:10m;
      ssl_session_timeout 10m;
      # Strict-Transport-Security: 180 days. Bootstrap cert is self-signed
      # (or a short-lived Let's Encrypt IP cert) so we deliberately stop
      # short of the standard 1y/preload window; revisit when we have a
      # stable trusted cert chain.
      add_header Strict-Transport-Security "max-age=15552000" always;
      add_header Content-Security-Policy "upgrade-insecure-requests" always;
      # Defensive headers: prevent clickjacking, MIME sniffing, and
      # cross-origin Referer leaks. Safe to apply globally; individual
      # locations can override with their own add_header if needed.
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      # Hide nginx version from the Server response header.
      server_tokens off;

      # Keep large generated HTML/JSON artifacts, such as /factmachine-markets,
      # reliable over slower public links without changing upstream services.
      gzip on;
      gzip_vary on;
      gzip_min_length 1024;
      gzip_comp_level 5;
      gzip_proxied any;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml image/svg+xml;

      client_max_body_size 10m;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
      error_page 401 = @auth_required;

      location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
      }

      location = /auth {
        # GET renders the login form; POST submits the PIN + optional TOTP.
        # Nothing else is valid, so reject other methods before they reach the
        # upstream.
        if ($request_method !~ ^(GET|HEAD|POST)$) {
          return 405;
        }
        # Per-IP brute-force throttle on the PIN submission. The empty key for
        # non-POST methods means the GET form is never rate-limited; burst=3
        # absorbs an operator fat-fingering the code a couple times.
        limit_req zone=dd_auth_write burst=3 nodelay;
        limit_req_status 429;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_1 dd-remote-auth.default.svc.cluster.local:8083;
        proxy_pass http://$dd_up_1;
      }

      location = /auth/login {
        return 302 /auth?return=/home;
      }

      location = /auth/logout {
        return 302 /auth?return=/home;
      }

      # Only /auth/status is exposed under /auth/, replacing the previous broad
      # `location /auth/` prefix proxy. That prefix auto-published every current
      # and future route the auth server mounts; this exact-match limits the
      # public surface to the one documented read endpoint (cookie-state probe).
      # GET/HEAD only — it is a metadata read, never a mutation.
      location = /auth/status {
        if ($request_method !~ ^(GET|HEAD)$) {
          return 405;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_2 dd-remote-auth.default.svc.cluster.local:8083;
        proxy_pass http://$dd_up_2;
      }

      location = /jello {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_3 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_3;
      }

      location = /jello/ {
        return 302 /jello;
      }

      location = /jello/sample {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_4 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_4;
      }

      location = /jello/sample/ {
        return 302 /jello/sample$is_args$args;
      }

      location = / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_5 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_5;
      }

      location /home {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_6 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_6;
      }

      # Operator-only HTML pages backed by /api/agents/* (which IS auth-gated
      # below). Without the same auth gate here a fresh visit to
      # /agents/threads would render the HTML, then the agents-threads UI
      # would issue fetch("/api/agents/tasks?limit=200") and the gateway
      # would return the JSON 401 ('missing required dd header') because no
      # dd_auth cookie was ever obtained — visible in the browser console
      # as "snapshot failed 401". Gating the page itself makes the
      # error_page 401 = @auth_required redirect kick in and bounce the
      # browser to /auth?return=/agents/threads, after which the cookie is
      # set and every subsequent /api/agents/* fetch succeeds.
      location /agents/tasks {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_7 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_7;
      }

      location /agents/threads {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_8 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_8;
      }

      location /lambdas/functions {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_9 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_9;
      }

      location /lambdas/invoke/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method != POST) {
          return 405;
        }
        client_max_body_size 5m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 65;
        proxy_send_timeout 65;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleam-lambda-runner.default.svc.cluster.local:8083/invoke/;
      }

      location = /lambdas/check {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method != POST) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 35;
        proxy_send_timeout 35;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-gleam-lambda-runner.default.svc.cluster.local:8083/check;
      }

      location /api/lambdas/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST|PATCH)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_up_10 dd-remote-rest-api.default.svc.cluster.local:8082;
        proxy_pass http://$dd_up_10;
      }

      # /container-pool/config — operator UI for viewing and editing pool image
      # Dockerfiles, with build+test history. Gated by the same operator cookie
      # as /lambdas/functions.
      location /container-pool/config {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_11 dd-remote-web-home.default.svc.cluster.local:8080;
        proxy_pass http://$dd_up_11;
      }

      # /api/container-pool/* — CRUD + build/test API backing the page above.
      # Operator-cookie gated; the rest-api binary trusts the gateway and
      # mirrors the lambdas API auth model.
      location /api/container-pool/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|PUT|POST)$) {
          return 405;
        }
        client_max_body_size 256k;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 1200;
        proxy_send_timeout 1200;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_up_12 dd-remote-rest-api.default.svc.cluster.local:8082;
        proxy_pass http://$dd_up_12;
      }

      # /api/db/ is intentionally NOT proxied to the node-root rest-api.
      # Generic DB CRUD must stay internal-only per the Postgres contract
      # (AGENTS.md): the rest-api serves it under /internal/db (default-disabled
      # via REST_API_INTERNAL_DB_ROUTES_ENABLED) and only in-cluster. Closing it
      # at the gateway keeps DB inspection off the public path and off the
      # privileged / containerd-socket API surface entirely.
      location /api/db/ {
        return 404;
      }

      # /api/runtime-config/snapshot/{stage|prod} — proxied through the rest-api
      # for short-lived consumers (lambdas, container-pool images, cron). Read
      # only; no secret material should ever live in runtime-config entries.
      location /api/runtime-config/ {
        if ($request_method !~ ^(GET)$) {
          return 405;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
        proxy_send_timeout 30;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $dd_up_14 dd-remote-rest-api.default.svc.cluster.local:8082;
        proxy_pass http://$dd_up_14;
      }

      # /runtime-config/admin — operator-cookie-gated HTML admin UI.
      # All form posts (entries/{env}/{scope}/{key}/delete, /admin/upsert,
      # /admin/push/{env}, /subscribers/{env}/{name}/delete) live under
      # /runtime-config/* so this single block covers the whole admin
      # surface. The trailing slash on proxy_pass strips the prefix so the
      # upstream sees /admin, /admin/upsert, etc.
      location /runtime-config/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 60;
        proxy_send_timeout 60;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header X-Admin-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-runtime-config.default.svc.cluster.local:8110/;
      }

      location /api/agent-worker/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(POST)$) {
          return 405;
        }
        client_max_body_size 1m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_up_15 dd-agent-worker-broker.default.svc.cluster.local:8098;
        proxy_pass http://$dd_up_15;
      }

      location = /container-pools {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST)$) {
          return 405;
        }
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_pass http://dd-container-pool.default.svc.cluster.local:8102/pools;
      }

      location /container-pools/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        if ($request_method !~ ^(GET|POST)$) {
          return 405;
        }
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        rewrite ^/container-pools/?(.*)$ /pools/$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_up_16 dd-container-pool.default.svc.cluster.local:8102;
        proxy_pass http://$dd_up_16;
      }

      location /api/agents/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 360;
        proxy_send_timeout 360;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Server-Auth $dd_dev_server_auth_header;
        proxy_set_header X-Agent-Auth $dd_dev_server_auth_header;
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_up_17 dd-remote-rest-api.default.svc.cluster.local:8082;
        proxy_pass http://$dd_up_17;
      }

      location = /bastion {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /bastion/profile;
      }

      location /bastion/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 30;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bastion-Auth "${DD_REMOTE_DEV_SERVER_AUTH_VALUE}";
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_bastion_upstream dd-bastion.vpn.svc.cluster.local:8111;
        rewrite ^/bastion/?(.*)$ /$1 break;
        proxy_pass http://$dd_bastion_upstream;
      }

      location = /headlamp {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /headlamp/;
      }

      location /headlamp/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        set $dd_up_18 headlamp.headlamp.svc.cluster.local:80;
        proxy_pass http://$dd_up_18;
      }

      location = /telemetry {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        return 302 /telemetry/;
      }

      location /telemetry/ {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
        proxy_http_version 1.1;
        # Grafana Live uses a WebSocket at /telemetry/api/live/ws, so the
        # gateway must forward Upgrade/Connection through this location.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Auth $dd_gateway_auth_header;
        proxy_set_header X-Forwarded-Prefix /telemetry;
        set $dd_up_19 dd-grafana.observability.svc.cluster.local:3000;
        proxy_pass http://$dd_up_19;
      }

      location ~ "^/grafana/depl/(?<dd_grafana_deployment>[A-Za-z0-9][A-Za-z0-9._-]{0,126})/?$" {
        if ($dd_gateway_auth_ok = 0) {
          return 401;
        }
