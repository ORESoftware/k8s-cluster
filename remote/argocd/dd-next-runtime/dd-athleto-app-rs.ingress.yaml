# Dedicated public hosts for the Athlet-O shop app (submodule
# remote/deployments/athleto-app-rs). Unlike the shared gateway Ingress
# (gateway-edge), this routes app.athleto.store (B2C storefront) and
# biz.athleto.store (B2B portal; the app switches chrome on the Host header)
# straight to the jello-ws ClusterIP Service alias for the existing
# dd-athleto-app-rs pods. The app serves plain HTTP on 8145, so no
# backend-protocol annotation. DNS lives in Cloudflare (athleto.store zone);
# keep the records DNS-only until the cert-manager certificate is issued.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dd-athleto-app-rs
  namespace: default
  labels:
    app: dd-athleto-app-rs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.athleto.store
      secretName: athleto-public-tls
    - hosts:
        - biz.athleto.store
      secretName: athleto-biz-tls
  rules:
    - host: app.athleto.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jello-ws
                port:
                  number: 8145
    - host: biz.athleto.store
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jello-ws
                port:
                  number: 8145
