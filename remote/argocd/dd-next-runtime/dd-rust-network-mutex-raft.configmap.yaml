apiVersion: v1
kind: ConfigMap
metadata:
  name: dd-rust-network-mutex-raft-config
  namespace: default
  labels:
    app: dd-rust-network-mutex-raft
data:
  lmx-raft.toml: |
    [server]
    bind_host = "0.0.0.0"
    tcp_port = 6970
    http_port = 6971
    disable_tcp = true
    disable_http = false
    tcp_nodelay = true
    tcp_quickack = true

    [broker]
    default_ttl_ms = 4000
    max_lock_holders = 1
    max_concurrency_cap = 1000
    ttl_sweep_interval_ms = 10
    idle_key_grace_ms = 60000

    [raft]
    enabled = true
    node_id = "dd-rust-network-mutex-raft-0"
    bind_addr = "0.0.0.0:7980"
    advertise_addr = "dd-rust-network-mutex-raft-0.dd-rust-network-mutex-raft-peer.default.svc.cluster.local:7980"
    data_dir = "/var/lib/dd-rust-network-mutex/raft"
    heartbeat_interval_ms = 100
    election_timeout_min_ms = 800
    election_timeout_max_ms = 1600
    snapshot_interval_ms = 1800000
    snapshot_max_log_entries = 100000
    snapshot_max_log_bytes = 67108864
    trailing_log_entries = 10000

    [[raft.peers]]
    id = "dd-rust-network-mutex-raft-0"
    addr = "dd-rust-network-mutex-raft-0.dd-rust-network-mutex-raft-peer.default.svc.cluster.local:7980"

    [[raft.peers]]
    id = "dd-rust-network-mutex-raft-1"
    addr = "dd-rust-network-mutex-raft-1.dd-rust-network-mutex-raft-peer.default.svc.cluster.local:7980"

    [[raft.peers]]
    id = "dd-rust-network-mutex-raft-2"
    addr = "dd-rust-network-mutex-raft-2.dd-rust-network-mutex-raft-peer.default.svc.cluster.local:7980"

    [[raft.peers]]
    id = "dd-rust-network-mutex-raft-3"
    addr = "dd-rust-network-mutex-raft-3.dd-rust-network-mutex-raft-peer.default.svc.cluster.local:7980"

    [[raft.peers]]
    id = "dd-rust-network-mutex-raft-4"
    addr = "dd-rust-network-mutex-raft-4.dd-rust-network-mutex-raft-peer.default.svc.cluster.local:7980"
