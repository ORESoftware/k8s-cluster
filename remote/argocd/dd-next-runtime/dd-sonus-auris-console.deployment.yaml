apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-sonus-auris-console
  namespace: default
  labels:
    app: dd-sonus-auris-console
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1200
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-sonus-auris-console
  template:
    metadata:
      annotations:
        dd.dev/sonus-auris-console-revision: '11b43907da9cfac0da6674cbcbf6bf2d41f5599b'
      labels:
        app: dd-sonus-auris-console
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: build-sonus-auris-console
          image: 710156900967.dkr.ecr.us-east-1.amazonaws.com/sonus-flutter-builder:3.44.2-c9a6c48423
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              source_dir=/work/source
              github_basic="$(printf 'x-access-token:%s' "$GH_PAT" | base64 | tr -d '\n')"
              github_extraheader="AUTHORIZATION: basic ${github_basic}"
              git -c "http.https://github.com/.extraheader=${github_extraheader}" \
                clone --filter=blob:none --no-checkout "$SONUS_AURIS_CONSOLE_GIT_URL" "$source_dir"
              git -C "$source_dir" -c "http.https://github.com/.extraheader=${github_extraheader}" \
                fetch --depth 1 origin "$SONUS_AURIS_CONSOLE_GIT_REF"
              git -C "$source_dir" switch --detach FETCH_HEAD
              echo "[dd-sonus-auris-console] source: ${SONUS_AURIS_CONSOLE_GIT_REF} ($(git -C "$source_dir" rev-parse --short HEAD))"

              cd "$source_dir"
              flutter pub get
              flutter build web --release \
                --base-href /sonus-console/ \
                --dart-define="SONUS_SUPABASE_URL=${SONUS_SUPABASE_URL}" \
                --dart-define="SONUS_SUPABASE_ANON_KEY=${SONUS_SUPABASE_ANON_KEY}"
              cp -R build/web/. /console-dist/
          env:
            - name: SONUS_AURIS_CONSOLE_GIT_URL
              value: https://github.com/sonus-auris/sonus-auris-web-desktop.dart.git
            - name: SONUS_AURIS_CONSOLE_GIT_REF
              value: 11b43907da9cfac0da6674cbcbf6bf2d41f5599b
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: GH_PAT
            - name: SONUS_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_URL
            - name: SONUS_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_PUBLISHABLE_KEY
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: '4'
              memory: 8Gi
          volumeMounts:
            - name: build-work
              mountPath: /work
            - name: console-dist
              mountPath: /console-dist
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: console-dist
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: build-work
          emptyDir: {}
        - name: console-dist
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: dd-sonus-auris-console-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
