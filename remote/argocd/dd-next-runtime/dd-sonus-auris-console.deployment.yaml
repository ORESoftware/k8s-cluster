apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-sonus-auris-console
  namespace: default
  labels:
    app: dd-sonus-auris-console
spec:
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 1200
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-sonus-auris-console
  template:
    metadata:
      annotations:
        dd.dev/sonus-auris-monorepo-revision: 'c0bcf006037938cc09d92d04a454bff5cb99d9fa'
        dd.dev/sonus-auris-console-revision: '6ca595c6918b1524366228a3d7a42e26b9c9b4fd'
      labels:
        app: dd-sonus-auris-console
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: build-sonus-auris-console
          image: 710156900967.dkr.ecr.us-east-1.amazonaws.com/sonus-flutter-builder:3.44.2-c9a6c48423
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              expected_flutter_revision=c9a6c484230f8b5e408ec57be1ef71dee1e77020
              expected_flutter_version=3.44.2
              actual_flutter_revision="$(git -C /opt/flutter rev-parse HEAD)"
              if [ "$actual_flutter_revision" != "$expected_flutter_revision" ]; then
                echo "[dd-sonus-auris-console] refusing Flutter revision ${actual_flutter_revision}; expected ${expected_flutter_revision}" >&2
                exit 1
              fi
              git -C /opt/flutter tag --force "$expected_flutter_version" "$expected_flutter_revision"
              if [ -f /opt/flutter/bin/cache/flutter.version.json ]; then
                mv /opt/flutter/bin/cache/flutter.version.json /tmp/flutter.version.pre-tag.json
              fi
              if ! flutter --version --machine | grep -Eq '"frameworkVersion"[[:space:]]*:[[:space:]]*"3\.44\.2"'; then
                echo "[dd-sonus-auris-console] Flutter did not resolve to ${expected_flutter_version}" >&2
                exit 1
              fi

              source_dir=/work/source
              monorepo_mount=/host-dd-next/remote/deployments/sonus-auris-monorepo
              source_mount=${monorepo_mount}/apps/sonus-auris-web-desktop.dart
              actual_monorepo_revision="$(git -c safe.directory="$monorepo_mount" -C "$monorepo_mount" rev-parse HEAD)"
              if [ "$actual_monorepo_revision" != "$SONUS_AURIS_MONOREPO_GIT_REF" ]; then
                echo "[dd-sonus-auris-console] refusing monorepo revision ${actual_monorepo_revision}; expected ${SONUS_AURIS_MONOREPO_GIT_REF}" >&2
                exit 1
              fi
              actual_revision="$(git -c safe.directory="$source_mount" -C "$source_mount" rev-parse HEAD)"
              if [ "$actual_revision" != "$SONUS_AURIS_CONSOLE_GIT_REF" ]; then
                echo "[dd-sonus-auris-console] refusing source revision ${actual_revision}; expected ${SONUS_AURIS_CONSOLE_GIT_REF}" >&2
                exit 1
              fi
              mkdir -p "$source_dir"
              tar --exclude=.git -C "$source_mount" -cf - . | tar --no-same-owner -xf - -C "$source_dir"
              echo "[dd-sonus-auris-console] monorepo: ${actual_monorepo_revision}"
              echo "[dd-sonus-auris-console] source: ${actual_revision}"

              cd "$source_dir"
              flutter pub get
              flutter build web --release \
                --base-href /sonus-console/ \
                --dart-define="SONUS_SUPABASE_URL=${SONUS_SUPABASE_URL}" \
                --dart-define="SONUS_SUPABASE_ANON_KEY=${SONUS_SUPABASE_ANON_KEY}"
              cp -R build/web/. /console-dist/
          env:
            - name: SONUS_AURIS_MONOREPO_GIT_REF
              value: c0bcf006037938cc09d92d04a454bff5cb99d9fa
            - name: SONUS_AURIS_CONSOLE_GIT_REF
              value: 6ca595c6918b1524366228a3d7a42e26b9c9b4fd
            - name: SONUS_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_URL
            - name: SONUS_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SOUND_RECORDER_SUPABASE_PUBLISHABLE_KEY
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: '4'
              memory: 8Gi
          volumeMounts:
            - name: monorepo-source
              mountPath: /host-dd-next
              readOnly: true
            - name: build-work
              mountPath: /work
            - name: console-dist
              mountPath: /console-dist
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: console-dist
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: monorepo-source
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-work
          emptyDir: {}
        - name: console-dist
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: dd-sonus-auris-console-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
