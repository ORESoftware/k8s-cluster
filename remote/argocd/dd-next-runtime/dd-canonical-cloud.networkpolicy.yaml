apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-canonical-cloud
  namespace: default
  labels:
    app: dd-canonical-cloud
spec:
  podSelector:
    matchLabels:
      app: dd-canonical-cloud
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the edge gateway reaches the site; observability may scrape it.
    - from:
        - podSelector:
            matchLabels:
              app: dd-remote-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - dd-prometheus
                  - dd-otel-collector
      ports:
        - protocol: TCP
          port: 8119
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Explicit OTLP/gRPC export to the in-cluster collector. The public egress
    # rules below intentionally exclude cluster-private address ranges.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app: dd-otel-collector
      ports:
        - protocol: TCP
          port: 4317
    # Public egress for the in-pod build, Supabase Auth HTTPS, and the direct or
    # session-pooled PostgreSQL connection required by LISTEN/NOTIFY. Private
    # ranges remain excluded.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.168.0.0/16
              - 192.0.2.0/24
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: ::/0
            except:
              - ::/128
              - ::1/128
              - 64:ff9b:1::/48
              - 100::/64
              - 2001:2::/48
              - 2001:db8::/32
              - fc00::/7
              - fe80::/10
              - ff00::/8
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
