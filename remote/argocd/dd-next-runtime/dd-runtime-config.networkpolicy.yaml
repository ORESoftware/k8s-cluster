apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-runtime-config
  namespace: default
  labels:
    app: dd-runtime-config
spec:
  podSelector:
    matchLabels:
      app: dd-runtime-config
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # Runtime-config clients currently share the default namespace. This
        # blocks cross-namespace callers while preserving registration, pulls,
        # the gateway admin surface, and callback pushes.
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8110
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        # Subscriber callbacks and Redis are intentionally confined to the
        # service namespace. This is a second SSRF boundary in addition to the
        # applyUrl validator in runtime-config-rs.
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
