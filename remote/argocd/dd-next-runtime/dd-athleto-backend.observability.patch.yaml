apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-athleto-backend
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: athleto-backend
          env:
            - name: RUST_LOG
              value: info,athleto_backend=info,sea_orm=warn,hyper=warn
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dd-otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=remote-dev
            - name: DEPLOYMENT_ENV
              value: remote-dev
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: ATHLETO_DATABASE_URL
                  optional: true
