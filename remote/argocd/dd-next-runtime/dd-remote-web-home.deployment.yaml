apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-remote-web-home
  namespace: default
  labels:
    app: dd-remote-web-home
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-remote-web-home
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: "2026-05-15-direct-rest-api-fetch"
      labels:
        app: dd-remote-web-home
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: remote-web-home
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/web-home-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
