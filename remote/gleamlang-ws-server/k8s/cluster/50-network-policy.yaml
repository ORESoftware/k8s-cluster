# NetworkPolicy that:
#  - allows pod-to-pod EPMD (4369) and Erlang distribution (9100) inside
#    the namespace so the BEAM cluster can mesh
#  - allows WebSocket traffic from any pod / ingress in the cluster
#  - blocks everything else

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: presence-cluster-traffic
  namespace: presence
spec:
  podSelector:
    matchLabels:
      app: presence
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: presence
      ports:
        - port: 4369
          protocol: TCP
        - port: 9100
          protocol: TCP
    - ports:
        - port: 8081
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: presence
      ports:
        - port: 4369
          protocol: TCP
        - port: 9100
          protocol: TCP
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
