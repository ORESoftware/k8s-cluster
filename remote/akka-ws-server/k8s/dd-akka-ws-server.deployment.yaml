apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-akka-ws-server
  namespace: default
  labels:
    app: dd-akka-ws-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-akka-ws-server
  template:
    metadata:
      labels:
        app: dd-akka-ws-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: akka-ws-server
          image: docker.io/library/maven:3.9.9-eclipse-temurin-21
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/akka-ws-server
              if [ ! -f target/dd-akka-ws-server.jar ]; then
                echo "Building dd-akka-ws-server with Maven..."
                mvn -B -e -DskipTests package
              fi
              exec java $JAVA_OPTS -jar target/dd-akka-ws-server.jar
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8086'
            - name: JAVA_OPTS
              value: -XX:+UseG1GC -XX:MaxRAMPercentage=70 -Dfile.encoding=UTF-8
            # Capped at 30 because async.java's `synchronized` accessors pin virtual threads
            # on JDK 21 — 23 (fixed by JEP 491 in JDK 24); higher counts trip a TimeoutException
            # around iteration 40-130. Bump once we either move to JDK 24+ or switch
            # async.java's ShortCircuit to AtomicBoolean. See readme.md "JDK 21
            # synchronized-pinning" finding.
            - name: BENCHMARK_ITERATIONS
              value: '30'
            - name: BENCHMARK_PAYLOAD
              value: '{"id":"bench","payload":"a benchmark message body"}'
          ports:
            - name: http
              containerPort: 8086
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
