apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleam-lambda-runner
  namespace: default
  labels:
    app: dd-gleam-lambda-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-gleam-lambda-runner
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-16-lambda-runner'
      labels:
        app: dd-gleam-lambda-runner
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gleam-lambda-runner
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              apk add --no-cache \
                --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community \
                nodejs-current \
                postgresql-client >/tmp/dd-lambda-runner-apk.log 2>&1 || true
              cd /opt/dd-next-1/remote/gleam-lambda-runner
              gleam deps download
              exec gleam run
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8083'
            - name: LAMBDA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleam-lambda-runner-secrets
                  key: LAMBDA_DATABASE_URL
                  optional: true
            - name: LAMBDA_FUNCTION_CACHE_MAX
              value: '128'
            - name: LAMBDA_FUNCTION_BODY_MAX_BYTES
              value: '262144'
            - name: LAMBDA_CHILD_INPUT_MAX_BYTES
              value: '6291456'
            - name: LAMBDA_RESULT_MAX_BYTES
              value: '1048576'
          envFrom:
            - secretRef:
                name: dd-gleam-lambda-runner-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 2Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
