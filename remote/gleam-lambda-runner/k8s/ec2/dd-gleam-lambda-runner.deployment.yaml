apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleam-lambda-runner
  namespace: default
  labels:
    app: dd-gleam-lambda-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-gleam-lambda-runner
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-16-lambda-runner'
      labels:
        app: dd-gleam-lambda-runner
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gleam-lambda-runner
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              if ! apk add --no-cache \
                --repository=https://dl-cdn.alpinelinux.org/alpine/edge/main \
                --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community \
                nodejs-current \
                python3 \
                ruby \
                bash \
                gcompat \
                libc6-compat \
                postgresql-client >/tmp/dd-lambda-runner-apk.log 2>&1; then
                cat /tmp/dd-lambda-runner-apk.log
                exit 1
              fi
              cd /opt/dd-next-1/remote/gleam-lambda-runner
              gleam deps download
              exec gleam run
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8083'
            - name: LAMBDA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleam-lambda-runner-secrets
                  key: LAMBDA_DATABASE_URL
                  optional: true
            - name: LAMBDA_FUNCTION_CACHE_MAX
              value: '128'
            - name: LAMBDA_FUNCTION_BODY_MAX_BYTES
              value: '262144'
            - name: LAMBDA_CHILD_INPUT_MAX_BYTES
              value: '6291456'
            - name: LAMBDA_RESULT_MAX_BYTES
              value: '1048576'
            - name: LAMBDA_ALLOW_HOST_RUNTIMES
              value: nodejs
            - name: LAMBDA_PREWARM_RUNTIMES
              value: nodejs
            - name: LAMBDA_PREWARM_CONTAINER_RUNTIMES
              value: nodejs,python3,ruby,bash
            - name: LAMBDA_CONTAINER_NERDCTL
              value: /usr/local/bin/nerdctl
            - name: LAMBDA_CONTAINER_NAMESPACE
              value: k8s.io
            - name: LAMBDA_CONTAINER_NETWORK
              value: host
            - name: LAMBDA_CONTAINER_RUNNER
              value: ctr
            - name: LAMBDA_CONTAINER_CTR
              value: /usr/local/bin/ctr
            - name: LAMBDA_CONTAINER_MEMORY_BYTES
              value: '268435456'
            - name: LAMBDA_NODEJS_CONTAINER_IMAGE
              value: docker.io/library/dd-lambda-nodejs-runtime:dev
            - name: LAMBDA_PYTHON3_CONTAINER_IMAGE
              value: docker.io/library/dd-lambda-python3-runtime:dev
            - name: LAMBDA_RUBY_CONTAINER_IMAGE
              value: docker.io/library/dd-lambda-ruby-runtime:dev
            - name: LAMBDA_BASH_CONTAINER_IMAGE
              value: docker.io/library/dd-lambda-bash-runtime:dev
          envFrom:
            - secretRef:
                name: dd-gleam-lambda-runner-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 2Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: containerd-run
              mountPath: /run/containerd
              mountPropagation: Bidirectional
            - name: containerd-root
              mountPath: /var/lib/containerd
              mountPropagation: Bidirectional
            - name: nerdctl-bin
              mountPath: /usr/local/bin/nerdctl
              readOnly: true
            - name: ctr-bin
              mountPath: /usr/local/bin/ctr
              readOnly: true
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: containerd-run
          hostPath:
            path: /run/containerd
            type: Directory
        - name: containerd-root
          hostPath:
            path: /var/lib/containerd
            type: Directory
        - name: nerdctl-bin
          hostPath:
            path: /usr/local/bin/nerdctl
            type: File
        - name: ctr-bin
          hostPath:
            path: /usr/local/bin/ctr
            type: File
