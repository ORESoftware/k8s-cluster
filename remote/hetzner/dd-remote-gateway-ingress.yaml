apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dd-remote-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hello.95-217-171-250.sslip.io
        - app.fiducia.cloud
        - api.fiducia.cloud
        - admin.fiducia.cloud
      secretName: gateway-public-tls
  rules:
    - host: hello.95-217-171-250.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dd-remote-gateway
                port:
                  number: 443
    - host: app.fiducia.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dd-remote-gateway
                port:
                  number: 443
    - host: api.fiducia.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dd-remote-gateway
                port:
                  number: 443
    - host: admin.fiducia.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dd-remote-gateway
                port:
                  number: 443
