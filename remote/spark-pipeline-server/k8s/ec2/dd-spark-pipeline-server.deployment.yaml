apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-spark-pipeline-server
  namespace: default
  labels:
    app: dd-spark-pipeline-server
spec:
  replicas: 1
  # Zero-surge rollout: don't start a new pod until the old one is fully gone. The single-node
  # cluster doesn't have headroom to run two replicas during a deploy. Same shape as the
  # gcs-router fix in commit 98f9ada.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-spark-pipeline-server
  template:
    metadata:
      labels:
        app: dd-spark-pipeline-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: spark-pipeline-server
          image: docker.io/library/maven:3.9.9-eclipse-temurin-17
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          # `set -o pipefail` is bash-only. The maven base image ships dash as /bin/sh, which
          # rejects it (see commit b7b3c1b for the same fix on fsharp-ws-server).
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/spark-pipeline-server
              if [ ! -f target/dd-spark-pipeline-server.jar ]; then
                echo "Building dd-spark-pipeline-server with Maven..."
                mvn -B -e -DskipTests package
              fi
              exec java $JAVA_OPTS -jar target/dd-spark-pipeline-server.jar
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8085'
            - name: PIPELINE_MAX_CONCURRENT
              value: '4'
            - name: JAVA_OPTS
              value: -XX:+UseG1GC -XX:MaxRAMPercentage=70 -Dfile.encoding=UTF-8
            # Optional Postgres connection (consumed by PgDb via HikariCP + jOOQ for the
            # generated pg-defs Tables). If the secret is absent the service still boots and
            # serves /healthz, /readyz, /metrics, /v1/jobs; only /v1/repos and the
            # SPARK_SUBMIT repoId precheck require Postgres and degrade to 503 /
            # "repo_unresolved" without it.
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-spark-pipeline-server-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: PG_POOL_SIZE
              value: '8'
          ports:
            - name: http
              containerPort: 8085
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              # Single-node cluster is request-pressured. This pod is mostly idle awaiting HTTP
              # requests; trim baseline to 50m so it actually schedules. Burst budget (limits)
              # stays at 2 CPUs.
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
