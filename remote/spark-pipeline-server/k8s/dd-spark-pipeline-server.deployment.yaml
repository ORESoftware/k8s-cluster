apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-spark-pipeline-server
  namespace: default
  labels:
    app: dd-spark-pipeline-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-spark-pipeline-server
  template:
    metadata:
      labels:
        app: dd-spark-pipeline-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: spark-pipeline-server
          image: docker.io/library/maven:3.9.9-eclipse-temurin-17
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/spark-pipeline-server
              if [ ! -f target/dd-spark-pipeline-server.jar ]; then
                echo "Building dd-spark-pipeline-server with Maven..."
                mvn -B -e -DskipTests package
              fi
              exec java $JAVA_OPTS -jar target/dd-spark-pipeline-server.jar
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8085'
            - name: PIPELINE_MAX_CONCURRENT
              value: '4'
            - name: JAVA_OPTS
              value: -XX:+UseG1GC -XX:MaxRAMPercentage=70 -Dfile.encoding=UTF-8
          ports:
            - name: http
              containerPort: 8085
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
