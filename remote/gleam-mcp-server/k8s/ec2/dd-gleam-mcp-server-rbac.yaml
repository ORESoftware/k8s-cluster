apiVersion: v1
kind: ServiceAccount
metadata:
  name: dd-gleam-mcp-server
  namespace: default
  labels:
    app: dd-gleam-mcp-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dd-gleam-mcp-server-read-deployments
  labels:
    app: dd-gleam-mcp-server
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dd-gleam-mcp-server-read-deployments
  labels:
    app: dd-gleam-mcp-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dd-gleam-mcp-server-read-deployments
subjects:
  - kind: ServiceAccount
    name: dd-gleam-mcp-server
    namespace: default
