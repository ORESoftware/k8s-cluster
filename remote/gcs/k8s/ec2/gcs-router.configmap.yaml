# gcs-router: WebSocket-aware smart proxy that sits between
# dd-remote-gateway and the gcs pods.
#
# Why a dedicated layer:
#
#   chat.vibe already does in-pod fan-out for any convId / userId where
#   multiple WS connections land on the same pod (see
#   src/ws/service.go::writeToConvTopic / writeToUserTopic, plus the
#   per-pod brokerFanout in src/ws/broker_fanout.go that landed in
#   PR #4). The win is that messages between co-located clients never
#   hit RabbitMQ/Kafka — they go in-memory through hub.Broadcaster.
#
#   That optimization is wasted if two clients for the SAME conv land
#   on DIFFERENT pods, because then every message has to make the
#   broker round-trip anyway. This router is the piece that pins WS
#   connections for the same conv to the same pod.
#
# Routing rules (paths are post-gateway-rewrite — dd-remote-gateway
# strips `/gcs/ws/` before forwarding here, so what we see is `/conv/X`
# not `/gcs/ws/conv/X`):
#
#   /conv/<convId>[/...]   -> upstream gcs_conv      (consistent hash)
#       hash $request_uri consistent. Because the URI is "/conv/<convId>"
#       and the convId is the only variable part, two clients hitting
#       /conv/abc and /conv/abc/foo both hash to the same pod. This is
#       the pinning that enables the in-pod fan-out optimization.
#
#   everything else        -> upstream gcs_balanced  (least_conn)
#       least_conn picks the upstream peer with the fewest active
#       connections. For long-lived WS, active-connection count is the
#       best cheap proxy for "load". Use this for user-topic
#       (/user/<userId>), device-queue (/device/<deviceId>), and any
#       unstructured catch-all.
#
# Why not just pin everything by some key:
#
#   user-topic and device-queue WS connections are 1 per device (a user
#   has few of them). They don't share fan-out opportunities with other
#   users' connections, so there's no co-location win to chase. Spreading
#   them by load is the right call.
#
# Upstream peer list — IMPORTANT scaling note:
#
#   Phase 1 (today, 1 gcs pod):
#     `server gcs-headless.default.svc.cluster.local:3001` — at startup
#     OSS NGINX resolves the headless Service DNS once and gets 1 A
#     record. Hash is a no-op (1 peer); least_conn is a no-op (1 peer).
#     Everything correctly routes to the only pod.
#
#   Phase 2 (>=2 pods, no NGINX changes):
#     The headless Service returns N A records. If you do
#     `kubectl rollout restart deployment/gcs-router` after scaling, OSS
#     NGINX picks up the new peer list. Consistent hash now actually
#     pins; least_conn now actually balances.
#
#   Phase 3 (frequent autoscale or zero-downtime peer updates):
#     OSS NGINX only resolves upstream DNS at startup (the `resolve`
#     keyword on server directives is NGINX Plus only). Either:
#       (a) run a 60s reload sidecar (cheap, non-disruptive to in-flight
#           WS — `nginx -s reload` finishes old workers gracefully), or
#       (b) switch this image to openresty + lua-resty-balancer for
#           true dynamic peer updates with balancer_by_lua_block, or
#       (c) move to Envoy/Istio with EDS — see readme.md.
#
# Long-lived WS during rolling restarts:
#
#   Pod-set changes reshuffle ~1/N of the hash ring. Existing WS stay
#   pinned to their current pod (proxy can't re-route an upgraded WS).
#   New WS hash against the new ring. Optionally, the gcs server can
#   send a 1012 Service Restart close so clients reconnect through the
#   updated ring — that's a follow-up in the chat.vibe repo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcs-router-config
  namespace: default
  labels:
    app: gcs-router
data:
  nginx.conf: |
    worker_processes auto;
    worker_rlimit_nofile 65535;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 16384;
      multi_accept on;
    }

    http {
      log_format gcsrouter '$remote_addr -> $upstream_addr '
                           '[$time_iso8601] "$request" $status '
                           'pool=$gcs_pool key="$request_uri" '
                           'rt=$request_time ut=$upstream_response_time';
      access_log /dev/stdout gcsrouter;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;

      # WS upgrade plumbing.
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      # Shared proxy settings for both pools.
      proxy_http_version 1.1;
      proxy_buffering    off;
      proxy_request_buffering off;
      # gcs WS connections are long-lived (chat sessions). 1h covers a
      # browser tab left open through a lunch break; client-side ping
      # keeps it alive longer.
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
      # Don't time out the upstream connect; gcs is on-cluster.
      proxy_connect_timeout 5s;

      # ---- Upstream pools ------------------------------------------
      # See header comment re: scaling. Both pools point at the same
      # headless Service; the difference is the LB algorithm.

      upstream gcs_conv {
        hash $request_uri consistent;
        # `max_fails=0` disables passive health checks on the upstream.
        # NGINX would otherwise mark a peer "unavailable" after N failed
        # connects within fail_timeout. For WS that's overly aggressive
        # (one slow upgrade ≠ peer down). Liveness is gcs's own probe.
        server gcs-headless.default.svc.cluster.local:3001 max_fails=0;
        keepalive 64;
      }

      upstream gcs_balanced {
        least_conn;
        server gcs-headless.default.svc.cluster.local:3001 max_fails=0;
        keepalive 64;
      }

      server {
        listen 3001 default_server;
        server_name _;

        # Debuggability: echo the pool used in a response header so
        # client-side logs / browser devtools can see the routing
        # decision per WS upgrade.
        set $gcs_pool "unknown";
        add_header X-Gcs-Pool $gcs_pool always;

        # k8s probe endpoint. Cheap, no upstream call.
        location = /healthz {
          access_log off;
          default_type text/plain;
          return 200 "ok\n";
        }

        # Path-based conv pinning. Regex matches /conv/<id> or
        # /conv/<id>/anything-else. The hash key is $request_uri so
        # path variations under the same convId still route together.
        location ~ ^/conv/[^/]+ {
          set $gcs_pool "conv-hash";
          proxy_pass http://gcs_conv;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;
          proxy_set_header X-Gcs-Routing     conv-hash;
        }

        # Catch-all: user-topic, device-queue, anything that isn't
        # conv-pinned. least_conn distributes by active TCP upstream
        # connection count, which for WS is "open WS count" — the
        # natural load metric for this server.
        location / {
          set $gcs_pool "least-conn";
          proxy_pass http://gcs_balanced;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;
          proxy_set_header X-Gcs-Routing     least-conn;
        }
      }
    }
