apiVersion: v1
kind: Service
metadata:
  name: gcs-rabbitmq
  namespace: default
  labels:
    app: gcs-rabbitmq
spec:
  type: ClusterIP
  selector:
    app: gcs-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
