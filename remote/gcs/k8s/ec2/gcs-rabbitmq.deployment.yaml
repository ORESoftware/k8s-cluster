apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcs-rabbitmq
  namespace: default
  labels:
    app: gcs-rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gcs-rabbitmq
  template:
    metadata:
      labels:
        app: gcs-rabbitmq
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: init-rabbitmq-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 999:999 /var/lib/rabbitmq
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: gcs
            - name: RABBITMQ_DEFAULT_PASS
              value: gcs
            - name: RABBITMQ_ERLANG_COOKIE
              value: gcs-cookie
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - check_running
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: data
          hostPath:
            path: /var/lib/dd/gcs/rabbitmq
            type: DirectoryOrCreate
