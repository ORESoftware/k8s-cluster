apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-fsharp-ws-server
  namespace: default
  labels:
    app: dd-fsharp-ws-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-fsharp-ws-server
  template:
    metadata:
      labels:
        app: dd-fsharp-ws-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: fsharp-ws-server
          # Same pattern as dd-akka-ws-server / dd-spark-pipeline-server: mount
          # the repo as a hostPath and build inside the container so the running
          # image always reflects the dev branch tip without an external CI step.
          image: mcr.microsoft.com/dotnet/sdk:10.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            # bash explicitly: the dotnet/sdk:10.0 image is Debian-based and
            # ships dash as `/bin/sh`, which doesn't support `set -o pipefail`.
            # akka-ws-server happens to work with /bin/sh only because the
            # eclipse-temurin base symlinks /bin/sh -> bash.
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/fsharp-ws-server
              # Publish into a node-local writable workdir so concurrent pods
              # (and re-deploys) don't trip over each other writing into the
              # read-only repo mount.
              OUT=/tmp/dd-fsharp-ws-server
              if [ ! -f "$OUT/dd-fsharp-ws-server.dll" ]; then
                echo "Publishing dd-fsharp-ws-server with dotnet..."
                dotnet publish DdFsharpWsServer.fsproj \
                    -c Release \
                    -o "$OUT" \
                    /p:UseAppHost=false
              fi
              exec dotnet "$OUT/dd-fsharp-ws-server.dll"
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8087'
            - name: BENCHMARK_ITERATIONS
              value: '200'
            - name: BENCHMARK_PAYLOAD
              value: '{"id":"bench","payload":"a benchmark message body"}'
            # Server GC + tiered PGO is the standard .NET 10 profile for ASP.NET
            # Core services; matches the akka-ws-server's G1 + JIT settings.
            - name: DOTNET_gcServer
              value: '1'
            - name: DOTNET_TieredPGO
              value: '1'
            - name: DOTNET_EnableDiagnostics
              value: '0'
            # NuGet packages live on the hostPath repo by default; redirect to a
            # node-local cache so the readonly mount stays clean.
            - name: NUGET_PACKAGES
              value: /tmp/nuget-packages
            - name: DOTNET_CLI_HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 8087
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
