name = "dd_runtime_config_client"
version = "0.1.0"
target = "erlang"
description = "Shared receiver for dd-runtime-config push messages. Drop into any Gleam deployment that wants to receive /internal/update-runtime-config payloads."

[dependencies]
gleam_stdlib = ">= 0.68.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
mist = ">= 6.0.0 and < 7.0.0"
