[package]
name = "dd-wal-consumer"
version = "0.1.0"
edition = "2021"

# Shared client for the WAL gateway's NATS JetStream CDC stream.
#
# Services consume row-change events without touching Postgres on the read
# path. The gateway (`dd-wal-gateway`) owns the logical replication slot
# and republishes every change to subjects shaped like
# `cdc.<schema>.<table>.<op>`. This crate provides:
#
#   * The `RowChange` envelope type (mirrors the gateway's `cdc.row.v1`
#     wire format)
#   * `subject_for(schema, table, op)` helpers
#   * `Subscription` builder that wraps a JetStream durable pull consumer,
#     handles ack/nack, and dispatches to an async handler
#
# Each consumer is durable: progress survives pod restarts via the
# durable name passed to `Subscription::start`.

[dependencies]
async-nats = "=0.38.0"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "sync"] }
tracing = { version = "0.1", optional = true }

[features]
default = []
tracing = ["dep:tracing"]
