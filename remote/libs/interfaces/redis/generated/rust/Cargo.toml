[package]
name = "dd-redis-interfaces"
version = "0.1.0"
edition = "2021"
description = "Generated Rust types and redis key formatters for dd cross-runtime redis usage. Do not edit by hand."

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
