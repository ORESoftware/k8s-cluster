[package]
name = "dd-runtime-config-client"
version = "0.1.0"
edition = "2021"
description = "Shared receiver helper for dd-runtime-config push messages. Drop into any Rust deployment that wants to receive /internal/update-runtime-config payloads."

[lib]
path = "src/lib.rs"

[dependencies]
axum = { version = "0.7", features = ["macros"] }
reqwest = { version = "=0.12.9", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "sync", "time", "macros"] }
