[package]
name = "dd-des-rs"
version = "0.1.0"
edition = "2021"
description = "HTTP server that runs the discrete-event-system.rs engine as a library and serves the rendered HTML result pages."

[dependencies]
dd-telemetry = { path = "../../libs/telemetry-rs" }
tracing = "0.1"
axum = { version = "0.7", features = ["multipart", "ws"] }
tokio = { version = "1", features = ["fs", "io-util", "macros", "rt-multi-thread", "signal", "time"] }
tokio-util = { version = "0.7", features = ["io"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

# The discrete-event-system.rs engine, imported as a LIBRARY via the git
# submodule checked out at `remote/submodules/discrete-event-system.rs`.
# This is the whole point of the deployment: run the real Rust DES engine
# in-process and serve the HTML/JSON artifacts its simulations render.
des_engine = { path = "../../submodules/discrete-event-system.rs" }

# Soccer was extracted out of des_engine into the `soccer_engine` crate
# (soccer-sim-game-engine.rs), checked out adjacently as a submodule. Its own
# `des_engine = { path = "../discrete-event-system.rs" }` resolves to the SAME
# engine submodule above, so there is exactly one des_engine in the graph.
soccer_engine = { path = "../../submodules/soccer-sim-game-engine.rs" }
