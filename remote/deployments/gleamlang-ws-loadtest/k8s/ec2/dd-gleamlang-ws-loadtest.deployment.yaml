apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleamlang-ws-loadtest
  namespace: default
  labels:
    app: dd-gleamlang-ws-loadtest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-gleamlang-ws-loadtest
  template:
    metadata:
      labels:
        app: dd-gleamlang-ws-loadtest
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: ghcr.io/gleam-lang/gleam:v1.16.0-node-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/gleamlang-ws-loadtest
              npm install --omit=dev
              exec gleam run --target javascript
          env:
            - name: TARGET_WS_URL
              value: ws://dd-gleamlang-server.default.svc.cluster.local:8081/ws
            - name: CLIENT_COUNT
              value: "5000"
            - name: HOLD_SECONDS
              value: "300"
            - name: CONNECT_TIMEOUT_MS
              value: "20000"
            - name: RECONNECT_DELAY_MS
              value: "1000"
            - name: RAMP_DELAY_MS
              value: "1"
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "6"
              memory: 12Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
