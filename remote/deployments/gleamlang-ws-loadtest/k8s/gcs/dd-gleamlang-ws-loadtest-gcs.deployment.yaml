apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleamlang-ws-loadtest-gcs
  namespace: default
  labels:
    app: dd-gleamlang-ws-loadtest-gcs
    role: loadtest
    target: gcs-router
spec:
  # WebSocket chat load against the chat.vibe gcs server via gcs-router, driven
  # by the Gleam/Node loader in LOAD_MODE=gcs (real chat.vibe protocol:
  # userId/deviceId/conversationIds query params + MongoChatMessage envelopes).
  #
  # Default replicas: 0 — the operator scales to N for the duration of a load
  # test and back to 0 afterwards.
  replicas: 0
  selector:
    matchLabels:
      app: dd-gleamlang-ws-loadtest-gcs
  template:
    metadata:
      labels:
        app: dd-gleamlang-ws-loadtest-gcs
        role: loadtest
        target: gcs-router
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: ghcr.io/gleam-lang/gleam:v1.16.0-node-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/gleamlang-ws-loadtest
              npm install --omit=dev
              exec gleam run --target javascript
          env:
            - name: TARGET_WS_URL
              value: ws://gcs-router.default.svc.cluster.local:3001
            - name: LOAD_MODE
              value: "gcs"
            - name: CLIENT_COUNT
              value: "2000"
            - name: GCS_CLIENTS_PER_CONV
              value: "5"
            # 0 => every client in a conversation sends (max fan-out).
            - name: GCS_SENDERS_PER_CONV
              value: "0"
            - name: MESSAGES_PER_SECOND_PER_CLIENT
              value: "1.0"
            - name: MESSAGE_ENCODINGS
              value: "json,msgpack,protobuf,flatbuffers"
            - name: LOADTEST_TRANSPORTS
              value: "http,tcp,websocket"
            - name: CONNECT_TIMEOUT_MS
              value: "30000"
            - name: RECONNECT_DELAY_MS
              value: "2000"
            - name: RAMP_DELAY_MS
              value: "2"
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "6"
              memory: 12Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
