[package]
name = "dd-remote-web-home"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.7", features = ["macros"] }
# Source-of-truth NATS subject names for the dashboard's labelled rows so a
# subject rename in remote/libs/nats/subject-defs/schema/ immediately
# updates this operator UI instead of going stale silently.
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
dd-runtime-config-client = { path = "../../libs/runtime-config-client-rs" }
maud = "0.27"
once_cell = "1"
prometheus = "0.13"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
