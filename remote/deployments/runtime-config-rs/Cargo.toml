[package]
name = "dd-runtime-config"
version = "0.1.0"
edition = "2021"

# Centralized runtime-config control plane.
#
# Redis is the source of truth for entries; this service holds an in-memory
# mirror, runs a 5-minute cron that pushes the current snapshot to every
# registered subscriber's /internal/update-runtime-config endpoint, and exposes
# an admin UI so operators can rev a value and fan it out on demand.
#
# Cross-runtime payload types come from the shared interfaces library so the
# Node, Python, and Gleam consumers stay byte-compatible with this service.

[dependencies]
dd-telemetry = { path = "../../libs/telemetry-rs" }
tracing = "0.1"
axum = { version = "0.7", features = ["macros"] }
dd-shared-interfaces = { path = "../../libs/interfaces/shared/generated/rust" }
maud = "0.27"
once_cell = "1"
prometheus = "0.13"
redis = { version = "=0.27.6", default-features = false, features = ["aio", "tokio-comp"] }
reqwest = { version = "=0.12.9", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
