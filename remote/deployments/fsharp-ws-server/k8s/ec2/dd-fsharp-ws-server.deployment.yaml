apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-fsharp-ws-server
  namespace: default
  labels:
    app: dd-fsharp-ws-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-fsharp-ws-server
  template:
    metadata:
      labels:
        app: dd-fsharp-ws-server
      annotations:
        # Bump on code-only changes (when no other spec field is moving) so
        # ArgoCD rolls a fresh pod that re-runs `dotnet publish` against the
        # latest source on the hostPath repo. Same pattern dd-remote-gateway
        # uses for configmap updates.
        dd.dev/code-revision: '2026-05-18-presence-fanin'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: fsharp-ws-server
          # Same pattern as dd-akka-ws-server / dd-spark-pipeline-server: mount
          # the repo as a hostPath and build inside the container so the running
          # image always reflects the dev branch tip without an external CI step.
          image: mcr.microsoft.com/dotnet/sdk:10.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            # bash explicitly: the dotnet/sdk:10.0 image is Debian-based and
            # ships dash as `/bin/sh`, which doesn't support `set -o pipefail`.
            # akka-ws-server happens to work with /bin/sh only because the
            # eclipse-temurin base symlinks /bin/sh -> bash.
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              SRC=/opt/dd-next-1/remote/deployments/fsharp-ws-server
              # Publish into a node-local writable workdir so concurrent pods
              # (and re-deploys) don't trip over each other writing into the
              # read-only repo mount.
              WORK=/tmp/dd-fsharp-ws-server-src
              OUT=/tmp/dd-fsharp-ws-server
              if [ ! -f "$OUT/dd-fsharp-ws-server.dll" ]; then
                echo "Publishing dd-fsharp-ws-server with dotnet..."
                rm -rf "$WORK" "$OUT"
                mkdir -p "$WORK" "$OUT"
                cp -R "$SRC"/. "$WORK"/
                rm -rf "$WORK/bin" "$WORK/obj"
                cd "$WORK"
                dotnet publish DdFsharpWsServer.fsproj \
                    -c Release \
                    -o "$OUT" \
                    /p:UseAppHost=false
              fi
              exec dotnet "$OUT/dd-fsharp-ws-server.dll"
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8087'
            - name: BENCHMARK_ITERATIONS
              value: '200'
            - name: MAX_BENCHMARK_ITERATIONS
              value: '1000'
            - name: BENCHMARK_PAYLOAD
              value: '{"id":"bench","payload":"a benchmark message body"}'
            - name: MAX_WS_TEXT_FRAME_BYTES
              value: '65536'
            - name: HOME
              value: /tmp
            # Server GC + tiered PGO is the standard .NET 10 profile for ASP.NET
            # Core services; matches the akka-ws-server's G1 + JIT settings.
            - name: DOTNET_gcServer
              value: '1'
            - name: DOTNET_TieredPGO
              value: '1'
            - name: DOTNET_EnableDiagnostics
              value: '0'
            - name: DOTNET_CLI_TELEMETRY_OPTOUT
              value: '1'
            - name: DOTNET_NOLOGO
              value: '1'
            # NuGet packages live on the hostPath repo by default; redirect to a
            # node-local cache so the readonly mount stays clean.
            - name: NUGET_PACKAGES
              value: /tmp/nuget-packages
            - name: DOTNET_CLI_HOME
              value: /tmp
            # ---------------------------------------------------------------
            # Presence subsystem (NATS + PG LISTEN/NOTIFY + PG WAL + outbox).
            # Posture mirrors dd-gleamlang-presence-server: every source is
            # optional, and unset env vars trigger a graceful skip with an
            # info log line.
            #
            # NATS is wired up by default — the cluster ships `dd-nats` in
            # the `messaging` namespace, the same NATS the other DD services
            # use. If `dd-nats` is unavailable the F# server logs a warning
            # and keeps serving every other endpoint normally.
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            # PG is OFF by default. To enable, provision a database+role with
            # `wal_level = logical` and the `wal2json` extension installed,
            # then drop the URI into a Secret (e.g. `fsws-pg`) and uncomment:
            #
            # - name: PG_DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: fsws-pg
            #       key: url
            #
            # When PG is enabled all three PG paths (LISTEN/NOTIFY, WAL via
            # pg_logical_slot_get_changes, and the outbox tail) come online
            # automatically — see remote/deployments/fsharp-ws-server/sql/schema.sql for
            # what the boot-time migrator provisions.
            - name: FSWS_WAL_POLL_MS
              value: '250'
            - name: FSWS_OUTBOX_POLL_MS
              value: '1000'
            - name: FSWS_OUTBOX_BATCH
              value: '256'
            - name: FSWS_OUTBOX_BACKFILL
              value: 'false'
          ports:
            - name: http
              containerPort: 8087
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
