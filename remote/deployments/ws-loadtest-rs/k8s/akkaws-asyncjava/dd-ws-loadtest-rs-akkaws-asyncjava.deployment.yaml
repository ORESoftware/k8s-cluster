apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-ws-loadtest-rs-akkaws-asyncjava
  namespace: default
  labels:
    app: dd-ws-loadtest-rs-akkaws-asyncjava
    role: loadtest
    target: dd-akka-ws-server
    pipeline: asyncjava
spec:
  # Long-running pipeline-mode loadtest driving dd-akka-ws-server's /ws/asyncjava
  # endpoint, which routes incoming JSON frames through the async-java/async.java
  # Asyncc.Parallel-based pipeline. Companion deployment
  # `dd-ws-loadtest-rs-akkaws-akkastreams` drives the matching /ws/akkastreams endpoint;
  # the two are side-by-side comparison sources for the readme writeup.
  replicas: 1
  selector:
    matchLabels:
      app: dd-ws-loadtest-rs-akkaws-asyncjava
  template:
    metadata:
      labels:
        app: dd-ws-loadtest-rs-akkaws-asyncjava
        role: loadtest
        target: dd-akka-ws-server
        pipeline: asyncjava
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH="/usr/local/cargo/bin:${PATH}"
              cd /opt/dd-next-1/remote/deployments/ws-loadtest-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: TARGET_WS_URL
              value: ws://dd-akka-ws-server.default.svc.cluster.local:8086/ws/asyncjava
            - name: LOAD_MODE
              value: pipeline
            - name: CLIENT_COUNT
              value: "50"
            - name: MESSAGES_PER_SECOND_PER_CLIENT
              value: "10"
            - name: MESSAGE_PAYLOAD
              value: a benchmark message body
            - name: HOLD_SECONDS
              value: "3600"
            - name: CONNECT_TIMEOUT_SECONDS
              value: "20"
            - name: RECEIVE_TIMEOUT_SECONDS
              value: "5"
            - name: RECONNECT_DELAY_MS
              value: "1000"
            - name: RAMP_DELAY_MS
              value: "10"
            - name: REPORT_INTERVAL_SECONDS
              value: "30"
            - name: CORRELATION_TIMEOUT_SECONDS
              value: "10"
          resources:
            requests:
              cpu: "200m"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
