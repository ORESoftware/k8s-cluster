apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-ws-loadtest-rs-dart
  namespace: default
  labels:
    app: dd-ws-loadtest-rs-dart
    role: loadtest
    target: dd-dart-server
spec:
  # WebSocket clients from a fan of loader pods against /dart/wss.
  # Each replica drives CLIENT_COUNT connections; total simultaneous
  # connections at peak == replicas × CLIENT_COUNT.
  #
  # As of 2026-05-23 dd-dart-server runs replicas=4 with a single
  # gateway isolate per pod. One Rust loader pod hit a 4-CPU ceiling
  # at ~6.8K connections last run, so we shard the loader to match the
  # server: 4 replicas × 5K clients = 20K total, with 60s ramp per pod
  # (3 ms/client). Kube-proxy iptables NAT distributes the connections
  # across the 4 server pods naturally.
  #
  # Default replicas: 0 — the operator scales to 4 for the duration of
  # a load test and back to 0 afterwards. The Argo CD app no longer
  # selfHeals so the manual scale sticks for the test window.
  replicas: 0
  selector:
    matchLabels:
      app: dd-ws-loadtest-rs-dart
  template:
    metadata:
      labels:
        app: dd-ws-loadtest-rs-dart
        role: loadtest
        target: dd-dart-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              # Raise the per-process FD ceiling so 20K open WS sockets fit.
              ulimit -n 131072 || true
              export PATH="/usr/local/cargo/bin:${PATH}"
              cd /opt/dd-next-1/remote/deployments/ws-loadtest-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: TARGET_WS_URL
              value: ws://dd-dart-server.default.svc.cluster.local:8089/dart/wss
            # Per-pod client count. With replicas=4 this gives 20K total.
            - name: CLIENT_COUNT
              value: "5000"
            # 300s sustained hold so a 4-minute snapshot window can sit
            # entirely inside the steady-state phase without per-client
            # reconnect cycles muddying the numbers.
            - name: HOLD_SECONDS
              value: "300"
            - name: CONNECT_TIMEOUT_SECONDS
              value: "30"
            # Receive timeout has to be loose enough to accommodate
            # gateway burst-write delay during ramp. The dd-dart-server
            # gateway emits a 1 Hz clock to every session; under heavy
            # outbound fan-out it can take 1–10 s to drain the queue
            # for any single session. 5 s was the previous value and
            # caused 80% of clients to disconnect with a "no frame in
            # 5 s" error during the 20K ramp; 30 s gives 30× slack.
            - name: RECEIVE_TIMEOUT_SECONDS
              value: "30"
            - name: RECONNECT_DELAY_MS
              value: "2000"
            # 20000 clients * 3 ms = 60s ramp. Slow enough that we don't
            # overwhelm the listen backlog, fast enough that we hit peak in
            # under a minute.
            - name: RAMP_DELAY_MS
              value: "3"
            - name: REPORT_INTERVAL_SECONDS
              value: "5"
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "4"
              memory: 6Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
