apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-ws-loadtest-rs-gcs
  namespace: default
  labels:
    app: dd-ws-loadtest-rs-gcs
    role: loadtest
    target: gcs-router
spec:
  # WebSocket chat load against the chat.vibe gcs server via gcs-router.
  # Unlike the echo-server overlays this uses LOAD_MODE=gcs, which speaks the
  # real chat.vibe protocol (userId/deviceId/conversationIds query params +
  # MongoChatMessage envelopes). Each conversation's clients hash to the same
  # gcs pod (conv-hash) and fan messages out to one another.
  #
  # Default replicas: 0 — the operator scales to N for the duration of a load
  # test and back to 0 afterwards. Peak conns == replicas × CLIENT_COUNT.
  replicas: 0
  selector:
    matchLabels:
      app: dd-ws-loadtest-rs-gcs
  template:
    metadata:
      labels:
        app: dd-ws-loadtest-rs-gcs
        role: loadtest
        target: gcs-router
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              ulimit -n 131072 || true
              export PATH="/usr/local/cargo/bin:${PATH}"
              cd /opt/dd-next-1/remote/deployments/ws-loadtest-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: TARGET_WS_URL
              value: ws://gcs-router.default.svc.cluster.local:3001
            - name: LOAD_MODE
              value: "gcs"
            - name: CLIENT_COUNT
              value: "3000"
            - name: GCS_CLIENTS_PER_CONV
              value: "5"
            # 0 => every client in a conversation sends (max fan-out).
            - name: GCS_SENDERS_PER_CONV
              value: "0"
            - name: MESSAGES_PER_SECOND_PER_CLIENT
              value: "1.0"
            - name: CONNECT_TIMEOUT_SECONDS
              value: "30"
            - name: RECEIVE_TIMEOUT_SECONDS
              value: "30"
            - name: RECONNECT_DELAY_MS
              value: "2000"
            - name: RAMP_DELAY_MS
              value: "2"
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "6"
              memory: 12Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
