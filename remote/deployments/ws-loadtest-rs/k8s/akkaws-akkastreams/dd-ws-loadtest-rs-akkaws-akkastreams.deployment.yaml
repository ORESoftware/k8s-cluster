apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-ws-loadtest-rs-akkaws-akkastreams
  namespace: default
  labels:
    app: dd-ws-loadtest-rs-akkaws-akkastreams
    role: loadtest
    target: dd-akka-ws-server
    pipeline: akkastreams
spec:
  # Long-running pipeline-mode loadtest driving dd-akka-ws-server's /ws/akkastreams
  # endpoint, which routes incoming JSON frames through an Akka Streams
  # Source -> Flow -> Sink graph. Companion deployment
  # `dd-ws-loadtest-rs-akkaws-asyncjava` drives the matching /ws/asyncjava endpoint;
  # the two are side-by-side comparison sources for the readme writeup.
  #
  # Default replicas: 0 (off). Operator scales to 4 for a 30K-conn run
  # in the cross-language WSS benchmark and back to 0 afterwards.
  replicas: 0
  selector:
    matchLabels:
      app: dd-ws-loadtest-rs-akkaws-akkastreams
  template:
    metadata:
      labels:
        app: dd-ws-loadtest-rs-akkaws-akkastreams
        role: loadtest
        target: dd-akka-ws-server
        pipeline: akkastreams
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: loadtest
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH="/usr/local/cargo/bin:${PATH}"
              cd /opt/dd-next-1/remote/deployments/ws-loadtest-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: TARGET_WS_URL
              value: ws://dd-akka-ws-server.default.svc.cluster.local:8086/ws/akkastreams
            - name: LOAD_MODE
              value: pipeline
            - name: CLIENT_COUNT
              value: "7500"
            - name: MESSAGES_PER_SECOND_PER_CLIENT
              value: "1.0"
            - name: MESSAGE_PAYLOAD
              value: "akkastreams-bench-payload"
            - name: HOLD_SECONDS
              value: "600"
            - name: CONNECT_TIMEOUT_SECONDS
              value: "30"
            - name: RECEIVE_TIMEOUT_SECONDS
              value: "30"
            - name: RECONNECT_DELAY_MS
              value: "2000"
            - name: RAMP_DELAY_MS
              value: "3"
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
            - name: CORRELATION_TIMEOUT_SECONDS
              value: "10"
          resources:
            requests:
              cpu: "250m"
              memory: 768Mi
            limits:
              cpu: "4"
              memory: 6Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
