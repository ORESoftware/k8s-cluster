[package]
name = "dd-func-approx-rs"
version = "0.1.0"
edition = "2021"
description = "Eureqa-style function approximator. Given data it discovers a non-linear regression model three ways: genetic-programming symbolic regression that returns human-readable analytic equations along an accuracy/complexity Pareto front, a backprop-trained MLP (analytic gradients), and an evolution-strategy neuroevolution that evolves MLP weights gradient-free. Symbolic regression fuses analytic least-squares (Keijzer linear scaling) with evolutionary search and reports simplified equations plus their symbolic derivatives."

[dependencies]
dd-telemetry = { path = "../../libs/telemetry-rs" }
tracing = "0.1"
async-nats = "=0.38.0"
axum = { version = "0.7", features = ["macros"] }
# Source-of-truth NATS subject constants for the fit request/result lane and the
# shared runtime-events publish default.
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
dd-runtime-config-client = { path = "../../libs/runtime-config-client-rs" }
# Analytic-formulation engine: e-graph equality saturation (the approach Herbie
# uses) to canonicalise the symbolic-regression output. The `deterministic`
# feature keeps extraction reproducible from the fit `seed`, matching the crate's
# pure-Rust deterministic contract. `ordered-float` gives the e-graph a
# hashable/orderable f64 constant for the analysis.
egg = { version = "0.11", features = ["deterministic"] }
ordered-float = "4"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }
