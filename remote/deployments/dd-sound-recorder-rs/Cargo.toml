[package]
name = "dd-sound-recorder-rs"
version = "0.1.0"
edition = "2021"
description = "Rust backend for mobile sound-recorder dashcam uploads, S3 presigned URLs, and product pages."

[dependencies]
aws-config = "1"
aws-sdk-s3 = { version = "1", features = ["http-1x"] }
axum = { version = "0.7", features = ["macros"] }
aes-gcm = { version = "0.10.3", features = ["aes"] }
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
dd-pg-defs = { path = "../../libs/pg-defs/generated/rust" }
jsonwebtoken = "9"
once_cell = "1"
prometheus = "0.13"
rand = "0.8"
reqwest = { version = "=0.12.9", default-features = false, features = ["json", "multipart", "rustls-tls"] }
rustls = { version = "=0.23.20", default-features = false, features = ["ring", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync"] }
tokio-postgres = { version = "=0.7.12", features = ["with-chrono-0_4", "with-serde_json-1"] }
tokio-postgres-rustls = "=0.12.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4"] }
webpki-roots = "=0.26.7"
