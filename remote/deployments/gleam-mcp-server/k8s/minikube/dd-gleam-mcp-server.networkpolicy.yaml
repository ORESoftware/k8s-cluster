apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-gleam-mcp-server
  namespace: dd-dev-local
  labels:
    app: dd-gleam-mcp-server
spec:
  podSelector:
    matchLabels:
      app: dd-gleam-mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: dd-remote-gateway
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: dd-dev-server-api
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/part-of: dd-remote-dev
              app.kubernetes.io/component: thread-pod
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8090
    # Warm worker containers spawned by `dd-container-pool` use
    # `nerdctl run --network host` and inherit the node network
    # namespace, so their MCP requests arrive with the host IP rather
    # than a pod identity. Allow RFC1918 ingress on :8090 to keep
    # parity with the EC2 overlay; auth on the read-only `/mcp` and
    # X-Server-Auth on ops paths remain the security boundary.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8090
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 3200
        - protocol: TCP
          port: 8889
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 16686
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
          podSelector:
            matchLabels:
              app: dd-nats
      ports:
        - protocol: TCP
          port: 7777
        - protocol: TCP
          port: 8222
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
