apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-gleam-mcp-server
  namespace: default
  labels:
    app: dd-gleam-mcp-server
spec:
  podSelector:
    matchLabels:
      app: dd-gleam-mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dd-remote-gateway
        - podSelector:
            matchLabels:
              app: dd-dev-server-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: dd-remote-dev
              app.kubernetes.io/component: thread-pod
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8090
    # Warm worker containers spawned by `dd-container-pool` (Node.js
    # chat/Claude workers and other runtimes) run via `nerdctl run
    # --network host` and inherit the EC2 node's network namespace.
    # Their MCP requests therefore arrive with the node's host IP rather
    # than a pod identity, so the podSelector clauses above never match
    # and Cilium drops the SYN. Allowing RFC1918 ingress on :8090
    # mirrors the egress allowlist already present in this policy and
    # is safe because the `/mcp` surface is intentionally read-only and
    # the ops/runtime-config paths still require X-Server-Auth.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8090
    # dd-runtime-config posts back to /internal/update-runtime-config
    # whenever its broadcast value changes. Without this rule the
    # pod would still register fine (the egress rule below carries the
    # outbound subscribe) but the apply callback would silently get
    # dropped at the CNI. Authentication on /internal/* is enforced
    # by the X-Server-Auth (RUNTIME_CONFIG_SERVER_SECRET) header.
    - from:
        - podSelector:
            matchLabels:
              app: dd-runtime-config
      ports:
        - protocol: TCP
          port: 8090
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 3200
        - protocol: TCP
          port: 8889
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 16686
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: messaging
          podSelector:
            matchLabels:
              app: dd-nats
      ports:
        - protocol: TCP
          port: 7777
        - protocol: TCP
          port: 8222
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
    # dd-runtime-config registration. The pod's RUNTIME_CONFIG_REGISTER_URL
    # env points at dd-runtime-config.default.svc:8110/subscribers and
    # without this rule the registration loop logs
    # "[runtime-config] register error: timeout; retrying in N s"
    # forever (visible in stdout / Loki) while the rest of MCP works.
    - to:
        - podSelector:
            matchLabels:
              app: dd-runtime-config
      ports:
        - protocol: TCP
          port: 8110
