apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleam-mcp-server
  namespace: default
  labels:
    app: dd-gleam-mcp-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-gleam-mcp-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: "2026-05-20-track-gleam-manifest"
      labels:
        app: dd-gleam-mcp-server
    spec:
      serviceAccountName: dd-gleam-mcp-server
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 20
      containers:
        - name: gleam-mcp-server
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              cd /opt/dd-next-1/remote/deployments/gleam-mcp-server
              if [ ! -f manifest.toml ]; then
                echo "manifest.toml is required for offline-safe Gleam startup; run gleam deps download and commit the manifest"
                exit 1
              fi
              exec gleam run
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8090'
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleam-mcp-server-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: AGENT_TASKS_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleam-mcp-server-secrets
                  key: AGENT_TASKS_RDS_DATABASE_URL
                  optional: true
            - name: MCP_PROMETHEUS_URL
              value: http://dd-prometheus.observability.svc.cluster.local:9090
            - name: MCP_LOKI_URL
              value: http://dd-loki.observability.svc.cluster.local:3100
            - name: MCP_GRAFANA_URL
              value: http://dd-grafana.observability.svc.cluster.local:3000
            - name: MCP_TEMPO_URL
              value: http://dd-tempo.observability.svc.cluster.local:3200
            - name: MCP_JAEGER_URL
              value: http://dd-jaeger.observability.svc.cluster.local:16686
            - name: MCP_OTEL_COLLECTOR_URL
              value: http://dd-otel-collector.observability.svc.cluster.local:8889
            - name: MCP_NATS_MONITOR_URL
              value: http://dd-nats.messaging.svc.cluster.local:8222
            - name: MCP_NATS_METRICS_URL
              value: http://dd-nats.messaging.svc.cluster.local:7777
            - name: MCP_OBSERVABILITY_TIMEOUT_MS
              value: '1200'
            - name: MCP_OBSERVABILITY_BODY_LIMIT_BYTES
              value: '32768'
            - name: MCP_KUBERNETES_TIMEOUT_MS
              value: '1500'
            - name: MCP_KUBERNETES_BODY_LIMIT_BYTES
              value: '262144'
            - name: MCP_KUBERNETES_INVENTORY_BODY_LIMIT_BYTES
              value: '32768'
            # dd-runtime-config subscriber wiring (Gleam helper:
            # `dd_runtime_config_client.start_registration_loop`).
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-gleam-mcp-server
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-gleam-mcp-server
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-gleam-mcp-server.default.svc.cluster.local:8090/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: dd-gleam-mcp-server-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8090
          startupProbe:
            httpGet:
              path: /healthz
              port: 8090
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
