apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleam-mcp-server
  namespace: default
  labels:
    app: dd-gleam-mcp-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-gleam-mcp-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: "2026-05-20-track-gleam-manifest"
      labels:
        app: dd-gleam-mcp-server
    spec:
      serviceAccountName: dd-gleam-mcp-server
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 20
      initContainers:
        # Build in init with a larger memory budget, then keep the
        # long-running BEAM container capped at 300Mi.
        - name: build-gleam-mcp-server
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              SRC_ROOT=/opt/dd-next-1
              WORK_ROOT=/work/dd-next-1
              PROJ="$WORK_ROOT/remote/deployments/gleam-mcp-server"
              mkdir -p \
                "$WORK_ROOT/remote/deployments/gleam-mcp-server" \
                "$WORK_ROOT/remote/libs/cli-config-client-gleam" \
                "$WORK_ROOT/remote/libs/pg-defs/generated" \
                "$WORK_ROOT/remote/libs/runtime-config-client-gleam" \
                /work/home /work/cache /work/gleam-home
              cp -R "$SRC_ROOT/remote/deployments/gleam-mcp-server"/. "$WORK_ROOT/remote/deployments/gleam-mcp-server"/
              cp -R "$SRC_ROOT/remote/libs/cli-config-client-gleam"/. "$WORK_ROOT/remote/libs/cli-config-client-gleam"/
              cp -R "$SRC_ROOT/remote/libs/pg-defs/generated/gleam" "$WORK_ROOT/remote/libs/pg-defs/generated/gleam"
              cp -R "$SRC_ROOT/remote/libs/runtime-config-client-gleam"/. "$WORK_ROOT/remote/libs/runtime-config-client-gleam"/
              missing=0
              for path in \
                "$PROJ/gleam.toml" \
                "$PROJ/manifest.toml" \
                "$WORK_ROOT/remote/libs/cli-config-client-gleam/gleam.toml" \
                "$WORK_ROOT/remote/libs/pg-defs/generated/gleam/gleam.toml" \
                "$WORK_ROOT/remote/libs/runtime-config-client-gleam/gleam.toml"; do
                if [ ! -e "$path" ]; then
                  echo "build: missing required source file after copy: $path"
                  missing=1
                fi
              done
              if [ "$missing" != "0" ]; then
                echo "build: warm /home/ec2-user/codes/dd/dd-next-1 on the EC2 node so the gleam-mcp-server hostPath mount has the full repo"
                exit 1
              fi
              if [ ! -d "$PROJ/build/packages" ] \
                 || [ -z "$(ls -A "$PROJ/build/packages" 2>/dev/null)" ]; then
                echo "build: build/packages is empty in the copied project, and this pod's NetworkPolicy blocks hex.pm"
                echo "build: run 'gleam deps download' once on the EC2 node under /home/ec2-user/codes/dd/dd-next-1/remote/deployments/gleam-mcp-server before deploying"
                exit 1
              fi
              # Cross-check that every package listed in manifest.toml has a
              # corresponding entry under build/packages/. Local-path deps
              # show up as `<name>.config_fingerprint`, hex deps show up as
              # `<name>/`. We hit this exact failure mode once: a new
              # local-path dep (dd_runtime_config_client) was added to
              # gleam.toml/manifest.toml but the host's build/packages was
              # left stale from a previous warm, so `gleam run` inside the
              # pod tried to resolve the missing dep over the network and
              # crash-looped against the NetworkPolicy.
              names=$(awk '/^packages = \[/,/^\]/' "$PROJ/manifest.toml" \
                | grep -oE 'name = "[^"]+"' \
                | awk -F'"' '{print $2}' \
                | sort -u)
              if [ -z "$names" ]; then
                echo "build: could not parse package names from manifest.toml; refusing to start until the host checkout has a valid manifest"
                exit 1
              fi
              stale=""
              for name in $names; do
                if [ -d "$PROJ/build/packages/$name" ] \
                   || [ -f "$PROJ/build/packages/$name.config_fingerprint" ]; then
                  continue
                fi
                stale="$stale $name"
              done
              if [ -n "$stale" ]; then
                echo "build: build/packages on the host is stale, missing entries for:$stale"
                echo "build: re-run 'gleam deps download' on the EC2 node under /home/ec2-user/codes/dd/dd-next-1/remote/deployments/gleam-mcp-server"
                echo "build: see remote/deployments/gleam-mcp-server/readme.md \"Warming build/packages on the EC2 host\" for the exact nerdctl one-liner"
                exit 1
              fi
              cd "$PROJ"
              gleam clean || true
              gleam build
              if [ ! -f "$PROJ/build/dev/erlang/gleam_mcp_server/ebin/gleam_mcp_server@@main.beam" ]; then
                echo "build: build/dev is missing the generated MCP entry module after gleam build"
                exit 1
              fi
              echo "build: ok"
          env:
            - name: HOME
              value: /work/home
            - name: XDG_CACHE_HOME
              value: /work/cache
            - name: GLEAM_HOME
              value: /work/gleam-home
            - name: ERL_FLAGS
              value: "+S 2:2 +SDcpu 1:1 +SDio 1 +sbwt none +sbwtdcpu none +sbwtdio none"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: "2"
              memory: 8Gi
              ephemeral-storage: 4Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: work
              mountPath: /work
            - name: tmp
              mountPath: /tmp
      containers:
        - name: gleam-mcp-server
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            # The build init container prepares /work; the long-running
            # process only starts prebuilt BEAM modules under the 300Mi cap.
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              WORK_ROOT=/work/dd-next-1
              cd "$WORK_ROOT/remote/deployments/gleam-mcp-server"
              if [ ! -f build/dev/erlang/gleam_mcp_server/ebin/gleam_mcp_server@@main.beam ]; then
                echo "boot: missing Gleam BEAM artifacts from build init container"
                exit 1
              fi
              exec erl -pa build/dev/erlang/*/ebin -noshell -eval 'gleam_mcp_server@@main:run(gleam_mcp_server).'
          env:
            # Bound the BEAM runtime footprint on the shared EC2 node. If this
            # service needs more throughput, scale replicas horizontally rather
            # than letting one Erlang VM reserve multiple GiB.
            - name: ERL_FLAGS
              value: "+S 2:2 +SDcpu 1:1 +SDio 1 +sbwt none +sbwtdcpu none +sbwtdio none"
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8090'
            # Redirect the gleam image's implicit writable paths into the
            # bounded work emptyDir prepared by the build init container so
            # readOnlyRootFilesystem: true can stay on.
            - name: HOME
              value: /work/home
            - name: XDG_CACHE_HOME
              value: /work/cache
            - name: GLEAM_HOME
              value: /work/gleam-home
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleam-mcp-server-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: AGENT_TASKS_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleam-mcp-server-secrets
                  key: AGENT_TASKS_RDS_DATABASE_URL
                  optional: true
            - name: MCP_PROMETHEUS_URL
              value: http://dd-prometheus.observability.svc.cluster.local:9090
            - name: MCP_LOKI_URL
              value: http://dd-loki.observability.svc.cluster.local:3100
            - name: MCP_GRAFANA_URL
              value: http://dd-grafana.observability.svc.cluster.local:3000
            - name: MCP_TEMPO_URL
              value: http://dd-tempo.observability.svc.cluster.local:3200
            - name: MCP_JAEGER_URL
              value: http://dd-jaeger.observability.svc.cluster.local:16686
            - name: MCP_OTEL_COLLECTOR_URL
              value: http://dd-otel-collector.observability.svc.cluster.local:8889
            - name: MCP_NATS_MONITOR_URL
              value: http://dd-nats.messaging.svc.cluster.local:8222
            - name: MCP_NATS_METRICS_URL
              value: http://dd-nats.messaging.svc.cluster.local:7777
            - name: MCP_OBSERVABILITY_TIMEOUT_MS
              value: '1200'
            - name: MCP_OBSERVABILITY_BODY_LIMIT_BYTES
              value: '32768'
            - name: MCP_KUBERNETES_TIMEOUT_MS
              value: '1500'
            - name: MCP_KUBERNETES_BODY_LIMIT_BYTES
              value: '262144'
            - name: MCP_KUBERNETES_INVENTORY_BODY_LIMIT_BYTES
              value: '32768'
            # dd-runtime-config subscriber wiring (Gleam helper:
            # `dd_runtime_config_client.start_registration_loop`).
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-gleam-mcp-server
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-gleam-mcp-server
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-gleam-mcp-server.default.svc.cluster.local:8090/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: dd-gleam-mcp-server-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8090
          startupProbe:
            httpGet:
              path: /healthz
              port: 8090
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 2Gi
          volumeMounts:
            - name: work
              mountPath: /work
            # Small writable /tmp so OS-level transient temp files and Erlang
            # crash dumps have somewhere to land under readOnlyRootFilesystem:
            # true. Bounded small because no workload artifact belongs here.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: work
          emptyDir:
            sizeLimit: 4Gi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
