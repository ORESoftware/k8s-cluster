apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-benefactor-marketing-rs
  namespace: default
  labels:
    app: dd-benefactor-marketing-rs
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-benefactor-marketing-rs
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-08-redis-runtime'
      labels:
        app: dd-benefactor-marketing-rs
        dd.dev/redis-cache-client: 'true'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: benefactor-marketing
          image: docker.io/library/rust:1.95-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export CARGO_HOME=/var/cache/dd-benefactor-marketing-rs/cargo
              export CARGO_TARGET_DIR=/var/cache/dd-benefactor-marketing-rs/target
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              cd /opt/dd-next-1/remote/deployments/dd-benefactor-marketing-rs
              exec cargo run --release --locked
          env:
            - name: HOME
              value: /tmp
            - name: BENEFACTOR_MARKETING_HOST
              value: 0.0.0.0
            - name: BENEFACTOR_MARKETING_PORT
              value: '8134'
            - name: BENEFACTOR_MARKETING_LOG_FORMAT
              value: json
            - name: BENEFACTOR_MARKETING_ALLOW_UNAUTHENTICATED
              value: 'false'
            - name: BENEFACTOR_MARKETING_REDIS_URL
              value: redis://dd-redis-cache.default.svc.cluster.local:6379/0
            - name: BENEFACTOR_MARKETING_REDIS_REQUIRED_FOR_READY
              value: 'false'
            - name: BENEFACTOR_MARKETING_CACHE_TTL_SECONDS
              value: '120'
            - name: BENEFACTOR_MARKETING_RATE_LIMIT_PER_MINUTE
              value: '600'
            - name: BENEFACTOR_MARKETING_JOB_STREAM
              value: benefactor:marketing:jobs
            - name: RUST_LOG
              value: dd_benefactor_marketing_rs=info,sea_orm=warn,sqlx=warn,tower_http=info
            - name: BENEFACTOR_MARKETING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-benefactor-marketing-rs-secrets
                  key: database_url
            - name: BENEFACTOR_MARKETING_API_AUTH_BEARER
              valueFrom:
                secretKeyRef:
                  name: dd-benefactor-marketing-rs-secrets
                  key: api_auth_bearer
            - name: BENEFACTOR_MARKETING_SCRAPER_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-benefactor-marketing-rs-secrets
                  key: scraper_base_url
                  optional: true
          ports:
            - name: http
              containerPort: 8134
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-benefactor-marketing-rs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-cache
          hostPath:
            path: /var/cache/dd-benefactor-marketing-rs
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
