# ExternalSecret for dd-benefactor-marketing-rs. AWS Secrets Manager stores
# the real values under `dd/remote-dev/benefactor-marketing-secrets`.
# Expected JSON properties:
#   - database_url
#   - api_auth_bearer
#   - scraper_base_url (optional)
#
# Do not commit plaintext credentials or generated database URLs.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-benefactor-marketing-rs-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: dd-benefactor-marketing-rs
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-benefactor-marketing-rs-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: database_url
      remoteRef:
        key: dd/remote-dev/benefactor-marketing-secrets
        property: database_url
    - secretKey: api_auth_bearer
      remoteRef:
        key: dd/remote-dev/benefactor-marketing-secrets
        property: api_auth_bearer
    - secretKey: scraper_base_url
      remoteRef:
        key: dd/remote-dev/benefactor-marketing-secrets
        property: scraper_base_url
