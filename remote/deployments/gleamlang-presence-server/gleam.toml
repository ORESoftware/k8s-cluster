name = "gleamlang_presence_server"
version = "0.1.0"
target = "erlang"
description = "Websocket presence service: ETS subject registry on each node, Erlang `pg` for cross-node group membership, Postgres-backed conversation membership cached in memory, supervisor tree with automatic re-registration."

[dependencies]
dd_nats_subject_defs = { path = "../../libs/nats/subject-defs/generated/gleam" }
dd_pg_defs = { path = "../../libs/pg-defs/generated/gleam" }
dd_runtime_config_client = { path = "../../libs/runtime-config-client-gleam" }
gleam_stdlib = ">= 0.68.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
mist = ">= 6.0.0 and < 7.0.0"
pog = ">= 4.0.0 and < 5.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
