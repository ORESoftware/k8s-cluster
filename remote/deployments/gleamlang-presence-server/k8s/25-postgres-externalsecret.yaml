apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: presence-pg
  namespace: presence
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: presence-pg
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: dd/remote-dev/rest-api-secrets
        property: AGENT_TASKS_RDS_DATABASE_URL
