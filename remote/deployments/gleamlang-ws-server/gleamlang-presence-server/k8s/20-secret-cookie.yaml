# Shared Erlang cookie. Every node in the cluster must use the SAME value.
#
# Generate yourself with:
#   openssl rand -hex 32 | base64
#
# Then replace the placeholder below before applying:
#   kubectl apply -f 20-secret-cookie.yaml

apiVersion: v1
kind: Secret
metadata:
  name: presence-cookie
  namespace: presence
type: Opaque
stringData:
  # NOTE: replace with a strong random value. Loaded as RELEASE_COOKIE.
  cookie: "replace-me-with-a-strong-random-cookie"
