[package]
name = "idle-reaper"
version = "0.1.0"
edition = "2021"

[dependencies]
async-nats = "=0.38.0"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
# Source-of-truth NATS subject names, wildcards, queue groups, and stream
# names. The idle-reaper publishes runtime events ("dd.remote.events") and
# watches the per-thread tasks wildcard for liveness signals; pulling those
# from the generated lib keeps it in sync with the producer side.
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
chrono-tz = "0.10"
futures-util = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "macros", "process", "rt-multi-thread", "time"] }
