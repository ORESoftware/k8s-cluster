# ExternalSecret for dd-git-rs. AWS Secrets Manager stores the real values under
# `dd/remote-dev/git-server-secrets`. Expected JSON properties:
#   - database_url        (Postgres connection string for the vcs_* tables)
#   - server_auth_secret  (shared secret guarding privileged routes)
#
# Both are optional at the env level (the pod boots degraded if absent), but the
# service cannot register/sync repositories until they are present.
# Do not commit plaintext credentials or generated database URLs.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-git-rs-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: dd-git-rs
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-git-rs-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: database_url
      remoteRef:
        key: dd/remote-dev/git-server-secrets
        property: database_url
    - secretKey: server_auth_secret
      remoteRef:
        key: dd/remote-dev/git-server-secrets
        property: server_auth_secret
