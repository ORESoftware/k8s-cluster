apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-git-rs
  namespace: default
  labels:
    app: dd-git-rs
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 1800
  # Recreate: the pod owns a single hostPath build cache and repo-storage volume,
  # so two pods must never run concurrently against them.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-git-rs
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-06-10-git-rs-bootstrap'
      labels:
        app: dd-git-rs
        dd.dev/redis-cache-client: 'true'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        # Built from the mounted source tree with the stock Rust image, like the
        # other dd-*-rs services. Unlike them it also apt-installs the non-git
        # VCS binaries (mercurial, subversion, fossil) at startup, so it runs as
        # root with the default capability set and a writable rootfs. git is
        # already present in the rust image.
        - name: git-rs
          image: docker.io/library/rust:1.91.1-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              export DEBIAN_FRONTEND=noninteractive

              # Install the non-git VCS CLIs. Skip the apt step if they are already
              # present (warm pod restart on a node that still has them cached).
              if ! command -v hg >/dev/null || ! command -v svn >/dev/null || ! command -v fossil >/dev/null; then
                apt-get update
                apt-get install -y --no-install-recommends mercurial subversion fossil ca-certificates openssh-client
                rm -rf /var/lib/apt/lists/*
              fi

              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR" "$GIT_RS_STORAGE_ROOT"
              cd /opt/dd-next-1/remote/deployments/dd-git-rs
              exec cargo run --release --locked
          env:
            - name: HOME
              value: /tmp
            - name: GIT_RS_HOST
              value: 0.0.0.0
            - name: GIT_RS_PORT
              value: '8137'
            - name: GIT_RS_LOG_FORMAT
              value: json
            - name: RUST_LOG
              value: dd_git_rs=info,tower_http=info
            - name: CARGO_HOME
              value: /var/cache/dd-git-rs/cargo
            - name: CARGO_TARGET_DIR
              value: /var/cache/dd-git-rs/target
            # Keep build parallelism to one job: the node has hit rustc build
            # storms when several Rust pods cold-start at once.
            - name: CARGO_BUILD_JOBS
              value: '1'
            - name: GIT_RS_STORAGE_ROOT
              value: /var/lib/dd-git-rs/repos
            - name: GIT_RS_REDIS_URL
              value: redis://dd-redis-cache.default.svc.cluster.local:6379/0
            - name: GIT_RS_REDIS_PREFIX
              value: dd:git
            - name: GIT_RS_MIRROR_TIMEOUT_SECONDS
              value: '600'
            - name: GIT_RS_READ_TIMEOUT_SECONDS
              value: '120'
            - name: GIT_RS_ALLOW_UNAUTHENTICATED
              value: 'false'
            # Bound concurrent VCS subprocesses so a read-endpoint flood can't
            # fan out into unbounded clones/diffs.
            - name: GIT_RS_MAX_CONCURRENT_OPS
              value: '4'
            - name: GIT_RS_MAX_BODY_BYTES
              value: '65536'
            # SSRF posture: never allow file:// remotes; loopback/link-local/
            # metadata hosts are always blocked. Flip this on to also reject
            # private-network remotes (no in-cluster/internal mirroring).
            - name: GIT_RS_ALLOW_FILE_URLS
              value: 'false'
            - name: GIT_RS_BLOCK_PRIVATE_REMOTES
              value: 'false'
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: NATS_CRITICAL_EVENT_SUBJECT
              value: dd.remote.events.critical
            - name: DD_GIT_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-git-rs-secrets
                  key: database_url
                  optional: true
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: GIT_RS_SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-git-rs-secrets
                  key: server_auth_secret
                  optional: true
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8137
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 600
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 6Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: build-cache
              mountPath: /var/cache/dd-git-rs
            - name: repo-storage
              mountPath: /var/lib/dd-git-rs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: build-cache
          hostPath:
            path: /var/cache/dd-git-rs
            type: DirectoryOrCreate
        - name: repo-storage
          hostPath:
            path: /var/lib/dd-git-rs
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
