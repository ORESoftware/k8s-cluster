[package]
name = "dd-patent-filing-rs"
version = "0.2.0"
edition = "2021"
publish = false
description = "Rust/Axum patent filing preparation service: intake, readiness, drafting, prior-art search planning, claim formality checks, USPTO fee estimation, and filing deadline analysis."

[[bin]]
name = "dd-patent-filing-rs"
path = "src/main.rs"

[dependencies]
dd-telemetry = { path = "../../libs/telemetry-rs" }
axum = { version = "0.7", features = ["macros"] }
dd-runtime-config-client = { path = "../../libs/runtime-config-client-rs" }
maud = "0.26"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
tower-http = { version = "0.6", features = ["limit", "trace", "timeout", "set-header"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
