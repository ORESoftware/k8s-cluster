# ExternalSecret pulls provider OAuth credentials, the Postgres URL, and the
# AES master seal key out of the secrets backend (AWS Secrets Manager / Vault
# / SealedSecrets — whichever ESO is configured against) and materializes them
# as a single Kubernetes Secret named `dd-billing-server-secrets`.
#
# NEVER put plaintext OAuth credentials or the master seal key directly into a
# manifest committed to git. Even sealed-secrets is preferable to that, and
# ESO is preferable to sealed-secrets for centralized rotation.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dd-billing-server-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dd-default-secret-store
    kind: ClusterSecretStore
  target:
    name: dd-billing-server-secrets
    creationPolicy: Owner
  data:
    - secretKey: database_url
      remoteRef: { key: dd/billing-server/database_url }
    - secretKey: master_seal_key_b64
      remoteRef: { key: dd/billing-server/master_seal_key_b64 }
    - secretKey: stripe_client_id
      remoteRef: { key: dd/billing-server/stripe_client_id }
    - secretKey: stripe_client_secret
      remoteRef: { key: dd/billing-server/stripe_client_secret }
    - secretKey: paypal_client_id
      remoteRef: { key: dd/billing-server/paypal_client_id }
    - secretKey: paypal_client_secret
      remoteRef: { key: dd/billing-server/paypal_client_secret }
    - secretKey: braintree_client_id
      remoteRef: { key: dd/billing-server/braintree_client_id }
    - secretKey: braintree_client_secret
      remoteRef: { key: dd/billing-server/braintree_client_secret }
    - secretKey: plaid_client_id
      remoteRef: { key: dd/billing-server/plaid_client_id }
    - secretKey: plaid_secret
      remoteRef: { key: dd/billing-server/plaid_secret }
    - secretKey: solana_anchor_keypair_b58
      remoteRef: { key: dd/billing-server/solana_anchor_keypair_b58 }
