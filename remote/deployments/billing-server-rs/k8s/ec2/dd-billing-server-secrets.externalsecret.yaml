# ExternalSecret pulls the billing-server Postgres URL, the AES master seal
# key, and any provider OAuth credentials out of AWS Secrets Manager via the
# cluster's ESO ClusterSecretStore and materializes them as a single
# Kubernetes Secret named `dd-billing-server-secrets`.
#
# Source layout (matches every other dd-* deployment in this cluster):
#   AWS Secrets Manager key: `dd/remote-dev/billing-server-secrets`
#   Value: JSON object whose properties are the secret fields below.
#
# Provider OAuth keys are intentionally listed but blank-tolerated: the
# deployment marks each as `optional: true` so the pod boots cleanly with
# only `database_url` + `master_seal_key_b64` populated, and individual
# providers can be wired up by writing the matching property into the SM
# JSON later (no manifest change needed, ESO refresh picks it up).
#
# NEVER put plaintext credentials into a git-committed manifest. The whole
# point of the indirection through ESO + AWS Secrets Manager is centralized
# rotation and audit.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-billing-server-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: dd-billing-server
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-billing-server-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: database_url
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: database_url
    - secretKey: master_seal_key_b64
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: master_seal_key_b64
    - secretKey: stripe_client_id
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: stripe_client_id
    - secretKey: stripe_client_secret
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: stripe_client_secret
    - secretKey: stripe_api_key
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: stripe_api_key
    - secretKey: stripe_webhook_secret
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: stripe_webhook_secret
    - secretKey: paypal_client_id
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: paypal_client_id
    - secretKey: paypal_client_secret
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: paypal_client_secret
    - secretKey: paypal_webhook_id
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: paypal_webhook_id
    - secretKey: braintree_client_id
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: braintree_client_id
    - secretKey: braintree_client_secret
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: braintree_client_secret
    - secretKey: plaid_client_id
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: plaid_client_id
    - secretKey: plaid_secret
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: plaid_secret
    - secretKey: coinbase_webhook_secret
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: coinbase_webhook_secret
    - secretKey: coinflow_webhook_validation_key
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: coinflow_webhook_validation_key
    - secretKey: solana_anchor_keypair_b58
      remoteRef:
        key: dd/remote-dev/billing-server-secrets
        property: solana_anchor_keypair_b58
