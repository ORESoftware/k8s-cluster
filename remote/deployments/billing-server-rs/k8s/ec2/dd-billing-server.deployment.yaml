apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-billing-server
  namespace: default
  labels:
    app: dd-billing-server
spec:
  replicas: 1
  # Zero-surge rollout: the single-node EC2 cluster cannot host two replicas
  # during a rolling deploy (same shape as dd-akka-ws-server).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-billing-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-18-observability'
      labels:
        app: dd-billing-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: billing-server
          image: docker.io/library/rust:1.95-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/billing-server-rs
              if [ ! -x target/release/billing-server-rs ]; then
                echo "Building billing-server-rs (release)..."
                cargo build --release --locked
              fi
              exec target/release/billing-server-rs
          env:
            - name: BILLING_HOST
              value: 0.0.0.0
            - name: BILLING_PORT
              value: '8087'
            - name: BILLING_LOG_FORMAT
              value: json
            - name: RUST_LOG
              value: info,sqlx=warn,hyper=warn,tower_http=info
            - name: BILLING_RUN_MIGRATIONS
              value: 'true'
            - name: BILLING_OAUTH_REDIRECT_BASE
              value: https://billing.dd.internal
            - name: SOLANA_CLUSTER
              value: devnet
            - name: SOLANA_RPC_URL
              value: https://api.devnet.solana.com
            # Secrets injected from dd-billing-server.secret.yaml below.
            - name: BILLING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: database_url
            - name: BILLING_MASTER_SEAL_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: master_seal_key_b64
            - name: STRIPE_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: stripe_client_id, optional: true }
            - name: STRIPE_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: stripe_client_secret, optional: true }
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: paypal_client_id, optional: true }
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: paypal_client_secret, optional: true }
            - name: BRAINTREE_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: braintree_client_id, optional: true }
            - name: BRAINTREE_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: braintree_client_secret, optional: true }
            - name: PLAID_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: plaid_client_id, optional: true }
            - name: PLAID_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: plaid_secret, optional: true }
            - name: SOLANA_ANCHOR_KEYPAIR_B58
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: solana_anchor_keypair_b58, optional: true }
          ports:
            - name: http
              containerPort: 8087
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 120  # cold cargo build can take a while on first boot
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              # Modest baseline; spikes on webhook bursts handled by limits.
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: cargo-cache
              mountPath: /usr/local/cargo/registry
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: cargo-cache
          hostPath:
            path: /home/ec2-user/.cache/cargo-billing-server-rs
            type: DirectoryOrCreate
