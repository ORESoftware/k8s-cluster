apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-billing-server
  namespace: default
  labels:
    app: dd-billing-server
spec:
  replicas: 1
  # Zero-surge rollout: the single-node EC2 cluster cannot host two replicas
  # during a rolling deploy (same shape as dd-akka-ws-server).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-billing-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-07-16-fiducia-coordination'
      labels:
        app: dd-billing-server
        dd.dev/fiducia-client: 'true'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: billing-server
          image: docker.io/library/rust:1.95-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/billing-server-rs
              if [ ! -x target/release/billing-server-rs ]; then
                echo "Building billing-server-rs (release)..."
                cargo build --release --locked
              fi
              exec target/release/billing-server-rs
          env:
            - name: BILLING_HOST
              value: 0.0.0.0
            - name: BILLING_PORT
              value: '8087'
            - name: BILLING_LOG_FORMAT
              value: json
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: RUST_LOG
              value: info,sqlx=warn,hyper=warn,tower_http=info
            - name: BILLING_RUN_MIGRATIONS
              # Schema changes are reviewed and applied through pg-defs/dpm;
              # application startup must never mutate production DDL.
              value: 'false'
            - name: BILLING_OAUTH_REDIRECT_BASE
              value: https://billing.dd.internal
            - name: BILLING_REQUIRE_WEBHOOK_SIGNATURES
              value: 'true'
            - name: BILLING_WEBHOOK_SIGNATURE_TOLERANCE_SECONDS
              value: '300'
            # Refuse outbound HTTP to private / loopback / link-local
            # IPs (SSRF guard for tenant.webhook + notification webhooks).
            # Production never legitimately POSTs into the cluster from
            # tenant-supplied URLs.
            - name: BILLING_BLOCK_PRIVATE_OUTBOUND
              value: 'true'
            # Fiducia supplies atomic union locks for customer critical
            # sections and renewable election leases for tenant jobs. Postgres
            # transaction-scoped advisory locks remain an independent local
            # serialization layer.
            - name: BILLING_FIDUCIA_ENABLED
              value: 'true'
            - name: BILLING_FIDUCIA_BASE_URL
              value: http://fiducia-load-balance.fiducia.svc.cluster.local:8088
            - name: BILLING_FIDUCIA_LOCK_TTL_MS
              value: '60000'
            - name: BILLING_FIDUCIA_REQUEST_TIMEOUT_MS
              value: '30000'
            - name: BILLING_FIDUCIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: fiducia_api_key
            # The JSON API is gated by a bearer token in addition to
            # any upstream gateway (`dd-remote-auth`). Without this set
            # the API is open to anyone who can reach the listener.
            - name: BILLING_API_AUTH_BEARER
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: api_auth_bearer
            # Admin UI is mounted at /admin; require its own bearer
            # even when fronted by the gateway.
            - name: BILLING_ADMIN_AUTH_BEARER
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: admin_auth_bearer
            - name: STRIPE_API_VERSION
              value: 2026-04-22.dahlia
            - name: PAYPAL_ENV
              value: production
            - name: BRAINTREE_ENV
              value: production
            - name: PLAID_ENV
              value: production
            - name: SOLANA_CLUSTER
              value: devnet
            - name: SOLANA_RPC_URL
              value: https://api.devnet.solana.com
            # Secrets injected from dd-billing-server.secret.yaml below.
            - name: BILLING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: database_url
            - name: BILLING_MASTER_SEAL_KEY
              valueFrom:
                secretKeyRef:
                  name: dd-billing-server-secrets
                  key: master_seal_key_b64
            - name: STRIPE_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: stripe_client_id, optional: true }
            - name: STRIPE_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: stripe_client_secret, optional: true }
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: stripe_api_key, optional: true }
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: stripe_webhook_secret, optional: true }
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: paypal_client_id, optional: true }
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: paypal_client_secret, optional: true }
            - name: PAYPAL_WEBHOOK_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: paypal_webhook_id, optional: true }
            - name: BRAINTREE_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: braintree_client_id, optional: true }
            - name: BRAINTREE_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: braintree_client_secret, optional: true }
            - name: PLAID_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: plaid_client_id, optional: true }
            - name: PLAID_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: plaid_secret, optional: true }
            - name: COINBASE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: coinbase_webhook_secret, optional: true }
            - name: COINFLOW_WEBHOOK_VALIDATION_KEY
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: coinflow_webhook_validation_key, optional: true }
            - name: SOLANA_ANCHOR_KEYPAIR_B58
              valueFrom:
                secretKeyRef: { name: dd-billing-server-secrets, key: solana_anchor_keypair_b58, optional: true }
          ports:
            - name: http
              containerPort: 8087
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 120  # cold cargo build can take a while on first boot
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              # Modest baseline; spikes on webhook bursts handled by limits.
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: cargo-cache
              mountPath: /tmp/cargo
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: cargo-cache
          hostPath:
            path: /home/ec2-user/.cache/cargo-billing-server-rs
            type: DirectoryOrCreate
