akka {
  license-key = ${?AKKA_LICENSE_KEY}
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"

  actor {
    provider = "local"

    # Use a dedicated default dispatcher whose name shows up in stack traces; the comparison
    # readme refers to these names when diffing how Akka Streams and the JDK pool render
    # frames in failure cases.
    default-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 4
        parallelism-factor = 1.0
        parallelism-max = 16
      }
      throughput = 5
    }
  }

  http {
    server {
      idle-timeout = 120s
      websocket {
        # Periodic keep-alive ping every 30s so idle WS clients don't get evicted by a
        # downstream load balancer.
        periodic-keep-alive-mode = "ping"
        periodic-keep-alive-max-idle = 30s
      }
    }
  }
}
