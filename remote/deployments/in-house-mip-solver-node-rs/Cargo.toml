[package]
name = "dd-in-house-mip-solver-node"
version = "0.1.0"
edition = "2021"

[dependencies]
async-nats = "=0.38.0"
axum = { version = "0.7", features = ["macros"] }
# Source-of-truth NATS subject constants for distributed MIP work/results/control/events.
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
des_engine = { path = "../../submodules/discrete-event-system.rs" }
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
uuid = { version = "1", features = ["v4"] }
