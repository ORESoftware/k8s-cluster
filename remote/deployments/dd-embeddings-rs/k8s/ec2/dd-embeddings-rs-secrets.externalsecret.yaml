# ExternalSecret pulls the dd-embeddings-rs API bearer, the Qdrant API key,
# and every embedding-provider API key out of AWS Secrets Manager via the
# cluster's ESO ClusterSecretStore, materializing them as a single Kubernetes
# Secret named `dd-embeddings-rs-secrets`.
#
# Source layout (matches every other dd-* deployment in this cluster):
#   AWS Secrets Manager key: `dd/remote-dev/embeddings-rs-secrets`
#   Value: JSON object whose properties are the secret fields below.
#
# Provider keys are intentionally listed but blank-tolerated: the deployment
# marks each as `optional: true` and the service only registers a provider when
# its key is populated. So the pod boots cleanly with only `api_auth_bearer`
# set, and individual providers are wired up by writing the matching property
# into the SM JSON later (no manifest change — ESO refresh picks it up).
#
# NEVER put plaintext credentials into a git-committed manifest. The whole
# point of the ESO + AWS Secrets Manager indirection is centralized rotation
# and audit.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dd-embeddings-rs-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: dd-embeddings-rs
    app.kubernetes.io/part-of: dd-remote-dev
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: dd-aws-secrets-manager
  target:
    name: dd-embeddings-rs-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api_auth_bearer
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: api_auth_bearer
    # Postgres search subsystem connection string (optional — /api/search/* is
    # disabled when absent). The DB user needs CREATE EXTENSION vector + pg_trgm.
    - secretKey: database_url
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: database_url
    - secretKey: qdrant_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: qdrant_api_key
    - secretKey: openai_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: openai_api_key
    - secretKey: voyage_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: voyage_api_key
    - secretKey: gemini_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: gemini_api_key
    - secretKey: cohere_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: cohere_api_key
    - secretKey: mistral_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: mistral_api_key
    - secretKey: jina_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: jina_api_key
    - secretKey: together_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: together_api_key
    - secretKey: fireworks_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: fireworks_api_key
    - secretKey: deepinfra_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: deepinfra_api_key
    - secretKey: nomic_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: nomic_api_key
    - secretKey: azure_openai_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: azure_openai_api_key
    - secretKey: azure_base_url
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: azure_base_url
    - secretKey: upstage_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: upstage_api_key
    - secretKey: siliconflow_api_key
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: siliconflow_api_key
    - secretKey: github_models_token
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: github_models_token
    - secretKey: cloudflare_api_token
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: cloudflare_api_token
    - secretKey: cloudflare_base_url
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: cloudflare_base_url
    - secretKey: databricks_token
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: databricks_token
    - secretKey: databricks_base_url
      remoteRef:
        key: dd/remote-dev/embeddings-rs-secrets
        property: databricks_base_url
