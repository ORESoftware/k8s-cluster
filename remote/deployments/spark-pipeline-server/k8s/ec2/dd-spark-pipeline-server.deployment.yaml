apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-spark-pipeline-server
  namespace: ai-ml
  labels:
    app: dd-spark-pipeline-server
spec:
  replicas: 1
  # Keep one ready pod serving during rollouts. The request is intentionally small enough that a
  # temporary replacement pod can schedule before the old pod is removed.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dd-spark-pipeline-server
  template:
    metadata:
      labels:
        app: dd-spark-pipeline-server
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: spark-pipeline-server
          image: docker.io/library/dd-spark-pipeline-server:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8085'
            - name: PIPELINE_MAX_CONCURRENT
              value: '4'
            - name: JAVA_OPTS
              value: -XX:+UseG1GC -XX:MaxRAMPercentage=70 -Dfile.encoding=UTF-8
            - name: SPARK_PIPELINE_ALLOW_UNAUTHENTICATED
              value: 'false'
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
            # Optional Postgres connection (consumed by PgDb via HikariCP + jOOQ for the
            # generated pg-defs Tables). If the secret is absent the service still boots and
            # serves /healthz, /readyz, /metrics, /v1/jobs; only /v1/repos and the
            # SPARK_SUBMIT repoId precheck require Postgres and degrade to 503 /
            # "repo_unresolved" without it.
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: PG_POOL_SIZE
              value: '8'
          ports:
            - name: http
              containerPort: 8085
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              # Single-node cluster is request-pressured. This pod is mostly idle awaiting HTTP
              # requests; trim baseline to 50m so it actually schedules. Burst budget (limits)
              # stays at 2 CPUs.
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
