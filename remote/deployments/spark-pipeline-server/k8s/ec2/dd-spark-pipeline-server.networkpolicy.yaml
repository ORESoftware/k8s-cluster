apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dd-spark-pipeline-server
  namespace: default
  labels:
    app: dd-spark-pipeline-server
spec:
  podSelector:
    matchLabels:
      app: dd-spark-pipeline-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8085
