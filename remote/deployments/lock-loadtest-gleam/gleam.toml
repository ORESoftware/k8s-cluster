name = "dd_lock_loadtest_gleam"
version = "0.1.0"
# We deliberately compile to Erlang (not JavaScript like
# `gleamlang-ws-loadtest`) because the broker speaks an NDJSON-over-TCP
# protocol; the BEAM's `gen_tcp` in `{packet, line}` mode gives us
# zero-copy line-framed receives without writing a hand-rolled
# buffered reader. The Erlang VM also gives us cheap per-worker
# processes for the acquire/release loop.
target = "erlang"
description = "Mutex-broker load tester written in Gleam. Drives an acquire/release workload from BEAM against either dd-rust-network-mutex or dd-live-mutex(-submodule), and prints per-run JSON summaries to stdout for log-based comparison."

[dependencies]
gleam_stdlib = ">= 0.68.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
# Reuse the in-tree Gleam client. It already implements `connect`,
# `acquire`, `release`, and `acquire_many` against the same NDJSON
# protocol both brokers speak.
dd_rust_network_mutex_client = { path = "../rust-network-mutex-rs/clients/gleam" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
