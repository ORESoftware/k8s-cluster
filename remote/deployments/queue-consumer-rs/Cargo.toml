[package]
name = "dd-remote-queue-consumer"
version = "0.1.0"
edition = "2021"

[dependencies]
async-nats = "=0.38.0"
# Source-of-truth NATS subject names, wildcards, queue groups, and stream
# names. The constants below replace the legacy "dd.remote.*" magic strings
# so a subject rename in remote/libs/nats/subject-defs/schema/ immediately
# surfaces here at compile time instead of silently drifting.
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
dd-shared-interfaces = { path = "../../libs/interfaces/shared/generated/rust" }
futures-util = "0.3"
reqwest = { version = "=0.12.9", default-features = false, features = ["json", "rustls-tls"] }
rustls = { version = "=0.23.20", default-features = false, features = ["ring", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = "=0.3.44"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }
