# Template: GitHub Actions workflow that forwards pull_request events to
# the dd-formal-methods-service running in this k8s cluster.
#
# This is Option B from the deployment guide (see
# `remote/deployments/formal-methods-service-rs/readme.md`). Drop it into your
# consuming repo at `.github/workflows/formal-methods-trigger.yml` and set
# the two repo secrets at the bottom of this file.
#
# Use Option A (native GitHub webhook in repo Settings → Webhooks)
# whenever possible. Option B exists for teams that want the trigger
# declaratively in source control so the `paths:` filter is reviewable
# per-PR, gates can be added on labels / draft state / codeowners, and
# everything stays diffable.
#
# The workflow no-ops cleanly when either secret is missing so the file
# is safe to commit before the service is deployed.

name: formal-methods-trigger

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    # Narrow the path filter to the directories your formal-methods
    # pipeline actually cares about. Skipping unrelated PRs at the GHA
    # level costs nothing; the service does the same path filter
    # server-side via FORMAL_METHODS_PATH_PREFIXES.
    paths:
      - 'packages/contract/**'
      - 'packages/math/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: dispatch to dd-formal-methods-service
        env:
          FM_URL: ${{ secrets.FORMAL_METHODS_URL }}
          FM_SECRET: ${{ secrets.FORMAL_METHODS_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${FM_URL:-}" || -z "${FM_SECRET:-}" ]]; then
            echo "FORMAL_METHODS_URL or FORMAL_METHODS_WEBHOOK_SECRET not set; skipping."
            exit 0
          fi
          payload=$(jq -nc \
            --arg action "${{ github.event.action }}" \
            --argjson number ${{ github.event.number }} \
            --argjson pr '${{ toJSON(github.event.pull_request) }}' \
            --argjson repo '${{ toJSON(github.event.repository) }}' \
            '{action:$action, number:$number, pull_request:$pr, repository:$repo}')
          sig="sha256=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$FM_SECRET" | sed 's/^.* //')"
          curl -fsS -X POST "${FM_URL%/}/webhook/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-GitHub-Delivery: ${{ github.run_id }}-${{ github.run_attempt }}" \
            -H "X-Hub-Signature-256: $sig" \
            --data-binary "$payload"

# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   FORMAL_METHODS_URL              e.g. https://formal-methods.example.com
#   FORMAL_METHODS_WEBHOOK_SECRET   same value as GITHUB_WEBHOOK_SECRET on the service
#
# Required repo variable (optional but recommended):
#
#   none — the service derives the status `context` from its own
#   STATUS_CONTEXT env. Make that the required check in branch
#   protection.
