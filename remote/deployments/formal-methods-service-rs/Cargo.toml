[package]
name = "dd-formal-methods-service"
version = "0.1.0"
edition = "2021"
publish = false
description = "Webhook-driven formal-methods analysis service. Verifies GitHub PR HMAC signatures and runs a pluggable pipeline of formal-methods analyzers (cargo check/test, proptest, Kani, Verus, dReal, Certora) against the PR head commit."
authors = ["ORE Software"]
license = "UNLICENSED"

[[bin]]
name = "dd-formal-methods-service"
path = "src/main.rs"

# The library is exported as `formal_methods_service` so the
# `use formal_methods_service::...` statements in main.rs and the
# integration tests use the canonical module path.
[lib]
name = "formal_methods_service"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
axum = { version = "0.7", features = ["macros"] }
bytes = "1"
dd-runtime-config-client = { path = "../../libs/runtime-config-client-rs" }
hex = "0.4"
hmac = "0.12"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
subtle = "2"
tempfile = "3"
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "process", "fs", "sync", "time"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "limit"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
