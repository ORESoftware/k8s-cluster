[package]
name = "dd-soccer-rs"
version = "0.1.0"
edition = "2021"
description = "Root soccer game server: UUID-keyed live games over soccer-sim-game-engine, serving /soccer/game, /soccer/live, /soccer/sim."

[[bin]]
name = "dd-soccer-rs"
path = "src/main.rs"

[dependencies]
# NOTE: the shared `dd-telemetry` crate (../../libs/telemetry-rs) referenced by
# the other deployments does not exist in the repo yet, and this server's build
# script does not assemble remote/libs into its build root, so depending on it
# makes the in-pod `cargo build` fail at dependency resolution. Use a plain
# stdout tracing subscriber until the shared telemetry crate is actually shipped.
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }

# The soccer domain engine (`soccer_engine` crate, from soccer-sim-game-engine.rs),
# checked out as a submodule alongside the discrete-event-system.rs engine — same
# layout dd-des-rs uses. soccer_engine's own `des_engine = { path =
# "../discrete-event-system.rs" }` resolves to that same engine submodule.
soccer_engine = { path = "../../submodules/soccer-sim-game-engine.rs" }
