[package]
name = "dd-music-rs"
version = "0.1.0"
edition = "2021"
description = "Rust generative music server backed by des_engine, S3, Postgres, and Redis."

[dependencies]
dd-telemetry = { path = "../../libs/telemetry-rs" }
tracing = "0.1"
async-nats = "=0.38.0"
aws-config = "1"
aws-sdk-s3 = "1"
axum = { version = "0.7", features = ["macros"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
dd-pg-defs = { path = "../../libs/pg-defs/generated/rust" }
dd-redis-interfaces = { path = "../../libs/interfaces/redis/generated/rust" }
des_engine = { path = "../../submodules/discrete-event-system.rs" }
futures-util = "0.3"
maud = "0.26"
once_cell = "1"
prometheus = "0.13"
redis = { version = "=0.27.6", default-features = false, features = ["aio", "tokio-comp"] }
rustls = { version = "=0.23.20", default-features = false, features = ["ring", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["fs", "macros", "rt-multi-thread", "signal", "sync", "time"] }
tokio-postgres = { version = "=0.7.12", features = ["with-serde_json-1"] }
tokio-postgres-rustls = "=0.12.0"
uuid = { version = "1", features = ["v4"] }
webpki-roots = "=0.26.7"
