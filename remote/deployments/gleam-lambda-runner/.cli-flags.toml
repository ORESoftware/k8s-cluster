[help]
url = "https://github.com/ORESoftware/flags-2-env"

[parse]
allow_unknown = true
errors_env = "FLAGS2ENV_PARSE_ERRORS"
unknown_options_env = "FLAGS2ENV_UNKNOWN_OPTIONS"

[flags.host]
env = "HOST"
aliases = ["host", "bind-host"]
type = "string"
default = "0.0.0.0"

[flags.port]
env = "PORT"
aliases = ["port", "http-port"]
short = "p"
type = "integer"
default = 8083

[flags.nats_url]
env = "NATS_URL"
aliases = ["nats-url"]
type = "string"

[flags.lambda_invoke_subject]
env = "NATS_LAMBDA_INVOKE_SUBJECT"
aliases = ["lambda-invoke-subject"]
type = "string"

[flags.lambda_queue_group]
env = "NATS_LAMBDA_QUEUE_GROUP"
aliases = ["lambda-queue-group"]
type = "string"

[flags.lambda_result_subject]
env = "NATS_LAMBDA_RESULT_SUBJECT"
aliases = ["lambda-result-subject"]
type = "string"

[flags.lambda_functions_subject]
env = "NATS_LAMBDA_FUNCTIONS_SUBJECT"
aliases = ["lambda-functions-subject"]
type = "string"

[flags.lambda_max_payload_bytes]
env = "NATS_LAMBDA_MAX_PAYLOAD_BYTES"
aliases = ["lambda-max-payload-bytes"]
type = "integer"

[flags.lambda_database_url]
env = "LAMBDA_DATABASE_URL"
aliases = ["lambda-database-url"]
type = "string"

[flags.lambda_function_cache_max]
env = "LAMBDA_FUNCTION_CACHE_MAX"
aliases = ["lambda-function-cache-max"]
type = "integer"

[flags.lambda_function_body_max_bytes]
env = "LAMBDA_FUNCTION_BODY_MAX_BYTES"
aliases = ["lambda-function-body-max-bytes"]
type = "integer"

[flags.lambda_child_input_max_bytes]
env = "LAMBDA_CHILD_INPUT_MAX_BYTES"
aliases = ["lambda-child-input-max-bytes"]
type = "integer"

[flags.lambda_result_max_bytes]
env = "LAMBDA_RESULT_MAX_BYTES"
aliases = ["lambda-result-max-bytes"]
type = "integer"

[flags.lambda_allow_host_runtimes]
