[flags.lambda_container_invoke_timeout_seconds]
env = "LAMBDA_CONTAINER_INVOKE_TIMEOUT_SECONDS"
aliases = ["lambda-container-invoke-timeout-seconds"]
type = "integer"

[flags.lambda_container_memory_bytes]
env = "LAMBDA_CONTAINER_MEMORY_BYTES"
aliases = ["lambda-container-memory-bytes"]
