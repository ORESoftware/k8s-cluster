apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-gleamlang-server
  namespace: default
  labels:
    app: dd-gleamlang-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-gleamlang-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-20-pg-ws-shards'
      labels:
        app: dd-gleamlang-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      initContainers:
        - name: build-gleamlang-server
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              SRC_ROOT=/opt/dd-next-1
              WORK_ROOT=/work/dd-next-1
              mkdir -p \
                "$WORK_ROOT/remote/deployments" \
                "$WORK_ROOT/remote/libs/cli-config-client-gleam" \
                "$WORK_ROOT/remote/libs/nats/subject-defs/generated" \
                "$WORK_ROOT/remote/libs/pg-defs/generated" \
                "$WORK_ROOT/remote/libs/runtime-config-client-gleam" \
                /work/home /work/cache /work/gleam-home
              cp -R "$SRC_ROOT/remote/deployments/gleamlang-ws-server" "$WORK_ROOT/remote/deployments/gleamlang-ws-server"
              cp -R "$SRC_ROOT/remote/libs/cli-config-client-gleam"/. "$WORK_ROOT/remote/libs/cli-config-client-gleam"/
              cp -R "$SRC_ROOT/remote/libs/nats/subject-defs/generated/gleam" "$WORK_ROOT/remote/libs/nats/subject-defs/generated/gleam"
              cp -R "$SRC_ROOT/remote/libs/pg-defs/generated/gleam" "$WORK_ROOT/remote/libs/pg-defs/generated/gleam"
              cp -R "$SRC_ROOT/remote/libs/runtime-config-client-gleam"/. "$WORK_ROOT/remote/libs/runtime-config-client-gleam"/
              cd "$WORK_ROOT/remote/deployments/gleamlang-ws-server"
              gleam clean || true
              gleam deps download
              gleam build
              if [ ! -f build/dev/erlang/gleamlang_ws_server/ebin/gleamlang_ws_server@@main.beam ]; then
                echo "build: missing generated Gleam websocket entry module after gleam build"
                exit 1
              fi
          env:
            - name: HOME
              value: /work/home
            - name: XDG_CACHE_HOME
              value: /work/cache
            - name: GLEAM_HOME
              value: /work/gleam-home
            - name: ERL_FLAGS
              value: "+S 2:2 +SDcpu 1:1 +SDio 1 +sbwt none +sbwtdcpu none +sbwtdio none"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: '2'
              memory: 8Gi
              ephemeral-storage: 4Gi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: gleam-build
              mountPath: /work
      containers:
        - name: gleamlang-server
          image: ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              cd /work/dd-next-1/remote/deployments/gleamlang-ws-server
              if [ ! -f build/dev/erlang/gleamlang_ws_server/ebin/gleamlang_ws_server@@main.beam ]; then
                echo "boot: missing Gleam BEAM artifacts from build init container"
                exit 1
              fi
              exec erl -pa build/dev/erlang/*/ebin -noshell -eval 'gleamlang_ws_server@@main:run(gleamlang_ws_server).'
          ports:
            - name: http
              containerPort: 8081
          env:
            # Bound the BEAM runtime footprint on the shared EC2 node. If this
            # service needs more throughput, scale replicas horizontally rather
            # than letting one Erlang VM reserve multiple GiB.
            - name: ERL_FLAGS
              value: "+S 2:2 +SDcpu 1:1 +SDio 1 +sbwt none +sbwtdcpu none +sbwtdio none"
            - name: HOME
              value: /work/home
            - name: XDG_CACHE_HOME
              value: /work/cache
            - name: GLEAM_HOME
              value: /work/gleam-home
            - name: GLEAM_BROADCAST_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-gleamlang-server-secrets
                  key: GLEAM_BROADCAST_SECRET
            - name: GLEAM_NATS_PUBLISH_URL
              value: http://127.0.0.1:8083/publish
            - name: NATS_PUBLISH_SUBJECT
              value: dd.remote.websocket.events
            - name: RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleamlang-server-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: PG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleamlang-server-secrets
                  key: RDS_DATABASE_URL
                  optional: true
            - name: AGENT_TASKS_RDS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-gleamlang-server-secrets
                  key: AGENT_TASKS_RDS_DATABASE_URL
                  optional: true
            - name: PRESENCE_NOTIFY_SHARDS
              value: "256"
            - name: PRESENCE_WAL_ENABLED
              value: "true"
            # dd-runtime-config subscriber wiring (Gleam helper:
            # `dd_runtime_config_client.start_registration_loop`).
            - name: RUNTIME_CONFIG_SERVICE_NAME
              value: dd-gleamlang-server
            - name: RUNTIME_CONFIG_SCOPE
              value: dd-gleamlang-server
            - name: RUNTIME_CONFIG_ENV
              value: stage
            - name: RUNTIME_CONFIG_REGISTER_URL
              value: http://dd-runtime-config.default.svc.cluster.local:8110/subscribers
            - name: RUNTIME_CONFIG_APPLY_URL
              value: http://dd-gleamlang-server.default.svc.cluster.local:8081/internal/update-runtime-config
            - name: RUNTIME_CONFIG_SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
          envFrom:
            - secretRef:
                name: dd-gleamlang-server-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          volumeMounts:
            - name: gleam-build
              mountPath: /work
        - name: nats-bridge
          image: docker.io/library/node:22-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              exec node /opt/dd-next-1/remote/deployments/gleamlang-ws-server/nats-bridge.mjs
          env:
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
            - name: NATS_READ_SUBJECT
              value: dd.remote.events
            - name: NATS_EVENT_SUBJECT
              value: dd.remote.events
            - name: NATS_PUBLISH_SUBJECT
              value: dd.remote.websocket.events
            - name: NATS_BRIDGE_HTTP_PORT
              value: '8083'
            - name: GLEAM_BROADCAST_URL
              value: http://127.0.0.1:8081/broadcast
            - name: GLEAM_BROADCAST_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-gleamlang-server-secrets
                  key: GLEAM_BROADCAST_SECRET
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: gleam-build
          emptyDir:
            sizeLimit: 4Gi
