apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dart-server
  namespace: default
  labels:
    app: dd-dart-server
spec:
  replicas: 1
  # Zero-surge rollout: same shape as dd-akka-ws-server / dd-billing-server.
  # The single-node EC2 cluster cannot host two replicas during a rolling
  # deploy.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-dart-server
  template:
    metadata:
      labels:
        app: dd-dart-server
      annotations:
        dd.dev/code-revision: '2026-05-22-prebuilt-image'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: dart-server
          # Pre-built multi-stage image (see ../../Dockerfile). Built on the
          # EC2 host with:
          #   docker build \
          #     -f remote/deployments/dart-server/Dockerfile \
          #     -t dd-dart-server:dev \
          #     .
          # All Flutter and Dart compilation happens at image-build time, so
          # the pod only runs the AOT-compiled `dd-dart-server` binary and
          # serves the pre-built Flutter SPA + mobile bundles. This matches
          # the dd-formal-methods-server / dd-remote-web-home pattern.
          image: docker.io/library/dd-dart-server:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8089'
            - name: STATIC_DIR
              value: /opt/dd-dart-server/public
            - name: MOBILE_STATIC_DIR
              value: /opt/dd-dart-server/mobile-public
            - name: READY_AT_BOOT
              value: 'true'
          ports:
            - name: http
              containerPort: 8089
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # NOTE: limits sized for the 20K-WS load test against /dart/wss
          # (one Dart isolate per session). The single-EC2-node cluster has
          # 123 GiB RAM available, so 32 GiB is well within budget while
          # leaving room for everything else. Drop these back to 1 CPU /
          # 384 Mi after the comparison run if you don't need the headroom.
          resources:
            requests:
              cpu: '1'
              memory: 2Gi
            limits:
              cpu: '8'
              memory: 32Gi
