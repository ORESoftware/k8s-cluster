apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dart-server
  namespace: default
  labels:
    app: dd-dart-server
spec:
  replicas: 1
  # Zero-surge rollout: same shape as dd-akka-ws-server / dd-billing-server.
  # The single-node EC2 cluster cannot host two replicas during a rolling
  # deploy.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-dart-server
  template:
    metadata:
      labels:
        app: dd-dart-server
      annotations:
        dd.dev/code-revision: '2026-05-22-revert-to-runtime-build'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: dart-server
          # Runtime build pattern: the cirruslabs Flutter image holds Dart
          # + Flutter, mounts the repo via hostPath, and compiles the AOT
          # server at start. Flutter web build is gated behind
          # SKIP_FLUTTER_BUILD so the Jaspr SSR pages and /dart/wss come
          # up even when the Flutter SPA isn't ready.
          #
          # We will switch to a pre-built `dd-dart-server:dev` containerd
          # image once `nerdctl build` on the host has produced one; until
          # then this is the safe shape that keeps the deploy alive.
          image: ghcr.io/cirruslabs/flutter:3.44.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/dart-server
              echo "[dd-dart-server] starting build-and-run.sh"
              exec scripts/build-and-run.sh
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8089'
            - name: STATIC_DIR
              value: /opt/dd-next-1/remote/deployments/dart-server/public
            - name: MOBILE_STATIC_DIR
              value: /opt/dd-next-1/remote/deployments/dart-server/mobile-public
            - name: READY_AT_BOOT
              value: 'true'
            - name: DEV_MODE
              value: 'false'
            - name: SKIP_FLUTTER_BUILD
              value: 'true'
            - name: PUB_CACHE
              value: /home/cirrus/.pub-cache
          ports:
            - name: http
              containerPort: 8089
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 384Mi
            limits:
              cpu: '2'
              memory: 1500Mi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: pub-cache
              mountPath: /home/cirrus/.pub-cache
            - name: flutter-cache
              mountPath: /opt/flutter/bin/cache
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: pub-cache
          hostPath:
            path: /home/ec2-user/.cache/pub-cache-dart-server
            type: DirectoryOrCreate
        - name: flutter-cache
          hostPath:
            path: /home/ec2-user/.cache/flutter-cache-dart-server
            type: DirectoryOrCreate
