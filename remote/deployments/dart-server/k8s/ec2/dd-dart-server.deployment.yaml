apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dart-server
  namespace: default
  labels:
    app: dd-dart-server
spec:
  # Multi-replica horizontal sharding for the WS gateway.
  #
  # Each Dart pod has a single gateway isolate (one event loop) doing
  # accept + WS upgrade + per-frame socket I/O for every connection it
  # owns. That single event loop tops out around ~6.8K concurrent WS
  # peers on one EC2 c5 vCPU before connect timeouts dominate. With
  # replicas=4 + kube-proxy iptables LB we cap each pod at ~5K and
  # leave headroom for the 1Hz clock fan-out and bus deliveries.
  #
  # The cluster is single-node, so all replicas land on the same EC2
  # host. CPU request stays at 1 (4 vCPU total scheduled) but the limit
  # remains 8 per pod for burst capacity. Memory request 2 Gi × 4 = 8
  # Gi steady-state; the node has 32 Gi.
  replicas: 4
  # Sequential rolling update: bring one pod down, one up, repeat.
  # The single-node EC2 cluster has limited spare capacity, so we
  # avoid surging extra replicas during deploys.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-dart-server
  template:
    metadata:
      labels:
        app: dd-dart-server
      annotations:
        dd.dev/code-revision: '2026-05-23-hardening-and-replica-shard'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: dart-server
          # Pre-built multi-stage image (see ../../Dockerfile). Built on the
          # EC2 host with:
          #   docker build \
          #     -f remote/deployments/dart-server/Dockerfile \
          #     -t dd-dart-server:dev \
          #     .
          # All Flutter and Dart compilation happens at image-build time, so
          # the pod only runs the AOT-compiled `dd-dart-server` binary and
          # serves the pre-built Flutter SPA + mobile bundles. This matches
          # the dd-formal-methods-server / dd-remote-web-home pattern.
          image: docker.io/library/dd-dart-server:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8089'
            - name: STATIC_DIR
              value: /opt/dd-dart-server/public
            - name: MOBILE_STATIC_DIR
              value: /opt/dd-dart-server/mobile-public
            - name: READY_AT_BOOT
              value: 'true'
            # Host-pool tuning: how many WebSocket sessions share one
            # session-host isolate. 100 is the conservative default; the
            # supervisor lazily spawns hosts up to ceil(connections/100).
            # Range 1..2000. Setting 1 reproduces the legacy
            # one-isolate-per-session behaviour for A/B comparison.
            - name: SESSIONS_PER_HOST
              value: '100'
            # Internal port for the dedicated HTTP isolate. Keep this
            # in sync with the `http` port on dd-dart-server Service
            # and with the ingress route for non-WS /dart/* paths.
            - name: HTTP_INTERNAL_PORT
              value: '8090'
            # Max idle time (in seconds) the server tolerates on a WS
            # session before emitting a 4001 `idle_timeout` close. Set
            # to 0 to disable.
            - name: WS_IDLE_TIMEOUT_SECONDS
              value: '300'
            # Hardening knobs (see lib/server/session_supervisor.dart):
            #   * frame size cap — kills 1009 (`message too big`).
            #   * outbound rate cap — kills 1011 slow-client.
            - name: WS_MAX_INBOUND_BYTES
              value: '65536'
            - name: WS_MAX_OUTBOUND_RATE_PER_SECOND
              value: '200'
            - name: WS_SLOW_CLIENT_WINDOWS
              value: '5'
            # SIGTERM grace: the supervisor stops accepting + asks all
            # hosts to drain. The pod also has terminationGracePeriod=30
            # so we reserve 5s for the kubelet to actually deliver
            # SIGKILL after our drain budget elapses.
            - name: SHUTDOWN_GRACE_SECONDS
              value: '25'
          ports:
            - name: ws
              containerPort: 8089
            - name: http
              containerPort: 8090
          # All three probes hit the dedicated HTTP isolate (port `http`,
          # 8090). The gateway isolate (port `ws`, 8089) can be heavily
          # loaded by WebSocket pumps under stress; the HTTP isolate is
          # a separate event loop that should always respond promptly,
          # which is exactly what we want from a probe authority.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # NOTE: limits sized for the 20K-WS load test against /dart/wss.
          # The host-pool architecture is dramatically lighter than the
          # legacy 1-isolate-per-session model (≈ 200 hosts at default
          # SESSIONS_PER_HOST=100 vs 20K isolates), but we keep the same
          # ceiling for direct A/B comparison. Drop these back to
          # 1 CPU / 384 Mi after the comparison run if you don't need
          # the headroom.
          resources:
            requests:
              cpu: '1'
              memory: 2Gi
            limits:
              cpu: '8'
              memory: 32Gi
