apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-dart-server
  namespace: default
  labels:
    app: dd-dart-server
spec:
  replicas: 1
  # Zero-surge rollout: same shape as dd-akka-ws-server / dd-billing-server.
  # The single-node EC2 cluster cannot host two replicas during a rolling
  # deploy.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dd-dart-server
  template:
    metadata:
      labels:
        app: dd-dart-server
      annotations:
        dd.dev/code-revision: '2026-05-22-flutter-base-href-placeholder'
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: dart-server
          # ghcr.io/cirruslabs/flutter ships both the Dart SDK and the
          # Flutter SDK in /opt/flutter, so a single image can build both
          # the server (dart compile exe) and the web bundle (flutter build
          # web). Pin to the same Flutter version we use for local builds.
          image: ghcr.io/cirruslabs/flutter:3.44.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          # Bash-only `set -o pipefail` lives in /bin/bash; the cirruslabs
          # image ships it. (Same shape as the dash-vs-bash fix in
          # commit b7b3c1b on fsharp-ws-server.)
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /opt/dd-next-1/remote/deployments/dart-server
              echo "[dd-dart-server] starting build-and-run.sh"
              exec scripts/build-and-run.sh
          env:
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: '8089'
            - name: STATIC_DIR
              value: /opt/dd-next-1/remote/deployments/dart-server/public
            - name: READY_AT_BOOT
              value: 'true'
            # Hot reload toggle. When DEV_MODE=true, the in-pod runner
            # boots `dart run --enable-vm-service` (JIT) instead of
            # `dart compile exe` (AOT) and the in-process HotReloader
            # watches lib/ + bin/ for .dart changes — every isolate
            # picks up new code without dropping any open WebSocket.
            #
            # Endpoints when DEV_MODE=true:
            #   POST /dart/admin/reload            → reload all isolates
            #   GET  /dart/admin/hot-reload-status → JSON status + last result
            #
            # Set this through ArgoCD's `Refresh` UI or by editing the
            # Application's `parameters` so cluster ops can flip the
            # mode without rebuilding an image.
            - name: DEV_MODE
              value: 'false'
            # `flutter pub get` writes to a per-user cache. Anchor it at a
            # hostPath volume so subsequent boots don't re-download all of
            # pub.
            - name: PUB_CACHE
              value: /home/cirrus/.pub-cache
          ports:
            - name: http
              containerPort: 8089
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            # Cold flutter+dart build can take a minute or two on a small
            # EC2 host. Match the billing-server-rs cold-build budget.
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 384Mi
            limits:
              cpu: '2'
              memory: 1500Mi
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
            - name: pub-cache
              mountPath: /home/cirrus/.pub-cache
            - name: flutter-cache
              mountPath: /opt/flutter/bin/cache
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: pub-cache
          hostPath:
            path: /home/ec2-user/.cache/pub-cache-dart-server
            type: DirectoryOrCreate
        - name: flutter-cache
          hostPath:
            path: /home/ec2-user/.cache/flutter-cache-dart-server
            type: DirectoryOrCreate
