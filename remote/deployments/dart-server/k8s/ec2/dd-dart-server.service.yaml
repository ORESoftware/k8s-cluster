apiVersion: v1
kind: Service
metadata:
  name: dd-dart-server
  namespace: default
  labels:
    app: dd-dart-server
spec:
  selector:
    app: dd-dart-server
  ports:
    # `admin` exposes the coordinator (main isolate): probes,
    # /metrics, /dart/admin/*. The coordinator does no WS work and is
    # the canonical place for operator + Prometheus traffic.
    - name: admin
      port: 8088
      targetPort: 8088
    # `ws` exposes the gateway-shard pool. Each pod runs N shards
    # bound `shared: true` on this port; kube-proxy sees a single
    # service endpoint and the kernel SO_REUSEPORT hash distributes
    # accepted connections across shards inside the pod.
    - name: ws
      port: 8089
      targetPort: 8089
    # `http` exposes the dedicated HTTP isolate. The ingress should
    # route every non-WS, non-admin /dart/* path here so HTML rendering
    # and static file IO never compete with WS pumps for event-loop
    # time on the gateway isolate.
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
