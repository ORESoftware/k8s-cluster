name: dd_dart_flutter_mobile_app
description: >-
  Flutter web bundle served from /dart/mobile/. Mobile-optimized landing
  surface that lists the Jaspr SSR pages and stubs a connect button to
  /dart/wss. Independent of flutter_app/ so the two bundles can evolve
  separately.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  rxdart: ^0.28.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
