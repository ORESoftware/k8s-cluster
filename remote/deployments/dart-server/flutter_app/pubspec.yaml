name: dd_dart_flutter_app
description: >-
  Flutter web SPA served from /dart/app. Embeds HTMX over WebSocket for
  the dynamic surface and uses RxDart for the Flutter-side state graph.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  rxdart: ^0.28.0
  web: ^1.1.1
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
