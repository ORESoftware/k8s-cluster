[package]
name = "dd-ocr-rs"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[features]
# tesseract-bridge -> compiles the cpp/tesseract_bridge.cpp shim and links it
# against libtesseract + Leptonica (the local open-source OCR engine), both
# discovered via pkg-config. Build with --no-default-features to compile/run
# without the native OCR toolchain; the local `tesseract` engine then reports
# unavailable and only the cloud backends (Google/AWS/Azure) are usable.
default = ["tesseract-bridge"]
tesseract-bridge = []

[dependencies]
dd-telemetry = { path = "../../libs/telemetry-rs" }
tracing = "0.1"
async-nats = "=0.38.0"
axum = { version = "0.7", features = ["macros"] }
base64 = "0.22"
dd-nats-subject-defs = { path = "../../libs/nats/subject-defs/generated/rust" }
dd-runtime-config-client = { path = "../../libs/runtime-config-client-rs" }
futures-util = "0.3"
hex = "0.4"
hmac = "0.12"
# Pure-Rust open-source image decode/preprocess for the local OCR path. No
# default features so we don't link a system image stack — only the codecs the
# OCR front-end needs.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "tiff", "bmp", "gif"] }
imageproc = "0.25"
# rustls (no OpenSSL) so the slim runtime image needs no native TLS stack.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }

[build-dependencies]
# Used only when the tesseract-bridge feature is on, to compile the C++ shim.
cc = "1"
