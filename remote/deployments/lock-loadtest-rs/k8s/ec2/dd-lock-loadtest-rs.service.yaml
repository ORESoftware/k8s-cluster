apiVersion: v1
kind: Service
metadata:
  name: dd-lock-loadtest-rs
  namespace: default
  labels:
    app: dd-lock-loadtest-rs
    role: lock-loadtester
    runtime: rust
  annotations:
    # Same scrape pattern as `dd-live-mutex-submodule`. The
    # `lock_loadtest_*` metrics expose last-run gauges + run counters.
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8120'
    prometheus.io/path: /metrics
spec:
  selector:
    app: dd-lock-loadtest-rs
  ports:
    - name: http
      port: 8120
      targetPort: http
