apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-lock-loadtest-rs
  namespace: default
  labels:
    app: dd-lock-loadtest-rs
    role: lock-loadtester
    runtime: rust
spec:
  # Single replica is enough; the trigger API runs benchmarks on
  # demand, not continuously, so we never need horizontal load on
  # this pod itself. (The pod *generates* load against brokers; its
  # own throughput is bounded by what one Tokio runtime can saturate.)
  replicas: 1
  strategy:
    # The pod has at most one in-flight bench window. Recreate is
    # safer than RollingUpdate because we don't want two pods racing
    # benchmarks against the same broker.
    type: Recreate
  selector:
    matchLabels:
      app: dd-lock-loadtest-rs
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-23-lock-loadtest-rs'
      labels:
        app: dd-lock-loadtest-rs
        role: lock-loadtester
        runtime: rust
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      containers:
        - name: lock-loadtest-rs
          # Same hostPath-build pattern as `dd-rust-network-mutex`.
          # We could push to ECR but mutex workloads in this cluster
          # are uniformly source-built at pod start, so this stays
          # consistent with the operator runbook.
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              cd /opt/dd-next-1/remote/deployments/lock-loadtest-rs
              /usr/local/cargo/bin/cargo build --release
              exec /opt/dd-next-1/remote/deployments/lock-loadtest-rs/target/release/dd-lock-loadtest-rs
          env:
            - name: HTTP_BIND
              value: 0.0.0.0:8120
            # Default broker target; the trigger API can override per
            # request, so this is just the "no body" default.
            - name: BROKER_HOST
              value: dd-rust-network-mutex.default.svc.cluster.local
            - name: BROKER_PORT
              value: '6970'
            - name: RUST_LOG
              value: info
          ports:
            - name: http
              containerPort: 8120
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              # Tokio multi-thread runtime; the worker pool can drive
              # 80k+ acquires/sec on `localhost`. Network paths inside
              # the cluster are slower, so this is generous headroom.
              cpu: '4'
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
