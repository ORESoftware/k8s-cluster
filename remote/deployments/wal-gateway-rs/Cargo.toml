[package]
name = "dd-wal-gateway"
version = "0.1.0"
edition = "2021"

# Single-instance (leader-elected) Postgres logical-replication consumer.
#
# Reads from a `wal2json` slot on the shared pg-defs RDS database and fans
# row changes out over NATS JetStream subjects shaped like
# `cdc.<schema>.<table>.<op>`. Application services subscribe via the
# `dd-wal-consumer` crate; they never touch Postgres on the read path.
#
# Why a separate service: each replication slot retains WAL on the database
# until its consumer advances. Running one slot per service-pod multiplies
# both slot count and retention risk by pod count. Centralising the read
# side bounds both to one slot (or N for HA, leader-elected).

[dependencies]
async-nats = "=0.38.0"
axum = { version = "0.7", features = ["macros"] }
prometheus = "0.13"
rustls = { version = "=0.23.20", default-features = false, features = ["ring", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time", "sync"] }
tokio-postgres = { version = "=0.7.12", features = ["with-serde_json-1"] }
tokio-postgres-rustls = "=0.12.0"
webpki-roots = "=0.26.7"
