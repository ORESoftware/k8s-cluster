apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-routing-server-master
  namespace: ai-ml
  labels:
    app: dd-routing-server-master
    app.kubernetes.io/component: master
spec:
  replicas: 1
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: dd-routing-server-master
  template:
    metadata:
      labels:
        app: dd-routing-server-master
        app.kubernetes.io/component: master
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: routing
          image: REPLACE_ME_ECR_URI/dd-routing-server:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8132'
            - name: ROUTING_NODE_ROLE
              value: master
            - name: NATS_URL
              value: nats://dd-nats.messaging.svc.cluster.local:4222
          ports:
            - name: http
              containerPort: 8132
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: '1'
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
