apiVersion: v1
kind: ServiceAccount
metadata:
  name: dd-cluster-mcp-rs
  namespace: default
  labels:
    app: dd-cluster-mcp-rs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dd-cluster-mcp-rs-read-inventory
  labels:
    app: dd-cluster-mcp-rs
rules:
  - apiGroups:
      - ''
    resources:
      - endpoints
      - events
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - serviceaccounts
      - services
    verbs:
      - list
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - list
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - list
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - list
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - list
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - list
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dd-cluster-mcp-rs-read-inventory
  labels:
    app: dd-cluster-mcp-rs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dd-cluster-mcp-rs-read-inventory
subjects:
  - kind: ServiceAccount
    name: dd-cluster-mcp-rs
    namespace: default
