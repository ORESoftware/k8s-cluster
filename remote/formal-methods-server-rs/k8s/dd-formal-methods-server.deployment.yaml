apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-formal-methods-server
  namespace: default
  labels:
    app: dd-formal-methods-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-formal-methods-server
  template:
    metadata:
      annotations:
        dd.dev/telemetry-revision: '2026-05-17-formal-methods-server'
      labels:
        app: dd-formal-methods-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: formal-methods-server
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              if ! command -v z3 >/dev/null 2>&1; then
                echo "installing z3..."
                apt-get update
                apt-get install -y --no-install-recommends z3
                rm -rf /var/lib/apt/lists/*
              fi
              export CARGO_HOME=/tmp/cargo
              export CARGO_TARGET_DIR=/tmp/dd-formal-methods-server-target
              export HOME=/tmp
              mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
              cd /opt/dd-next-1/remote/formal-methods-server-rs
              exec /usr/local/cargo/bin/cargo run --release
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_TARGET_DIR
              value: /tmp/dd-formal-methods-server-target
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8110'
            - name: FORMAL_METHODS_WORK_ROOT
              value: /var/lib/dd-formal-methods-server/jobs
            - name: FORMAL_METHODS_GIT_BIN
              value: git
            - name: FORMAL_METHODS_Z3_BIN
              value: z3
            - name: FORMAL_METHODS_ALLOWED_REPO_PREFIXES
              value: https://github.com/,git@github.com:,ssh://git@github.com/
            - name: FORMAL_METHODS_MAX_CONCURRENT
              value: '2'
            - name: FORMAL_METHODS_JOB_TIMEOUT_SECONDS
              value: '900'
            - name: FORMAL_METHODS_Z3_TIMEOUT_SECONDS
              value: '5'
            - name: FORMAL_METHODS_MAX_LOG_BYTES
              value: '4194304'
            - name: FORMAL_METHODS_MAX_FILES
              value: '5000'
            - name: FORMAL_METHODS_MAX_FILE_BYTES
              value: '524288'
            - name: FORMAL_METHODS_MAX_FINDINGS_PER_JOB
              value: '5000'
            - name: SERVER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: SERVER_AUTH_SECRET
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: GITHUB_WEBHOOK_SECRET
                  optional: true
            - name: GITHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dd-agent-secrets
                  key: GITHUB_API_TOKEN
                  optional: true
            - name: FORMAL_METHODS_PR_DIFF_ONLY
              value: 'true'
            - name: FORMAL_METHODS_PR_BASE_FETCH_DEPTH
              value: '200'
            - name: FORMAL_METHODS_PR_COMMENT_MAX_ROWS
              value: '25'
          ports:
            - name: http
              containerPort: 8110
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: '2'
              memory: 1500Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: repo
              mountPath: /opt/dd-next-1
              readOnly: true
            - name: work
              mountPath: /var/lib/dd-formal-methods-server
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/ec2-user/codes/dd/dd-next-1
            type: Directory
        - name: work
          hostPath:
            path: /var/lib/dd-formal-methods-server
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
