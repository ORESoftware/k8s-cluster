# TEMPLATE — DO NOT COMMIT WITH REAL VALUES.
#
# Copy to `02-secrets.yaml` (gitignored), fill in, then `kubectl apply`.
# For production, prefer External Secrets Operator + AWS Secrets Manager
# so rotated values land in the cluster automatically.
#
# Each thread pod mounts these as env vars via `envFrom`. The dev-server
# enforces an env allowlist before spawning the agent so the agent
# itself never sees the GitHub PAT, deploy key, Supabase service-role
# key, or any of the shared secrets.
apiVersion: v1
kind: Secret
metadata:
  name: dd-agent-secrets
  namespace: dd-dev
type: Opaque
stringData:
  # ---- Auth (Vercel ↔ pod) ----
  SERVER_AUTH_SECRET: "REPLACE_ME_long_random_>=32_chars"
  REMOTE_DEV_TOKEN_SECRET: "REPLACE_ME_long_random_>=32_chars"
  EVENT_INGEST_SECRET: "REPLACE_ME_matches_REMOTE_DEV_INGEST_SECRET_on_vercel"
  HEARTBEAT_SECRET:   "REPLACE_ME_matches_REMOTE_DEV_HEARTBEAT_SECRET_on_vercel"
  REMOTE_DEV_REAPER_SECRET: "REPLACE_ME_matches_REMOTE_DEV_REAPER_SECRET_on_vercel"

  # ---- Model providers ----
  # Pin model names here so newer flagships don't silently replace your
  # tested config. Comment out the providers you don't use.
  ANTHROPIC_API_KEY: "REPLACE_ME"
  ANTHROPIC_MODEL:   "claude-opus-4-7"
  # ANTHROPIC_BASE_URL: "https://api.anthropic.com"  # Bedrock proxy etc.

  GEMINI_API_KEY: "REPLACE_ME"
  GEMINI_MODEL: "gemini-3-pro-preview"

  OPENAI_API_KEY: "REPLACE_ME"
  OPENAI_MODEL:   "gpt-5.5"
  # OPENAI_BASE_URL: ""  # Azure OpenAI etc.
  # OPENAI_ORG: ""
  # CODEX_MODEL: "gpt-5.5"  # only used by openai-codex-cli runner

  # ---- GitHub (push branches + open PRs) ----
  DD_REPO_URL: "git@github.com:org/repo.git"
  DD_REPO_REF: "dev"
  GH_PAT: "REPLACE_ME_fine_grained_PAT_with_Contents+PR_write_on_configured_repo"
  GH_DEPLOY_KEY: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_ME_full_private_key
    -----END OPENSSH PRIVATE KEY-----

  # ---- Supabase (Realtime fan-out) ----
  SUPABASE_URL: "https://REPLACE_ME.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_ME"

  # ---- Redis (control-plane cache for threadId → pod mapping) ----
  # Same Upstash instance Vercel uses, so cache hits are cross-tier.
  UPSTASH_REDIS_REST_URL: "REPLACE_ME"
  UPSTASH_REDIS_REST_TOKEN: "REPLACE_ME"

  # ---- Storage (artifacts) ----
  # Fill in the section matching DEFAULT_STORAGE_PROVIDER in the configmap.
  # R2 is the default. The other three providers stay scaffolded for
  # easy switching (gcs / drive throw on call until their SDKs are
  # wired in remote/dev-server/src/storage/{gcs,drive}.ts).

  # Cloudflare R2 (active default).
  R2_BUCKET: "REPLACE_ME"
  R2_ACCESS_KEY_ID: "REPLACE_ME"
  R2_SECRET_ACCESS_KEY: "REPLACE_ME"
  R2_PUBLIC_BASE_URL: "https://REPLACE_ME-cdn.example.com"

  # AWS S3 (alternative).
  # S3_BUCKET: "REPLACE_ME"
  # S3_ACCESS_KEY_ID: "REPLACE_ME"
  # S3_SECRET_ACCESS_KEY: "REPLACE_ME"
  # S3_PUBLIC_BASE_URL: "https://REPLACE_ME.cloudfront.net"

  # Google Cloud Storage (scaffold — SDK not wired yet).
  # GCS_PROJECT_ID: "REPLACE_ME"
  # GCS_BUCKET: "REPLACE_ME"
  # GCS_KEY_JSON_BASE64: "REPLACE_ME"
  # GCS_PUBLIC_BASE_URL: "https://storage.googleapis.com/REPLACE_ME"

  # Google Drive (scaffold — SDK not wired yet).
  # DRIVE_FOLDER_ID: "REPLACE_ME"
  # DRIVE_KEY_JSON_BASE64: "REPLACE_ME"

  # ---- Container self-registration (used by control-plane lookup) ----
  # Public ingress hostname through which Vercel reaches each pod.
  # The pod composes `<INGRESS_BASE_URL>/<podName>/...` and writes that
  # to its Redis registration on boot.
  INGRESS_BASE_URL: "https://agents.example.com"
