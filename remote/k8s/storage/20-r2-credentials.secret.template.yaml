# TEMPLATE — DO NOT COMMIT WITH REAL VALUES.
#
# Copy to 20-r2-credentials.secret.yaml (gitignored), fill from Terraform
# outputs, then `kubectl apply -f`. For production prefer External Secrets
# Operator so rotated values land here automatically.
#
#   R2_ACCESS_KEY_ID     <- terraform output -raw r2_access_key_id
#   R2_SECRET_ACCESS_KEY <- terraform output -raw r2_secret_access_key
#
# Mount into a workload with:  envFrom: [{ secretRef: { name: r2-credentials } }, { configMapRef: { name: r2-config } }]
apiVersion: v1
kind: Secret
metadata:
  name: r2-credentials
  namespace: ores-k8s-storage
type: Opaque
stringData:
  R2_ACCESS_KEY_ID: "REPLACE_ME"
  R2_SECRET_ACCESS_KEY: "REPLACE_ME"
