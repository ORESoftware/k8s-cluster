name: pg-defs generated bindings drift

on:
  pull_request:
    paths:
      # remote/libs is now a submodule; pg-defs source changes land in
      # ORESoftware/k8s-libs-and-shared-defs. In this repo only the gitlink
      # at `remote/libs` moves, so trigger the wiring checks on that bump.
      - 'remote/libs'
      - 'remote/databases/pg/**'
      - 'remote/deployments/gleam-lambda-runner/**'
      - 'remote/deployments/gleam-mcp-server/**'
      - 'remote/deployments/gleamlang-server/**'
      - 'remote/deployments/**/src/**'
      - 'remote/deployments/**/nats-bridge.mjs'
      - 'remote/deployments/rest-api-rs/**'
      - 'remote/deployments/web-home-rs/**'
      - 'remote/tests/general/pg-defs-bindings.test.ts'
      - 'remote/tests/general/pg-declarative-diff.test.ts'
      - 'remote/tests/general/pg-sql-centralized.test.ts'
      - 'remote/tests/general/rest-api-route-parity.test.ts'
      - 'remote/tests/general/gleam-pg-defs-wiring.test.ts'
      - 'remote/tests/general/rust-pg-defs-wiring.test.ts'
      - 'remote/tests/check-rest-api-route-parity.mjs'
      - 'remote/tools/generate-api-docs.mjs'
      - 'scripts/pg/diff/**'
      - 'remote/deployments/**/generated/api-docs.*'
      - 'remote/deployments/generated-api-docs-index.json'
      - 'remote/deployments/generated-api-docs-index.html'
      - 'AGENTS.md'
      - '.github/workflows/pg-defs-check.yml'
  push:
    branches:
      - dev
      - main
    paths:
      # remote/libs is now a submodule; pg-defs source changes land in
      # ORESoftware/k8s-libs-and-shared-defs. In this repo only the gitlink
      # at `remote/libs` moves, so trigger the wiring checks on that bump.
      - 'remote/libs'
      - 'remote/databases/pg/**'
      - 'remote/deployments/gleam-lambda-runner/**'
      - 'remote/deployments/gleam-mcp-server/**'
      - 'remote/deployments/gleamlang-server/**'
      - 'remote/deployments/**/src/**'
      - 'remote/deployments/**/nats-bridge.mjs'
      - 'remote/deployments/rest-api-rs/**'
      - 'remote/deployments/web-home-rs/**'
      - 'remote/tests/general/pg-defs-bindings.test.ts'
      - 'remote/tests/general/pg-declarative-diff.test.ts'
      - 'remote/tests/general/pg-sql-centralized.test.ts'
      - 'remote/tests/general/rest-api-route-parity.test.ts'
      - 'remote/tests/general/gleam-pg-defs-wiring.test.ts'
      - 'remote/tests/general/rust-pg-defs-wiring.test.ts'
      - 'remote/tests/check-rest-api-route-parity.mjs'
      - 'remote/tools/generate-api-docs.mjs'
      - 'scripts/pg/diff/**'
      - 'remote/deployments/**/generated/api-docs.*'
      - 'remote/deployments/generated-api-docs-index.json'
      - 'remote/deployments/generated-api-docs-index.html'
      - 'AGENTS.md'
      - '.github/workflows/pg-defs-check.yml'

permissions:
  contents: read

concurrency:
  group: pg-defs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: generate.mjs --check (all remote/libs generators)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # remote/libs is a submodule (ORESoftware/k8s-libs-and-shared-defs,
      # pinned to main) holding pg-defs/nats/interfaces. Without it the
      # generator + wiring steps below hit file-not-found. Only remote/libs
      # is needed here; it has a nested async-java submodule pinned to an
      # SSH URL, so rewrite git@github.com: to HTTPS (actions/checkout's
      # persisted extraheader token authenticates the HTTPS fetches).
      - name: Init remote/libs submodule only
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive --depth 1 remote/libs

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: remote/tests/pnpm-lock.yaml

      # The generators are dependency-light (Node stdlib only), so no `npm
      # install` is needed. Running `--check` re-runs each generator in
      # memory and compares against the committed `generated/` files; if any
      # file would change, the job fails and prints the stale path(s) so the
      # author can run `node remote/libs/<gen>/src/generate.mjs` locally and
      # commit the diff. Each generator's self-tests lock in its parser
      # contract before the downstream wiring jobs run per-language checks.
      - name: Verify generated bindings are in sync (all remote/libs generators)
        run: |
          set -euo pipefail
          for gen in pg-defs nats/subject-defs interfaces/redis interfaces/shared; do
            echo "::group::remote/libs/${gen}"
            node "remote/libs/${gen}/src/generate.mjs" --check
            node --test "remote/libs/${gen}/src/generate.test.mjs"
            echo "::endgroup::"
          done

      - name: Print SQL DDL for review on stale runs
        if: failure()
        run: node remote/libs/pg-defs/src/generate.mjs --print-sql

      # Enforce the "exactly two homes for .sql" rule: every table DDL must
      # live in remote/libs/pg-defs/schema/schema.sql and every fixture in
      # remote/databases/pg/seeds/. See remote/databases/pg/seeds/readme.md.
      - name: Install tsx (remote/tests)
        run: pnpm install --frozen-lockfile
        working-directory: remote/tests

      - name: Enforce SQL file centralization
        run: pnpm run test:cli:pg-sql-centralized
        working-directory: remote/tests

      - name: Verify report-only declarative RDS diff tooling
        run: pnpm run test:cli:pg-declarative-diff
        working-directory: remote/tests

      - name: Verify generated bindings are still consumed by every service
        run: pnpm run test:cli:pg-defs-bindings
        working-directory: remote/tests

  gleam-wiring:
    name: gleam test (dd_pg_defs + every consumer)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # remote/libs is a submodule (ORESoftware/k8s-libs-and-shared-defs,
      # pinned to main) holding pg-defs/nats/interfaces; the wiring steps
      # below hit file-not-found without it. The nested async-java submodule
      # uses an SSH URL, so rewrite git@github.com: to HTTPS.
      - name: Init remote/libs submodule only
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive --depth 1 remote/libs

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: remote/tests/pnpm-lock.yaml

      # Pin Erlang/OTP and Gleam to the same major as the runtime images in
      # remote/gleam-*/Dockerfile (ghcr.io/gleam-lang/gleam:v1.16.0-erlang-alpine).
      # If you bump the runtime image, bump these here too.
      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          gleam-version: '1.16.0'
          rebar3-version: '3'

      - name: Install tsx (remote/tests)
        run: pnpm install --frozen-lockfile
        working-directory: remote/tests

      # Drives `gleam test` in: the dd_pg_defs package itself,
      # dd-gleam-lambda-runner, dd-gleam-mcp-server, and dd-gleamlang-server.
      # Also asserts each consumer's manifest.toml records dd_pg_defs as a
      # local path-dep and that build/dev/erlang/dd_pg_defs/ is populated
      # after the build (so silent dep drops never reach production).
      - name: Verify Gleam services compile + test against dd_pg_defs
        run: pnpm run test:cli:gleam-pg-defs-wiring
        working-directory: remote/tests

  rust-wiring:
    name: cargo check + cargo test (dd-remote-rest-api pg_contract)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # remote/libs is a submodule (ORESoftware/k8s-libs-and-shared-defs,
      # pinned to main) holding pg-defs/nats/interfaces; the wiring steps
      # below hit file-not-found without it. The nested async-java submodule
      # uses an SSH URL, so rewrite git@github.com: to HTTPS.
      - name: Init remote/libs submodule only
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive --depth 1 remote/libs

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: remote/tests/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            remote/deployments/rest-api-rs/target
            remote/libs/pg-defs/generated/rust/target
          key: ${{ runner.os }}-cargo-pg-defs-${{ hashFiles('remote/deployments/rest-api-rs/Cargo.lock', 'remote/libs/pg-defs/generated/rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pg-defs-

      - name: Install tsx (remote/tests)
        run: pnpm install --frozen-lockfile
        working-directory: remote/tests

      # Asserts:
      #   1. dd-remote-rest-api lists dd-pg-defs as a path-dep
      #   2. src/pg_contract.rs re-exports + provides assert_canonical_schema_matches_local_reads()
      #   3. main.rs calls that assertion at startup
      #   4. dd-remote-web-home stays free of any direct Postgres deps
      #   5. cargo check passes (proves the path-dep resolves)
      #   6. cargo test pg_contract passes (subset + table-name + status round-trip)
      - name: Verify Rust services compile + test against dd-pg-defs
        run: pnpm run test:cli:rust-pg-defs-wiring
        working-directory: remote/tests

      - name: Verify REST API route parity
        run: pnpm run test:cli:rest-api-route-parity
        working-directory: remote/tests
