name: Remote Dev Server ECR Image

on:
  schedule:
    # GitHub cron is UTC. These cover 4am Eastern in EST and EDT; the
    # first step exits unless America/New_York local time is actually 04.
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if this is not the 3-day cadence slot'
        required: false
        default: 'true'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.REMOTE_DEV_ECR_REPOSITORY || 'dd-dev-server' }}
  DD_REPO_URL: ${{ vars.REMOTE_DEV_REPO_URL || 'git@github.com:dancing-dragons/dd-next-1.git' }}
  DD_REPO_REF: ${{ vars.REMOTE_DEV_REPO_REF || 'dev' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check 4am Eastern 3-day cadence
        id: cadence
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          eastern_hour="$(TZ=America/New_York date +%H)"
          if [ "$eastern_hour" != "04" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          days_since_epoch="$(( $(date -u +%s) / 86400 ))"
          if [ "$(( days_since_epoch % 3 ))" = "0" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Configure AWS credentials
        if: steps.cadence.outputs.should_run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.REMOTE_DEV_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.cadence.outputs.should_run == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.cadence.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.cadence.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        env:
          REMOTE_DEV_GITHUB_DEPLOY_KEY: ${{ secrets.REMOTE_DEV_GITHUB_DEPLOY_KEY }}
        with:
          context: remote/dev-server
          file: remote/dev-server/Dockerfile
          push: true
          build-args: |
            DD_REPO_URL=${{ env.DD_REPO_URL }}
            DD_REPO_REF=${{ env.DD_REPO_REF }}
          secret-envs: |
            github_deploy_key=REMOTE_DEV_GITHUB_DEPLOY_KEY
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
