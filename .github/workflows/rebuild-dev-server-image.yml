# Rebuild the dd-dev-server Docker image and push to ECR.
#
# Schedule: every 3 days at 4am Eastern (8am UTC).
# This ensures the baked repo clone + node_modules inside the image
# stay reasonably fresh — the container's entrypoint.sh does a
# `git fetch + checkout + pnpm install` at startup, but with a fresh
# image the delta is minimal (seconds, not minutes).
#
# Also triggerable via workflow_dispatch for manual rebuilds.

name: Rebuild Dev Server Image

on:
  schedule:
    # GitHub cron is UTC. Run at both possible 4am Eastern UTC offsets
    # and gate below so daylight saving time stays correct.
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to bake into the image (default: dev)"
        required: false
        default: "dev"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dd-dev-server
  DD_REPO_URL: git@github.com:dancing-dragons/dd-next-1.git

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine branch and tags
        id: meta
        run: |
          EASTERN_HOUR=$(TZ=America/New_York date +%H)
          EASTERN_EPOCH_DAY=$(TZ=America/New_York date +%s)
          EASTERN_DAY_NUMBER=$((EASTERN_EPOCH_DAY / 86400))
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$EASTERN_HOUR" != "04" ] || [ $((EASTERN_DAY_NUMBER % 3)) -ne 0 ]; then
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: not the every-third-day 4am Eastern slot."
              exit 0
            fi
          fi
          echo "should_build=true" >> "$GITHUB_OUTPUT"

          BRANCH="${{ github.event.inputs.branch || 'dev' }}"
          DATE_TAG=$(date +%Y%m%d-%H%M)
          SHORT_SHA=$(git rev-parse --short HEAD)
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:latest,${IMAGE}:${DATE_TAG},${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Write deploy key to temp file
        if: steps.meta.outputs.should_build == 'true'
        run: |
          echo "${{ secrets.GH_DEPLOY_KEY }}" > /tmp/dd_deploy
          chmod 600 /tmp/dd_deploy

      - name: Build and push
        if: steps.meta.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: remote/deployments/dev-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            DD_REPO_URL=${{ env.DD_REPO_URL }}
            DD_REPO_REF=${{ steps.meta.outputs.branch }}
          secrets: |
            github_deploy_key=/tmp/dd_deploy
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up deploy key
        if: always() && steps.meta.outputs.should_build == 'true'
        run: |
          : > /tmp/dd_deploy

      - name: Print image digest
        if: steps.meta.outputs.should_build == 'true'
        run: |
          echo "Image pushed: ${{ steps.meta.outputs.tags }}"
          echo "Branch baked: ${{ steps.meta.outputs.branch }}"
