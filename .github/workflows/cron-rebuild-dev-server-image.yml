# Rebuild the dd-dev-server Docker image and push to Amazon ECR.
#
# Schedule: Every 3 days at 4:00 AM Eastern (09:00 UTC).
# Purpose: Keep the baked dd-next-1 checkout fresh so that on container
#   start, `git fetch && git checkout --force origin/dev && pnpm install`
#   has minimal delta to apply. A 3-day-old image means at most ~3 days
#   of commits to fast-forward + ~3 days of lockfile drift to reconcile.
#
# Manual trigger: workflow_dispatch for ad-hoc rebuilds after large
#   pnpm-lock.yaml changes or Dockerfile edits.
#
# Prerequisites (GitHub repo secrets):
#   AWS_OIDC_ROLE_ARN   — IAM role ARN with ecr:GetAuthorizationToken,
#                         ecr:BatchCheckLayerAvailability, ecr:PutImage, etc.
#   DD_DEPLOY_KEY       — OpenSSH private key for git clone of dd-next-1
#                         (read access only, used during docker build).
#   ECR_REGISTRY        — e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com

name: Rebuild dd-dev-server image (ECR)

on:
  schedule:
    # Every 3 days at 08:00 UTC = 4am EDT / 3am EST.
    # GitHub Actions doesn't support "every N days" perfectly, but */3
    # fires on days 1,4,7,10,… which is close enough.
    - cron: "0 8 */3 * *"
  workflow_dispatch: {}

concurrency:
  group: rebuild-dev-server
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dd-dev-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write   # OIDC federation
      contents: read    # git checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 50

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          DATE_TAG="$(date -u +%Y%m%d)"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          GH_DEPLOY_KEY: ${{ secrets.DD_DEPLOY_KEY }}
        run: |
          IMAGE_BASE="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          DOCKER_BUILDKIT=1 docker build \
            --build-arg DD_REPO_URL=git@github.com:dancing-dragons/dd-next-1.git \
            --build-arg DD_REPO_REF=dev \
            --secret id=github_deploy_key,env=GH_DEPLOY_KEY \
            -t "${IMAGE_BASE}:${{ steps.tags.outputs.short_sha }}" \
            -t "${IMAGE_BASE}:${{ steps.tags.outputs.date_tag }}" \
            -t "${IMAGE_BASE}:latest" \
            remote/dev-server

          docker push "${IMAGE_BASE}:${{ steps.tags.outputs.short_sha }}"
          docker push "${IMAGE_BASE}:${{ steps.tags.outputs.date_tag }}"
          docker push "${IMAGE_BASE}:latest"

      - name: Job summary
        run: |
          echo "### 🐳 dd-dev-server image pushed to ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ steps.tags.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Date | \`${{ steps.tags.outputs.date_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The image is ready for ECS task definition update." >> "$GITHUB_STEP_SUMMARY"
