name: akrion GitOps

# Source repositories own code and CI. akrion-monorepo integrates their tested
# revisions, and this workflow promotes only a successful monorepo revision into
# k8s-cluster. Argo CD remains the sole deployment actor.
on:
  pull_request:
    paths:
      - '.github/workflows/akrion-gitops.yml'
      - '.github/workflows/repo-checks.yml'
      - '.gitmodules'
      - 'scripts/promote-akrion-gitops.rb'
      - 'scripts/validate-akrion-gitops.rb'
      - 'remote/argocd/akrion/**'
      - 'remote/argocd/akrion-training/**'
      - 'remote/argocd/dd-next-runtime/dd-akrion-web-server-rs.deployment.yaml'
      - 'remote/argocd/dd-next-runtime/dd-soccer-rs.deployment.yaml'
      - 'remote/argocd/dd-next-runtime/dd-soccer-learning-queue.cronjob.yaml'
      - 'remote/argocd/dd-next-runtime/dd-soccer-tournament-nightly.cronjob.yaml'
      - 'remote/argocd/clusters/aws/applications.yaml'
      - 'remote/argocd/clusters/hetzner/applications.yaml'
  push:
    branches: [dev]
    paths:
      - '.github/workflows/akrion-gitops.yml'
      - '.github/workflows/repo-checks.yml'
      - '.gitmodules'
      - 'scripts/promote-akrion-gitops.rb'
      - 'scripts/validate-akrion-gitops.rb'
      - 'remote/argocd/akrion/**'
      - 'remote/argocd/akrion-training/**'
      - 'remote/argocd/dd-next-runtime/dd-akrion-web-server-rs.deployment.yaml'
      - 'remote/argocd/dd-next-runtime/dd-soccer-rs.deployment.yaml'
      - 'remote/argocd/dd-next-runtime/dd-soccer-learning-queue.cronjob.yaml'
      - 'remote/argocd/dd-next-runtime/dd-soccer-tournament-nightly.cronjob.yaml'
      - 'remote/argocd/clusters/aws/applications.yaml'
      - 'remote/argocd/clusters/hetzner/applications.yaml'
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [akrion-release]

permissions:
  contents: read

concurrency:
  group: akrion-gitops-${{ github.event_name == 'pull_request' && github.ref || 'promotion' }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout GitOps source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: v1.32.2
      - name: Validate Akrion release contract and Argo renders
        run: ruby scripts/validate-akrion-gitops.rb

  promote:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.AKRION_GITOPS_TOKEN }}
    steps:
      - name: Require private-repository promotion token
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}" || {
            echo 'AKRION_GITOPS_TOKEN is required to read private akrion-monorepo CI metadata.' >&2
            exit 1
          }
      - name: Checkout GitOps dev
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ github.token }}
      - name: Resolve newest successful source revisions
        id: revisions
        shell: bash
        run: |
          set -euo pipefail

          monorepo="$(gh api \
            'repos/akrion-sim/akrion-monorepo/actions/workflows/ci.yml/runs?branch=main&status=success&event=push&per_page=1' \
            --jq '.workflow_runs[0].head_sha // empty')"
          if ! [[ "$monorepo" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'No successful main CI revision found for akrion-sim/akrion-monorepo.' >&2
            exit 1
          fi

          monorepo_tree="$(gh api "repos/akrion-sim/akrion-monorepo/git/trees/${monorepo}?recursive=1")"
          component_revision() {
            path="$1"
            revision="$(jq -r --arg path "$path" \
              '.tree[] | select(.path == $path and .mode == "160000") | .sha' \
              <<<"$monorepo_tree")"
            if ! [[ "$revision" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Successful monorepo revision does not pin ${path}." >&2
              exit 1
            fi
            printf '%s' "$revision"
          }

          backend="$(component_revision apps/akrion-backend.rs)"
          web="$(component_revision apps/akrion-web-server.rs)"
          soccer="$(component_revision apps/akrion-soccer-engine.rs)"
          des="$(component_revision apps/discrete-event-system.rs)"

          {
            echo "monorepo=$monorepo"
            echo "backend=$backend"
            echo "web=$web"
            echo "soccer=$soccer"
            echo "des=$des"
          } >> "$GITHUB_OUTPUT"
      - name: Update exact GitOps revisions
        env:
          AKRION_MONOREPO_REVISION: ${{ steps.revisions.outputs.monorepo }}
          AKRION_BACKEND_REVISION: ${{ steps.revisions.outputs.backend }}
          AKRION_WEB_REVISION: ${{ steps.revisions.outputs.web }}
          AKRION_SOCCER_REVISION: ${{ steps.revisions.outputs.soccer }}
          AKRION_DES_REVISION: ${{ steps.revisions.outputs.des }}
        run: ruby scripts/promote-akrion-gitops.rb
      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: v1.32.2
      - name: Validate promoted release and Argo renders
        run: ruby scripts/validate-akrion-gitops.rb
      - name: Commit and push desired state
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo 'Akrion GitOps is already at the newest successful revisions.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          short_monorepo="${{ steps.revisions.outputs.monorepo }}"
          git commit -m "chore(akrion): promote tested monorepo ${short_monorepo:0:12}"
          git push origin HEAD:dev

          {
            echo '### Akrion GitOps promotion'
            echo
            echo "- monorepo: \`${{ steps.revisions.outputs.monorepo }}\`"
            echo "- backend: \`${{ steps.revisions.outputs.backend }}\`"
            echo "- web: \`${{ steps.revisions.outputs.web }}\`"
            echo "- soccer: \`${{ steps.revisions.outputs.soccer }}\`"
            echo "- DES: \`${{ steps.revisions.outputs.des }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
