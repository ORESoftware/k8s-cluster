          git fetch origin "${TARGET_REVISION:-dev}"
          git submodule sync --recursive
          git submodule update --init --recursive
          current_sha="$(git ls-tree "origin/${TARGET_REVISION:-dev}" remote/deployments/gcs/chat-vibe | awk '{print $3}')"
          five_days_sha="${GCS_BISECT_OLD_SHA:-96d58c361b38c5c633d0f3d4389b2927c2ed66d3}"
