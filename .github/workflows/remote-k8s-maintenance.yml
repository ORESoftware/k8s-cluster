            kubectl -n default scale deployment/dd-ws-loadtest-rs-gcs --replicas=0 >/dev/null 2>&1 || true
            kubectl -n default scale deployment/dd-nodejs-ws-loadtest-gcs --replicas=0 >/dev/null 2>&1 || true
