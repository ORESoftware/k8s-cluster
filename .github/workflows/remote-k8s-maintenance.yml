name: Remote K8s maintenance

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/remote-k8s-maintenance.yml"
      - "remote/deployments/container-pool-rs/**"
      - "remote/deployments/queue-consumer-rs/**"
      - "remote/deployments/rest-api-rs/**"
      - "remote/deployments/host-cron/**"
      - "remote/deployments/dev-server/src/server.ts"
      - "remote/deployments/gcs/**"
      - "remote/deployments/ws-loadtest-rs/**"
      - "remote/deployments/gleamlang-ws-loadtest/**"
      - "remote/argocd/apps/gcs.application.yaml"
      - "remote/argocd/apps/dd-ws-loadtest-rs-gcs.application.yaml"
      - "remote/argocd/apps/dd-gleamlang-ws-loadtest-gcs.application.yaml"
      - "remote/argocd/apps/dd-nodejs-ws-loadtest-gcs.application.yaml"
      - "remote/argocd/dd-next-runtime/**"
  workflow_dispatch:
    inputs:
      operation:
        description: Maintenance operation to run on the EC2 Kubernetes host.
        required: true
        type: choice
        options:
          - inspect-unhealthy
          - inspect-next-runtime
          - inspect-container-pool
          - free-thread-pod-slots
          - repair-gleamlang-secret
          - reconcile-runtime
          - deploy-lambda-ui
          - verify-lambda-checks
          - seed-container-pool-config
          - test-container-pool-config
          - sync-agent-gh-pat
          - sync-agent-model-keys
          - verify-gleam-mcp-server
          - bootstrap-thread-go-services
          - verify-thread-go-services
          - deploy-bastion-live-containers
          - verify-bastion-live-containers
          - loadtest-gcs-wss
      target_revision:
        description: Git revision or branch to sync on the EC2 host.
        required: false
        default: dev

concurrency:
  group: remote-k8s-maintenance
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_revision || 'dev' }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.REMOTE_DEV_AWS_ROLE_TO_ASSUME || secrets.AWS_OIDC_ROLE_ARN || secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}

      - name: Run maintenance command through SSM
        env:
          INSTANCE_ID: ${{ secrets.AWS_SSM_INSTANCE_ID }}
          OPERATION: ${{ inputs.operation || (github.event_name == 'push' && contains(github.event.head_commit.message, '[gcs-loadtest]') && 'loadtest-gcs-wss') || (github.event_name == 'push' && 'reconcile-runtime') || 'inspect-unhealthy' }}
          TARGET_REVISION: ${{ inputs.target_revision || 'dev' }}
          REMOTE_DEV_GH_PAT: ${{ secrets.REMOTE_DEV_GH_PAT }}
          REMOTE_DEV_DEEPSEEK_API_KEY: ${{ secrets.REMOTE_DEV_DEEPSEEK_API_KEY }}
          REMOTE_DEV_DASHSCOPE_API_KEY: ${{ secrets.REMOTE_DEV_DASHSCOPE_API_KEY }}
          REMOTE_DEV_XAI_API_KEY: ${{ secrets.REMOTE_DEV_XAI_API_KEY }}
          THREAD_RUNTIME_MAX_AWAKE_DEPLOYMENTS: ${{ vars.THREAD_RUNTIME_MAX_AWAKE_DEPLOYMENTS || '4' }}
        run: |
          set -euo pipefail

          case "$OPERATION" in
            free-thread-pod-slots)
              python3 - <<'PY' > /tmp/remote-k8s-commands.json
          import json
          import os
          import shlex

          script = r'''set -euo pipefail
          namespace=default
          max_awake="${THREAD_RUNTIME_MAX_AWAKE_DEPLOYMENTS:-4}"
          case "$max_awake" in
            ''|*[!0-9]*) max_awake=4 ;;
          esac

          echo "=== node pod capacity ==="
          kubectl get nodes -o json | jq -r '.items[] | "\(.metadata.name) pods_capacity=\(.status.capacity.pods) pods_allocatable=\(.status.allocatable.pods)"'
          echo "=== default namespace pod count ==="
          kubectl -n "$namespace" get pods --no-headers 2>/dev/null | wc -l
          echo "=== thread runtime deployments before ==="
          kubectl -n "$namespace" get deploy -l app.kubernetes.io/component=thread-pod -o wide || true
          echo "=== thread runtime pods before ==="
          kubectl -n "$namespace" get pods -l app.kubernetes.io/component=thread-pod -o wide || true

          mapfile -t keep < <(
            kubectl -n "$namespace" get deploy -l app.kubernetes.io/component=thread-pod -o json \
              | jq -r --argjson max "$max_awake" '.items
                | map(select((.spec.replicas // 0) > 0))
                | sort_by(.metadata.creationTimestamp)
                | reverse
                | .[0:$max][]?.metadata.name'
          )
          echo "keeping newest awake deployments: ${keep[*]:-(none)}"

          scaled=0
          while IFS= read -r deployment; do
            keep_it=0
            for current in "${keep[@]}"; do
              if [[ "$deployment" == "$current" ]]; then
                keep_it=1
                break
              fi
            done
            if [[ "$keep_it" -eq 0 ]]; then
              echo "scaling stale thread runtime to zero: $deployment"
              kubectl -n "$namespace" scale deployment "$deployment" --replicas=0 || true
              ((scaled+=1))
            fi
          done < <(
            kubectl -n "$namespace" get deploy -l app.kubernetes.io/component=thread-pod -o json \
              | jq -r '.items[] | select((.spec.replicas // 0) > 0) | .metadata.name'
          )

          kubectl -n "$namespace" delete pod \
            -l app.kubernetes.io/component=thread-pod \
            --field-selector=status.phase=Pending \
            --wait=false || true

          echo "scaled stale awake deployments: $scaled"
          echo "=== thread runtime deployments after ==="
          kubectl -n "$namespace" get deploy -l app.kubernetes.io/component=thread-pod -o wide || true
          echo "=== thread runtime pods after ==="
          kubectl -n "$namespace" get pods -l app.kubernetes.io/component=thread-pod -o wide || true
          echo "=== recent scheduler events ==="
          kubectl get events -n "$namespace" --sort-by=.lastTimestamp | tail -80 || true
          '''

          print(json.dumps({
              "commands": [
                  "set -euo pipefail",
                  f"sudo -u ec2-user -H env THREAD_RUNTIME_MAX_AWAKE_DEPLOYMENTS={shlex.quote(os.environ.get('THREAD_RUNTIME_MAX_AWAKE_DEPLOYMENTS', '4'))} bash -lc {shlex.quote(script)}",
              ],
          }))
          PY
              ;;
            inspect-unhealthy)
              cat > /tmp/remote-k8s-commands.json <<'JSON'
          {
            "commands": [
              "set -euo pipefail",
              "echo '=== context ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl config current-context; kubectl get nodes -o wide'",
              "echo '=== default pods ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl get pods -n default -o wide'",
              "echo '=== unhealthy app labels ==='",
              "sudo -u ec2-user -H bash -lc 'for app in dd-remote-gateway dd-fsharp-ws-server dd-webrtc-signaling dd-trading-server dd-remote-web-home dd-gleam-mcp-server dd-gleamlang-server dd-container-pool dd-remote-rest-api dd-remote-queue-consumer; do echo --- $app; kubectl -n default get pods -l app=$app -o wide || true; done'",
              "echo '=== gleamlang ExternalSecret ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default get externalsecret dd-gleamlang-server-secrets -o yaml || true'",
              "echo '=== selected k8s secrets ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default get secret dd-gleamlang-server-secrets dd-gleam-mcp-server-secrets dd-agent-secrets dd-remote-auth-secrets --ignore-not-found'",
              "echo '=== recent default events ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl get events -n default --sort-by=.lastTimestamp | tail -160'",
              "echo '=== pod describes and logs ==='",
              "for p in $(sudo -u ec2-user -H bash -lc \"kubectl -n default get pods -o name | egrep 'dd-remote-gateway|dd-fsharp-ws-server|dd-webrtc-signaling|dd-trading-server|dd-remote-web-home|dd-gleam-mcp-server|dd-gleamlang-server|dd-container-pool|dd-remote-rest-api|dd-remote-queue-consumer'\" || true); do echo === DESCRIBE $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default describe $p | tail -160\" || true; echo === LOGS $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default logs $p --all-containers --tail=180\" || true; echo === PREV_LOGS $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default logs $p --all-containers --previous --tail=180 2>/dev/null\" || true; done",
              "echo '=== AWS secret candidates ==='",
              "for s in dd/remote-dev/gleamlang-server-secrets; do aws secretsmanager describe-secret --region us-east-1 --secret-id \"$s\" --query Name --output text 2>/dev/null || true; done"
            ]
          }
          JSON
              ;;
            inspect-next-runtime)
              cat > /tmp/remote-k8s-commands.json <<'JSON'
          {
            "commands": [
              "set -euo pipefail",
              "echo '=== dd-next-runtime summary ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o wide || true'",
              "echo '--- sync.status ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.sync.status}; echo'",
              "echo '--- sync.revision ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.sync.revision}; echo'",
              "echo '--- health.status ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.health.status}; echo'",
              "echo '--- operationState.phase ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.operationState.phase}; echo'",
              "echo '--- operationState.message ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.operationState.message}; echo'",
              "echo '--- operationState.syncResult.revision ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.operationState.syncResult.revision}; echo'",
              "echo '--- condition types ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.conditions[*].type}; echo'",
              "echo '--- condition messages ---'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.conditions[*].message}; echo'",
              "echo '=== dd-des-rs presence (default ns) ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default get deploy,svc,pod -l app=dd-des-rs -o wide || true'",
              "echo '=== app-controller recent errors mentioning dd-next-runtime ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd logs -l app.kubernetes.io/name=argocd-application-controller --tail=300 2>/dev/null | egrep -i \"dd-next-runtime|comparison|failed to|fetch|repository|permission denied\" | tail -40 || true'",
              "echo '=== force hard refresh ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd annotate application/dd-next-runtime argocd.argoproj.io/refresh=hard --overwrite || true'",
              "sleep 30",
              "echo '=== after refresh: summary + sync.status + dd-des-rs ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o wide || true'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n argocd get application/dd-next-runtime -o jsonpath={.status.sync.status}; echo'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default get deploy -l app=dd-des-rs -o wide || true'"
            ]
          }
          JSON
              ;;
            inspect-container-pool)
              cat > /tmp/remote-k8s-commands.json <<'JSON'
          {
            "commands": [
              "set -euo pipefail",
              "echo '=== context ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl config current-context; kubectl get nodes -o wide'",
              "echo '=== container pool resources ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default get deploy,rs,pod,svc,endpoints -l app=dd-container-pool -o wide || true'",
              "echo '=== queue/rest/web resources ==='",
              "sudo -u ec2-user -H bash -lc 'for app in dd-remote-queue-consumer dd-remote-rest-api dd-remote-web-home; do echo --- $app; kubectl -n default get pods -l app=$app -o wide || true; done'",
              "echo '=== host listeners for container-pool port ==='",
              "sudo -u ec2-user -H bash -lc 'sudo ss -ltnp | grep -E \":8102\\\\b\" || true'",
              "echo '=== managed nerdctl workers ==='",
              "sudo -u ec2-user -H bash -lc 'sudo nerdctl -n k8s.io ps -a --format \"{{.ID}} {{.Status}} {{.Names}}\" | grep -E \"dd-pool|dd-container-pool\" || true'",
              "echo '=== managed worker container details ==='",
              "sudo -u ec2-user -H bash -lc 'for c in $(sudo nerdctl -n k8s.io ps -a --format \"{{.Names}}\" | grep \"^dd-pool\" || true); do echo === $c ===; sudo nerdctl -n k8s.io inspect \"$c\" 2>/dev/null | jq -r \".[0] | {Name:.Name, Image:.Image, Created:.Created, Args:.Args, State:.State, Status:.Status}\" || true; echo --- logs; sudo nerdctl -n k8s.io logs --tail 80 \"$c\" 2>&1 || true; done'",
              "echo '=== container-pool /pools snapshot ==='",
              "sudo -u ec2-user -H bash -lc 'pod=$(kubectl -n default get pods -l app=dd-container-pool -o jsonpath=\"{.items[0].metadata.name}\"); kubectl -n default exec \"$pod\" -- bash -lc '\\''secret=\"${SERVER_AUTH_SECRET:-}\"; curl -fsS -H \"X-Server-Auth: $secret\" http://127.0.0.1:8102/pools || true'\\'''",
              "echo '=== container-pool deployment ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default describe deployment/dd-container-pool | tail -90 || true'",
              "echo '=== container-pool pods ==='",
              "for p in $(sudo -u ec2-user -H bash -lc \"kubectl -n default get pods -l app=dd-container-pool -o name\" || true); do echo === DESCRIBE $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default describe $p | tail -90\" || true; echo === PREV_LOGS $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default logs $p --all-containers --previous --tail=80 2>/dev/null\" || true; echo === LOGS $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default logs $p --all-containers --tail=80\" || true; done",
              "echo '=== queue-consumer recent logs ==='",
              "for p in $(sudo -u ec2-user -H bash -lc \"kubectl -n default get pods -l app=dd-remote-queue-consumer -o name\" || true); do echo === LOGS $p ===; sudo -u ec2-user -H bash -lc \"kubectl -n default logs $p --all-containers --tail=180\" || true; done",
              "echo '=== recent container-pool events ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl get events -n default --sort-by=.lastTimestamp | grep -E \"dd-container-pool|container-pool|8102\" | tail -80 || true'"
            ]
          }
          JSON
              ;;
            seed-container-pool-config)
              cat > /tmp/remote-k8s-commands.json <<'JSON'
          {
            "commands": [
              "set -euo pipefail",
              "echo '=== applying container-pool app_config seed ==='",
              "sudo -u ec2-user -H bash -lc 'set -euo pipefail; pod=$(kubectl -n default get pods -l app=dd-container-pool -o jsonpath=\"{.items[0].metadata.name}\"); kubectl -n default exec \"$pod\" -- bash -lc '\\''set -euo pipefail; export DEBIAN_FRONTEND=noninteractive; if ! command -v psql >/dev/null 2>&1; then apt-get update >/dev/null && apt-get install -y --no-install-recommends postgresql-client >/dev/null; fi; db_url=\"${CONTAINER_POOL_DATABASE_URL:-${AGENT_TASKS_RDS_DATABASE_URL:-${RDS_DATABASE_URL:-${DATABASE_URL:-}}}}\"; if [[ -z \"$db_url\" ]]; then echo \"missing database URL env\" >&2; exit 1; fi; psql \"$db_url\" -v ON_ERROR_STOP=1 -f /opt/dd-next-1/remote/databases/pg/seeds/app-config-table.sql >/tmp/container-pool-schema.out; psql \"$db_url\" -v ON_ERROR_STOP=1 -f /opt/dd-next-1/remote/databases/pg/seeds/container-pool-app-config.sql >/tmp/container-pool-seed.out; grep -E \"^(INSERT|UPDATE|CREATE|ALTER|NOTICE)\" /tmp/container-pool-schema.out /tmp/container-pool-seed.out || cat /tmp/container-pool-schema.out /tmp/container-pool-seed.out'\\'''",
              "echo '=== restarting container-pool and queue consumer ==='",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default rollout restart deployment/dd-container-pool deployment/dd-remote-queue-consumer'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default rollout status deployment/dd-container-pool --timeout=300s'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default rollout status deployment/dd-remote-queue-consumer --timeout=300s'",
              "sudo -u ec2-user -H bash -lc 'kubectl -n default get pods -l app=dd-container-pool -o wide'"
            ]
          }
          JSON
              ;;
            test-container-pool-config)
              python3 - <<'PY' > /tmp/remote-k8s-commands.json
          import json
          import os
          import shlex

          rev = os.environ.get("TARGET_REVISION", "dev") or "dev"
          script = r'''set -euo pipefail
          repo=/home/ec2-user/codes/dd/dd-next-1
          cd "$repo"

          echo "=== sync EC2 checkout ==="
          git fetch origin "${TARGET_REVISION:-dev}"
          git merge --ff-only FETCH_HEAD
          git rev-parse --short HEAD

          echo "=== wait for deployed services ==="
          kubectl -n default rollout status deployment/dd-remote-rest-api --timeout=300s
          kubectl -n default rollout status deployment/dd-remote-web-home --timeout=300s
          kubectl -n default rollout status deployment/dd-remote-gateway --timeout=300s

          echo "=== run /container-pool/config e2e from cluster ==="
          bash scripts/test/container-pool-config-e2e.sh
          '''

          commands = [
              "set -euo pipefail",
              f"sudo -u ec2-user -H env TARGET_REVISION={shlex.quote(rev)} bash -lc {shlex.quote(script)}",
          ]
          print(json.dumps({"commands": commands}))
          PY
              ;;
            repair-gleamlang-secret)
              python3 - <<'PY' > /tmp/remote-k8s-commands.json
          import json

          script = r'''set -euo pipefail
          secret_name="dd/remote-dev/gleamlang-server-secrets"
          region="${AWS_REGION:-us-east-1}"

          secret_json="$(
            sudo -u ec2-user -H python3 - <<'INNER'
          import base64
          import json
          import subprocess

          raw = subprocess.check_output([
              "kubectl",
              "-n",
              "default",
              "get",
              "secret",
              "dd-gleamlang-server-secrets",
              "-o",
              "json",
          ])
          secret = json.loads(raw)
          decoded = {
              key: base64.b64decode(value).decode("utf-8")
              for key, value in secret.get("data", {}).items()
          }
          if not decoded:
              raise SystemExit("dd-gleamlang-server-secrets has no data")
          print(json.dumps(decoded, separators=(",", ":")))
          INNER
          )"

          if aws secretsmanager describe-secret \
            --region "$region" \
            --secret-id "$secret_name" >/dev/null 2>/tmp/gleam-secret.err; then
            aws secretsmanager put-secret-value \
              --region "$region" \
              --secret-id "$secret_name" \
              --secret-string "$secret_json" >/dev/null
            echo "updated $secret_name"
          elif grep -q ResourceNotFoundException /tmp/gleam-secret.err; then
            aws secretsmanager create-secret \
              --region "$region" \
              --name "$secret_name" \
              --secret-string "$secret_json" >/dev/null
            echo "created $secret_name"
          else
            cat /tmp/gleam-secret.err >&2
            exit 1
          fi

          sudo -u ec2-user -H bash -lc \
            'kubectl -n default annotate externalsecret dd-gleamlang-server-secrets force-sync=$(date +%s) --overwrite'
          sleep 20
          sudo -u ec2-user -H bash -lc \
            'kubectl -n default get externalsecret dd-gleamlang-server-secrets'
          sudo -u ec2-user -H bash -lc \
            'kubectl -n default describe externalsecret dd-gleamlang-server-secrets | sed -n "/Status:/,/Events:/p"'
          sudo -u ec2-user -H bash -lc \
            'kubectl -n default get secret dd-gleamlang-server-secrets'
          '''

          print(json.dumps({"commands": ["set -euo pipefail", script]}))
          PY
              ;;
            reconcile-runtime)
              python3 - <<'PY' > /tmp/remote-k8s-commands.json
          import json
          import os
          import shlex
          rev = os.environ.get("TARGET_REVISION", "dev") or "dev"
          tag_images = r'''set -euo pipefail
          echo "=== copying dd-dev-server:dev image into dd-pool containerd namespace ==="
          sudo ctr -n dd-pool namespace ls >/dev/null 2>&1 || sudo ctr namespace create dd-pool || true
          if sudo nerdctl -n k8s.io images --quiet docker.io/library/dd-dev-server:dev >/tmp/dd-dev-server.found 2>/dev/null && [ -s /tmp/dd-dev-server.found ]; then
            sudo ctr -n k8s.io image export /tmp/dd-dev-server.tar docker.io/library/dd-dev-server:dev
            sudo ctr -n dd-pool image import /tmp/dd-dev-server.tar || true
            sudo rm -f /tmp/dd-dev-server.tar
            sudo nerdctl -n dd-pool images | grep dd-dev-server || true
          else
            echo "dd-dev-server:dev not present in k8s.io; skipping image copy"
          fi
          echo "=== removing any stale dd-pool managed containers in k8s.io ==="
          for c in $(sudo nerdctl -n k8s.io ps -aq --filter label=dd.container-pool.managed=true 2>/dev/null); do
            sudo nerdctl -n k8s.io rm -f "$c" || true
          done
          '''
          diag = r'''set +e
          echo "=== runtime versions on host ==="
          sudo nerdctl --version 2>&1 || true
          sudo containerd --version 2>&1 || true
          sudo runc --version 2>&1 || true
          which runc 2>&1 || true
          ls -la /usr/bin/runc /usr/local/bin/runc /usr/sbin/runc 2>&1 || true
          ls -la /usr/local/bin/containerd-shim-runc-v2 /usr/bin/containerd-shim-runc-v2 2>&1 || true
          stat -c '%a %u %g %n' /run/containerd/containerd.sock 2>&1 || true
          echo "=== live-mutex pool snapshot ==="
          pod="$(kubectl -n default get pods -l app=dd-container-pool -o jsonpath='{.items[0].metadata.name}')"
          if [ -n "$pod" ]; then
            kubectl -n default exec "$pod" -- bash -lc 'secret="${SERVER_AUTH_SECRET:-}"; curl -fsS -H "X-Server-Auth: $secret" http://127.0.0.1:8102/pools/nodejs-chat-claude-live-mutex-dev || true' | head -c 2000
            echo
          fi
          echo "=== managed nerdctl workers (dd-pool namespace) ==="
          sudo nerdctl -n dd-pool ps -a --format "{{.ID}} {{.Status}} {{.Names}}" | grep -E "dd-pool" || true
          echo "=== ctr containers and tasks in dd-pool ==="
          sudo ctr -n dd-pool containers ls 2>&1 | head -c 2000 || true
          echo
          sudo ctr -n dd-pool tasks ls 2>&1 | head -c 2000 || true
          echo
          echo "=== nerdctl inspect first worker ==="
          first_worker="$(sudo nerdctl -n dd-pool ps -a --format '{{.Names}}' | grep '^dd-pool' | head -n1 || true)"
          if [ -n "$first_worker" ]; then
            echo "worker=$first_worker"
            echo "--- raw inspect State ---"
            sudo nerdctl -n dd-pool inspect "$first_worker" 2>/tmp/inspect.err | jq -r '.[0].State' 2>&1 | head -c 800 || true
            echo
            echo "--- inspect stderr ---"
            cat /tmp/inspect.err | head -c 600 || true
            echo
            echo "--- worker logs ---"
