                      else:
                          values.append(existing)
                  except json.JSONDecodeError:
                      values.extend(item.strip() for item in existing.replace("\n", ",").split(",") if item.strip())
              elif isinstance(existing, list):
                  values.extend(str(item) for item in existing if str(item).strip())
              if value not in values:
                  values.append(value)
              data[key] = json.dumps(values, separators=(",", ":"))

          merge_json_array("DEEPSEEK_API_KEYS_JSON", os.environ.get("REMOTE_DEV_DEEPSEEK_API_KEY", ""))
