                break
              fi
              if [ "${failed:-0}" -ge 1 ]; then
                result=failed
                break
              fi
              sleep 1
            done
            kubectl -n default logs job/gcs-loadtest --tail=80 2>/dev/null \
              | grep -E '^(=== [0-9]/|=== summary|ALL TESTS PASSED|ONE OR MORE TESTS FAILED|>> .* exit=|FAIL|ERROR)' || true
