          kubectl -n argocd patch application/gcs --type merge -p '{"operation":{"initiatedBy":{"username":"gcs-recover"},"info":[{"name":"reason","value":"post-loadtest-recover"}],"sync":{"revision":"HEAD","prune":true}}}' || true
          for i in $(seq 1 60); do
