          except json.JSONDecodeError:
              data = {}
          if not isinstance(data, dict):
              data = {}

          def merge_json_array(key: str, value: str) -> None:
              value = (value or "").strip()
              if not value:
                  return
              existing = data.get(key)
              values = []
              if isinstance(existing, str) and existing.strip():
                  try:
