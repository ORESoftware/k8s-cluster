          import json
          import os
          import shlex

          rev = os.environ.get("TARGET_REVISION", "dev") or "dev"
          script = r'''set -euo pipefail
          repo=/home/ec2-user/codes/dd/dd-next-1
          capacity_apps="dd-next-runtime dd-akka-ws-server dd-dart-server dd-fsharp-ws-server dd-gleamlang-server dd-ws-loadtest-gleam"
