          import json
          import os
          import shlex

          rev = os.environ.get("TARGET_REVISION", "dev") or "dev"
          duration = os.environ.get("GCS_BISECT_DURATION_SECONDS", "60") or "60"
          script = r'''set -euo pipefail
          repo=/home/ec2-user/codes/dd/dd-next-1
          gcs_dir="$repo/remote/deployments/gcs/chat-vibe"
          results=/tmp/gcs-bisect-results.txt
          duration="${GCS_BISECT_DURATION_SECONDS:-60}"
