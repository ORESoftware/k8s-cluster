            sha="$2"
            echo "=== deploy candidate $label $sha ==="
            git -C "$gcs_dir" fetch origin
            git -C "$gcs_dir" switch --detach "$sha"
            git -C "$gcs_dir" show -s --format='candidate=%H date=%ci subject=%s'
            recover_stack "deploy-$label"
          }

          run_loader() {
            commit_label="$1"
            sha="$2"
            size_label="$3"
            replicas="$4"
            clients="$5"
            d="$6"
            loader_label="$7"
            total=$((replicas * clients))
            echo "=== load commit=$commit_label size=$size_label loader=$loader_label total=$total duration=${duration}s ==="
            recover_stack "pre-${commit_label}-${size_label}-${loader_label}" >/dev/null
            kubectl -n default set resources "deployment/$d" \
              --requests=cpu=1m,memory=512Mi \
              --limits=cpu=4,memory=8Gi >/dev/null || true
            kubectl -n default set env "deployment/$d" \
              CLIENT_COUNT="$clients" \
              GCS_CLIENTS_PER_CONV=5 \
              GCS_SENDERS_PER_CONV=5 \
              MESSAGES_PER_SECOND_PER_CLIENT=2.5 \
              RAMP_DELAY_MS=20 \
              CONNECT_TIMEOUT_SECONDS=60 \
              CONNECT_TIMEOUT_MS=60000 \
              RECONNECT_DELAY_MS=10000 \
              REPORT_INTERVAL_SECONDS=10 >/dev/null
