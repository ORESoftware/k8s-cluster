            sync="$(kubectl -n argocd get application/gcs -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            health="$(kubectl -n argocd get application/gcs -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
            echo "  gcs wait=$i phase=${phase:-none} sync=${sync:-unknown} health=${health:-unknown}"
            case "$phase:$sync" in
              Succeeded:Synced|:Synced) break ;;
              Failed:*|Error:*) break ;;
            esac
            sleep 5
          done
          kubectl -n argocd get application/gcs -o wide || true

          echo "=== recover GCS: stop any loaders ==="
          kubectl -n default scale deployment/dd-ws-loadtest-rs-gcs --replicas=0 || true
          kubectl -n default scale deployment/dd-nodejs-ws-loadtest-gcs --replicas=0 || true
          kubectl -n default scale deployment/dd-gleamlang-ws-loadtest-gcs --replicas=0 || true
          free_recovery_capacity

          echo "=== recover GCS: refresh and wait for dependencies ==="
