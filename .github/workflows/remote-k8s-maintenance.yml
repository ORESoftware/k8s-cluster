          fi

          echo "=== Argo CD application sync state ==="
          kubectl -n argocd get application/metrics-server application/dd-vpn -o wide || true
          '''

          print(json.dumps({
              "commands": [
                  "set -euo pipefail",
                  f"sudo -u ec2-user -H bash -lc {shlex.quote(script)}",
              ],
          }))
          PY
              ;;
