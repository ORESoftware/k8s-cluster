              phase="$(kubectl -n argocd get "application/$app" -o jsonpath='{.status.operationState.phase}' 2>/dev/null || true)"
              sync="$(kubectl -n argocd get "application/$app" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
              health="$(kubectl -n argocd get "application/$app" -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
              echo "  $app wait=$i phase=${phase:-none} sync=${sync:-unknown} health=${health:-unknown}"
              case "$phase:$sync" in
                Succeeded:Synced|:Synced) break ;;
                Failed:*|Error:*) break ;;
              esac
              sleep 5
            done
            kubectl -n argocd get "application/$app" -o wide || true
          }

          restore_loadtest_apps() {
            kubectl apply -f remote/argocd/apps/dd-ws-loadtest-rs-gcs.application.yaml || true
            kubectl apply -f remote/argocd/apps/dd-gleamlang-ws-loadtest-gcs.application.yaml || true
            kubectl apply -f remote/argocd/apps/dd-nodejs-ws-loadtest-gcs.application.yaml || true
