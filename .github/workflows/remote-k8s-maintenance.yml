                    memoryMiB: ((.metrics.memoryBytes // 0) / 1048576 | floor)
                  }]
                  | sort_by(-.cpuMilli) | .[0:8]
                ),
                terminalUrlSample: (.deployments[].pods[].containers[].terminalUrl | select(. != null and . != \"\")) | [.] | first,
                logsUrlSample: (.deployments[].pods[].containers[].logsUrl | select(. != null and . != \"\")) | [.] | first
              }" 2>&1 | head -120 || (echo "raw response (first 2000 chars):"; echo "$response" | head -c 2000)
            fi
          fi

          echo "=== /api/docs.json includes new routes (authed) ==="
          if [ -n "$bastion_pod" ]; then
            kubectl -n vpn exec "$bastion_pod" -- sh -lc \
              "curl -fsS -H 'X-Server-Auth: ${server_auth}' http://127.0.0.1:8111/api/docs.json" 2>/dev/null \
              | jq -r ".paths | keys[]" 2>/dev/null \
              | sort -u || echo "WARN: could not parse /api/docs.json"
          fi

          echo "=== real kubectl exec smoke against a target pod ==="
          # Pick a Running default-namespace pod that the bastion's
          # managed-deployment allowlist accepts and try a real exec
          # using the dd-bastion ServiceAccount token mounted at
          # /var/run/secrets/kubernetes.io/serviceaccount.
          target=$(kubectl -n default get pods -l app=dd-remote-web-home \
            -o jsonpath="{.items[?(@.status.phase=='Running')].metadata.name}" 2>/dev/null \
            | awk "{print \$1}")
          echo "target_pod=$target"
          if [ -n "$bastion_pod" ] && [ -n "$target" ]; then
            kubectl -n vpn exec "$bastion_pod" -- sh -lc \
              "kubectl --token=\$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) \
                       --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                       --server=https://kubernetes.default.svc \
                       -n default exec $target -- sh -lc 'echo bastion-exec-ok; hostname; id'" 2>&1 \
              | head -10 || true
          fi

          echo "=== real kubectl logs smoke against a target pod ==="
          if [ -n "$bastion_pod" ] && [ -n "$target" ]; then
            kubectl -n vpn exec "$bastion_pod" -- sh -lc \
              "kubectl --token=\$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) \
                       --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                       --server=https://kubernetes.default.svc \
                       -n default logs $target --tail=3" 2>&1 \
              | head -10 || true
          fi

          echo "=== /bastion/logs/ws WebSocket smoke (one connect, read N lines) ==="
          # Resolve the container name from the inventory response so we
          # do not hard-code a name that differs from the deployment
          # template (the bastion validates target.container before the
          # WS upgrade).
          target_container=$(echo "$response" \
            | jq --arg pod "$target" -r "[.deployments[].pods[] | select(.name == \$pod) | .containers[].name] | first // empty" 2>/tmp/jq_err || true)
          echo "target_container=$target_container"
          if [ -z "$target_container" ]; then
            echo "jq_err:"; cat /tmp/jq_err 2>/dev/null | head -5
            echo "response length=${#response}"
            target_container="remote-web-home"
            echo "fallback target_container=$target_container"
          fi
          if [ -n "$bastion_pod" ] && [ -n "$target" ] && [ -n "$target_container" ] && [ -n "$server_auth" ]; then
            kubectl -n vpn exec "$bastion_pod" -- sh -lc "
              python3 - <<'PYEOF'
          import json, ssl, socket, base64, hashlib, secrets, urllib.parse, threading, time
          host = '127.0.0.1'
          port = 8111
          path = '/logs/ws?namespace=default&deployment=dd-remote-web-home&pod=$target&container=$target_container'
          key = base64.b64encode(secrets.token_bytes(16)).decode()
          headers = (
              f'GET {path} HTTP/1.1\r\n'
              f'Host: {host}:{port}\r\n'
              f'Upgrade: websocket\r\n'
              f'Connection: Upgrade\r\n'
              f'Sec-WebSocket-Key: {key}\r\n'
              f'Sec-WebSocket-Version: 13\r\n'
              f'X-Server-Auth: $server_auth\r\n'
              '\r\n'
          )
          s = socket.create_connection((host, port), timeout=15)
          s.sendall(headers.encode())
          buf = b''
          while b'\r\n\r\n' not in buf:
              chunk = s.recv(4096)
              if not chunk:
                  break
              buf += chunk
          status_line = buf.split(b'\r\n', 1)[0].decode(errors='replace')
          print(f'handshake: {status_line}')
          assert b'101' in buf.split(b'\r\n', 1)[0], 'expected 101 Switching Protocols'
          deadline = time.time() + 4
          frames = []
          tail = buf.split(b'\r\n\r\n', 1)[1]
          s.settimeout(2.5)
          try:
              while time.time() < deadline:
                  if tail:
                      data = tail
                      tail = b''
                  else:
                      try:
                          data = s.recv(8192)
                      except socket.timeout:
                          break
                      if not data:
                          break
                  while data:
                      if len(data) < 2:
                          break
                      b1 = data[0]
                      b2 = data[1]
                      opcode = b1 & 0x0f
                      length = b2 & 0x7f
                      offset = 2
                      if length == 126:
                          length = int.from_bytes(data[offset:offset+2], 'big'); offset += 2
                      elif length == 127:
                          length = int.from_bytes(data[offset:offset+8], 'big'); offset += 8
                      if offset + length > len(data):
                          break
                      payload = data[offset:offset+length]
                      data = data[offset+length:]
                      if opcode == 1:
                          frames.append(payload.decode('utf-8', errors='replace'))
                      if len(frames) >= 5:
                          break
                  if len(frames) >= 5:
                      break
          finally:
              try:
                  s.close()
              except Exception:
                  pass
          print(f'frames: {len(frames)}')
          for f in frames[:5]:
              print(f'frame: {f[:200]}')
          PYEOF
            " 2>&1 | head -25 || true
          fi

          echo "=== /home public HTML markers ==="
          curl -k -fsS --max-time 10 https://54.91.17.58/home 2>/dev/null \
            | grep -oE "openTerminalPanel|openLogsPanel|safeBastionLogsUrl|metricChip|inline-panel|home-terminal-frame|terminal-dock" \
            | sort | uniq -c || true

