              size_label="${size_spec%%:*}"
              rest="${size_spec#*:}"
              replicas="${rest%%:*}"
              clients="${rest##*:}"
              for loader_spec in "dd-ws-loadtest-rs-gcs:rust" "dd-nodejs-ws-loadtest-gcs:node" "dd-gleamlang-ws-loadtest-gcs:gleam"; do
