name: secret scan

# Defense-in-depth gate: catches AWS keys, AWS STS session tokens, and
# common provider tokens before they land in the default branch. The
# repo uses External Secrets + AWS Secrets Manager as the source of
# truth (`remote/argocd/secrets/readme.md`); nothing in Git should ever
# need a raw AWS, OpenAI, Anthropic, GitHub, or session token. This
# workflow runs gitleaks against the changed range and fails fast.

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks (no plaintext secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Public OSS scan; no license token required for public repos.
          # If this becomes private, switch to GITLEAKS_LICENSE secret
          # populated from AWS Secrets Manager via the operator path.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .github/gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  aws-shape-grep:
    name: belt-and-suspenders AWS regex check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Independent regex sweep so a misconfigured gitleaks rule cannot
      # silently let an AWS key through. Hardcoded shapes only; no
      # tracking of secrets, no exfiltration. Excludes the agent-side
      # redaction code that legitimately references these patterns.
      - name: Grep for AWS access-key shapes
        run: |
          set -euo pipefail
          # ripgrep is preinstalled on ubuntu-latest images; install if missing.
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq ripgrep
          fi
          # AWS access-key id shapes: AKIA… (IAM long-lived) and ASIA…
          # (STS short-lived). Allow occurrences in this workflow file
          # and in the redaction sources/tests that document the shape.
          if rg --hidden \
               --glob '!.git/**' \
               --glob '!.github/workflows/secret-scan.yml' \
               --glob '!.github/gitleaks.toml' \
               --glob '!remote/deployments/dev-server/src/server.ts' \
               --glob '!remote/deployments/dev-server/dist/**' \
               --glob '!remote/deployments/container-pool-rs/src/main.rs' \
               --glob '!remote/tests/**' \
               -e '(?:AKIA|ASIA)[0-9A-Z]{16}' .; then
            echo "::error::Found a literal AWS access-key shape in the tree."
            exit 1
          fi
          # IQoJ-prefixed AWS STS session token shape (>=180 chars).
          if rg --hidden \
               --glob '!.git/**' \
               --glob '!.github/workflows/secret-scan.yml' \
               --glob '!.github/gitleaks.toml' \
               --glob '!remote/deployments/dev-server/src/server.ts' \
               --glob '!remote/deployments/dev-server/dist/**' \
               --glob '!remote/tests/**' \
               -e 'IQoJ[A-Za-z0-9+/=_\-]{180,}' .; then
            echo "::error::Found a literal AWS STS session-token shape in the tree."
            exit 1
          fi
