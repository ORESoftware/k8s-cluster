name: repo checks

on:
  pull_request:
  push:
    # PRs already run via `pull_request`; limit push runs to the long-lived
    # branches so feature-branch pushes don't double-run every check.
    branches:
      - dev
      - main
    tags:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-checks-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-contracts:
    name: api docs + static repo contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Require private-submodule read token
        env:
          K8S_SUBMODULE_TOKEN: ${{ secrets.REMOTE_DEV_GH_PAT }}
        run: test -n "$K8S_SUBMODULE_TOKEN"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize required contract submodule
        env:
          K8S_SUBMODULE_TOKEN: ${{ secrets.REMOTE_DEV_GH_PAT }}
        run: |
          set -euo pipefail
          token_url="https://x-access-token:${K8S_SUBMODULE_TOKEN}@github.com/"
          git config --global url."${token_url}".insteadOf "git@github.com:"
          trap 'git config --global --unset-all url."${token_url}".insteadOf || true' EXIT
          git submodule update --init --recursive --depth 1 -- remote/libs

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: remote/tests/pnpm-lock.yaml

      - name: Install remote test dependencies
        run: pnpm install --frozen-lockfile
        working-directory: remote/tests

      - name: Verify generated API docs are current
        run: pnpm run check:api-docs
        working-directory: remote/tests

      - name: Verify observability coverage
        run: pnpm run check:observability-coverage
        working-directory: remote/tests

      - name: Run static repo contract tests
        run: |
          set -euo pipefail
          static_tests=(
            general/agent-breadcrumb-pipeline.test.ts
            general/ai-ml-platform-config.test.ts
            general/athleto-app-routing.test.ts
            general/bastion-config.test.ts
            general/browser-job-runner-config.test.ts
            general/browser-test-server-config.test.ts
            general/build-server-config.test.ts
            general/cluster-doctor-cron.test.ts
            general/cluster-hardening.test.ts
            general/container-pool-config.test.ts
            general/contract-service-config.test.ts
            general/des-simulator-config.test.ts
            general/dev-server-container-pool-config.test.ts
            general/fabrication-cad-source-intake.test.ts
            general/fsharp-ws-server-config.test.ts
            general/gateway-service-directory.test.ts
            general/gcs-chat-config.test.ts
            general/gleam-lambda-runner-config.test.ts
            general/gleam-mcp-server-config.test.ts
            general/gleam-mcp-server-observability.test.ts
            general/gleam-websocket-nats-fanout.test.ts
            general/live-mutex-config.test.ts
            general/local-k8s-cleanup.test.ts
            general/mdp-optimizer-config.test.ts
            general/nats-config.test.ts
            general/nats-connect-resilience.test.ts
            general/nats-shadow-handoff.test.ts
            general/observability-config.test.ts
            general/redis-cache-config.test.ts
            general/remote-libs-submodule-contract.test.ts
            general/remote-dev-worker-git-hardening.test.ts
            general/runtime-split-config.test.ts
            general/selenium-server-config.test.ts
            general/thread-fleet-exporter-go-config.test.ts
            general/thread-operator-go-config.test.ts
            general/trading-server-config.test.ts
            general/vpn-config.test.ts
            general/web-home-agents-tasks-links.test.ts
            general/web-home-agents-threads-container-state.test.ts
            general/web-home-lambda-highlighter.test.ts
            general/web-home-shared-header.test.ts
            general/web-scraper-config.test.ts
            general/webrtc-signaling-service.test.ts
            general/ws-loadtest-config.test.ts
          )
          pnpm exec tsx --test "${static_tests[@]}"
        working-directory: remote/tests

  backend-contracts:
    name: backend pins + SeaORM + NATS contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Require private-submodule read token
        env:
          K8S_SUBMODULE_TOKEN: ${{ secrets.REMOTE_DEV_GH_PAT }}
        run: test -n "$K8S_SUBMODULE_TOKEN"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pinned libraries and backend repositories
        env:
          K8S_SUBMODULE_TOKEN: ${{ secrets.REMOTE_DEV_GH_PAT }}
        run: |
          set -euo pipefail
          token_url="https://x-access-token:${K8S_SUBMODULE_TOKEN}@github.com/"
          git config --global url."${token_url}".insteadOf "git@github.com:"
          trap 'git config --global --unset-all url."${token_url}".insteadOf || true' EXIT
          git submodule update --init --depth 1 -- remote/libs remote/deployments

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: remote/tests/pnpm-lock.yaml

      - name: Install remote test dependencies
        run: pnpm install --frozen-lockfile
        working-directory: remote/tests

      - name: Verify pinned backend architecture and NATS subjects
        run: pnpm exec tsx --test general/backend-architecture-contract.test.ts general/nats-subject-contract.test.ts
        working-directory: remote/tests

  kustomize-render:
    name: render kustomize overlays
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize required public overlay submodule
        run: |
          set -euo pipefail
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 -- remote/deployments/mip-solver-node.rs

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Render overlays
        run: |
          set -euo pipefail

          # Auto-discover every tracked kustomization.yaml so new overlays
          # gain coverage without touching this list. `git ls-files` does not
          # descend into submodules (intentional: their overlays belong to
          # their own repos' CI); the exceptions below are rendered explicitly.
          git ls-files '*/kustomization.yaml' | while read -r f; do
            overlay="$(dirname "$f")"
            echo "::group::${overlay}"
            output="${RUNNER_TEMP}/${overlay//\//__}.yaml"
            kubectl kustomize --load-restrictor=LoadRestrictionsNone "${overlay}" > "${output}"
            test -s "${output}"
            echo "::endgroup::"
          done

          # Overlays hosted inside the explicitly initialized submodule that
          # git ls-files cannot see;
          # carried over from the previous hardcoded list so coverage
          # does not regress.
          submodule_overlays=(
            remote/deployments/mip-solver-node.rs/k8s
            remote/deployments/mip-solver-node.rs/k8s-gpu
          )
          for overlay in "${submodule_overlays[@]}"; do
            echo "::group::${overlay}"
            output="${RUNNER_TEMP}/${overlay//\//__}.yaml"
            kubectl kustomize --load-restrictor=LoadRestrictionsNone "${overlay}" > "${output}"
            test -s "${output}"
            echo "::endgroup::"
          done
