name: Refresh remote web-home local image

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/refresh-remote-web-home-local-image.yml"
      - "remote/argocd/apps/dd-next-runtime.application.yaml"
      - "remote/argocd/dd-next-runtime/**"
      - "remote/web-home-rs/**"
  workflow_dispatch:

concurrency:
  group: refresh-remote-web-home-local-image
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.REMOTE_DEV_AWS_ROLE_TO_ASSUME || secrets.AWS_OIDC_ROLE_ARN || secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}

      - name: Build local image on EC2 through SSM
        run: |
          set -euo pipefail
          command_id="$(
            aws ssm send-command \
              --instance-ids "${{ secrets.AWS_SSM_INSTANCE_ID }}" \
              --document-name "AWS-RunShellScript" \
              --comment "Refresh remote web-home local image" \
              --parameters 'commands=[
                "set -euo pipefail",
                "cd /home/ec2-user/codes/dd/dd-next-1",
                "git fetch origin dev",
                "git merge --ff-only origin/dev",
                "sudo nerdctl -n k8s.io build --progress=plain -t docker.io/library/dd-remote-web-home:dev remote/web-home-rs",
                "kubectl apply -f remote/argocd/apps/dd-next-runtime.application.yaml",
                "kubectl -n argocd get application/dd-next-runtime",
                "kubectl -n argocd annotate application/dd-next-runtime argocd.argoproj.io/refresh=hard --overwrite",
                "kubectl delete pod -n default -l app=dd-remote-web-home --wait=true --timeout=120s",
                "kubectl wait --for=condition=Available deployment/dd-remote-web-home -n default --timeout=300s",
                "kubectl get deployment dd-remote-web-home -n default -o wide",
                "kubectl get pods -n default -l app=dd-remote-web-home -o wide"
              ]' \
              --query "Command.CommandId" \
              --output text
          )"
          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "${{ secrets.AWS_SSM_INSTANCE_ID }}"
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ secrets.AWS_SSM_INSTANCE_ID }}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json
