name: Refresh remote web-home local image

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/refresh-remote-web-home-local-image.yml"
      - "remote/argocd/apps/dd-next-runtime.application.yaml"
      - "remote/argocd/dd-next-runtime/**"
      - "remote/deployments/container-pool-rs/**"
      - "remote/deployments/dev-server/**"
      - "remote/deployments/idle-reaper-rs/**"
      - "remote/k8s/**"
      - "remote/deployments/queue-consumer-rs/**"
      - "remote/deployments/rest-api-rs/**"
      - "remote/deployments/web-home-rs/**"
  workflow_dispatch:

concurrency:
  group: refresh-remote-web-home-local-image
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.REMOTE_DEV_AWS_ROLE_TO_ASSUME || secrets.AWS_OIDC_ROLE_ARN || secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}

      - name: Build local image on EC2 through SSM
        run: |
          set -euo pipefail
          command_id="$(
            aws ssm send-command \
              --instance-ids "${{ secrets.AWS_SSM_INSTANCE_ID }}" \
              --document-name "AWS-RunShellScript" \
              --comment "Refresh remote web-home local image" \
              --parameters 'commands=[
                "set -euo pipefail",
                "sudo -u ec2-user -H bash -lc '\''set -euo pipefail; source_repo=/home/ec2-user/codes/dd/dd-next-1; cd \"$source_repo\"; git status --short; refresh_root=$(mktemp -d /tmp/dd-web-home-refresh.XXXXXX); git clone --depth 1 --branch dev \"$(git config --get remote.origin.url)\" \"$refresh_root\"; cd \"$refresh_root\"; git rev-parse --short HEAD; printf \"%s\\n\" \"$refresh_root\" >/tmp/dd-web-home-refresh-root'\''",
                "refresh_root=$(cat /tmp/dd-web-home-refresh-root); cd \"$refresh_root\"",
                "sudo nerdctl -n k8s.io build --progress=plain -t docker.io/library/dd-dev-server:dev remote/deployments/dev-server",
                "sudo nerdctl -n k8s.io build --progress=plain -t docker.io/library/dd-remote-web-home:dev remote/deployments/web-home-rs",
                "sudo -u ec2-user -H bash -lc '\''refresh_root=$(cat /tmp/dd-web-home-refresh-root); cd \"$refresh_root\" && kubectl apply -f remote/argocd/apps/dd-next-runtime.application.yaml'\''",
                "sudo -u ec2-user -H bash -lc '\''refresh_root=$(cat /tmp/dd-web-home-refresh-root); cd \"$refresh_root\" && kubectl apply -f remote/argocd/apps/dd-gleam-lambda-runner.application.yaml'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n argocd get application/dd-next-runtime'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n argocd get application/dd-gleam-lambda-runner'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n argocd annotate application/dd-next-runtime argocd.argoproj.io/refresh=hard --overwrite'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n argocd annotate application/dd-gleam-lambda-runner argocd.argoproj.io/refresh=hard --overwrite'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout restart deployment/dd-container-pool deployment/dd-remote-rest-api deployment/dd-remote-queue-consumer deployment/dd-idle-reaper || true'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout restart deployment/dd-gleam-lambda-runner || true'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout status deployment/dd-container-pool --timeout=300s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout status deployment/dd-remote-rest-api --timeout=300s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout status deployment/dd-remote-queue-consumer --timeout=300s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout status deployment/dd-idle-reaper --timeout=300s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl -n default rollout status deployment/dd-gleam-lambda-runner --timeout=300s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl delete pod -n default -l app=dd-remote-web-home --wait=true --timeout=120s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl wait --for=condition=Available deployment/dd-remote-web-home -n default --timeout=300s'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl get deployment dd-remote-web-home -n default -o wide'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl get deployment dd-container-pool dd-remote-rest-api dd-remote-queue-consumer dd-idle-reaper dd-remote-web-home -n default -o wide'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl get deployment dd-gleam-lambda-runner -n default -o wide'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl get pods -n default -l \"app in (dd-container-pool,dd-remote-rest-api,dd-remote-queue-consumer,dd-idle-reaper,dd-remote-web-home)\" -o wide'\''",
                "sudo -u ec2-user -H bash -lc '\''kubectl get pods -n default -l app=dd-gleam-lambda-runner -o wide'\''"
              ]' \
              --query "Command.CommandId" \
              --output text
          )"
          status=""
          for attempt in {1..180}; do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ secrets.AWS_SSM_INSTANCE_ID }}" \
                --query "Status" \
                --output text 2>/dev/null || true
            )"
            case "$status" in
              Success|Cancelled|Cancelling|Failed|TimedOut)
                break
                ;;
            esac
            echo "SSM command $command_id status=${status:-pending} attempt=$attempt/180"
            sleep 10
          done
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ secrets.AWS_SSM_INSTANCE_ID }}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json | tee /tmp/ssm-invocation.json
          status="$(jq -r '.Status' /tmp/ssm-invocation.json)"
          test "$status" = "Success"
